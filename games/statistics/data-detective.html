<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Data Detective – MathMunch</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --s1:#A29BFE;--s2:#6C5CE7;
      --bg:#F5F3FF;--white:#FFFFFF;
      --dark:#1E1E2E;--mid:#525270;
      --radius:16px;
      --shadow:0 4px 20px rgba(108,92,231,0.15);
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
    .topbar{position:sticky;top:0;z-index:100;background:var(--white);box-shadow:0 2px 12px rgba(108,92,231,0.1);display:flex;align-items:center;gap:12px;padding:10px 20px}
    .back-btn{text-decoration:none;color:var(--s2);font-weight:700;font-size:.9rem;padding:6px 14px;border-radius:20px;border:2px solid var(--s1);transition:.2s}
    .back-btn:hover{background:var(--s1);color:white}
    .topbar-logo{text-decoration:none;font-weight:800;font-size:1.1rem;color:var(--s2)}
    .game-title{font-weight:700;font-size:1rem;color:var(--dark);flex:1;text-align:center}
    .level-badge{background:var(--s2);color:white;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:20px}
    .score-display{font-weight:800;font-size:1rem;color:var(--s2);min-width:80px;text-align:right}
    .progress-bar-wrap{position:fixed;bottom:0;left:0;right:0;height:8px;background:#E8E4FF;z-index:200}
    .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#A29BFE,#6C5CE7);transition:width .4s ease;border-radius:0 4px 4px 0}
    .end-screen{display:none;position:fixed;inset:0;background:rgba(30,30,46,0.85);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center}
    .end-screen.show{display:flex}
    .end-card{background:white;border-radius:24px;padding:40px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    .end-stars{font-size:2.5rem;margin-bottom:12px}
    .end-title{font-size:1.8rem;font-weight:800;color:var(--dark);margin-bottom:8px}
    .end-score{font-size:1.1rem;color:var(--mid);margin-bottom:24px}
    .btn{display:inline-block;padding:12px 28px;border-radius:30px;border:none;cursor:pointer;font-size:1rem;font-weight:700;transition:.2s}
    .btn-play{background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;margin:0 6px}
    .btn-home{background:#F0F4FF;color:var(--s2);margin:0 6px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,92,231,0.3)}
    .game-area{max-width:800px;margin:0 auto;padding:24px 16px 90px}

    /* Case file card */
    .case-file{background:#FBF7EC;border:2px solid #D4A853;border-radius:var(--radius);padding:0;overflow:hidden;box-shadow:0 6px 28px rgba(108,92,231,0.12),0 2px 8px rgba(0,0,0,0.08)}
    .case-header{background:#D4A853;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
    .case-number{font-size:.85rem;font-weight:800;color:#7B4F00;letter-spacing:.08em;text-transform:uppercase}
    .case-status{font-size:.8rem;font-weight:700;color:#7B4F00;display:flex;align-items:center;gap:6px}
    .case-body{padding:22px 24px}

    /* Stamp overlay */
    .stamp-wrap{position:relative;display:inline-block}
    .stamp{position:absolute;top:-10px;right:-10px;font-size:.85rem;font-weight:800;padding:5px 10px;border-radius:4px;border:3px solid;transform:rotate(15deg);letter-spacing:.05em;opacity:0;transition:opacity .3s;pointer-events:none;z-index:10}
    .stamp.solved{color:#006400;border-color:#006400;background:rgba(200,255,200,0.6)}
    .stamp.incorrect{color:#8B0000;border-color:#8B0000;background:rgba(255,200,200,0.6)}
    .stamp.show{opacity:1}

    /* Chart area */
    .chart-area{background:white;border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid #E0D5B0}
    .chart-title{font-size:.9rem;font-weight:700;color:var(--mid);margin-bottom:12px;text-align:center}

    /* Detective question */
    .detective-q-label{font-size:.75rem;font-weight:700;color:#8B6914;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
    .detective-q{font-size:1.1rem;font-weight:700;color:var(--dark);margin-bottom:18px;line-height:1.4}

    /* Options */
    .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
    .opt-btn{background:white;border:2px solid #D4A853;border-radius:10px;padding:14px 12px;font-size:.95rem;font-weight:700;color:#6B4C00;cursor:pointer;transition:.2s;text-align:left}
    .opt-btn:hover{background:#FFF3CD;transform:translateY(-1px)}
    .opt-btn.correct{background:#d4f8ec;border-color:#00b894;color:#00734a}
    .opt-btn.wrong{background:#ffeaea;border-color:#d63031;color:#c0392b}
    .opt-btn.reveal{background:#e0fff5;border-color:#00b894;color:#00734a}
    .opt-btn.disabled{pointer-events:none;opacity:.8}

    /* Feedback */
    .feedback-strip{border-radius:10px;padding:12px 16px;font-weight:700;font-size:.9rem;margin-top:12px;opacity:0;transition:opacity .3s}
    .feedback-strip.show{opacity:1}
    .feedback-strip.good{background:#d4f8ec;color:#00734a;border:2px solid #00b894}
    .feedback-strip.bad{background:#ffeaea;color:#c0392b;border:2px solid #d63031}

    .next-btn{display:block;margin:14px auto 0;padding:11px 32px;background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;border:none;border-radius:30px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;opacity:0;pointer-events:none}
    .next-btn.visible{opacity:1;pointer-events:auto}
    .next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,92,231,0.3)}

    /* Bar chart */
    .bar-chart{display:flex;align-items:flex-end;gap:6px;height:140px;padding-bottom:24px;position:relative;border-bottom:2px solid #ccc;border-left:2px solid #ccc;margin:0 8px}
    .bar-col{display:flex;flex-direction:column;align-items:center;flex:1}
    .bar{width:100%;border-radius:4px 4px 0 0;transition:height .4s;position:relative}
    .bar-label{font-size:.65rem;font-weight:700;color:var(--mid);position:absolute;bottom:-20px;text-align:center;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bar-val{position:absolute;top:-18px;font-size:.7rem;font-weight:700;color:var(--dark);width:100%;text-align:center}

    /* Line chart */
    .line-chart-wrap{position:relative;padding-bottom:28px;margin:0 8px}

    /* Pie chart */
    .pie-legend{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;margin-top:10px}
    .pie-legend-item{display:flex;align-items:center;gap:5px;font-size:.8rem;font-weight:600;color:var(--mid)}
    .pie-swatch{width:13px;height:13px;border-radius:3px;flex-shrink:0}

    /* round counter */
    .round-label{font-size:.78rem;color:var(--mid);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

</head>

// ── Colour palette ────────────────────────────────────────────────────
const BAR_COLS=['#A29BFE','#6C5CE7','#FF6B6B','#4ECDC4','#FDCB6E','#74B9FF','#55EFC4','#FD79A8'];

// ── SVG Pie helpers ───────────────────────────────────────────────────
function polarXY(cx,cy,r,deg){
  const rad=(deg-90)*Math.PI/180;
  return{x:+(cx+r*Math.cos(rad)).toFixed(3),y:+(cy+r*Math.sin(rad)).toFixed(3)};
}
function buildPie(segs,size=200){
  const cx=size/2,cy=size/2,r=size/2-10;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  let cum=0;
  segs.forEach(s=>{
    const start=cum*3.6,end=(cum+s.pct)*3.6;
    cum+=s.pct;
    const p1=polarXY(cx,cy,r,start),p2=polarXY(cx,cy,r,end);
    const large=s.pct>50?1:0;
    svg+=`<path d="M${cx},${cy} L${p1.x},${p1.y} A${r},${r} 0 ${large},1 ${p2.x},${p2.y} Z" fill="${s.col}" stroke="white" stroke-width="2.5"/>`;
    const mid=start+(end-start)/2;
    const lp=polarXY(cx,cy,r*0.62,mid);
    svg+=`<text x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="white" font-weight="700">${s.emoji||''}</text>`;
  });
  svg+='</svg>';
  return svg;
}

// ── Build bar chart SVG ───────────────────────────────────────────────
function buildBarSVG(labels,values,yLabel){
  const w=340, h=160, pad={top:24,right:10,bottom:42,left:36};
  const cw=w-pad.left-pad.right, ch=h-pad.top-pad.bottom;
  const maxV=Math.max(...values);
  const barW=Math.floor(cw/values.length)-8;
  let svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible">`;
  // axes
  svg+=`<line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top+ch}" stroke="#ccc" stroke-width="2"/>`;
  svg+=`<line x1="${pad.left}" y1="${pad.top+ch}" x2="${pad.left+cw}" y2="${pad.top+ch}" stroke="#ccc" stroke-width="2"/>`;
  // y-axis label
  if(yLabel) svg+=`<text x="10" y="${pad.top+ch/2}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#999" transform="rotate(-90,10,${pad.top+ch/2})">${yLabel}</text>`;
  // gridlines & y-labels
  const steps=4;
  for(let i=0;i<=steps;i++){
    const v=Math.round(maxV*(i/steps));
    const gy=pad.top+ch-ch*(i/steps);
    svg+=`<line x1="${pad.left}" y1="${gy}" x2="${pad.left+cw}" y2="${gy}" stroke="#eee" stroke-width="1"/>`;
    svg+=`<text x="${pad.left-4}" y="${gy}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#999">${v}</text>`;
  }
  // bars
  values.forEach((v,i)=>{
    const bh=ch*(v/maxV);
    const bx=pad.left+i*(cw/values.length)+(cw/values.length-barW)/2;
    const by=pad.top+ch-bh;
    svg+=`<rect x="${bx}" y="${by}" width="${barW}" height="${bh}" rx="3" fill="${BAR_COLS[i%BAR_COLS.length]}"/>`;
    svg+=`<text x="${bx+barW/2}" y="${by-4}" text-anchor="middle" font-size="9" fill="${BAR_COLS[i%BAR_COLS.length]}" font-weight="700">${v}</text>`;
    // x label
    const lx=bx+barW/2, ly=pad.top+ch+14;
    svg+=`<text x="${lx}" y="${ly}" text-anchor="middle" font-size="9" fill="#666">${labels[i]}</text>`;
  });
  svg+='</svg>';
  return svg;
}

// ── Build line chart SVG ──────────────────────────────────────────────
function buildLineSVG(labels,values,yLabel){
  const w=340, h=160, pad={top:24,right:10,bottom:42,left:36};
  const cw=w-pad.left-pad.right, ch=h-pad.top-pad.bottom;
  const maxV=Math.max(...values);
  const step=cw/(values.length-1);
  let svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible">`;
  svg+=`<line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top+ch}" stroke="#ccc" stroke-width="2"/>`;
  svg+=`<line x1="${pad.left}" y1="${pad.top+ch}" x2="${pad.left+cw}" y2="${pad.top+ch}" stroke="#ccc" stroke-width="2"/>`;
  if(yLabel) svg+=`<text x="10" y="${pad.top+ch/2}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#999" transform="rotate(-90,10,${pad.top+ch/2})">${yLabel}</text>`;
  // gridlines
  const steps=4;
  for(let i=0;i<=steps;i++){
    const v=Math.round(maxV*(i/steps));
    const gy=pad.top+ch-ch*(i/steps);
    svg+=`<line x1="${pad.left}" y1="${gy}" x2="${pad.left+cw}" y2="${gy}" stroke="#eee" stroke-width="1"/>`;
    svg+=`<text x="${pad.left-4}" y="${gy}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#999">${v}</text>`;
  }
  // line path
  const pts=values.map((v,i)=>{
    const x=pad.left+i*step;
    const y=pad.top+ch-ch*(v/maxV);
    return`${x},${y}`;
  });
  svg+=`<polyline points="${pts.join(' ')}" fill="none" stroke="#6C5CE7" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>`;
  // dots & labels
  values.forEach((v,i)=>{
    const x=pad.left+i*step;
    const y=pad.top+ch-ch*(v/maxV);
    svg+=`<circle cx="${x}" cy="${y}" r="5" fill="#6C5CE7" stroke="white" stroke-width="2"/>`;
    svg+=`<text x="${x}" y="${y-10}" text-anchor="middle" font-size="9" fill="#6C5CE7" font-weight="700">${v}</text>`;
    svg+=`<text x="${x}" y="${pad.top+ch+14}" text-anchor="middle" font-size="9" fill="#666">${labels[i]}</text>`;
  });
  svg+='</svg>';
  return svg;
}

let pool=[...QUESTIONS];

// ── Helpers ───────────────────────────────────────────────────────────
function updateScore(pts){score+=pts;document.getElementById('score').textContent=score;}
function updateProgress(){document.getElementById('progressBar').style.width=(current/total*100)+'%';}
function showEnd(){
  const pct=score/total;
  document.getElementById('endStars').textContent=pct>=0.8?'⭐⭐⭐':pct>=0.5?'⭐⭐':'⭐';
  document.getElementById('endTitle').textContent=pct>=0.8?'Case Closed!':pct>=0.5?'Good detective work!':'Keep investigating!';
  document.getElementById('endScore').textContent='You solved '+score+' / '+total+' cases';
  document.getElementById('endScreen').classList.add('show');
}
function restartGame(){
  document.getElementById('endScreen').classList.remove('show');
  score=0;current=0;
  document.getElementById('score').textContent='0';
  pool=[...QUESTIONS];
  initGame();
}

// ── Build chart HTML ──────────────────────────────────────────────────
function buildChart(q){
  if(q.chartType==='bar'){
    return buildBarSVG(q.chartData.labels,q.chartData.values,q.chartData.yLabel);
  } else if(q.chartType==='line'){
    return buildLineSVG(q.chartData.labels,q.chartData.values,q.chartData.yLabel);
  } else if(q.chartType==='pie'){
    const pieSVG=buildPie(q.chartData.segs,200);
    let legend=`<div class="pie-legend">`;
    q.chartData.segs.forEach(s=>{
      legend+=`<div class="pie-legend-item"><span class="pie-swatch" style="background:${s.col}"></span>${s.label} ${s.emoji}</div>`;
    });
    legend+=`</div>`;
    return `<div style="display:flex;flex-direction:column;align-items:center;">${pieSVG}${legend}</div>`;
  }
  return '';
}

// ── Render question ───────────────────────────────────────────────────
function renderQuestion(q){
  const gc=document.getElementById('gameContainer');
  const chartHTML=buildChart(q);
  let html=`<div class="case-file">
    <div class="case-header">
      <span class="case-number">🔍 Case File #${q.caseFile}</span>
      <span class="case-status">Investigation in progress…</span>
    </div>
    <div class="case-body">
      <div class="round-label">Question ${current+1} of ${total}</div>
      <div class="chart-area">
        <div class="chart-title">${q.chartTitle}</div>
        ${chartHTML}
      </div>
      <div class="detective-q-label">🔍 Detective's Question:</div>
      <div class="detective-q">${q.question}</div>
      <div class="stamp-wrap" id="stampWrap">
        <div class="opts-grid">`;
  q.opts.forEach(opt=>{
    const safeOpt=opt.replace(/'/g,"\\'");
    const safeFb=q.fb.replace(/'/g,"\\'");
    html+=`<button class="opt-btn" onclick="checkAnswer(this,'${safeOpt}','${q.answer.replace(/'/g,"\\'")}','${safeFb}')">${opt}</button>`;
  });
  html+=`</div>
        <div class="stamp solved" id="solvedStamp">SOLVED ✓</div>
        <div class="stamp incorrect" id="incorrectStamp">INCORRECT ✗</div>
      </div>
      <div class="feedback-strip" id="feedbackStrip"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Case →</button>
    </div>
  </div>`;
  gc.innerHTML=html;
}

function checkAnswer(btn,chosen,correct,fbText){
  const all=document.querySelectorAll('.opt-btn');
  all.forEach(b=>{
    b.classList.add('disabled');
    if(b===btn) b.classList.add(chosen===correct?'correct':'wrong');
    else if(b.textContent===correct) b.classList.add('reveal');
  });
  const ok=chosen===correct;
  if(ok) updateScore(1);

  // Show stamp
  if(ok){
    document.getElementById('solvedStamp').classList.add('show');
  } else {
    document.getElementById('incorrectStamp').classList.add('show');
  }

  const fb=document.getElementById('feedbackStrip');
  fb.textContent=(ok?'✅ Correct! ':'❌ Wrong. ')+fbText;
  fb.className='feedback-strip show '+(ok?'good':'bad');
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion(){
  current++;
  updateProgress();
  if(current>=total){showEnd();return;}
  renderQuestion(pool[current]);
}

function initGame(){
  updateProgress();
  renderQuestion(pool[current]);
}
document.addEventListener('DOMContentLoaded',initGame);
</script>
</body>
</html>
