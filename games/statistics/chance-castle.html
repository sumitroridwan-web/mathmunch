<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
  <title>Chance Castle – MathMunch</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --s1:#FB923C;--s2:#F97316;
      --bg:#F5F3FF;--white:#FFFFFF;
      --dark:#1E1E2E;--mid:#525270;
      --radius:16px;
      --shadow:0 4px 20px rgba(249,115,22,0.15);
    }
    body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
    .topbar{position:sticky;top:0;z-index:100;background:var(--white);box-shadow:0 2px 12px rgba(249,115,22,0.1);display:flex;align-items:center;gap:12px;padding:10px 20px}
    .back-btn{text-decoration:none;color:var(--s2);font-weight:700;font-size:.9rem;padding:6px 14px;border-radius:20px;border:2px solid var(--s1);transition:.2s}
    .back-btn:hover{background:var(--s1);color:white}
    .topbar-logo{text-decoration:none;font-weight:800;font-size:1.1rem;color:var(--s2)}
    .game-title{font-weight:700;font-size:1rem;color:var(--dark);flex:1;text-align:center}
    .level-badge{background:var(--s2);color:white;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:20px}
    .score-display{font-weight:800;font-size:1rem;color:var(--s2);min-width:80px;text-align:right}
    .progress-bar-wrap{position:fixed;bottom:0;left:0;right:0;height:12px;background:#FFF7ED;z-index:200}
    .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#FB923C,#F97316);transition:width .4s ease;border-radius:0 4px 4px 0}
    .end-screen{display:none;position:fixed;inset:0;background:rgba(30,30,46,0.85);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center}
    .end-screen.show{display:flex}
    .end-card{background:white;border-radius:24px;padding:40px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    .end-stars{font-size:2.5rem;margin-bottom:12px}
    .end-title{font-size:1.8rem;font-weight:800;color:var(--dark);margin-bottom:8px}
    .end-score{font-size:1.1rem;color:var(--mid);margin-bottom:24px}
    .btn{display:inline-block;padding:12px 28px;border-radius:30px;border:none;cursor:pointer;font-size:1rem;font-weight:700;transition:.2s}
    .btn-play{background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;margin:0 6px}
    .btn-home{background:#FFF7ED;color:var(--s2);margin:0 6px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,0.3)}
    .game-area{max-width:800px;margin:0 auto;padding:24px 16px 90px}

    /* Game-specific */
    .question-card{background:var(--white);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);margin-bottom:24px;text-align:center}
    .round-label{font-size:.8rem;color:var(--mid);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
    .question-text{font-size:1.25rem;font-weight:700;color:var(--dark);margin-bottom:20px;line-height:1.4}
    .question-sub{font-size:.95rem;color:var(--mid);margin-bottom:20px}

    /* Tower buttons */
    .towers-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}
    .tower-btn{display:flex;flex-direction:column;align-items:center;cursor:pointer;border:none;background:none;padding:0;gap:6px;transition:.2s}
    .tower-btn:hover .tower-body{transform:translateY(-4px);box-shadow:0 8px 24px rgba(249,115,22,0.3)}
    .tower-body{width:80px;background:linear-gradient(180deg,#A29BFE,#6C5CE7);border-radius:6px 6px 0 0;padding:14px 8px 10px;position:relative;transition:.2s;box-shadow:0 4px 12px rgba(249,115,22,0.2)}
    .tower-top{width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:20px solid #5048C5;margin:0 auto 4px;display:block}
    .tower-windows{display:flex;gap:6px;justify-content:center;margin-bottom:6px}
    .tower-win{width:10px;height:14px;background:rgba(255,255,255,0.35);border-radius:2px 2px 5px 5px}
    .tower-label{font-size:.72rem;font-weight:800;color:white;line-height:1.2;text-align:center}
    .tower-base{width:88px;height:10px;background:#5048C5;border-radius:0 0 4px 4px}
    .tower-btn.correct .tower-body{background:linear-gradient(180deg,#55efc4,#00b894);box-shadow:0 0 20px rgba(0,184,148,0.5)}
    .tower-btn.correct .tower-base{background:#00b894}
    .tower-btn.correct .tower-top{border-bottom-color:#00b894}
    .tower-btn.wrong .tower-body{background:linear-gradient(180deg,#ff7675,#d63031);box-shadow:0 0 20px rgba(214,48,49,0.4)}
    .tower-btn.wrong .tower-base{background:#d63031}
    .tower-btn.wrong .tower-top{border-bottom-color:#d63031}
    .tower-btn.disabled{pointer-events:none;opacity:.7}

    /* Visual area */
    .visual-area{display:flex;justify-content:center;margin-bottom:16px}
    svg text{font-family:'Lexend',system-ui,sans-serif}

    /* Fraction options */
    .fraction-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:0 auto}
    .frac-btn{background:var(--white);border:2px solid var(--s1);border-radius:12px;padding:18px;font-size:1.3rem;font-weight:800;color:var(--s2);cursor:pointer;transition:.2s;box-shadow:0 2px 8px rgba(249,115,22,0.1)}
    .frac-btn:hover{background:var(--s1);color:white;transform:translateY(-2px)}
    .frac-btn.correct{background:#00b894;border-color:#00b894;color:white}
    .frac-btn.wrong{background:#d63031;border-color:#d63031;color:white}
    .frac-btn.disabled{pointer-events:none;opacity:.7}

    /* Feedback */
    .feedback-bar{border-radius:12px;padding:14px 20px;font-weight:700;font-size:1rem;text-align:center;margin-top:16px;opacity:0;transition:opacity .3s}
    .feedback-bar.show{opacity:1}
    .feedback-bar.good{background:#d4f8ec;color:#00734a;border:2px solid #00b894}
    .feedback-bar.bad{background:#ffeaea;color:#c0392b;border:2px solid #d63031}

    /* Next btn */
    .next-btn{display:block;margin:16px auto 0;padding:12px 36px;background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;border:none;border-radius:30px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;opacity:0;pointer-events:none}
    .next-btn.visible{opacity:1;pointer-events:auto}
    .next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,0.3)}

    /* Castle skyline decoration */
    .castle-skyline{display:flex;gap:4px;justify-content:center;align-items:flex-end;margin-bottom:20px;opacity:.3}
    .cs-tower{background:var(--s2);border-radius:4px 4px 0 0}

    /* Bag visual */
    .bag-legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px}
    .bag-dot{width:14px;height:14px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:4px}
    .bag-item{font-size:.85rem;font-weight:600;color:var(--mid);display:flex;align-items:center}
  </style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>
<div class="topbar">
  <a href="../../index.html" class="back-btn">← All Games</a>
  <a href="../../index.html" class="topbar-logo">🧮 MathMunch</a>
  <span class="game-title">🏰 Chance Castle</span>
  <span class="level-badge">P4</span>
  <span class="score-display">⭐ <span id="score">0</span></span>
</div>

<div class="game-area">
  <div class="castle-skyline" id="skyline"></div>
  <div id="gameContainer"></div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div class="end-stars" id="endStars">⭐⭐⭐</div>
    <div class="end-title" id="endTitle">Amazing!</div>
    <div class="end-score" id="endScore">You scored 10/10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a href="../../index.html" class="btn btn-home">Home</a>
  </div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<script>
// ── State ─────────────────────────────────────────────────────────────
let score = 0, total = 10, current = 0;
const LABELS = ['Impossible','Unlikely','Even chance','Likely','Certain'];

// ── Questions ────────────────────────────────────────────────────────
// Type A: likelihood label  (answer = index into LABELS 0-4)
// Type B: probability fraction (answer = fraction string)
const questions = [
  // 5 likelihood questions
  {type:'label', scenario:'Rolling a number less than 7 on a 1–6 die', answer:'Certain',
   hint:'Every face of the die is less than 7!'},
  {type:'label', scenario:'Picking a red ball from a bag of 9 blue balls and 1 red ball', answer:'Unlikely',
   hint:'Only 1 out of 10 balls is red — that\'s quite rare.'},
  {type:'label', scenario:'Getting heads OR tails when flipping a fair coin', answer:'Certain',
   hint:'A fair coin must land on one of the two sides.'},
  {type:'label', scenario:'Rolling a 7 on a standard 1–6 die', answer:'Impossible',
   hint:'A standard die only goes from 1 to 6 — no 7!'},
  {type:'label', scenario:'Picking a yellow sweet from a bag with 5 yellow and 5 green sweets', answer:'Even chance',
   hint:'5 yellow out of 10 total — exactly half!'},
  // 5 probability fraction questions
  {type:'fraction', visual:'bag',
   balls:[{col:'#e17055',n:3,name:'red'},{col:'#74b9ff',n:5,name:'blue'},{col:'#55efc4',n:2,name:'green'}],
   question:'What is the probability of picking a red ball?',
   answer:'3/10', options:['3/10','1/4','1/2','3/5'],
   hint:'3 red balls out of 10 total = 3/10'},
  {type:'fraction', visual:'spinner',
   slices:[{col:'#A29BFE',deg:180,name:'Purple'},{col:'#fdcb6e',deg:90,name:'Yellow'},{col:'#ff7675',deg:90,name:'Red'}],
   question:'What is the probability of landing on Purple?',
   answer:'1/2', options:['1/4','1/3','1/2','2/3'],
   hint:'Purple takes up half the spinner (180°) = 1/2'},
  {type:'fraction', visual:'bag',
   balls:[{col:'#e17055',n:2,name:'red'},{col:'#74b9ff',n:2,name:'blue'},{col:'#fdcb6e',n:4,name:'yellow'}],
   question:'What is the probability of picking a blue ball?',
   answer:'1/4', options:['1/4','1/3','2/8','1/2'],
   hint:'2 blue out of 8 total = 2/8 = 1/4'},
  {type:'fraction', visual:'spinner',
   slices:[{col:'#6C5CE7',deg:90,name:'Purple'},{col:'#ff7675',deg:90,name:'Red'},{col:'#55efc4',deg:90,name:'Green'},{col:'#fdcb6e',deg:90,name:'Yellow'}],
   question:'What is the probability of landing on Green?',
   answer:'1/4', options:['1/2','1/4','3/4','1/3'],
   hint:'Green is 1 of 4 equal sections = 1/4'},
  {type:'fraction', visual:'bag',
   balls:[{col:'#e17055',n:1,name:'red'},{col:'#74b9ff',n:1,name:'blue'},{col:'#a29bfe',n:3,name:'purple'},{col:'#55efc4',n:1,name:'green'}],
   question:'What is the probability of picking a purple ball?',
   answer:'1/2', options:['3/5','1/2','1/3','2/3'],
   hint:'3 purple out of 6 total = 3/6 = 1/2'},
];

// Shuffle questions (keep first 5 label + last 5 fraction order but randomise each group)
function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
let pool = [...shuffleArray(questions.slice(0,5)), ...shuffleArray(questions.slice(5))];

// ── Helpers ──────────────────────────────────────────────────────────
function updateScore(pts){score+=pts;document.getElementById('score').textContent=score;}
function updateProgress(){document.getElementById('progressBar').style.width=(current/total*100)+'%';}
function showEnd(){
  const pct=score/total;
  document.getElementById('endStars').textContent=pct>=0.8?'⭐⭐⭐':pct>=0.5?'⭐⭐':'⭐';
  document.getElementById('endTitle').textContent=pct>=0.8?'Brilliant!':pct>=0.5?'Good job!':'Keep trying!';
  document.getElementById('endScore').textContent='You scored '+score+' / '+total;
  document.getElementById('endScreen').classList.add('show');
}
function restartGame(){
  document.getElementById('endScreen').classList.remove('show');
  score=0;current=0;
  document.getElementById('score').textContent='0';
  pool=[...shuffleArray(questions.slice(0,5)),...shuffleArray(questions.slice(5))];
  initGame();
}

// ── SVG Helpers ──────────────────────────────────────────────────────
function polarToXY(cx,cy,r,angleDeg){
  const rad=(angleDeg-90)*Math.PI/180;
  return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};
}
function buildSpinner(slices,size=200){
  const cx=size/2,cy=size/2,r=size/2-8;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  let cumDeg=0;
  slices.forEach((s,i)=>{
    const start=polarToXY(cx,cy,r,cumDeg);
    cumDeg+=s.deg;
    const end=polarToXY(cx,cy,r,cumDeg);
    const large=s.deg>180?1:0;
    svg+=`<path d="M${cx},${cy} L${start.x},${start.y} A${r},${r} 0 ${large},1 ${end.x},${end.y} Z" fill="${s.col}" stroke="white" stroke-width="2"/>`;
    // label
    const mid=cumDeg-s.deg/2;
    const lp=polarToXY(cx,cy,r*0.62,mid);
    svg+=`<text x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="11" font-weight="700">${s.name}</text>`;
  });
  svg+=`<circle cx="${cx}" cy="${cy}" r="6" fill="white" stroke="#999" stroke-width="1"/>`;
  svg+='</svg>';
  return svg;
}
function buildBag(balls){
  const total=balls.reduce((s,b)=>s+b.n,0);
  // draw simple SVG bag
  let svg=`<svg width="200" height="160" viewBox="0 0 200 160">`;
  // bag shape
  svg+=`<ellipse cx="100" cy="110" rx="70" ry="45" fill="#e8e0f0" stroke="#b0a0d0" stroke-width="2"/>`;
  svg+=`<path d="M30,110 Q30,55 100,55 Q170,55 170,110" fill="#d8ccea" stroke="#b0a0d0" stroke-width="2"/>`;
  svg+=`<path d="M80,55 Q100,30 120,55" fill="none" stroke="#b0a0d0" stroke-width="3" stroke-linecap="round"/>`;
  // balls inside
  const positions=[
    [65,95],[85,105],[105,100],[125,95],[75,115],[100,118],[120,112],
    [90,88],[110,90],[55,108],[140,108],[60,120]
  ];
  let idx=0;
  balls.forEach(b=>{
    for(let i=0;i<b.n;i++){
      if(idx<positions.length){
        const[px,py]=positions[idx];
        svg+=`<circle cx="${px}" cy="${py}" r="9" fill="${b.col}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
        idx++;
      }
    }
  });
  svg+='</svg>';
  // legend
  let legend=`<div class="bag-legend">`;
  balls.forEach(b=>{
    legend+=`<div class="bag-item"><span class="bag-dot" style="background:${b.col}"></span>${b.n} ${b.name}</div>`;
  });
  legend+=`</div>`;
  return svg+legend;
}

// ── Render ───────────────────────────────────────────────────────────
function renderSkyline(){
  const sky=document.getElementById('skyline');
  const heights=[30,50,40,60,35,55,45,50,30,40,60,35];
  sky.innerHTML=heights.map(h=>`<div class="cs-tower" style="width:18px;height:${h}px"></div>`).join('');
}

function renderQuestion(q){
  const gc=document.getElementById('gameContainer');
  let html=`<div class="question-card">
    <div class="round-label">Question ${current+1} of ${total}</div>`;

  if(q.type==='label'){
    html+=`<div class="question-text">${q.scenario}</div>
    <div class="question-sub">How likely is this event?</div>
    <div class="towers-row">`;
    LABELS.forEach(lbl=>{
      html+=`<button class="tower-btn" onclick="answerLabel(this,'${lbl}','${q.answer}','${q.hint.replace(/'/g,"\\'")}')">
        <span class="tower-top"></span>
        <div class="tower-body">
          <div class="tower-windows"><div class="tower-win"></div><div class="tower-win"></div></div>
          <div class="tower-label">${lbl}</div>
        </div>
        <div class="tower-base"></div>
      </button>`;
    });
    html+=`</div>`;
  } else {
    // probability fraction
    const visHTML=q.visual==='bag'?buildBag(q.balls):buildSpinner(q.slices);
    html+=`<div class="visual-area">${visHTML}</div>
    <div class="question-text">${q.question}</div>
    <div class="fraction-options">`;
    q.options.forEach(opt=>{
      const safeHint=q.hint.replace(/'/g,"\\'");
      html+=`<button class="frac-btn" onclick="answerFrac(this,'${opt}','${q.answer}','${safeHint}')">${opt}</button>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="feedback-bar" id="feedbackBar"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
  </div>`;
  gc.innerHTML=html;
}

function showFeedback(correct,hint){
  const fb=document.getElementById('feedbackBar');
  fb.textContent=correct?'✅ Correct! '+hint:'❌ Not quite. '+hint;
  fb.className='feedback-bar show '+(correct?'good':'bad');
  document.getElementById('nextBtn').classList.add('visible');
}

function answerLabel(btn, chosen, correct, hint){
  const all=document.querySelectorAll('.tower-btn');
  all.forEach(b=>{
    b.classList.add('disabled');
    if(b===btn){b.classList.add(chosen===correct?'correct':'wrong');}
    else if(b.querySelector('.tower-label').textContent===correct){b.classList.add('correct');}
  });
  const ok=chosen===correct;
  if(ok) updateScore(1);
  showFeedback(ok,hint);
}

function answerFrac(btn, chosen, correct, hint){
  const all=document.querySelectorAll('.frac-btn');
  all.forEach(b=>{
    b.classList.add('disabled');
    if(b===btn){b.classList.add(chosen===correct?'correct':'wrong');}
    else if(b.textContent===correct){b.classList.add('correct');}
  });
  const ok=chosen===correct;
  if(ok) updateScore(1);
  showFeedback(ok,hint);
}

function nextQuestion(){
  current++;
  updateProgress();
  if(current>=total){showEnd();return;}
  renderQuestion(pool[current]);
}

function initGame(){
  renderSkyline();
  updateProgress();
  renderQuestion(pool[current]);
}

document.addEventListener('DOMContentLoaded',initGame);
</script>
</body>
</html>
