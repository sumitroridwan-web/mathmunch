<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
  <title>Pie Chart Party – MathMunch</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --s1:#FB923C;--s2:#F97316;
      --bg:#F5F3FF;--white:#FFFFFF;
      --dark:#1E1E2E;--mid:#525270;
      --radius:16px;
      --shadow:0 4px 20px rgba(249,115,22,0.15);
    }
    body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
    .topbar{position:sticky;top:0;z-index:100;background:var(--white);box-shadow:0 2px 12px rgba(249,115,22,0.1);display:flex;align-items:center;gap:12px;padding:10px 20px}
    .back-btn{text-decoration:none;color:var(--s2);font-weight:700;font-size:.9rem;padding:6px 14px;border-radius:20px;border:2px solid var(--s1);transition:.2s}
    .back-btn:hover{background:var(--s1);color:white}
    .topbar-logo{text-decoration:none;font-weight:800;font-size:1.1rem;color:var(--s2)}
    .game-title{font-weight:700;font-size:1rem;color:var(--dark);flex:1;text-align:center}
    .level-badge{background:var(--s2);color:white;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:20px}
    .score-display{font-weight:800;font-size:1rem;color:var(--s2);min-width:80px;text-align:right}
    .progress-bar-wrap{position:fixed;bottom:0;left:0;right:0;height:12px;background:#FFF7ED;z-index:200}
    .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#FB923C,#F97316);transition:width .4s ease;border-radius:0 4px 4px 0}
    .end-screen{display:none;position:fixed;inset:0;background:rgba(30,30,46,0.85);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center}
    .end-screen.show{display:flex}
    .end-card{background:white;border-radius:24px;padding:40px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    .end-stars{font-size:2.5rem;margin-bottom:12px}
    .end-title{font-size:1.8rem;font-weight:800;color:var(--dark);margin-bottom:8px}
    .end-score{font-size:1.1rem;color:var(--mid);margin-bottom:24px}
    .btn{display:inline-block;padding:12px 28px;border-radius:30px;border:none;cursor:pointer;font-size:1rem;font-weight:700;transition:.2s}
    .btn-play{background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;margin:0 6px}
    .btn-home{background:#FFF7ED;color:var(--s2);margin:0 6px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,0.3)}
    .game-area{max-width:800px;margin:0 auto;padding:24px 16px 90px}

    /* Party decorations */
    .party-header{text-align:center;margin-bottom:20px;font-size:1.6rem;letter-spacing:.05em}
    .confetti-strip{display:flex;justify-content:center;gap:4px;margin-bottom:12px;flex-wrap:wrap}
    .confetti-strip span{font-size:1.3rem}

    /* Question card */
    .question-card{background:var(--white);border-radius:var(--radius);padding:28px 24px;box-shadow:var(--shadow);text-align:center}
    .round-label{font-size:.8rem;color:var(--mid);font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
    .chart-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:20px}
    .chart-title{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:4px}

    /* Legend */
    .legend{display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;margin-top:6px}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;color:var(--mid)}
    .legend-swatch{width:16px;height:16px;border-radius:4px;flex-shrink:0}

    /* Question text */
    .question-text{font-size:1.15rem;font-weight:700;color:var(--dark);margin-bottom:20px;line-height:1.4}

    /* Answer buttons */
    .answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:420px;margin:0 auto}
    .ans-btn{background:#F5F3FF;border:2px solid var(--s1);border-radius:12px;padding:16px 12px;font-size:1.1rem;font-weight:700;color:var(--s2);cursor:pointer;transition:.2s}
    .ans-btn:hover{background:var(--s1);color:white;transform:translateY(-2px)}
    .ans-btn.correct{background:#00b894;border-color:#00b894;color:white}
    .ans-btn.wrong{background:#d63031;border-color:#d63031;color:white}
    .ans-btn.reveal{background:#e8f5e9;border-color:#00b894;color:#00734a}
    .ans-btn.disabled{pointer-events:none;opacity:.75}

    /* Feedback */
    .feedback-bar{border-radius:12px;padding:14px 20px;font-weight:700;font-size:.95rem;text-align:center;margin-top:16px;opacity:0;transition:opacity .3s}
    .feedback-bar.show{opacity:1}
    .feedback-bar.good{background:#d4f8ec;color:#00734a;border:2px solid #00b894}
    .feedback-bar.bad{background:#ffeaea;color:#c0392b;border:2px solid #d63031}

    .next-btn{display:block;margin:14px auto 0;padding:12px 36px;background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;border:none;border-radius:30px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;opacity:0;pointer-events:none}
    .next-btn.visible{opacity:1;pointer-events:auto}
    .next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,0.3)}
  </style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>
<div class="topbar">
  <a href="../../index.html" class="back-btn">← All Games</a>
  <a href="../../index.html" class="topbar-logo">🧮 MathMunch</a>
  <span class="game-title">🎉 Pie Chart Party</span>
  <span class="level-badge">P4</span>
  <span class="score-display">⭐ <span id="score">0</span></span>
</div>

<div class="game-area">
  <div class="confetti-strip">
    <span>🎉</span><span>🎂</span><span>🍰</span><span>🎈</span><span>🎊</span><span>🍰</span><span>🎂</span><span>🎉</span>
  </div>
  <div id="gameContainer"></div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div class="end-stars" id="endStars">⭐⭐⭐</div>
    <div class="end-title" id="endTitle">Amazing!</div>
    <div class="end-score" id="endScore">You scored 10/10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again 🎉</button>
    <a href="../../index.html" class="btn btn-home">Home</a>
  </div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<script>
// ── State ────────────────────────────────────────────────────────────
let score=0, total=10, current=0;

// ── Pie chart datasets ───────────────────────────────────────────────
// Each segment: {label, emoji, col, pct (0–100)}
const DATASETS = [
  {
    title:'Favourite Ice Cream Flavours 🍦',
    total:20,
    segments:[
      {label:'Chocolate',emoji:'🍫',col:'#6C5CE7',pct:50},
      {label:'Vanilla',  emoji:'🍦',col:'#FDCB6E',pct:25},
      {label:'Strawberry',emoji:'🍓',col:'#FF6B6B',pct:25},
    ]
  },
  {
    title:'After-School Activities 🏃',
    total:40,
    segments:[
      {label:'Football',emoji:'⚽',col:'#A29BFE',pct:50},
      {label:'Swimming',emoji:'🏊',col:'#4ECDC4',pct:25},
      {label:'Reading', emoji:'📚',col:'#FDCB6E',pct:12.5},
      {label:'Art',     emoji:'🎨',col:'#FF6B6B',pct:12.5},
    ]
  },
  {
    title:'Favourite Pizza Toppings 🍕',
    total:24,
    segments:[
      {label:'Cheese',     emoji:'🧀',col:'#FDCB6E',pct:33.33},
      {label:'Pepperoni',  emoji:'🍕',col:'#FF6B6B',pct:33.33},
      {label:'Vegetables', emoji:'🥦',col:'#55EFC4',pct:16.67},
      {label:'Ham',        emoji:'🥩',col:'#A29BFE',pct:16.67},
    ]
  },
  {
    title:'Pets Owned in Year 4 🐾',
    total:20,
    segments:[
      {label:'Dogs',  emoji:'🐶',col:'#FDCB6E',pct:50},
      {label:'Cats',  emoji:'🐱',col:'#A29BFE',pct:25},
      {label:'Fish',  emoji:'🐟',col:'#4ECDC4',pct:12.5},
      {label:'Other', emoji:'🐹',col:'#FF6B6B',pct:12.5},
    ]
  }
];

// ── Questions ────────────────────────────────────────────────────────
// datasetIdx, questionType, answer, options, feedback
const QUESTIONS = [
  // Dataset 0 – ice cream (3 questions)
  {ds:0, q:'Which flavour is the most popular?', ans:'Chocolate 🍫', opts:['Chocolate 🍫','Vanilla 🍦','Strawberry 🍓','Equal amounts'], fb:'Chocolate takes up half the chart — the biggest slice!'},
  {ds:0, q:'Approximately what fraction of students chose Vanilla?', ans:'1/4', opts:['1/4','1/3','1/2','3/4'], fb:'Vanilla is 25% = 1/4 of the chart.'},
  {ds:0, q:'If 20 students were asked, how many chose Strawberry?', ans:'5', opts:['5','10','4','8'], fb:'Strawberry = 1/4 of 20 = 5 students.'},

  // Dataset 1 – activities (3 questions)
  {ds:1, q:'Which activity is the most popular?', ans:'Football ⚽', opts:['Football ⚽','Swimming 🏊','Reading 📚','Art 🎨'], fb:'Football takes up half the chart (50%)!'},
  {ds:1, q:'Approximately what fraction chose Swimming?', ans:'1/4', opts:['1/2','1/4','1/3','3/4'], fb:'Swimming is 25% = 1/4 of the total.'},
  {ds:1, q:'If 40 students took part, how many chose Football?', ans:'20', opts:['10','20','15','8'], fb:'Football = 50% of 40 = 20 students.'},

  // Dataset 2 – pizza (2 questions)
  {ds:2, q:'Which two toppings are equally popular?', ans:'Vegetables 🥦 & Ham 🥩', opts:['Vegetables 🥦 & Ham 🥩','Cheese 🧀 & Ham 🥩','Cheese 🧀 & Pepperoni 🍕','All are equal'], fb:'Vegetables and Ham each have about 1/6 of the chart.'},
  {ds:2, q:'Approximately what fraction chose Cheese?', ans:'1/3', opts:['1/4','1/2','1/3','2/3'], fb:'Cheese is roughly 1/3 of the total.'},

  // Dataset 3 – pets (2 questions)
  {ds:3, q:'Which pet is most common?', ans:'Dogs 🐶', opts:['Dogs 🐶','Cats 🐱','Fish 🐟','Other 🐹'], fb:'Dogs take up exactly half the chart!'},
  {ds:3, q:'If there are 20 pets total, how many are Cats?', ans:'5', opts:['5','10','3','8'], fb:'Cats = 1/4 of 20 = 5 pets.'},
];

let pool = [...QUESTIONS]; // may shuffle

// ── SVG Pie Chart Builder ────────────────────────────────────────────
function polarXY(cx,cy,r,deg){
  const rad=(deg-90)*Math.PI/180;
  return{x:+(cx+r*Math.cos(rad)).toFixed(3),y:+(cy+r*Math.sin(rad)).toFixed(3)};
}
function buildPie(ds){
  const size=250,cx=size/2,cy=size/2,r=size/2-10;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  let cumPct=0;
  ds.segments.forEach(seg=>{
    const startDeg=cumPct*3.6;
    cumPct+=seg.pct;
    const endDeg=cumPct*3.6;
    const s=polarXY(cx,cy,r,startDeg);
    const e=polarXY(cx,cy,r,endDeg);
    const large=(seg.pct>50)?1:0;
    svg+=`<path d="M${cx},${cy} L${s.x},${s.y} A${r},${r} 0 ${large},1 ${e.x},${e.y} Z" fill="${seg.col}" stroke="white" stroke-width="3"/>`;
    // place label at midpoint
    const midDeg=startDeg+(endDeg-startDeg)/2;
    const lp=polarXY(cx,cy,r*0.6,midDeg);
    svg+=`<text x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="white" font-weight="700">${seg.emoji}</text>`;
  });
  svg+='</svg>';
  return svg;
}
function buildLegend(ds){
  let html=`<div class="legend">`;
  ds.segments.forEach(s=>{
    html+=`<div class="legend-item"><span class="legend-swatch" style="background:${s.col}"></span>${s.label} ${s.emoji}</div>`;
  });
  html+=`</div>`;
  return html;
}

// ── Render ───────────────────────────────────────────────────────────
function renderQuestion(q){
  const ds=DATASETS[q.ds];
  const gc=document.getElementById('gameContainer');
  const pieHTML=buildPie(ds);
  const legHTML=buildLegend(ds);

  let html=`<div class="question-card">
    <div class="round-label">Question ${current+1} of ${total}</div>
    <div class="chart-wrapper">
      <div class="chart-title">${ds.title}</div>
      ${pieHTML}
      ${legHTML}
    </div>
    <div class="question-text">${q.q}</div>
    <div class="answer-grid">`;
  q.opts.forEach(opt=>{
    const safeHint=q.fb.replace(/'/g,"\\'");
    html+=`<button class="ans-btn" onclick="checkAnswer(this,'${opt.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}','${safeHint}')">${opt}</button>`;
  });
  html+=`</div>
    <div class="feedback-bar" id="feedbackBar"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
  </div>`;
  gc.innerHTML=html;
}

function checkAnswer(btn,chosen,correct,hint){
  const all=document.querySelectorAll('.ans-btn');
  all.forEach(b=>{
    b.classList.add('disabled');
    if(b===btn) b.classList.add(chosen===correct?'correct':'wrong');
    else if(b.textContent===correct) b.classList.add('reveal');
  });
  const ok=chosen===correct;
  if(ok) updateScore(1);
  const fb=document.getElementById('feedbackBar');
  fb.textContent=(ok?'🎉 Correct! ':'❌ Not quite. ')+hint;
  fb.className='feedback-bar show '+(ok?'good':'bad');
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion(){
  current++;
  updateProgress();
  if(current>=total){showEnd();return;}
  renderQuestion(pool[current]);
}

// ── Core ─────────────────────────────────────────────────────────────
function updateScore(pts){score+=pts;document.getElementById('score').textContent=score;}
function updateProgress(){document.getElementById('progressBar').style.width=(current/total*100)+'%';}
function showEnd(){
  const pct=score/total;
  document.getElementById('endStars').textContent=pct>=0.8?'⭐⭐⭐':pct>=0.5?'⭐⭐':'⭐';
  document.getElementById('endTitle').textContent=pct>=0.8?'Brilliant!':pct>=0.5?'Good job!':'Keep trying!';
  document.getElementById('endScore').textContent='You scored '+score+' / '+total;
  document.getElementById('endScreen').classList.add('show');
}
function restartGame(){
  document.getElementById('endScreen').classList.remove('show');
  score=0;current=0;
  document.getElementById('score').textContent='0';
  pool=[...QUESTIONS];
  initGame();
}
function initGame(){
  updateProgress();
  renderQuestion(pool[current]);
}
document.addEventListener('DOMContentLoaded',initGame);
</script>
</body>
</html>
