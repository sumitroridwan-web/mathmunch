<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Venn Voyage – MathMunch</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --s1:#A29BFE;--s2:#6C5CE7;
      --bg:#F5F3FF;--white:#FFFFFF;
      --dark:#1E1E2E;--mid:#525270;
      --radius:16px;
      --shadow:0 4px 20px rgba(108,92,231,0.15);
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
    .topbar{position:sticky;top:0;z-index:100;background:var(--white);box-shadow:0 2px 12px rgba(108,92,231,0.1);display:flex;align-items:center;gap:12px;padding:10px 20px}
    .back-btn{text-decoration:none;color:var(--s2);font-weight:700;font-size:.9rem;padding:6px 14px;border-radius:20px;border:2px solid var(--s1);transition:.2s}
    .back-btn:hover{background:var(--s1);color:white}
    .topbar-logo{text-decoration:none;font-weight:800;font-size:1.1rem;color:var(--s2)}
    .game-title{font-weight:700;font-size:1rem;color:var(--dark);flex:1;text-align:center}
    .level-badge{background:var(--s2);color:white;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:20px}
    .score-display{font-weight:800;font-size:1rem;color:var(--s2);min-width:80px;text-align:right}
    .progress-bar-wrap{position:fixed;bottom:0;left:0;right:0;height:8px;background:#E8E4FF;z-index:200}
    .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#A29BFE,#6C5CE7);transition:width .4s ease;border-radius:0 4px 4px 0}
    .end-screen{display:none;position:fixed;inset:0;background:rgba(30,30,46,0.85);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center}
    .end-screen.show{display:flex}
    .end-card{background:white;border-radius:24px;padding:40px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    .end-stars{font-size:2.5rem;margin-bottom:12px}
    .end-title{font-size:1.8rem;font-weight:800;color:var(--dark);margin-bottom:8px}
    .end-score{font-size:1.1rem;color:var(--mid);margin-bottom:24px}
    .btn{display:inline-block;padding:12px 28px;border-radius:30px;border:none;cursor:pointer;font-size:1rem;font-weight:700;transition:.2s}
    .btn-play{background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;margin:0 6px}
    .btn-home{background:#F0F4FF;color:var(--s2);margin:0 6px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,92,231,0.3)}
    .game-area{max-width:800px;margin:0 auto;padding:24px 16px 90px}

    /* Game-specific */
    .question-counter{text-align:center;font-size:.85rem;color:var(--mid);margin-bottom:8px;font-weight:600}
    .number-display{text-align:center;margin-bottom:20px}
    .number-badge{display:inline-block;background:white;border:3px solid var(--s2);border-radius:20px;padding:12px 40px;font-size:2.4rem;font-weight:900;color:var(--dark);box-shadow:var(--shadow);min-width:120px}
    .question-text{text-align:center;font-size:1.05rem;font-weight:600;color:var(--mid);margin-bottom:16px}
    .venn-container{position:relative;margin:0 auto;max-width:600px}
    .venn-container svg{width:100%;height:auto;cursor:pointer}

    .region-label{font-size:.78rem;font-weight:700;fill:var(--dark);pointer-events:none}
    .circle-label{font-size:.85rem;font-weight:800;fill:var(--s2)}

    .feedback-box{text-align:center;margin-top:16px;min-height:52px;display:flex;align-items:center;justify-content:center;gap:10px;flex-direction:column}
    .feedback-msg{font-size:1.1rem;font-weight:700;padding:10px 28px;border-radius:30px;display:inline-block;opacity:0;transition:opacity .3s}
    .feedback-msg.show{opacity:1}
    .feedback-msg.correct{background:#DCFCE7;color:#166534}
    .feedback-msg.wrong{background:#FEE2E2;color:#991B1B}
    .hint-text{font-size:.85rem;color:var(--mid);font-style:italic}

    @keyframes pulseGreen{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4) saturate(2)}}
    @keyframes flashRed{0%,100%{filter:brightness(1)}50%{filter:brightness(.7) sepia(1) hue-rotate(-30deg)}}
    .pulse-green{animation:pulseGreen .5s ease}
    .flash-red{animation:flashRed .5s ease}

    .region-clickable{cursor:pointer;transition:opacity .2s}
    .region-clickable:hover{opacity:.7}

    .next-btn{display:block;margin:18px auto 0;padding:12px 36px;border-radius:30px;border:none;cursor:pointer;font-size:1rem;font-weight:700;background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;transition:.2s;opacity:0;pointer-events:none}
    .next-btn.visible{opacity:1;pointer-events:all}
    .next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,92,231,0.3)}

    .criteria-box{text-align:center;margin-bottom:10px;background:white;border-radius:12px;padding:10px 20px;box-shadow:var(--shadow);display:inline-flex;gap:16px;left:50%;position:relative;transform:translateX(-50%)}
    .criteria-item{display:flex;align-items:center;gap:6px;font-size:.9rem;font-weight:700}
    .criteria-dot{width:14px;height:14px;border-radius:50%;display:inline-block}
  </style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>
<div class="topbar">
  <a href="../../index.html" class="back-btn">← All Games</a>
  <a href="../../index.html" class="topbar-logo">🧮 MathMunch</a>
  <span class="game-title">Venn Voyage</span>
  <span class="level-badge">P3</span>
  <span class="score-display">⭐ <span id="score">0</span></span>
</div>

<div class="game-area">
  <div class="question-counter" id="questionCounter">Question 1 of 10</div>
  <div class="number-display">
    <div class="number-badge" id="numberBadge">?</div>
  </div>
  <div class="question-text" id="questionText">Where does this number belong?</div>

  <div class="criteria-box" id="criteriaBox">
    <div class="criteria-item"><span class="criteria-dot" style="background:#A29BFE80;border:2px solid #A29BFE"></span><span id="leftLabel">Left</span></div>
    <div class="criteria-item"><span class="criteria-dot" style="background:#6C5CE780;border:2px solid #6C5CE7"></span><span id="rightLabel">Right</span></div>
  </div>

  <div class="venn-container">
    <svg id="vennSvg" viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer boundary (neither region) -->
      <rect x="0" y="0" width="560" height="260" rx="16" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
      <text x="40" y="240" class="region-label" id="neitherHint" opacity=".5">Neither</text>

      <!-- Left circle -->
      <circle id="leftCircle" cx="210" cy="130" r="105" fill="#A29BFE" fill-opacity=".25" stroke="#A29BFE" stroke-width="2.5"/>
      <!-- Right circle -->
      <circle id="rightCircle" cx="350" cy="130" r="105" fill="#6C5CE7" fill-opacity=".25" stroke="#6C5CE7" stroke-width="2.5"/>

      <!-- Clickable hit regions (transparent polygons over approximate areas) -->
      <!-- Left only region -->
      <path id="regionLeft" class="region-clickable" d="M105,130 A105,105 0 0,1 280,50 A105,105 0 0,0 280,210 A105,105 0 0,1 105,130 Z" fill="transparent" stroke="none"/>
      <!-- Overlap region -->
      <path id="regionOverlap" class="region-clickable" d="M280,50 A105,105 0 0,1 280,210 A105,105 0 0,1 280,50 Z" fill="transparent" stroke="none"/>
      <!-- Right only region -->
      <path id="regionRight" class="region-clickable" d="M280,50 A105,105 0 0,0 280,210 A105,105 0 0,1 455,130 A105,105 0 0,1 280,50 Z" fill="transparent" stroke="none"/>
      <!-- Neither / outside region — four corners around circles -->
      <path id="regionNeither" class="region-clickable" d="M0,0 L560,0 L560,260 L0,260 Z M105,130 A105,105 0 1,1 315,130 A105,105 0 0,0 245,130 A105,105 0 1,0 105,130 Z" fill="transparent" stroke="none" fill-rule="evenodd"/>

      <!-- Labels -->
      <text x="140" y="32" class="circle-label" text-anchor="middle" id="svgLeftLabel">Multiples of 2</text>
      <text x="420" y="32" class="circle-label" text-anchor="middle" id="svgRightLabel">Multiples of 3</text>
      <text x="170" y="135" class="region-label" text-anchor="middle" id="labelLeft" opacity=".6">Only left</text>
      <text x="280" y="135" class="region-label" text-anchor="middle" id="labelBoth" opacity=".6">Both</text>
      <text x="390" y="135" class="region-label" text-anchor="middle" id="labelRight" opacity=".6">Only right</text>
    </svg>
  </div>

  <div class="feedback-box">
    <div class="feedback-msg" id="feedbackMsg"></div>
    <div class="hint-text" id="hintText"></div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div class="end-stars" id="endStars">⭐⭐⭐</div>
    <div class="end-title" id="endTitle">Amazing!</div>
    <div class="end-score" id="endScore">You scored 10/10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a href="../../index.html" class="btn btn-home">Home</a>
  </div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<script>
  let score = 0, total = 10, current = 0;
  let answered = false;

  function updateScore(pts) { score += pts; document.getElementById('score').textContent = score; }
  function updateProgress() { document.getElementById('progressBar').style.width = (current / total * 100) + '%'; }
  function showEnd() {
    const pct = score / total;
    document.getElementById('endStars').textContent = pct >= 0.8 ? '⭐⭐⭐' : pct >= 0.5 ? '⭐⭐' : '⭐';
    document.getElementById('endTitle').textContent = pct >= 0.8 ? 'Brilliant!' : pct >= 0.5 ? 'Good job!' : 'Keep trying!';
    document.getElementById('endScore').textContent = 'You scored ' + score + ' / ' + total;
    document.getElementById('endScreen').classList.add('show');
  }
  function restartGame() { document.getElementById('endScreen').classList.remove('show'); initGame(); }

  // Criteria sets
  const criteriaSets = [
    {
      left: 'Multiples of 2',
      right: 'Multiples of 3',
      testLeft: n => n % 2 === 0,
      testRight: n => n % 3 === 0,
      numbers: [4, 6, 9, 7, 12, 15, 8, 18, 5, 10]
    },
    {
      left: 'Greater than 10',
      right: 'Even numbers',
      testLeft: n => n > 10,
      testRight: n => n % 2 === 0,
      numbers: [14, 6, 7, 12, 20, 3, 18, 9, 16, 11]
    },
    {
      left: 'Less than 20',
      right: 'Multiples of 5',
      testLeft: n => n < 20,
      testRight: n => n % 5 === 0,
      numbers: [10, 25, 7, 15, 30, 3, 5, 22, 12, 20]
    }
  ];

  // Build 10 questions: criteria set 0 → q1-3, set1 → q4-6, set2 → q7-10
  const questionPlan = [
    {setIdx:0,numIdx:0},{setIdx:0,numIdx:1},{setIdx:0,numIdx:2},
    {setIdx:1,numIdx:0},{setIdx:1,numIdx:1},{setIdx:1,numIdx:2},
    {setIdx:2,numIdx:0},{setIdx:2,numIdx:1},{setIdx:2,numIdx:2},{setIdx:2,numIdx:3}
  ];

  function getRegion(cs, n) {
    const l = cs.testLeft(n), r = cs.testRight(n);
    if (l && r) return 'overlap';
    if (l) return 'left';
    if (r) return 'right';
    return 'neither';
  }

  function getRegionLabel(region, cs) {
    if (region === 'left') return 'Only ' + cs.left;
    if (region === 'right') return 'Only ' + cs.right;
    if (region === 'overlap') return 'Both!';
    return 'Neither circle';
  }

  function initGame() {
    score = 0; current = 0; answered = false;
    document.getElementById('score').textContent = '0';
    document.getElementById('progressBar').style.width = '0%';
    loadQuestion();
  }

  function loadQuestion() {
    answered = false;
    const fb = document.getElementById('feedbackMsg');
    fb.textContent = '';
    fb.className = 'feedback-msg';
    document.getElementById('hintText').textContent = '';
    document.getElementById('nextBtn').className = 'next-btn';

    // Reset circle colours
    document.getElementById('leftCircle').style.filter = '';
    document.getElementById('rightCircle').style.filter = '';

    const plan = questionPlan[current];
    const cs = criteriaSets[plan.setIdx];
    const n = cs.numbers[plan.numIdx];

    document.getElementById('questionCounter').textContent = 'Question ' + (current + 1) + ' of ' + total;
    document.getElementById('numberBadge').textContent = n;
    document.getElementById('leftLabel').textContent = cs.left;
    document.getElementById('rightLabel').textContent = cs.right;
    document.getElementById('svgLeftLabel').textContent = cs.left;
    document.getElementById('svgRightLabel').textContent = cs.right;
    document.getElementById('labelLeft').textContent = 'Only ' + cs.left.split(' ')[0] + '...';
    document.getElementById('labelRight').textContent = 'Only ' + cs.right.split(' ')[0] + '...';

    // Reset fill highlights
    highlightRegion(null);

    // Store current answer
    window._correctRegion = getRegion(cs, n);
    window._cs = cs;
    window._n = n;
  }

  function highlightRegion(region) {
    const leftC = document.getElementById('leftCircle');
    const rightC = document.getElementById('rightCircle');
    leftC.setAttribute('fill-opacity', '.25');
    rightC.setAttribute('fill-opacity', '.25');
    if (region === 'left') leftC.setAttribute('fill-opacity', '.55');
    else if (region === 'right') rightC.setAttribute('fill-opacity', '.55');
    else if (region === 'overlap') { leftC.setAttribute('fill-opacity', '.45'); rightC.setAttribute('fill-opacity', '.45'); }
  }

  function handleRegionClick(clicked) {
    if (answered) return;
    answered = true;
    const correct = window._correctRegion;
    const cs = window._cs;
    const n = window._n;
    const fb = document.getElementById('feedbackMsg');

    if (clicked === correct) {
      updateScore(1);
      fb.textContent = '✅ Correct! ' + n + ' → ' + getRegionLabel(correct, cs);
      fb.className = 'feedback-msg correct show';
      highlightRegion(correct);
      // Pulse animation
      if (correct === 'left' || correct === 'overlap') document.getElementById('leftCircle').classList.add('pulse-green');
      if (correct === 'right' || correct === 'overlap') document.getElementById('rightCircle').classList.add('pulse-green');
    } else {
      fb.textContent = '❌ Not quite!';
      fb.className = 'feedback-msg wrong show';
      document.getElementById('hintText').textContent = n + ' belongs in: ' + getRegionLabel(correct, cs);
      highlightRegion(correct);
    }

    current++;
    updateProgress();
    if (current >= total) {
      setTimeout(() => showEnd(), 1200);
    } else {
      document.getElementById('nextBtn').className = 'next-btn visible';
    }
  }

  function nextQuestion() {
    // Clean up animation classes
    document.getElementById('leftCircle').classList.remove('pulse-green','flash-red');
    document.getElementById('rightCircle').classList.remove('pulse-green','flash-red');
    loadQuestion();
  }

  // Wire up SVG click regions
  document.getElementById('regionLeft').addEventListener('click', () => handleRegionClick('left'));
  document.getElementById('regionOverlap').addEventListener('click', () => handleRegionClick('overlap'));
  document.getElementById('regionRight').addEventListener('click', () => handleRegionClick('right'));
  document.getElementById('regionNeither').addEventListener('click', () => handleRegionClick('neither'));

  // Hover effects
  ['regionLeft','regionOverlap','regionRight','regionNeither'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('mouseenter', () => {
      if (!answered) el.setAttribute('fill', 'rgba(108,92,231,0.08)');
    });
    el.addEventListener('mouseleave', () => {
      el.setAttribute('fill', 'transparent');
    });
  });

  initGame();
</script>
</body>
</html>
