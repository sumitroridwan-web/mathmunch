<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
  <title>Spin &amp; Sort – MathMunch</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --orange:#F97316;
      --orange-dark:#EA580C;
      --orange-light:#FFF7ED;
      --bg:#F9FAFB;
      --white:#FFFFFF;
      --outline:#E5E7EB;
      --text:#1F2937;
      --text-mid:#6B7280;
      --text-soft:#9CA3AF;
      --canvas:#FFEDD5;
      --radius:16px;
      --shadow:0 4px 20px rgba(249,115,22,0.12);
    }
    body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── Site header ── */
    .site-header{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--outline);display:flex;align-items:center;gap:16px;padding:0 24px;height:56px}
    .site-logo{text-decoration:none;font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.2rem;color:var(--orange);display:flex;align-items:center;gap:6px}
    .site-nav{display:flex;align-items:center;gap:8px;margin-left:auto}
    .nav-link{text-decoration:none;font-size:.85rem;font-weight:600;color:var(--text-mid);padding:4px 10px;border-radius:8px;transition:.15s}
    .nav-link:hover{color:var(--orange);background:var(--orange-light)}
    .btn-play{background:var(--orange);color:#fff;font-size:.85rem;font-weight:700;padding:8px 18px;border-radius:20px;border:none;cursor:pointer;transition:.15s;text-decoration:none;display:inline-block}
    .btn-play:hover{background:var(--orange-dark)}

    /* ── Two-column layout ── */
    .game-layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 56px)}

    /* ── Sidebar ── */
    .sidebar{background:var(--white);border-right:1px solid var(--outline);padding:20px 16px;display:flex;flex-direction:column;gap:14px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
    .sidebar-exit{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-mid);font-size:.85rem;font-weight:600;padding:8px 12px;border-radius:10px;border:1px solid var(--outline);transition:.15s}
    .sidebar-exit:hover{color:var(--orange);border-color:var(--orange);background:var(--orange-light)}
    .sidebar-card{background:var(--orange-light);border:1px solid #FED7AA;border-radius:var(--radius);padding:16px}
    .sidebar-card-label{font-size:.7rem;font-weight:700;color:var(--orange-dark);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .sidebar-score{font-family:'Quicksand',sans-serif;font-size:2rem;font-weight:700;color:var(--orange)}
    .sidebar-level-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .sidebar-level-name{font-size:.85rem;font-weight:600;color:var(--text)}
    .level-badge{background:var(--orange);color:#fff;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px}
    .progress-track{background:#FED7AA;border-radius:999px;height:8px;overflow:hidden}
    .progress-fill{height:100%;background:var(--orange);border-radius:999px;transition:width .4s ease;width:0%}
    .lives-row{display:flex;gap:6px;font-size:1.3rem}
    .info-title{font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:4px}
    .info-desc{font-size:.78rem;color:var(--text-mid);line-height:1.5}

    /* ── Game canvas ── */
    .game-canvas{background:var(--canvas);padding:32px 28px;position:relative;overflow-y:auto}
    .game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(249,115,22,.08) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}

    /* ── End screen ── */
    .end-screen{display:none;position:fixed;inset:0;background:rgba(30,30,46,.85);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center}
    .end-screen.show{display:flex}
    .end-card{background:white;border-radius:24px;padding:40px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    .end-emoji{font-size:2.5rem;margin-bottom:12px}
    .end-title{font-family:'Quicksand',sans-serif;font-size:1.8rem;font-weight:700;color:var(--text);margin-bottom:8px}
    .end-score{font-size:1.1rem;color:var(--text-mid);margin-bottom:24px}
    .end-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-block;padding:12px 28px;border-radius:30px;border:none;cursor:pointer;font-size:1rem;font-weight:700;transition:.2s}
    .btn-home{background:var(--orange-light);color:var(--orange);border:1px solid #FED7AA}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,.3)}

    /* ── Game-specific: spinner ── */
    .spinner-section{text-align:center;margin-bottom:28px;position:relative;z-index:1}
    .spinner-wheel{width:120px;height:120px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:white;position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(249,115,22,0.35);background:linear-gradient(135deg,#A29BFE,#6C5CE7)}
    .spinner-wheel.spinning{animation:spinWheel 1.2s cubic-bezier(.17,.67,.38,1) forwards}
    @keyframes spinWheel{0%{transform:rotate(0deg)}60%{transform:rotate(740deg)}80%{transform:rotate(700deg)}100%{transform:rotate(720deg)}}
    .spinner-label{font-size:1.1rem;font-weight:700;color:var(--orange);margin-top:8px;min-height:28px}
    .rule-reveal{font-size:1rem;font-weight:600;color:var(--text-mid);margin-top:4px;min-height:24px}

    .spin-btn-wrap{text-align:center;margin-bottom:24px;position:relative;z-index:1}
    .spin-btn{background:var(--orange);color:white;border:none;padding:14px 36px;border-radius:30px;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(249,115,22,0.3);transition:.2s;letter-spacing:.3px}
    .spin-btn:hover{background:var(--orange-dark);transform:translateY(-2px);box-shadow:0 6px 24px rgba(249,115,22,0.4)}
    .spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* ── Game-specific: object display ── */
    .object-section{text-align:center;margin-bottom:32px;position:relative;z-index:1}
    .object-display{font-size:4rem;line-height:1;min-height:72px;transition:transform .2s;user-select:none;animation:objPop .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes objPop{from{opacity:0;transform:scale(0.4)}to{opacity:1;transform:scale(1)}}
    .object-hint{font-size:.95rem;color:var(--text-mid);margin-top:8px;font-weight:600}

    /* ── Game-specific: round tracker ── */
    .round-tracker{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;position:relative;z-index:1}
    .round-dot{width:28px;height:28px;border-radius:50%;background:var(--orange-light);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--text-mid);transition:.3s}
    .round-dot.correct{background:linear-gradient(135deg,#55efc4,#00b894);color:white}
    .round-dot.wrong{background:linear-gradient(135deg,#fd79a8,#e84393);color:white}
    .round-dot.current{background:var(--orange);color:white;transform:scale(1.2)}

    /* ── Game-specific: bins ── */
    .bins-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}
    .bin{flex:1;min-width:140px;max-width:220px;min-height:160px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;font-weight:800;color:white;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden;border:4px solid transparent;user-select:none}
    .bin:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 8px 28px rgba(249,115,22,0.28)}
    .bin:active{transform:scale(0.97)}
    .bin .bin-icon{font-size:2.8rem;margin-bottom:8px}
    .bin .bin-label{font-size:1.2rem;letter-spacing:.5px}
    .bin.flash-correct{animation:correctFlash .5s ease}
    .bin.flash-wrong{animation:wrongFlash .5s ease}
    .bin.jiggle{animation:jiggle .4s ease}
    @keyframes correctFlash{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4) saturate(1.8)}}
    @keyframes wrongFlash{0%,100%{filter:brightness(1)}25%,75%{filter:brightness(0.6) saturate(0)}}
    @keyframes jiggle{0%,100%{transform:translateY(-4px) scale(1.03) rotate(0deg)}25%{transform:translateY(-4px) scale(1.03) rotate(-5deg)}75%{transform:translateY(-4px) scale(1.03) rotate(5deg)}}

    .feedback-text{text-align:center;font-size:1.1rem;font-weight:700;min-height:32px;margin-top:16px;transition:opacity .3s;position:relative;z-index:1}
    .feedback-text.good{color:#00b894}
    .feedback-text.bad{color:#e84393}

    .waiting-message{text-align:center;font-size:1.15rem;color:var(--text-mid);font-weight:600;padding:24px;position:relative;z-index:1}

    @media(max-width:768px){
      .game-layout{grid-template-columns:1fr}
      .sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--outline)}
    }
  </style>
</head>
<body>
<script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<!-- Site Header -->
<header class="site-header">
  <a href="../../index.html" class="site-logo">🧮 MathMunch</a>
  <nav class="site-nav">
    <a href="../../index.html" class="nav-link">Home</a>
    <a href="../../index.html" class="nav-link">Games</a>
    <a href="../../index.html" class="btn-play">Play Now</a>
  </nav>
</header>

<div class="game-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="../../index.html" class="sidebar-exit">← Exit Game</a>

    <div class="sidebar-card">
      <div class="sidebar-card-label">Score</div>
      <div class="sidebar-score" id="score">0</div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-level-row">
        <span class="sidebar-level-name">Progress</span>
        <span class="level-badge">EY</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-label">Lives</div>
      <div class="lives-row">❤️❤️❤️</div>
    </div>

    <div class="sidebar-card">
      <div class="info-title">🎡 Spin &amp; Sort</div>
      <div class="info-desc">Spin to get a sorting rule, then sort each object into the correct bin.</div>
    </div>
  </aside>

  <!-- Game Canvas -->
  <main class="game-canvas">
    <div class="spinner-section">
      <div class="spinner-wheel" id="spinnerWheel">🎡</div>
      <div class="spinner-label" id="spinnerLabel">Press Spin to start!</div>
      <div class="rule-reveal" id="ruleReveal"></div>
    </div>

    <div class="spin-btn-wrap">
      <button class="spin-btn" id="spinBtn" onclick="doSpin()">🎲 Spin!</button>
    </div>

    <div id="gameContent" style="display:none">
      <div class="round-tracker" id="roundTracker"></div>
      <div class="object-section">
        <div class="object-display" id="objectDisplay">?</div>
        <div class="object-hint" id="objectHint">Click the correct bin!</div>
      </div>
      <div class="bins-row" id="binsRow"></div>
      <div class="feedback-text" id="feedbackText"></div>
    </div>
    <div id="waitMessage" class="waiting-message" style="display:none">Great! Next object coming up…</div>
  </main>
</div>

<!-- End Screen -->
<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji">🌟</div>
    <div class="end-title" id="endTitle">Amazing!</div>
    <div class="end-score" id="endScore">You sorted 8/8</div>
    <div class="end-actions">
      <button class="btn btn-play" onclick="restartGame()">Play Again</button>
      <a href="../../index.html" class="btn btn-home">Home</a>
    </div>
  </div>
</div>

<script>
  let score = 0, total = 8, current = 0;
  let currentRule = null;
  let objects = [];
  let objectIndex = 0;
  let canClick = false;
  let roundResults = [];

  const RULES = [
    {
      name: "Sort by Colour: Red vs Blue",
      bins: [
        { label: "Red", icon: "🔴", color: "linear-gradient(135deg,#ff7675,#d63031)" },
        { label: "Blue", icon: "🔵", color: "linear-gradient(135deg,#74b9ff,#0984e3)" }
      ],
      objects: [
        { emoji: "🔴", label: "Red circle", correct: 0 },
        { emoji: "🟥", label: "Red square", correct: 0 },
        { emoji: "🔵", label: "Blue circle", correct: 1 },
        { emoji: "🟦", label: "Blue square", correct: 1 },
        { emoji: "❤️", label: "Red heart", correct: 0 },
        { emoji: "💙", label: "Blue heart", correct: 1 },
        { emoji: "🔴", label: "Red circle", correct: 0 },
        { emoji: "🔵", label: "Blue circle", correct: 1 }
      ]
    },
    {
      name: "Sort by Colour: Yellow vs Green",
      bins: [
        { label: "Yellow", icon: "🟡", color: "linear-gradient(135deg,#ffeaa7,#fdcb6e)" },
        { label: "Green", icon: "🟢", color: "linear-gradient(135deg,#55efc4,#00b894)" }
      ],
      objects: [
        { emoji: "🟡", label: "Yellow circle", correct: 0 },
        { emoji: "🟢", label: "Green circle", correct: 1 },
        { emoji: "🟨", label: "Yellow square", correct: 0 },
        { emoji: "🟩", label: "Green square", correct: 1 },
        { emoji: "⭐", label: "Yellow star", correct: 0 },
        { emoji: "🍀", label: "Green clover", correct: 1 },
        { emoji: "🌟", label: "Yellow glow star", correct: 0 },
        { emoji: "🐢", label: "Green turtle", correct: 1 }
      ]
    },
    {
      name: "Sort by Shape: Circle vs Square",
      bins: [
        { label: "Circle", icon: "⭕", color: "linear-gradient(135deg,#fd79a8,#e84393)" },
        { label: "Square", icon: "🟧", color: "linear-gradient(135deg,#fdb88a,#e17055)" }
      ],
      objects: [
        { emoji: "🔴", label: "Red circle", correct: 0 },
        { emoji: "🟥", label: "Red square", correct: 1 },
        { emoji: "🔵", label: "Blue circle", correct: 0 },
        { emoji: "🟦", label: "Blue square", correct: 1 },
        { emoji: "🟢", label: "Green circle", correct: 0 },
        { emoji: "🟩", label: "Green square", correct: 1 },
        { emoji: "🟡", label: "Yellow circle", correct: 0 },
        { emoji: "🟨", label: "Yellow square", correct: 1 }
      ]
    },
    {
      name: "Sort by Size: Big vs Small",
      bins: [
        { label: "Big", icon: "🐘", color: "linear-gradient(135deg,#a29bfe,#6c5ce7)" },
        { label: "Small", icon: "🐭", color: "linear-gradient(135deg,#fd79a8,#e84393)" }
      ],
      objects: [
        { emoji: "🐘", label: "Elephant (big)", correct: 0 },
        { emoji: "🐭", label: "Mouse (small)", correct: 1 },
        { emoji: "🦁", label: "Lion (big)", correct: 0 },
        { emoji: "🐝", label: "Bee (small)", correct: 1 },
        { emoji: "🐋", label: "Whale (big)", correct: 0 },
        { emoji: "🐛", label: "Caterpillar (small)", correct: 1 },
        { emoji: "🦒", label: "Giraffe (big)", correct: 0 },
        { emoji: "🐞", label: "Ladybird (small)", correct: 1 }
      ]
    }
  ];

  function updateScore(pts){ score += pts; document.getElementById('score').textContent = score; }
  function updateProgress(){ document.getElementById('progressBar').style.width = (objectIndex/total*100)+'%'; }

  function showEnd(){
    const pct = score/total;
    document.getElementById('endEmoji').textContent = pct>=0.875?'🌟':pct>=0.5?'👍':'💪';
    document.getElementById('endTitle').textContent = pct>=0.875?'Brilliant!':pct>=0.5?'Good job!':'Keep trying!';
    document.getElementById('endScore').textContent = 'You sorted '+score+' out of '+total+'!';
    document.getElementById('endScreen').classList.add('show');
  }

  function restartGame(){
    document.getElementById('endScreen').classList.remove('show');
    score = 0;
    document.getElementById('score').textContent = '0';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('gameContent').style.display = 'none';
    document.getElementById('spinBtn').disabled = false;
    document.getElementById('spinnerLabel').textContent = 'Press Spin to start!';
    document.getElementById('ruleReveal').textContent = '';
    const wheel = document.getElementById('spinnerWheel');
    wheel.style.background = 'linear-gradient(135deg,#A29BFE,#6C5CE7)';
    wheel.textContent = '🎡';
    wheel.classList.remove('spinning');
    initGame();
  }

  function initGame(){
    score = 0;
    objectIndex = 0;
    roundResults = [];
    canClick = false;
    document.getElementById('score').textContent = '0';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('gameContent').style.display = 'none';
    document.getElementById('spinBtn').disabled = false;
    document.getElementById('spinnerLabel').textContent = 'Press Spin to start!';
    document.getElementById('ruleReveal').textContent = '';
    document.getElementById('feedbackText').textContent = '';
    document.getElementById('objectDisplay').textContent = '?';
    const wheel = document.getElementById('spinnerWheel');
    wheel.style.background = 'linear-gradient(135deg,#A29BFE,#6C5CE7)';
    wheel.textContent = '🎡';
    wheel.classList.remove('spinning');
  }

  function doSpin(){
    const btn = document.getElementById('spinBtn');
    btn.disabled = true;
    const wheel = document.getElementById('spinnerWheel');
    wheel.classList.remove('spinning');
    void wheel.offsetWidth;
    wheel.classList.add('spinning');
    wheel.textContent = '🎲';
    wheel.style.background = 'linear-gradient(135deg,#fdcb6e,#e17055)';
    document.getElementById('spinnerLabel').textContent = 'Spinning…';
    document.getElementById('ruleReveal').textContent = '';

    setTimeout(()=>{
      currentRule = RULES[Math.floor(Math.random()*RULES.length)];
      objects = [...currentRule.objects];
      objectIndex = 0;
      score = 0;
      roundResults = [];
      document.getElementById('score').textContent = '0';
      document.getElementById('progressBar').style.width = '0%';

      wheel.textContent = '🎯';
      wheel.style.background = 'linear-gradient(135deg,#55efc4,#00b894)';
      document.getElementById('spinnerLabel').textContent = currentRule.name;
      document.getElementById('ruleReveal').textContent = 'Sort each object into the right bin!';

      buildBins();
      buildRoundTracker();
      document.getElementById('gameContent').style.display = 'block';
      document.getElementById('feedbackText').textContent = '';
      loadObject();
    }, 1300);
  }

  function buildBins(){
    const row = document.getElementById('binsRow');
    row.innerHTML = '';
    currentRule.bins.forEach((bin, idx)=>{
      const el = document.createElement('div');
      el.className = 'bin';
      el.style.background = bin.color;
      el.innerHTML = `<span class="bin-icon">${bin.icon}</span><span class="bin-label">${bin.label}</span>`;
      el.addEventListener('click', ()=> handleBinClick(idx, el));
      row.appendChild(el);
    });
  }

  function buildRoundTracker(){
    const tracker = document.getElementById('roundTracker');
    tracker.innerHTML = '';
    for(let i=0;i<total;i++){
      const dot = document.createElement('div');
      dot.className = 'round-dot' + (i===0?' current':'');
      dot.textContent = i+1;
      dot.id = 'dot-'+i;
      tracker.appendChild(dot);
    }
  }

  function loadObject(){
    if(objectIndex >= objects.length){
      updateProgress();
      setTimeout(showEnd, 600);
      return;
    }
    const obj = objects[objectIndex];
    const display = document.getElementById('objectDisplay');
    display.style.animation = 'none';
    void display.offsetWidth;
    display.style.animation = 'objPop .3s cubic-bezier(.34,1.56,.64,1)';
    display.textContent = obj.emoji;
    document.getElementById('objectHint').textContent = obj.label;
    document.getElementById('feedbackText').textContent = '';
    document.getElementById('feedbackText').className = 'feedback-text';
    canClick = true;
    updateProgress();
    if(objectIndex > 0){
      const prevDot = document.getElementById('dot-'+(objectIndex-1));
      if(prevDot) prevDot.classList.remove('current');
    }
    const curDot = document.getElementById('dot-'+objectIndex);
    if(curDot) curDot.classList.add('current');
  }

  function handleBinClick(binIdx, binEl){
    if(!canClick) return;
    canClick = false;
    const obj = objects[objectIndex];
    const isCorrect = binIdx === obj.correct;
    const bins = document.querySelectorAll('.bin');

    if(isCorrect){
      binEl.classList.add('flash-correct','jiggle');
      setTimeout(()=>{ binEl.classList.remove('flash-correct','jiggle'); },500);
      updateScore(1);
      document.getElementById('feedbackText').textContent = '✅ Correct! Well done!';
      document.getElementById('feedbackText').className = 'feedback-text good';
      markDot(objectIndex, true);
      objectIndex++;
      setTimeout(loadObject, 800);
    } else {
      binEl.classList.add('flash-wrong');
      setTimeout(()=>{ binEl.classList.remove('flash-wrong'); },500);
      document.getElementById('feedbackText').textContent = '❌ Oops! Try the other bin!';
      document.getElementById('feedbackText').className = 'feedback-text bad';
      const correctBin = bins[obj.correct];
      correctBin.style.outline = '4px solid #55efc4';
      setTimeout(()=>{
        correctBin.style.outline = '';
        canClick = true;
      }, 900);
    }
  }

  function markDot(idx, correct){
    const dot = document.getElementById('dot-'+idx);
    if(!dot) return;
    dot.classList.remove('current');
    dot.classList.add(correct?'correct':'wrong');
  }

  initGame();
</script>
</body>
</html>
