<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Line Graph Lab – MathMunch</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --s1:#A29BFE;--s2:#6C5CE7;
      --bg:#F5F3FF;--white:#FFFFFF;
      --dark:#1E1E2E;--mid:#525270;
      --radius:16px;
      --shadow:0 4px 20px rgba(108,92,231,0.15);
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
    .topbar{position:sticky;top:0;z-index:100;background:var(--white);box-shadow:0 2px 12px rgba(108,92,231,0.1);display:flex;align-items:center;gap:12px;padding:10px 20px}
    .back-btn{text-decoration:none;color:var(--s2);font-weight:700;font-size:.9rem;padding:6px 14px;border-radius:20px;border:2px solid var(--s1);transition:.2s}
    .back-btn:hover{background:var(--s1);color:white}
    .topbar-logo{text-decoration:none;font-weight:800;font-size:1.1rem;color:var(--s2)}
    .game-title{font-weight:700;font-size:1rem;color:var(--dark);flex:1;text-align:center}
    .level-badge{background:var(--s2);color:white;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:20px}
    .score-display{font-weight:800;font-size:1rem;color:var(--s2);min-width:80px;text-align:right}
    .progress-bar-wrap{position:fixed;bottom:0;left:0;right:0;height:8px;background:#E8E4FF;z-index:200}
    .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#A29BFE,#6C5CE7);transition:width .4s ease;border-radius:0 4px 4px 0}
    .end-screen{display:none;position:fixed;inset:0;background:rgba(30,30,46,0.85);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center}
    .end-screen.show{display:flex}
    .end-card{background:white;border-radius:24px;padding:40px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    .end-stars{font-size:2.5rem;margin-bottom:12px}
    .end-title{font-size:1.8rem;font-weight:800;color:var(--dark);margin-bottom:8px}
    .end-score{font-size:1.1rem;color:var(--mid);margin-bottom:24px}
    .btn{display:inline-block;padding:12px 28px;border-radius:30px;border:none;cursor:pointer;font-size:1rem;font-weight:700;transition:.2s}
    .btn-play{background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;margin:0 6px}
    .btn-home{background:#F0F4FF;color:var(--s2);margin:0 6px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,92,231,0.3)}
    .game-area{max-width:800px;margin:0 auto;padding:24px 16px 90px}

    .question-counter{text-align:center;font-size:.85rem;color:var(--mid);margin-bottom:10px;font-weight:600}

    /* Chart container */
    .chart-container{background:white;border-radius:16px;padding:16px 16px 8px;box-shadow:var(--shadow);margin-bottom:20px}
    .chart-dataset-label{text-align:center;font-size:.95rem;font-weight:700;color:var(--s2);margin-bottom:10px;letter-spacing:.3px}
    .chart-svg-wrap{display:flex;justify-content:center;overflow:hidden}
    svg.line-chart{display:block;overflow:visible}

    /* Question */
    .question-text{text-align:center;font-size:1.05rem;font-weight:700;color:var(--dark);margin-bottom:18px;background:#F5F3FF;border-radius:14px;padding:14px 20px;line-height:1.4;border:2px solid var(--s1)}

    /* Choices */
    .choices{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:18px}
    .choice-btn{padding:12px 22px;border-radius:20px;border:2.5px solid var(--s1);background:white;color:var(--dark);font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;min-width:72px}
    .choice-btn:hover:not(:disabled){background:var(--s1);color:white;transform:translateY(-2px)}
    .choice-btn.correct{background:#DCFCE7;border-color:#22C55E;color:#166534}
    .choice-btn.wrong{background:#FEE2E2;border-color:#EF4444;color:#991B1B}
    .choice-btn:disabled{cursor:default}

    .feedback-box{text-align:center;min-height:48px;margin-bottom:8px}
    .feedback-msg{font-size:1.05rem;font-weight:700;padding:10px 24px;border-radius:24px;display:inline-block;opacity:0;transition:opacity .3s}
    .feedback-msg.show{opacity:1}
    .feedback-msg.correct{background:#DCFCE7;color:#166534}
    .feedback-msg.wrong{background:#FEE2E2;color:#991B1B}

    .next-btn{display:block;margin:0 auto;padding:12px 36px;border-radius:30px;border:none;cursor:pointer;font-size:1rem;font-weight:700;background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:white;transition:.2s;opacity:0;pointer-events:none}
    .next-btn.visible{opacity:1;pointer-events:all}
    .next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,92,231,.3)}

    /* Animated dot pulse */
    @keyframes dotPop{0%{r:5}50%{r:9}100%{r:6}}
    .dot-highlight{animation:dotPop .5s ease}
  </style>
</head>
<body>
<div class="topbar">
  <a href="../../index.html" class="back-btn">← All Games</a>
  <a href="../../index.html" class="topbar-logo">🧮 MathMunch</a>
  <span class="game-title">Line Graph Lab</span>
  <span class="level-badge">P4</span>
  <span class="score-display">⭐ <span id="score">0</span></span>
</div>

<div class="game-area">
  <div class="question-counter" id="questionCounter">Question 1 of 10</div>

  <div class="chart-container">
    <div class="chart-dataset-label" id="datasetLabel">Dataset</div>
    <div class="chart-svg-wrap">
      <svg class="line-chart" id="lineSvg" viewBox="0 0 540 280" width="540" height="280"></svg>
    </div>
  </div>

  <div class="question-text" id="questionText">Loading question...</div>
  <div class="choices" id="mcArea"></div>

  <div class="feedback-box"><div class="feedback-msg" id="feedbackMsg"></div></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div class="end-stars" id="endStars">⭐⭐⭐</div>
    <div class="end-title" id="endTitle">Amazing!</div>
    <div class="end-score" id="endScore">You scored 10/10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a href="../../index.html" class="btn btn-home">Home</a>
  </div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<script>
  let score = 0, total = 10, current = 0;
  let answered = false;
  let correctAnswer = null;

  // SVG dimensions
  const SVG_W = 540, SVG_H = 280;
  const PAD_L = 52, PAD_R = 24, PAD_T = 24, PAD_B = 50;
  const CHART_W = SVG_W - PAD_L - PAD_R;
  const CHART_H = SVG_H - PAD_T - PAD_B;

  // 4 datasets, each used for 2-3 questions
  const datasets = [
    {
      title: 'Daily Temperature (°C) – Week 1',
      xLabel: 'Day',
      yLabel: '°C',
      xTicks: ['Mon','Tue','Wed','Thu','Fri'],
      values: [12, 15, 18, 14, 16],
      yMin: 8, yMax: 22
    },
    {
      title: 'Plant Height (cm) – 6 Weeks',
      xLabel: 'Week',
      yLabel: 'cm',
      xTicks: ['Wk1','Wk2','Wk3','Wk4','Wk5','Wk6'],
      values: [3, 7, 12, 18, 24, 30],
      yMin: 0, yMax: 35
    },
    {
      title: 'Steps Walked (hundreds) – School Week',
      xLabel: 'Day',
      yLabel: '×100',
      xTicks: ['Mon','Tue','Wed','Thu','Fri'],
      values: [80, 65, 90, 75, 85],
      yMin: 50, yMax: 100
    },
    {
      title: 'Books Read Per Month',
      xLabel: 'Month',
      yLabel: 'Books',
      xTicks: ['Jan','Feb','Mar','Apr','May','Jun'],
      values: [4, 6, 5, 8, 7, 9],
      yMin: 0, yMax: 12
    }
  ];

  // Question plan: dsIdx, questionType
  // Types: 'value-at', 'highest', 'lowest', 'biggest-rise', 'difference'
  const questionPlan = [
    // Dataset 0 – temperature – 3 questions
    { dsIdx: 0, type: 'value-at',    pointIdx: 0 },  // Mon
    { dsIdx: 0, type: 'highest',     pointIdx: null },
    { dsIdx: 0, type: 'difference',  ptA: 1, ptB: 3 }, // Tue vs Thu
    // Dataset 1 – plant – 3 questions
    { dsIdx: 1, type: 'value-at',    pointIdx: 3 },  // Wk4
    { dsIdx: 1, type: 'biggest-rise',pointIdx: null },
    { dsIdx: 1, type: 'lowest',      pointIdx: null },
    // Dataset 2 – steps – 2 questions
    { dsIdx: 2, type: 'value-at',    pointIdx: 2 },  // Wed
    { dsIdx: 2, type: 'difference',  ptA: 0, ptB: 1 }, // Mon vs Tue
    // Dataset 3 – books – 2 questions
    { dsIdx: 3, type: 'highest',     pointIdx: null },
    { dsIdx: 3, type: 'biggest-rise',pointIdx: null }
  ];

  function xPos(i, n) {
    return PAD_L + (i / (n - 1)) * CHART_W;
  }
  function yPos(v, yMin, yMax) {
    return PAD_T + CHART_H - ((v - yMin) / (yMax - yMin)) * CHART_H;
  }

  function niceGridStep(range) {
    const rough = range / 5;
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    const nice = [1,2,5,10].find(x => x * mag >= rough) * mag;
    return nice;
  }

  function drawLineGraph(ds, highlightIdx) {
    const svg = document.getElementById('lineSvg');
    const n = ds.values.length;
    const { yMin, yMax, values, xTicks } = ds;
    let html = '';

    // Grid lines
    const step = niceGridStep(yMax - yMin);
    let gridV = yMin + (step - (yMin % step === 0 ? step : yMin % step));
    if (yMin % step === 0) gridV = yMin;
    for (let v = gridV; v <= yMax; v += step) {
      const y = yPos(v, yMin, yMax);
      html += `<line x1="${PAD_L}" y1="${y}" x2="${SVG_W - PAD_R}" y2="${y}" stroke="#E8E4FF" stroke-width="1"/>`;
      html += `<text x="${PAD_L - 6}" y="${y + 4}" text-anchor="end" font-size="11" fill="#525270" font-weight="600">${v}</text>`;
    }
    // Axis min label
    html += `<text x="${PAD_L - 6}" y="${yPos(yMin,yMin,yMax) + 4}" text-anchor="end" font-size="11" fill="#525270" font-weight="600">${yMin}</text>`;

    // Axes
    html += `<line x1="${PAD_L}" y1="${PAD_T}" x2="${PAD_L}" y2="${PAD_T + CHART_H}" stroke="#525270" stroke-width="1.5"/>`;
    html += `<line x1="${PAD_L}" y1="${PAD_T + CHART_H}" x2="${SVG_W - PAD_R}" y2="${PAD_T + CHART_H}" stroke="#525270" stroke-width="1.5"/>`;

    // X tick labels
    for (let i = 0; i < n; i++) {
      const x = xPos(i, n);
      html += `<text x="${x}" y="${PAD_T + CHART_H + 18}" text-anchor="middle" font-size="11" fill="#525270" font-weight="600">${xTicks[i]}</text>`;
      // small tick on x-axis
      html += `<line x1="${x}" y1="${PAD_T + CHART_H}" x2="${x}" y2="${PAD_T + CHART_H + 5}" stroke="#525270" stroke-width="1"/>`;
    }

    // Y-axis label (rotated)
    html += `<text transform="rotate(-90)" x="${-(PAD_T + CHART_H/2)}" y="14" text-anchor="middle" font-size="11" fill="${'var(--s2)'}" font-weight="700">${ds.yLabel}</text>`;

    // Line path
    let d = '';
    for (let i = 0; i < n; i++) {
      const x = xPos(i, n);
      const y = yPos(values[i], yMin, yMax);
      d += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
    }
    html += `<path d="${d}" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
    html += `<defs><linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient></defs>`;

    // Shaded area under line
    const botY = PAD_T + CHART_H;
    const firstX = xPos(0, n), lastX = xPos(n-1, n);
    let areaPath = d + `L${lastX},${botY} L${firstX},${botY} Z`;
    html += `<path d="${areaPath}" fill="url(#areaGrad)" opacity=".18"/>`;
    html += `<defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#A29BFE" stop-opacity="0"/>
    </linearGradient></defs>`;

    // Data points
    for (let i = 0; i < n; i++) {
      const x = xPos(i, n);
      const y = yPos(values[i], yMin, yMax);
      const isHighlight = highlightIdx !== null && (Array.isArray(highlightIdx) ? highlightIdx.includes(i) : highlightIdx === i);
      html += `<circle cx="${x}" cy="${y}" r="${isHighlight ? 8 : 6}" fill="${isHighlight ? '#6C5CE7' : 'white'}" stroke="${isHighlight ? '#A29BFE' : '#6C5CE7'}" stroke-width="2.5" ${isHighlight ? 'class="dot-highlight"' : ''}/>`;
      // Value label above dot
      html += `<text x="${x}" y="${y - 12}" text-anchor="middle" font-size="11" fill="#6C5CE7" font-weight="800">${values[i]}</text>`;
    }

    svg.innerHTML = html;
  }

  function shuffleArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function makeNumDistractors(correct, candidates, count) {
    const filtered = candidates.filter(v => v !== correct);
    return shuffleArray([correct, ...shuffleArray(filtered).slice(0, count)]);
  }

  function loadQuestion() {
    answered = false;
    const fb = document.getElementById('feedbackMsg');
    fb.textContent = ''; fb.className = 'feedback-msg';
    document.getElementById('nextBtn').className = 'next-btn';
    document.getElementById('mcArea').innerHTML = '';

    const q = questionPlan[current];
    const ds = datasets[q.dsIdx];
    document.getElementById('questionCounter').textContent = 'Question ' + (current + 1) + ' of ' + total;
    document.getElementById('datasetLabel').textContent = ds.title;

    let qText = '';
    let highlightIdx = null;
    let options = [];

    if (q.type === 'value-at') {
      const i = q.pointIdx;
      correctAnswer = ds.values[i];
      qText = 'What was the value on ' + ds.xTicks[i] + '?';
      highlightIdx = i;
      const allVals = ds.values.slice();
      options = makeNumDistractors(correctAnswer, allVals, 3);
    }
    else if (q.type === 'highest') {
      const maxV = Math.max(...ds.values);
      const maxI = ds.values.indexOf(maxV);
      correctAnswer = maxV;
      qText = 'What was the highest value shown on the graph?';
      highlightIdx = maxI;
      const candidates = ds.values.slice().filter(v => v !== maxV);
      options = makeNumDistractors(correctAnswer, candidates, 3);
    }
    else if (q.type === 'lowest') {
      const minV = Math.min(...ds.values);
      const minI = ds.values.indexOf(minV);
      correctAnswer = minV;
      qText = 'What was the lowest value shown on the graph?';
      highlightIdx = minI;
      const candidates = ds.values.slice().filter(v => v !== minV);
      options = makeNumDistractors(correctAnswer, candidates, 3);
    }
    else if (q.type === 'biggest-rise') {
      // Find biggest consecutive increase
      let biggestRise = -Infinity, riseStart = 0;
      for (let i = 0; i < ds.values.length - 1; i++) {
        const diff = ds.values[i+1] - ds.values[i];
        if (diff > biggestRise) { biggestRise = diff; riseStart = i; }
      }
      correctAnswer = ds.xTicks[riseStart] + ' to ' + ds.xTicks[riseStart + 1];
      qText = 'Between which two points did the value increase the most?';
      highlightIdx = [riseStart, riseStart + 1];
      // Build distractor pairs
      const pairs = [];
      for (let i = 0; i < ds.values.length - 1; i++) {
        if (i !== riseStart) pairs.push(ds.xTicks[i] + ' to ' + ds.xTicks[i+1]);
      }
      options = shuffleArray([correctAnswer, ...shuffleArray(pairs).slice(0,3)]);
    }
    else if (q.type === 'difference') {
      const a = q.ptA, b = q.ptB;
      const diff = Math.abs(ds.values[a] - ds.values[b]);
      correctAnswer = diff;
      qText = 'What is the difference in value between ' + ds.xTicks[a] + ' (' + ds.values[a] + ') and ' + ds.xTicks[b] + ' (' + ds.values[b] + ')?';
      highlightIdx = [a, b];
      const candidates = [diff+1, diff-1, diff+2, diff-2, diff+3].filter(v => v > 0 && v !== diff);
      options = makeNumDistractors(correctAnswer, candidates, 3);
    }

    drawLineGraph(ds, highlightIdx);
    document.getElementById('questionText').textContent = qText;
    showMC(options);
  }

  function showMC(options) {
    const area = document.getElementById('mcArea');
    area.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => checkMC(opt, btn, area));
      area.appendChild(btn);
    });
  }

  function checkMC(val, btn, area) {
    if (answered) return;
    answered = true;
    area.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    const fb = document.getElementById('feedbackMsg');
    const isCorrect = (typeof correctAnswer === 'string') ? val === correctAnswer : Number(val) === Number(correctAnswer);
    if (isCorrect) {
      btn.classList.add('correct');
      fb.textContent = '✅ Correct! The answer is ' + correctAnswer;
      fb.className = 'feedback-msg correct show';
      updateScore(1);
    } else {
      btn.classList.add('wrong');
      fb.textContent = '❌ The correct answer was ' + correctAnswer;
      fb.className = 'feedback-msg wrong show';
      area.querySelectorAll('.choice-btn').forEach(b => {
        const bIsCorrect = (typeof correctAnswer === 'string') ? b.textContent === correctAnswer : Number(b.textContent) === Number(correctAnswer);
        if (bIsCorrect) b.classList.add('correct');
      });
    }
    current++;
    updateProgress();
    if (current >= total) {
      setTimeout(() => showEnd(), 1200);
    } else {
      document.getElementById('nextBtn').className = 'next-btn visible';
    }
  }

  function updateScore(pts) { score += pts; document.getElementById('score').textContent = score; }
  function updateProgress() { document.getElementById('progressBar').style.width = (current / total * 100) + '%'; }
  function showEnd() {
    const pct = score / total;
    document.getElementById('endStars').textContent = pct >= 0.8 ? '⭐⭐⭐' : pct >= 0.5 ? '⭐⭐' : '⭐';
    document.getElementById('endTitle').textContent = pct >= 0.8 ? 'Brilliant!' : pct >= 0.5 ? 'Good job!' : 'Keep trying!';
    document.getElementById('endScore').textContent = 'You scored ' + score + ' / ' + total;
    document.getElementById('endScreen').classList.add('show');
  }
  function restartGame() { document.getElementById('endScreen').classList.remove('show'); initGame(); }
  function nextQuestion() { loadQuestion(); }

  function initGame() {
    score = 0; current = 0; answered = false;
    document.getElementById('score').textContent = '0';
    document.getElementById('progressBar').style.width = '0%';
    loadQuestion();
  }

  initGame();
</script>
</body>
</html>
