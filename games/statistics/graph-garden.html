<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Graph Garden – MathMunch</title>
<style>
  :root {
    --orange:#F97316;--orange-dark:#EA580C;--orange-light:#FFF7ED;
    --blue:#3B82F6;--green:#10B981;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#FFEDD5;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3,.logo-text,.stat-value,.game-title-text{font-family:'Quicksand',system-ui,sans-serif;}

  .site-header{background:var(--white);border-bottom:1px solid var(--outline);position:sticky;top:0;z-index:100;}
  .site-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:38px;height:38px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 2px 0 var(--orange-dark);}
  .logo-text{font-size:1.25rem;font-weight:700;color:var(--orange);}
  .site-nav{display:flex;gap:4px;}
  .site-nav a{text-decoration:none;color:var(--text-mid);font-weight:600;font-size:.9rem;padding:8px 16px;border-radius:9999px;transition:.15s;}
  .site-nav a:hover,.site-nav a.active{background:var(--orange-light);color:var(--orange);}
  .btn-play-now{background:var(--orange);color:white;padding:10px 22px;border-radius:9999px;font-weight:700;font-size:.9rem;text-decoration:none;box-shadow:0 3px 0 var(--orange-dark);transition:.1s;}
  .btn-play-now:hover{transform:translateY(-1px);}
  .btn-play-now:active{transform:translateY(2px);box-shadow:0 1px 0 var(--orange-dark);}

  .game-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;padding:20px 24px 24px;max-width:1200px;margin:0 auto;flex:1;align-items:start;}

  .sidebar{display:flex;flex-direction:column;gap:12px;}
  .exit-btn{background:var(--white);border:2px solid var(--outline);border-radius:9999px;padding:12px 20px;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:600;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 0 var(--outline);transition:.1s;}
  .exit-btn:hover{border-color:var(--orange);color:var(--orange);}
  .exit-btn:active{transform:translateY(1px);box-shadow:none;}
  .stat-card{background:var(--white);border:1px solid var(--outline);border-radius:24px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .stat-label{font-family:'Lexend',sans-serif;font-size:.7rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .stat-value{font-size:2.2rem;font-weight:700;color:var(--orange);line-height:1;}
  .stat-level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .level-icon{font-size:1.4rem;}
  .stat-value-sm{font-size:1.4rem;font-weight:700;color:var(--orange);}
  .level-progress{height:10px;background:var(--outline);border-radius:9999px;overflow:hidden;}
  .level-progress-fill{height:100%;background:var(--orange);border-radius:9999px;width:0%;transition:width .4s ease;}
  .hearts{display:flex;gap:6px;font-size:1.5rem;}
  .game-info-title{font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
  .level-pill{display:inline-block;background:var(--orange);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:9999px;}

  .game-canvas{background:var(--canvas);border-radius:24px;padding:32px;position:relative;overflow:hidden;min-height:520px;border:1px solid rgba(249,115,22,.15);}
  .game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
  .game-canvas > *{position:relative;z-index:1;}

  .end-screen{display:none;position:fixed;inset:0;background:rgba(25,28,30,.8);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;}
  .end-screen.show{display:flex;}
  .end-card{background:white;border-radius:28px;padding:44px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:9999px;border:none;cursor:pointer;font-family:'Lexend',sans-serif;font-size:1rem;font-weight:700;transition:.1s;text-decoration:none;margin:0 6px;}
  .btn-play{background:var(--orange);color:white;box-shadow:0 3px 0 var(--orange-dark);}
  .btn-play:active{transform:translateY(2px);box-shadow:0 1px 0 var(--orange-dark);}
  .btn-home{background:var(--bg);color:var(--text-mid);border:2px solid var(--outline);}

  @media(max-width:768px){
    .game-layout{grid-template-columns:1fr;padding:16px;}
    .sidebar{flex-direction:row;flex-wrap:wrap;}
    .stat-card{flex:1;min-width:140px;}
    .site-nav{display:none;}
  }

  /* Game-specific CSS */
  .round-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .round-label{font-size:.9rem;font-weight:700;color:#525270}
  .type-badge{padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;color:white}
  .type-badge.pictogram{background:linear-gradient(135deg,#fdcb6e,#e17055)}
  .type-badge.barchart{background:linear-gradient(135deg,#74b9ff,#0984e3)}
  .round-dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .rdot{width:24px;height:24px;border-radius:50%;background:#FFF7ED;border:2px solid #c8c0ff;transition:.3s}
  .rdot.correct{background:linear-gradient(135deg,#55efc4,#00b894);border-color:#00b894}
  .rdot.wrong{background:linear-gradient(135deg,#fd79a8,#e84393);border-color:#e84393}
  .rdot.active{background:#FB923C;border-color:#F97316;transform:scale(1.3)}
  .chart-card{background:white;border-radius:20px;padding:24px;margin-bottom:24px;box-shadow:0 4px 20px rgba(249,115,22,0.15);border:2px solid #E8E4FF}
  .chart-title{font-size:.85rem;font-weight:700;color:#525270;text-align:center;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
  .pictogram-table{width:100%;border-collapse:separate;border-spacing:0 6px}
  .pictogram-table td{padding:6px 8px;vertical-align:middle}
  .picto-label{font-weight:700;font-size:.95rem;color:#1E1E2E;min-width:80px}
  .picto-icons{font-size:1.6rem;line-height:1.4;word-spacing:2px;letter-spacing:2px}
  .picto-count{font-weight:800;font-size:.9rem;color:#525270;padding-left:8px}
  .bar-chart-wrap{overflow-x:auto}
  .bar-chart-wrap svg{display:block;margin:0 auto}
  .question-text{text-align:center;font-size:1.15rem;font-weight:700;color:#1E1E2E;margin-bottom:22px;line-height:1.5}
  .answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:420px;margin:0 auto}
  .ans-btn{padding:16px 10px;border-radius:16px;border:3px solid #E8E4FF;background:white;font-size:1.2rem;font-weight:800;color:#1E1E2E;cursor:pointer;transition:.2s;box-shadow:0 2px 10px rgba(249,115,22,0.08);text-align:center;min-height:60px}
  .ans-btn:hover:not(:disabled){background:#FB923C;color:white;border-color:#FB923C;transform:translateY(-2px)}
  .ans-btn.correct{background:linear-gradient(135deg,#55efc4,#00b894);border-color:#00b894;color:white;animation:correctPop .4s ease}
  .ans-btn.wrong{background:linear-gradient(135deg,#fd79a8,#d63031);border-color:#d63031;color:white;animation:wrongShake .4s ease}
  .ans-btn.reveal{background:linear-gradient(135deg,#55efc4,#00b894);border-color:#00b894;color:white}
  @keyframes correctPop{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .ans-btn:disabled{cursor:not-allowed;opacity:.7}
  .feedback-strip{text-align:center;font-size:1.05rem;font-weight:700;min-height:36px;margin-top:16px;padding:8px 20px;border-radius:12px;transition:all .3s}
  .feedback-strip.good{background:#d4f5e9;color:#00b894}
  .feedback-strip.bad{background:#ffe4f0;color:#e84393}
  .garden-footer{text-align:center;font-size:1.4rem;margin-top:12px;opacity:.5}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <div class="site-header-inner">
    <a href="../../index.html" class="logo">
      <div class="logo-icon">📊</div>
      <span class="logo-text">MathMunch</span>
    </a>
    <nav class="site-nav">
      <a href="../../index.html#games" class="active">Games</a>
      <a href="#">Badges</a>
      <a href="#">Progress</a>
    </nav>
    <a href="../../index.html" class="btn-play-now">Play Now</a>
  </div>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>

    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Gardener</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Graph Garden</div>
      <span class="level-pill">P2</span>
    </div>
  </div>

  <div class="game-canvas">
    <div class="round-info">
      <span class="round-label" id="roundLabel">Question 1 of 10</span>
      <span class="type-badge" id="typeBadge">Pictogram</span>
    </div>
    <div class="round-dots" id="roundDots"></div>
    <div class="chart-card" id="chartCard">
      <div class="chart-title" id="chartTitle">Garden Survey</div>
      <div id="chartArea"></div>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="answers-grid" id="answersGrid"></div>
    <div class="feedback-strip" id="feedbackStrip"></div>
    <div class="garden-footer">🌸 🌿 🌼 🌱 🌺</div>
  </div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div style="font-size:3rem;margin-bottom:12px;" id="endEmoji">🎉</div>
    <div style="font-family:'Quicksand',sans-serif;font-size:1.9rem;font-weight:700;color:var(--text);margin-bottom:8px;" id="endTitle">Game Over!</div>
    <div style="font-size:1rem;color:var(--text-mid);margin-bottom:28px;" id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">← All Games</a>
  </div>
</div>

<script>
  let score = 0, total = 10, current = 0;
  let locked = false;
  let questions = [];

  function updateScore(pts){ score += pts; document.getElementById('score').textContent = score; }
  function updateProgress(){ document.getElementById('progressBar').style.width = (current/total*100)+'%'; }

  function showEnd(){
    const pct = score/total;
    document.getElementById('endEmoji').textContent = pct>=0.8?'🌟':pct>=0.5?'👍':'💪';
    document.getElementById('endTitle').textContent = pct>=0.8?'Brilliant!':pct>=0.5?'Good job!':'Keep trying!';
    document.getElementById('endScore').textContent = 'You scored '+score+' / '+total;
    document.getElementById('endScreen').classList.add('show');
  }

  function restartGame(){
    document.getElementById('endScreen').classList.remove('show');
    initGame();
  }

  function shuffle(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }

  const PICTO_DATASETS = [
    { title:"Flowers in the Garden", rows:[
      {label:"Sunflowers",emoji:"🌻",count:4},
      {label:"Roses",emoji:"🌹",count:6},
      {label:"Daisies",emoji:"🌼",count:3},
      {label:"Tulips",emoji:"🌷",count:5}
    ]},
    { title:"Vegetables Grown", rows:[
      {label:"Carrots",emoji:"🥕",count:7},
      {label:"Tomatoes",emoji:"🍅",count:5},
      {label:"Peas",emoji:"🫛",count:2},
      {label:"Lettuce",emoji:"🥬",count:4}
    ]},
    { title:"Garden Visitors", rows:[
      {label:"Butterflies",emoji:"🦋",count:3},
      {label:"Bees",emoji:"🐝",count:8},
      {label:"Ladybirds",emoji:"🐞",count:5},
      {label:"Beetles",emoji:"🪲",count:2}
    ]},
    { title:"Fruit on Trees", rows:[
      {label:"Apples",emoji:"🍎",count:6},
      {label:"Pears",emoji:"🍐",count:4},
      {label:"Lemons",emoji:"🍋",count:3},
      {label:"Cherries",emoji:"🍒",count:7}
    ]},
    { title:"Birds Seen Today", rows:[
      {label:"Robins",emoji:"🐦",count:5},
      {label:"Sparrows",emoji:"🐤",count:8},
      {label:"Owls",emoji:"🦉",count:2},
      {label:"Ducks",emoji:"🦆",count:6}
    ]}
  ];

  function makePictoQuestion(dataset){
    const type = Math.random()<0.5?'count':'most';
    if(type==='count'){
      const row = dataset.rows[Math.floor(Math.random()*dataset.rows.length)];
      const correct = row.count;
      const wrongs = new Set();
      while(wrongs.size<3){
        const v=correct+Math.floor(Math.random()*5)-2;
        if(v!==correct&&v>=1&&v<=12) wrongs.add(v);
      }
      return {
        kind:'pictogram',
        dataset,
        questionText:'How many '+row.label.toLowerCase()+' are there?',
        correct,
        answers: shuffle([correct,...wrongs])
      };
    } else {
      const maxRow = dataset.rows.reduce((a,b)=>a.count>b.count?a:b);
      const correct = maxRow.label;
      const others = dataset.rows.filter(r=>r.label!==correct).map(r=>r.label);
      const wrongs = shuffle(others).slice(0,3);
      return {
        kind:'pictogram',
        dataset,
        questionText:'Which '+dataset.title.toLowerCase().replace(' grown','').replace(' in the garden','').replace(' on trees','').replace(' seen today','').replace('garden visitors','creature')+' has the most?',
        correct,
        answers: shuffle([correct,...wrongs])
      };
    }
  }

  const BAR_DATASETS = [
    { title:"Favourite Garden Colours", labels:["Red","Yellow","Purple","Pink"], values:[5,3,7,4], colors:["#ff7675","#fdcb6e","#a29bfe","#fd79a8"] },
    { title:"Seeds Planted", labels:["Beans","Peas","Carrots","Corn"], values:[6,2,8,4], colors:["#55efc4","#00b894","#e17055","#fdcb6e"] },
    { title:"Tools in the Shed", labels:["Spades","Rakes","Forks","Trowels"], values:[4,7,3,6], colors:["#74b9ff","#0984e3","#a29bfe","#6c5ce7"] },
    { title:"Rain This Week (mm)", labels:["Mon","Tue","Wed","Thu"], values:[3,7,5,2], colors:["#74b9ff","#a29bfe","#55efc4","#fdcb6e"] },
    { title:"Snails Found", labels:["Bed A","Bed B","Bed C","Bed D"], values:[8,5,1,6], colors:["#e17055","#fdcb6e","#55efc4","#fd79a8"] }
  ];

  function makeBarQuestion(dataset){
    const type = Math.random()<0.5?'count':'most';
    if(type==='count'){
      const idx = Math.floor(Math.random()*dataset.labels.length);
      const correct = dataset.values[idx];
      const label = dataset.labels[idx];
      const wrongs = new Set();
      while(wrongs.size<3){
        const v=correct+Math.floor(Math.random()*5)-2;
        if(v!==correct&&v>=1&&v<=10) wrongs.add(v);
      }
      return {
        kind:'barchart',
        dataset,
        questionText:'How many '+label.toLowerCase()+'?',
        correct,
        answers: shuffle([correct,...wrongs])
      };
    } else {
      const maxVal = Math.max(...dataset.values);
      const maxIdx = dataset.values.indexOf(maxVal);
      const correct = dataset.labels[maxIdx];
      const others = dataset.labels.filter(l=>l!==correct);
      const wrongs = shuffle(others).slice(0,3);
      return {
        kind:'barchart',
        dataset,
        questionText:'Which bar is the tallest?',
        correct,
        answers: shuffle([correct,...wrongs])
      };
    }
  }

  function buildRoundDots(){
    const c=document.getElementById('roundDots'); c.innerHTML='';
    for(let i=0;i<total;i++){
      const d=document.createElement('div');
      d.className='rdot'+(i===0?' active':'');
      d.id='rdot-'+i; c.appendChild(d);
    }
  }

  function markDot(idx, ok){
    const d=document.getElementById('rdot-'+idx);
    if(!d) return;
    d.classList.remove('active');
    d.classList.add(ok?'correct':'wrong');
  }

  function generateQuestions(){
    const qs=[];
    const pictoDatasets=shuffle([...PICTO_DATASETS]);
    const barDatasets=shuffle([...BAR_DATASETS]);
    for(let i=0;i<5;i++){
      qs.push(makePictoQuestion(pictoDatasets[i%pictoDatasets.length]));
      qs.push(makeBarQuestion(barDatasets[i%barDatasets.length]));
    }
    return shuffle(qs).slice(0,10);
  }

  function renderPictogram(dataset){
    let html='<table class="pictogram-table">';
    dataset.rows.forEach(row=>{
      html+='<tr><td class="picto-label">'+row.label+'</td>';
      html+='<td class="picto-icons">';
      for(let i=0;i<row.count;i++) html+=row.emoji+' ';
      html+='</td>';
      html+='<td class="picto-count">='+row.count+'</td></tr>';
    });
    html+='</table>';
    return html;
  }

  function renderBarChart(dataset){
    const W=340, H=200, padL=36, padB=40, padT=16, padR=10;
    const chartW=W-padL-padR, chartH=H-padB-padT;
    const maxVal=Math.max(...dataset.values);
    const barW=Math.floor(chartW/dataset.values.length)-12;
    const barGap=Math.floor(chartW/dataset.values.length);
    const yScale = chartH/maxVal;

    let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    for(let y=0;y<=maxVal;y++){
      const cy=padT+chartH - y*yScale;
      svg+=`<line x1="${padL}" y1="${cy}" x2="${W-padR}" y2="${cy}" stroke="#e8e4ff" stroke-width="1"/>`;
      if(y>0||y===0) svg+=`<text x="${padL-4}" y="${cy+4}" font-size="11" fill="#888" text-anchor="end">${y}</text>`;
    }
    svg+=`<line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#525270" stroke-width="2"/>`;
    svg+=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#525270" stroke-width="2"/>`;
    dataset.values.forEach((v,i)=>{
      const x=padL+i*barGap+8;
      const barH=v*yScale;
      const y=padT+chartH-barH;
      svg+=`<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${dataset.colors[i]}" rx="4"/>`;
      svg+=`<text x="${x+barW/2}" y="${y-5}" font-size="12" font-weight="bold" fill="${dataset.colors[i]}" text-anchor="middle">${v}</text>`;
      const label=dataset.labels[i];
      if(label.length>5){
        svg+=`<text x="${x+barW/2}" y="${padT+chartH+16}" font-size="9" fill="#525270" text-anchor="middle">${label.slice(0,5)}</text>`;
        svg+=`<text x="${x+barW/2}" y="${padT+chartH+28}" font-size="9" fill="#525270" text-anchor="middle">${label.slice(5)}</text>`;
      } else {
        svg+=`<text x="${x+barW/2}" y="${padT+chartH+18}" font-size="11" fill="#525270" text-anchor="middle">${label}</text>`;
      }
    });
    svg+='</svg>';
    return '<div class="bar-chart-wrap">'+svg+'</div>';
  }

  function initGame(){
    score=0; current=0; locked=false;
    document.getElementById('score').textContent='0';
    document.getElementById('progressBar').style.width='0%';
    document.getElementById('feedbackStrip').textContent='';
    document.getElementById('feedbackStrip').className='feedback-strip';
    questions=generateQuestions();
    buildRoundDots();
    loadQuestion();
  }

  function loadQuestion(){
    if(current>=total){ showEnd(); return; }
    locked=false;
    updateProgress();
    const q=questions[current];
    document.getElementById('roundLabel').textContent='Question '+(current+1)+' of '+total;

    const badge=document.getElementById('typeBadge');
    if(q.kind==='pictogram'){
      badge.textContent='Pictogram';
      badge.className='type-badge pictogram';
      document.getElementById('chartTitle').textContent=q.dataset.title;
      document.getElementById('chartArea').innerHTML=renderPictogram(q.dataset);
    } else {
      badge.textContent='Bar Chart';
      badge.className='type-badge barchart';
      document.getElementById('chartTitle').textContent=q.dataset.title;
      document.getElementById('chartArea').innerHTML=renderBarChart(q.dataset);
    }

    document.getElementById('questionText').textContent=q.questionText;
    document.getElementById('feedbackStrip').textContent='';
    document.getElementById('feedbackStrip').className='feedback-strip';

    const grid=document.getElementById('answersGrid');
    grid.innerHTML='';
    q.answers.forEach(ans=>{
      const btn=document.createElement('button');
      btn.className='ans-btn';
      btn.textContent=ans;
      btn.onclick=()=>handleAnswer(ans, q.correct, btn);
      grid.appendChild(btn);
    });

    for(let i=0;i<total;i++){
      const d=document.getElementById('rdot-'+i);
      if(d) d.classList.toggle('active',i===current);
    }
  }

  function handleAnswer(chosen, correct, btn){
    if(locked) return;
    locked=true;
    const allBtns=document.querySelectorAll('.ans-btn');
    allBtns.forEach(b=>b.disabled=true);

    const isCorrect = String(chosen)===String(correct);
    if(isCorrect){
      btn.classList.add('correct');
      updateScore(1);
      document.getElementById('feedbackStrip').textContent='✅ Correct!';
      document.getElementById('feedbackStrip').className='feedback-strip good';
      markDot(current,true);
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b=>{ if(String(b.textContent)===String(correct)) b.classList.add('reveal'); });
      document.getElementById('feedbackStrip').textContent='❌ The answer is '+correct+'.';
      document.getElementById('feedbackStrip').className='feedback-strip bad';
      markDot(current,false);
    }
    current++;
    setTimeout(loadQuestion, 1400);
  }

  initGame();
</script>
<script src="../../js/mathmunch.js"></script>
</body>
</html>
