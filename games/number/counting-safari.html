<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Counting Safari – MathMunch</title>
<style>
  :root {
    --blue:#3B82F6;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
    --green:#10B981;--orange:#F97316;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#DBEAFE;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3,.logo-text,.stat-value,.game-title-text{font-family:'Quicksand',system-ui,sans-serif;}

  /* HEADER */
  .site-header{background:var(--white);border-bottom:1px solid var(--outline);position:sticky;top:0;z-index:100;}
  .site-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:38px;height:38px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 2px 0 var(--blue-dark);}
  .logo-text{font-size:1.25rem;font-weight:700;color:var(--blue);}
  .site-nav{display:flex;gap:4px;}
  .site-nav a{text-decoration:none;color:var(--text-mid);font-weight:600;font-size:.9rem;padding:8px 16px;border-radius:9999px;transition:.15s;}
  .site-nav a:hover,.site-nav a.active{background:var(--blue-light);color:var(--blue);}
  .btn-play-now{background:var(--blue);color:white;padding:10px 22px;border-radius:9999px;font-weight:700;font-size:.9rem;text-decoration:none;box-shadow:0 3px 0 var(--blue-dark);transition:.1s;}
  .btn-play-now:hover{transform:translateY(-1px);}
  .btn-play-now:active{transform:translateY(2px);box-shadow:0 1px 0 var(--blue-dark);}

  /* LAYOUT */
  .game-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;padding:20px 24px 24px;max-width:1200px;margin:0 auto;flex:1;align-items:start;}

  /* SIDEBAR */
  .sidebar{display:flex;flex-direction:column;gap:12px;}
  .exit-btn{background:var(--white);border:2px solid var(--outline);border-radius:9999px;padding:12px 20px;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:600;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 0 var(--outline);transition:.1s;}
  .exit-btn:hover{border-color:var(--blue);color:var(--blue);}
  .exit-btn:active{transform:translateY(1px);box-shadow:none;}
  .stat-card{background:var(--white);border:1px solid var(--outline);border-radius:24px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .stat-label{font-family:'Lexend',sans-serif;font-size:.7rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .stat-value{font-size:2.2rem;font-weight:700;color:var(--blue);line-height:1;}
  .stat-level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .level-icon{font-size:1.4rem;}
  .stat-value-sm{font-size:1.8rem;font-weight:700;color:var(--blue);}
  .level-progress{height:10px;background:var(--outline);border-radius:9999px;overflow:hidden;}
  .level-progress-fill{height:100%;background:var(--green);border-radius:9999px;width:0%;transition:width .4s ease;}
  .hearts{display:flex;gap:6px;font-size:1.5rem;}
  .game-info-title{font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
  .level-pill{display:inline-block;background:var(--blue);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:9999px;}

  /* GAME CANVAS */
  .game-canvas{background:var(--canvas);border-radius:24px;padding:32px;position:relative;overflow:hidden;min-height:520px;border:1px solid rgba(59,130,246,.15);}
  .game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
  .game-canvas > *{position:relative;z-index:1;}

  /* GAME-SPECIFIC STYLES */
  .safari-header{text-align:center;margin-bottom:20px;font-size:2rem;letter-spacing:4px;}
  .game-card{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border-radius:24px;box-shadow:0 8px 32px rgba(255,107,107,0.15);padding:28px 24px;margin-bottom:20px;}
  .question-text{text-align:center;font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:20px;}
  .animal-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:24px;min-height:80px;background:rgba(255,255,255,0.5);border-radius:16px;padding:16px;}
  .animal-emoji{font-size:2.4rem;display:inline-block;transition:transform 0.2s;}
  .answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn-answer{background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:white;border:none;border-radius:12px;font-weight:800;font-size:1.5rem;padding:16px 28px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 14px rgba(255,107,107,0.3);font-family:inherit;}
  .btn-answer:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,107,0.4);}
  .btn-answer:disabled{cursor:default;opacity:0.7;}
  .btn-answer.correct{background:#D4EDDA!important;color:#155724!important;box-shadow:0 4px 14px rgba(0,184,148,0.3);}
  .btn-answer.wrong{background:#F8D7DA!important;color:#721C24!important;box-shadow:none;}
  .feedback-box{border-radius:12px;padding:12px 20px;text-align:center;font-weight:700;font-size:1rem;margin-top:16px;display:none;}
  .feedback-box.correct{background:#D4EDDA;color:#155724;display:block;}
  .feedback-box.wrong{background:#F8D7DA;color:#721C24;display:block;}
  .confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:200;overflow:hidden;}
  .confetti-piece{position:absolute;font-size:1.5rem;animation:confettiFly 1.2s ease-out forwards;top:50%;opacity:1;}
  @keyframes confettiFly{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(-220px) rotate(720deg);opacity:0;}}

  /* END SCREEN */
  .end-screen{display:none;position:fixed;inset:0;background:rgba(25,28,30,.8);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;}
  .end-screen.show{display:flex;}
  .end-card{background:white;border-radius:28px;padding:44px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  .end-stars{font-size:2.8rem;margin-bottom:12px;}
  .end-title{font-family:'Quicksand',sans-serif;font-size:1.9rem;font-weight:700;color:var(--text);margin-bottom:8px;}
  .end-score{font-size:1rem;color:var(--text-mid);margin-bottom:28px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:9999px;border:none;cursor:pointer;font-family:'Lexend',sans-serif;font-size:1rem;font-weight:700;transition:.1s;text-decoration:none;}
  .btn-play{background:var(--blue);color:white;box-shadow:0 3px 0 var(--blue-dark);margin:0 6px;}
  .btn-play:active{transform:translateY(2px);box-shadow:0 1px 0 var(--blue-dark);}
  .btn-home{background:var(--bg);color:var(--text-mid);border:2px solid var(--outline);margin:0 6px;}

  /* RESPONSIVE */
  @media(max-width:768px){
    .game-layout{grid-template-columns:1fr;padding:16px;}
    .sidebar{flex-direction:row;flex-wrap:wrap;}
    .stat-card{flex:1;min-width:140px;}
    .site-nav{display:none;}
  }
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <div class="site-header-inner">
    <a href="../../index.html" class="logo">
      <div class="logo-icon">🧮</div>
      <span class="logo-text">MathMunch</span>
    </a>
    <nav class="site-nav">
      <a href="../../index.html#games" class="active">Games</a>
      <a href="#">Badges</a>
      <a href="#">Progress</a>
    </nav>
    <a href="../../index.html" class="btn-play-now">Play Now</a>
  </div>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>

    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Early Years</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Counting Safari</div>
      <span class="level-pill">EY</span>
    </div>
  </div>

  <div class="game-canvas">
    <div class="safari-header">🌴 ☀️ 🌴</div>

    <div class="game-card" id="gameCard">
      <div class="question-text" id="questionText">Loading...</div>
      <div class="animal-grid" id="animalGrid"></div>
      <div class="answers-grid" id="answersGrid"></div>
      <div class="feedback-box" id="feedbackBox"></div>
    </div>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="end-screen" id="endOverlay">
  <div class="end-card">
    <div class="end-stars" id="endEmoji">🦁</div>
    <div class="end-title" id="endTitle">Safari Complete!</div>
    <div class="end-score" id="endScore">0 / 10</div>
    <div style="font-size:2rem;margin-bottom:8px;" id="endStars">⭐⭐⭐</div>
    <div style="font-size:1rem;color:var(--text-mid);margin-bottom:20px;" id="endLabel">Brilliant!</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">← All Games</a>
  </div>
</div>

<script>
const ANIMALS = ['🦁','🐘','🦒','🦓','🦏','🦛','🐆','🦍','🦅','🦜'];
const CONFETTI = ['⭐','🌟','✨','🎉','🏆','🌈'];

let rounds = [];
let currentRound = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateRounds() {
  rounds = [];
  for (let i = 0; i < 10; i++) {
    const animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
    const count = Math.floor(Math.random() * 10) + 1;
    const distractors = new Set();
    while (distractors.size < 3) {
      let d = count + (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
      d = Math.max(1, Math.min(10, d));
      if (d !== count) distractors.add(d);
    }
    const options = shuffle([count, ...distractors]);
    rounds.push({ animal, count, options });
  }
}

function renderRound() {
  answered = false;
  const r = rounds[currentRound];

  document.getElementById('questionText').textContent =
    `How many ${r.animal}s can you see?`;

  const grid = document.getElementById('animalGrid');
  grid.innerHTML = '';
  for (let i = 0; i < r.count; i++) {
    const span = document.createElement('span');
    span.className = 'animal-emoji';
    span.textContent = r.animal;
    const rot = (Math.random() * 16 - 8).toFixed(1);
    const scale = (0.9 + Math.random() * 0.2).toFixed(2);
    span.style.transform = `rotate(${rot}deg) scale(${scale})`;
    span.style.animationDelay = `${i * 0.05}s`;
    grid.appendChild(span);
  }

  const grid2 = document.getElementById('answersGrid');
  grid2.innerHTML = '';
  r.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'btn-answer';
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(btn, opt, r.count);
    grid2.appendChild(btn);
  });

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  fb.textContent = '';

  updateProgress();
}

function handleAnswer(btn, chosen, correct) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.btn-answer');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedbackBox');
  if (chosen === correct) {
    btn.classList.add('correct');
    fb.className = 'feedback-box correct';
    fb.textContent = '✓ Correct! Great job!';
    score++;
    document.getElementById('score').textContent = score;
    launchConfetti();
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback-box wrong';
    fb.textContent = `✗ Not quite! The answer was ${correct}.`;
    allBtns.forEach(b => {
      if (parseInt(b.textContent) === correct) b.classList.add('correct');
    });
  }

  setTimeout(() => {
    currentRound++;
    if (currentRound < 10) {
      renderRound();
    } else {
      showEndScreen();
    }
  }, 1200);
}

function updateProgress() {
  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressBar').style.width = `${pct}%`;
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  for (let i = 0; i < 8; i++) {
    const piece = document.createElement('span');
    piece.className = 'confetti-piece';
    piece.textContent = CONFETTI[Math.floor(Math.random() * CONFETTI.length)];
    piece.style.left = (20 + Math.random() * 60) + '%';
    piece.style.animationDelay = (Math.random() * 0.3) + 's';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 1500);
  }
}

function showEndScreen() {
  const overlay = document.getElementById('endOverlay');
  document.getElementById('endScore').textContent = `${score} / 10`;

  let stars, label, emoji;
  if (score >= 9) { stars = '★★★'; label = 'Brilliant!'; emoji = '🏆'; }
  else if (score >= 7) { stars = '★★☆'; label = 'Well Done!'; emoji = '🌟'; }
  else { stars = '★☆☆'; label = 'Keep Trying!'; emoji = '🦁'; }

  document.getElementById('endStars').textContent = stars;
  document.getElementById('endLabel').textContent = label;
  document.getElementById('endEmoji').textContent = emoji;
  overlay.classList.add('show');
}

function restartGame() {
  currentRound = 0;
  score = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('endOverlay').classList.remove('show');
  generateRounds();
  renderRound();
}

// INIT
generateRounds();
renderRound();
</script>
<script src="../../js/mathmunch.js"></script>
</body>
</html>
