<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Division Dungeon – MathMunch</title>
<style>
  :root {
    --blue:#3B82F6;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
    --green:#10B981;--orange:#F97316;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#DBEAFE;
    --accent:#FDCB6E;
    --red:#EF4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lexend', system-ui, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

  /* HEADER */
  .site-header {
    position: sticky; top: 0; z-index: 100;
    background: var(--white);
    border-bottom: 1px solid var(--outline);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex; align-items: center;
    padding: 0 24px; height: 60px; gap: 16px;
  }
  .header-logo { font-family: 'Quicksand', sans-serif; font-size: 20px; font-weight: 700; color: var(--blue); text-decoration: none; }
  .header-nav { flex: 1; display: flex; justify-content: center; }
  .header-nav span { font-size: 15px; font-weight: 600; color: var(--text-mid); }
  .header-play { background: var(--blue); color: white; border: none; border-radius: 10px; padding: 8px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* LAYOUT */
  .game-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 12px; }
  .exit-btn { display: block; width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--outline); background: var(--white); color: var(--text-mid); font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; font-family: inherit; text-decoration: none; transition: background 0.15s; }
  .exit-btn:hover { background: #F1F5F9; }
  .stat-card { background: var(--white); border: 1px solid var(--outline); border-radius: 16px; padding: 16px; }
  .stat-label { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .stat-value { font-family: 'Quicksand', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-level-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .level-icon { font-size: 20px; }
  .stat-value-sm { font-family: 'Quicksand', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .level-progress { height: 8px; background: var(--outline); border-radius: 8px; overflow: hidden; }
  .level-progress-fill { height: 100%; background: var(--blue); border-radius: 8px; transition: width .4s ease; width: 0%; }
  .hearts { font-size: 20px; letter-spacing: 2px; }
  .game-info-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .level-pill { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

  /* GAME CANVAS */
  .game-canvas { background: var(--canvas); border-radius: 24px; padding: 28px; position: relative; overflow: hidden; min-height: 560px; }
  .game-canvas::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px); background-size: 28px 28px; pointer-events: none; z-index: 0; }
  .game-area { position: relative; z-index: 1; }

  /* TORCHES */
  .torch-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 8px; }
  .torch { font-size: 28px; animation: flicker 1.5s ease-in-out infinite alternate; }
  .torch:nth-child(2) { animation-delay: 0.7s; }
  @keyframes flicker { 0%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(.95)} 100%{opacity:.9;transform:scale(1.05)} }

  /* QUESTION CARD */
  .question-card { background: var(--white); border-radius: 16px; border: 1px solid var(--outline); padding: 24px; margin-bottom: 16px; text-align: center; }
  .question-text { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 16px; line-height: 1.4; }
  .gem-count-badge { display: inline-block; font-size: 32px; font-weight: 800; color: #92400E; background: #FEF3C7; padding: 6px 20px; border-radius: 12px; border: 2px solid var(--accent); margin-bottom: 16px; }

  /* GEMS DISPLAY */
  .gems-grid { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; padding: 12px; background: #FFF7ED; border-radius: 12px; border: 1px solid #FED7AA; margin-bottom: 16px; max-width: 420px; margin-left: auto; margin-right: auto; }
  .gem-item { font-size: 20px; }

  /* CHESTS */
  .chests-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
  .chest-box { background: #FFF7ED; border: 2px solid #FCD34D; border-radius: 12px; padding: 12px 10px; min-width: 70px; text-align: center; position: relative; transition: all 0.4s ease; }
  .chest-box .chest-label { font-size: 10px; color: var(--text-soft); font-weight: 600; margin-bottom: 4px; }
  .chest-box .chest-icon { font-size: 24px; }
  .chest-box .chest-count { font-size: 18px; font-weight: 800; color: #92400E; min-height: 24px; }
  .chest-box.filled { background: #FEF3C7; border-color: var(--accent); box-shadow: 0 0 12px rgba(253,203,110,0.4); }

  /* ANSWERS */
  .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  .ans-btn { padding: 18px 10px; border-radius: 16px; border: 2px solid var(--outline); background: var(--white); font-size: 22px; font-weight: 800; color: var(--text); cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .ans-btn:hover { border-color: var(--blue); background: var(--blue-light); transform: translateY(-2px); }
  .ans-btn.correct { border-color: var(--green); background: #ECFDF5; color: var(--green); }
  .ans-btn.wrong { border-color: var(--red); background: #FEF2F2; color: var(--red); }
  .ans-btn:disabled { cursor: default; transform: none; }

  .feedback { min-height: 36px; font-size: 16px; font-weight: 700; text-align: center; padding: 8px; border-radius: 10px; opacity: 0; transition: opacity 0.3s; margin-top: 10px; }
  .feedback.show { opacity: 1; }
  .feedback.correct { color: var(--green); background: #ECFDF5; }
  .feedback.wrong { color: var(--red); background: #FEF2F2; }

  /* END SCREEN */
  .end-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 200; }
  .end-overlay.show { display: flex; }
  .end-card { background: var(--white); border-radius: 24px; padding: 40px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .end-emoji { font-size: 64px; margin-bottom: 10px; }
  .end-title { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .end-score { font-size: 20px; color: var(--text-mid); margin-bottom: 16px; }
  .end-stars { font-size: 36px; margin-bottom: 24px; }
  .end-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary { padding: 14px 28px; border-radius: 16px; background: var(--blue); color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; transition: transform 0.2s; }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary { padding: 14px 28px; border-radius: 16px; background: var(--white); color: var(--blue); font-size: 16px; font-weight: 700; border: 2px solid var(--blue); cursor: pointer; text-decoration: none; display: inline-block; font-family: inherit; }
  .btn-secondary:hover { background: var(--blue-light); }

  @media(max-width:768px){.game-layout{grid-template-columns:1fr}.sidebar{flex-direction:row;flex-wrap:wrap}.stat-card{flex:1;min-width:120px}}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<!-- END SCREEN (outside layout) -->
<div class="end-overlay" id="endOverlay">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-score" id="endScore"></div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-btns">
      <button class="btn-primary" onclick="restartGame()">Play Again</button>
      <a class="btn-secondary" href="../../index.html">← Back</a>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav"><span>Division Dungeon</span></nav>
  <button class="header-play" onclick="restartGame()">Play Now</button>
</header>

<!-- LAYOUT -->
<div class="game-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Primary 4</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Division Dungeon</div>
      <span class="level-pill">P4</span>
    </div>
  </aside>

  <!-- GAME CANVAS -->
  <div class="game-canvas">
    <div class="game-area">
      <div class="torch-row">
        <span class="torch">🔥</span>
        <span style="font-size:13px;color:var(--text-mid);font-weight:600;">Share the treasure equally!</span>
        <span class="torch">🔥</span>
      </div>

      <div class="question-card">
        <div class="question-text" id="questionText">Loading...</div>
        <div class="gems-grid" id="gemsGrid"></div>
        <div class="chests-row" id="chestsRow"></div>
        <div class="answers-grid" id="answersGrid"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  { total: 10, groups: 2, answer: 5 },
  { total: 12, groups: 3, answer: 4 },
  { total: 15, groups: 5, answer: 3 },
  { total: 16, groups: 4, answer: 4 },
  { total: 20, groups: 4, answer: 5 },
  { total: 24, groups: 6, answer: 4 },
  { total: 21, groups: 7, answer: 3 },
  { total: 32, groups: 8, answer: 4 },
  { total: 36, groups: 9, answer: 4 },
  { total: 48, groups: 6, answer: 8 },
];

let currentRound = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function buildGemsGrid(total) {
  const maxShow = 24;
  let html = '';
  const show = Math.min(total, maxShow);
  for (let i = 0; i < show; i++) html += '<span class="gem-item">🪙</span>';
  if (total > maxShow) html += `<span style="font-size:14px;color:var(--text-soft);align-self:center;margin-left:4px">+${total-maxShow} more</span>`;
  return html;
}

function buildChests(groups) {
  let html = '';
  for (let i = 1; i <= groups; i++) {
    html += `<div class="chest-box" id="chest${i}">
      <div class="chest-label">Chest ${i}</div>
      <div class="chest-icon">📦</div>
      <div class="chest-count" id="chestCount${i}">?</div>
    </div>`;
  }
  return html;
}

function fillChests(groups, answer) {
  for (let i = 1; i <= groups; i++) {
    const el = document.getElementById(`chest${i}`);
    const cnt = document.getElementById(`chestCount${i}`);
    if (el && cnt) {
      setTimeout(() => {
        el.classList.add('filled');
        cnt.textContent = answer + ' 🪙';
      }, i * 120);
    }
  }
}

function loadRound() {
  answered = false;
  const q = QUESTIONS[currentRound];

  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('score').textContent = score;

  document.getElementById('questionText').textContent =
    `Share ${q.total} gems equally between ${q.groups} treasure chests. How many in each chest?`;

  document.getElementById('gemsGrid').innerHTML = buildGemsGrid(q.total);
  document.getElementById('chestsRow').innerHTML = buildChests(q.groups);

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';

  const used = new Set([q.answer]);
  const wrongs = [];
  const deltas = shuffle([-3,-2,-1,1,2,3,4,-4]);
  for (const d of deltas) {
    const v = q.answer + d;
    if (v > 0 && !used.has(v)) { used.add(v); wrongs.push(v); if (wrongs.length===3) break; }
  }
  const options = shuffle([q.answer, ...wrongs]);

  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(btn, opt, q);
    grid.appendChild(btn);
  });
}

function checkAnswer(btn, selected, q) {
  if (answered) return;
  answered = true;
  disableButtons();
  const fb = document.getElementById('feedback');
  if (selected === q.answer) {
    btn.className = 'ans-btn correct';
    fb.className = 'feedback correct show';
    fb.textContent = `✓ Correct! ${q.total} ÷ ${q.groups} = ${q.answer}`;
    score++;
    fillChests(q.groups, q.answer);
  } else {
    btn.className = 'ans-btn wrong';
    fb.className = 'feedback wrong show';
    fb.textContent = `✗ The answer is ${q.answer}. ${q.total} ÷ ${q.groups} = ${q.answer}`;
    highlightCorrectBtn(q.answer);
  }
  document.getElementById('score').textContent = score;
  setTimeout(nextRound, 1500);
}

function disableButtons() {
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
}

function highlightCorrectBtn(correct) {
  document.querySelectorAll('.ans-btn').forEach(b => {
    if (parseInt(b.textContent) === correct && !b.classList.contains('wrong')) {
      b.className = 'ans-btn correct';
    }
  });
}

function nextRound() {
  currentRound++;
  if (currentRound >= 10) showEnd();
  else loadRound();
}

function showEnd() {
  document.getElementById('progressBar').style.width = '100%';

  let emoji, title, stars;
  if (score >= 9) { emoji='👑'; title='Brilliant!'; stars='★★★'; }
  else if (score >= 7) { emoji='💎'; title='Well Done!'; stars='★★☆'; }
  else { emoji='🗡️'; title='Keep Trying!'; stars='★☆☆'; }

  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `${score}/10 correct`;
  document.getElementById('endStars').textContent = stars;
  document.getElementById('endOverlay').classList.add('show');
}

function restartGame() {
  currentRound = 0; score = 0;
  document.getElementById('endOverlay').classList.remove('show');
  loadRound();
}

loadRound();
</script>
</body>
</html>
