<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Division Dungeon – MathMunch</title>
<style>
  :root {
    --primary: #3B82F6;
    --primary-light: #EFF6FF;
    --accent: #FDCB6E;
    --n1: #FF6B6B;
    --n2: #FF8E53;
    --bg: #F0F4FF;
    --white: #FFFFFF;
    --text: #1E1E2E;
    --text2: #525270;
    --green: #00B894;
    --red: #FF4757;
    --radius: 16px;
    --shadow: 0 4px 20px rgba(59,130,246,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lexend', system-ui, sans-serif;
    background: #1A1A2E;
    min-height: 100vh;
    color: #E0E0FF;
  }

  /* TOP BAR */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: #12122A;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px; height: 56px;
    border-bottom: 1px solid #2A2A4A;
  }
  .topbar a { text-decoration: none; color: #A78BFA; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 4px; }
  .topbar .brand { font-weight: 700; font-size: 18px; color: #A78BFA; }
  .topbar .title { font-weight: 600; font-size: 16px; color: #E0E0FF; }
  .topbar .badge { background: #E0FFF5; color: #00A878; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .topbar .score { margin-left: auto; font-weight: 700; font-size: 16px; color: #FDCB6E; display: flex; align-items: center; gap: 4px; }

  .game-area {
    max-width: 800px;
    margin: 24px auto 100px;
    padding: 0 16px;
  }

  /* TORCHES */
  .torch-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding: 0 8px;
  }
  .torch { font-size: 28px; animation: flicker 1.5s ease-in-out infinite alternate; }
  .torch:nth-child(2) { animation-delay: 0.7s; }
  @keyframes flicker {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(0.95); }
    100% { opacity: 0.9; transform: scale(1.05); }
  }

  /* QUESTION CARD */
  .question-card {
    background: #23234A;
    border-radius: var(--radius);
    border: 1px solid #3A3A6A;
    padding: 24px;
    margin-bottom: 16px;
    text-align: center;
  }
  .question-text {
    font-size: 20px; font-weight: 700; color: #E0E0FF;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .gem-count-badge {
    display: inline-block;
    font-size: 32px; font-weight: 800;
    color: var(--accent);
    background: #1A1A2E;
    padding: 6px 20px; border-radius: 12px;
    border: 2px solid #FDCB6E;
    margin-bottom: 16px;
  }

  /* GEMS DISPLAY */
  .gems-grid {
    display: flex; flex-wrap: wrap; gap: 4px;
    justify-content: center;
    padding: 12px;
    background: #1A1A2E;
    border-radius: 12px;
    border: 1px solid #2A2A4A;
    margin-bottom: 16px;
    max-width: 420px;
    margin-left: auto; margin-right: auto;
  }
  .gem-item { font-size: 20px; }

  /* CHESTS */
  .chests-row {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 16px;
  }
  .chest-box {
    background: #3D2B1F;
    border: 2px solid #8B6914;
    border-radius: 12px;
    padding: 12px 10px;
    min-width: 70px;
    text-align: center;
    position: relative;
    transition: all 0.4s ease;
  }
  .chest-box .chest-label {
    font-size: 10px; color: #A0865A; font-weight: 600; margin-bottom: 4px;
  }
  .chest-box .chest-icon { font-size: 24px; }
  .chest-box .chest-count {
    font-size: 18px; font-weight: 800; color: var(--accent);
    min-height: 24px;
  }
  .chest-box.filled {
    background: #4D3B0F;
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(253,203,110,0.3);
  }

  /* ANSWERS */
  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  .ans-btn {
    padding: 18px 10px;
    border-radius: var(--radius);
    border: 2px solid #3A3A6A;
    background: #23234A;
    font-size: 22px; font-weight: 800; color: #E0E0FF;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ans-btn:hover { border-color: #A78BFA; background: #2D2D5A; transform: translateY(-2px); }
  .ans-btn.correct { border-color: var(--green); background: #0D2B22; color: var(--green); }
  .ans-btn.wrong { border-color: var(--red); background: #2B0D0D; color: var(--red); }
  .ans-btn:disabled { cursor: default; transform: none; }

  .feedback {
    min-height: 36px; font-size: 16px; font-weight: 700;
    text-align: center; padding: 8px; border-radius: 10px;
    opacity: 0; transition: opacity 0.3s; margin-top: 10px;
  }
  .feedback.show { opacity: 1; }
  .feedback.correct { color: var(--green); background: #0D2B22; }
  .feedback.wrong { color: var(--red); background: #2B0D0D; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #12122A;
    padding: 10px 20px;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 16px; z-index: 100;
    border-top: 1px solid #2A2A4A;
  }
  .progress-label { font-size: 14px; color: #8080B0; font-weight: 600; white-space: nowrap; }
  .progress-track {
    flex: 1; height: 12px; background: #2A2A4A;
    border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--n1), var(--n2));
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .progress-pct { font-size: 14px; font-weight: 700; color: var(--n2); white-space: nowrap; }

  /* END SCREEN */
  .end-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center;
    z-index: 200;
  }
  .end-card {
    background: #23234A;
    border: 1px solid #3A3A6A;
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .end-emoji { font-size: 64px; margin-bottom: 10px; }
  .end-title { font-size: 28px; font-weight: 800; color: #E0E0FF; margin-bottom: 6px; }
  .end-score { font-size: 20px; color: #8080B0; margin-bottom: 16px; }
  .end-stars { font-size: 36px; margin-bottom: 24px; }
  .end-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    padding: 14px 28px; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: white; font-size: 16px; font-weight: 700;
    border: none; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,130,246,0.4); }
  .btn-secondary {
    padding: 14px 28px; border-radius: var(--radius);
    background: transparent; color: #A78BFA;
    font-size: 16px; font-weight: 700;
    border: 2px solid #A78BFA; cursor: pointer;
    text-decoration: none; display: inline-block;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: #2D2D5A; }
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<!-- TOP BAR -->
<div class="topbar">
  <a href="../../index.html">← Games</a>
  <span class="brand">🧮 MathMunch</span>
  <span class="title">Division Dungeon</span>
  <span class="badge">P4</span>
  <div class="score">⭐ <span id="scoreDisplay">0</span></div>
</div>

<!-- GAME AREA -->
<div class="game-area">
  <div class="torch-row">
    <span class="torch">🔥</span>
    <span style="font-size:13px; color:#6060A0; font-weight:600;">Share the treasure equally!</span>
    <span class="torch">🔥</span>
  </div>

  <div class="question-card">
    <div class="question-text" id="questionText">Loading...</div>
    <div class="gems-grid" id="gemsGrid"></div>
    <div class="chests-row" id="chestsRow"></div>
    <div class="answers-grid" id="answersGrid"></div>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<!-- PROGRESS BAR -->
<div class="progress-bar-wrap">
  <div class="progress-label" id="progressLabel">Question 1 of 10</div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-pct" id="progressPct">0%</div>
</div>

<!-- END SCREEN -->
<div class="end-overlay" id="endOverlay">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-score" id="endScore"></div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-btns">
      <button class="btn-primary" onclick="restartGame()">Play Again</button>
      <a class="btn-secondary" href="../../index.html">← Back</a>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  { total: 10, groups: 2, answer: 5 },
  { total: 12, groups: 3, answer: 4 },
  { total: 15, groups: 5, answer: 3 },
  { total: 16, groups: 4, answer: 4 },
  { total: 20, groups: 4, answer: 5 },
  { total: 24, groups: 6, answer: 4 },
  { total: 21, groups: 7, answer: 3 },
  { total: 32, groups: 8, answer: 4 },
  { total: 36, groups: 9, answer: 4 },
  { total: 48, groups: 6, answer: 8 },
];

let currentRound = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function buildGemsGrid(total) {
  const maxShow = 24;
  let html = '';
  const show = Math.min(total, maxShow);
  for (let i = 0; i < show; i++) html += '<span class="gem-item">🪙</span>';
  if (total > maxShow) html += `<span style="font-size:14px;color:#A0865A;align-self:center;margin-left:4px">+${total-maxShow} more</span>`;
  return html;
}

function buildChests(groups) {
  let html = '';
  for (let i = 1; i <= groups; i++) {
    html += `<div class="chest-box" id="chest${i}">
      <div class="chest-label">Chest ${i}</div>
      <div class="chest-icon">📦</div>
      <div class="chest-count" id="chestCount${i}">?</div>
    </div>`;
  }
  return html;
}

function fillChests(groups, answer) {
  for (let i = 1; i <= groups; i++) {
    const el = document.getElementById(`chest${i}`);
    const cnt = document.getElementById(`chestCount${i}`);
    if (el && cnt) {
      setTimeout(() => {
        el.classList.add('filled');
        cnt.textContent = answer + ' 🪙';
      }, i * 120);
    }
  }
}

function loadRound() {
  answered = false;
  const q = QUESTIONS[currentRound];

  document.getElementById('progressLabel').textContent = `Question ${currentRound+1} of 10`;
  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('scoreDisplay').textContent = score;

  document.getElementById('questionText').textContent =
    `Share ${q.total} gems equally between ${q.groups} treasure chests. How many in each chest?`;

  document.getElementById('gemsGrid').innerHTML = buildGemsGrid(q.total);
  document.getElementById('chestsRow').innerHTML = buildChests(q.groups);

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';

  // Wrong options
  const used = new Set([q.answer]);
  const wrongs = [];
  const deltas = shuffle([-3,-2,-1,1,2,3,4,-4]);
  for (const d of deltas) {
    const v = q.answer + d;
    if (v > 0 && !used.has(v)) { used.add(v); wrongs.push(v); if (wrongs.length===3) break; }
  }
  const options = shuffle([q.answer, ...wrongs]);

  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(btn, opt, q);
    grid.appendChild(btn);
  });
}

function checkAnswer(btn, selected, q) {
  if (answered) return;
  answered = true;
  disableButtons();
  const fb = document.getElementById('feedback');
  if (selected === q.answer) {
    btn.className = 'ans-btn correct';
    fb.className = 'feedback correct show';
    fb.textContent = `✓ Correct! ${q.total} ÷ ${q.groups} = ${q.answer}`;
    score++;
    fillChests(q.groups, q.answer);
  } else {
    btn.className = 'ans-btn wrong';
    fb.className = 'feedback wrong show';
    fb.textContent = `✗ The answer is ${q.answer}. ${q.total} ÷ ${q.groups} = ${q.answer}`;
    highlightCorrectBtn(q.answer);
  }
  document.getElementById('scoreDisplay').textContent = score;
  setTimeout(nextRound, 1500);
}

function disableButtons() {
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
}

function highlightCorrectBtn(correct) {
  document.querySelectorAll('.ans-btn').forEach(b => {
    if (parseInt(b.textContent) === correct && !b.classList.contains('wrong')) {
      b.className = 'ans-btn correct';
    }
  });
}

function nextRound() {
  currentRound++;
  if (currentRound >= 10) showEnd();
  else loadRound();
}

function showEnd() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressPct').textContent = '100%';

  let emoji, title, stars;
  if (score >= 9) { emoji='👑'; title='Brilliant!'; stars='★★★'; }
  else if (score >= 7) { emoji='💎'; title='Well Done!'; stars='★★☆'; }
  else { emoji='🗡️'; title='Keep Trying!'; stars='★☆☆'; }

  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `${score}/10 correct`;
  document.getElementById('endStars').textContent = stars;
  document.getElementById('endOverlay').style.display = 'flex';
}

function restartGame() {
  currentRound = 0; score = 0;
  document.getElementById('endOverlay').style.display = 'none';
  loadRound();
}

loadRound();
</script>
</body>
</html>
