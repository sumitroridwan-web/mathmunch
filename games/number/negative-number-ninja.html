<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Negative Number Ninja – MathMunch</title>
<style>
  :root {
    --blue:#3B82F6;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
    --green:#10B981;--orange:#F97316;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#DBEAFE;
    --accent:#FDCB6E;
    --red:#EF4444;
    --cold:#4FC3F7;
    --warm:#FF8E53;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lexend', system-ui, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

  /* HEADER */
  .site-header { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 1px solid var(--outline); box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; align-items: center; padding: 0 24px; height: 60px; gap: 16px; }
  .header-logo { font-family: 'Quicksand', sans-serif; font-size: 20px; font-weight: 700; color: var(--blue); text-decoration: none; }
  .header-nav { flex: 1; display: flex; justify-content: center; }
  .header-nav span { font-size: 15px; font-weight: 600; color: var(--text-mid); }
  .header-play { background: var(--blue); color: white; border: none; border-radius: 10px; padding: 8px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* LAYOUT */
  .game-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 12px; }
  .exit-btn { display: block; width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--outline); background: var(--white); color: var(--text-mid); font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; font-family: inherit; text-decoration: none; transition: background 0.15s; }
  .exit-btn:hover { background: #F1F5F9; }
  .stat-card { background: var(--white); border: 1px solid var(--outline); border-radius: 16px; padding: 16px; }
  .stat-label { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .stat-value { font-family: 'Quicksand', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-level-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .level-icon { font-size: 20px; }
  .stat-value-sm { font-family: 'Quicksand', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .level-progress { height: 8px; background: var(--outline); border-radius: 8px; overflow: hidden; }
  .level-progress-fill { height: 100%; background: var(--blue); border-radius: 8px; transition: width .4s ease; width: 0%; }
  .hearts { font-size: 20px; letter-spacing: 2px; }
  .game-info-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .level-pill { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

  /* GAME CANVAS */
  .game-canvas { background: var(--canvas); border-radius: 24px; padding: 28px; position: relative; overflow: hidden; min-height: 560px; }
  .game-canvas::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px); background-size: 28px 28px; pointer-events: none; z-index: 0; }
  .game-area { position: relative; z-index: 1; }

  /* NINJA HEADER */
  .ninja-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; font-size: 14px; color: var(--text-mid); }
  .ninja-char { font-size: 32px; }

  /* QUESTION CARD */
  .question-card { background: var(--white); border-radius: 16px; border: 1px solid var(--outline); padding: 24px; margin-bottom: 16px; }
  .question-text { font-size: 18px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 20px; line-height: 1.5; }

  /* THERMOMETER + NUMBER LINE ROW */
  .visuals-row { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 20px; }

  /* THERMOMETER */
  .thermometer-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .thermo-label { font-size: 11px; color: var(--text-soft); margin-bottom: 6px; font-weight: 600; }
  .thermo-svg-wrap { width: 44px; position: relative; }
  .thermo-scale { position: absolute; right: -28px; top: 0; display: flex; flex-direction: column; justify-content: space-between; height: 180px; font-size: 10px; color: var(--text-soft); }

  /* NUMBER LINE */
  .number-line-section { flex: 1; }
  .nl-label { font-size: 12px; color: var(--text-mid); font-weight: 600; margin-bottom: 8px; }
  .nl-wrap { position: relative; height: 60px; background: transparent; }
  .nl-track { position: absolute; top: 20px; left: 0; right: 0; height: 6px; border-radius: 3px; overflow: visible; }
  .nl-negative { background: linear-gradient(90deg,#1565C0,#42A5F5); }
  .nl-positive { background: linear-gradient(90deg,#E65100,#FF8E53); }
  .nl-marker { position: absolute; top: 9px; width: 24px; height: 24px; border-radius: 50%; background: var(--blue); border: 3px solid white; transform: translateX(-50%); box-shadow: 0 2px 8px rgba(59,130,246,0.6); transition: left 0.6s cubic-bezier(0.34,1.56,0.64,1), background 0.3s; display: none; z-index: 5; }
  .nl-marker.show { display: block; }

  /* ANSWERS GRID */
  .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ans-btn { padding: 18px 10px; border-radius: 16px; border: 2px solid var(--outline); font-size: 22px; font-weight: 800; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .ans-btn.negative { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
  .ans-btn.positive { background: #FFF7ED; color: #C2410C; border-color: #FED7AA; }
  .ans-btn.zero { background: var(--white); color: var(--text); border-color: var(--outline); }
  .ans-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
  .ans-btn.correct { border-color: var(--green) !important; background: #ECFDF5 !important; color: var(--green) !important; }
  .ans-btn.wrong { border-color: var(--red) !important; background: #FEF2F2 !important; color: var(--red) !important; }
  .ans-btn:disabled { cursor: default; transform: none; }

  /* FEEDBACK */
  .feedback { font-size: 16px; font-weight: 700; text-align: center; padding: 10px; border-radius: 10px; opacity: 0; transition: opacity 0.3s; min-height: 40px; margin-top: 12px; }
  .feedback.show { opacity: 1; }
  .feedback.correct { color: var(--green); background: #ECFDF5; }
  .feedback.wrong { color: var(--red); background: #FEF2F2; }

  /* END SCREEN */
  .end-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 200; }
  .end-overlay.show { display: flex; }
  .end-card { background: var(--white); border-radius: 24px; padding: 40px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .end-emoji { font-size: 64px; margin-bottom: 10px; }
  .end-title { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .end-score { font-size: 20px; color: var(--text-mid); margin-bottom: 16px; }
  .end-stars { font-size: 36px; margin-bottom: 24px; }
  .end-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary { padding: 14px 28px; border-radius: 16px; background: var(--blue); color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; }
  .btn-secondary { padding: 14px 28px; border-radius: 16px; background: var(--white); color: var(--blue); font-size: 16px; font-weight: 700; border: 2px solid var(--blue); cursor: pointer; text-decoration: none; display: inline-block; font-family: inherit; }
  .btn-secondary:hover { background: var(--blue-light); }

  @media(max-width:768px){.game-layout{grid-template-columns:1fr}.sidebar{flex-direction:row;flex-wrap:wrap}.stat-card{flex:1;min-width:120px}}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<!-- END SCREEN -->
<div class="end-overlay" id="endOverlay">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-score" id="endScore"></div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-btns">
      <button class="btn-primary" onclick="restartGame()">Play Again</button>
      <a class="btn-secondary" href="../../index.html">← Back</a>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav"><span>Negative Number Ninja</span></nav>
  <button class="header-play" onclick="restartGame()">Play Now</button>
</header>

<!-- LAYOUT -->
<div class="game-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Primary 5</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Negative Number Ninja</div>
      <span class="level-pill">P5</span>
    </div>
  </aside>

  <!-- GAME CANVAS -->
  <div class="game-canvas">
    <div class="game-area">
      <div class="ninja-header">
        <span class="ninja-char">🥷</span>
        <span>Master the number line — positive and negative!</span>
        <span class="ninja-char">🥷</span>
      </div>

      <div class="question-card">
        <div class="question-text" id="questionText">Loading...</div>

        <div class="visuals-row">
          <!-- THERMOMETER -->
          <div class="thermometer-wrap">
            <div class="thermo-label">Temp</div>
            <div class="thermo-svg-wrap">
              <svg width="44" height="200" viewBox="0 0 44 200">
                <!-- Tube -->
                <rect x="18" y="10" width="8" height="150" rx="4" fill="#E0F2FE" stroke="#BAE6FD" stroke-width="1"/>
                <!-- Bulb -->
                <circle cx="22" cy="170" r="14" fill="#E0F2FE" stroke="#BAE6FD" stroke-width="1"/>
                <!-- Fill -->
                <rect id="thermoFill" x="20" y="85" width="4" height="75" rx="2" fill="#EF4444"/>
                <circle cx="22" cy="170" r="11" fill="#EF4444" id="thermoBulb"/>
                <!-- Scale lines -->
                <line x1="15" y1="20" x2="18" y2="20" stroke="#93C5FD" stroke-width="1"/>
                <line x1="15" y1="57" x2="18" y2="57" stroke="#93C5FD" stroke-width="1"/>
                <line x1="15" y1="95" x2="18" y2="95" stroke="#93C5FD" stroke-width="1"/>
                <line x1="15" y1="132" x2="18" y2="132" stroke="#93C5FD" stroke-width="1"/>
                <text x="5" y="22" font-size="8" fill="#60A5FA">+</text>
                <text x="5" y="130" font-size="8" fill="#60A5FA">−</text>
              </svg>
              <div class="thermo-scale">
                <span>+</span>
                <span>0</span>
                <span>−</span>
              </div>
            </div>
          </div>

          <!-- NUMBER LINE -->
          <div class="number-line-section">
            <div class="nl-label">Number Line: −20 to +20</div>
            <div class="nl-wrap" id="nlWrap">
              <!-- Built by JS -->
            </div>
          </div>
        </div>

        <div class="answers-grid" id="answersGrid"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  { text: "The temperature is 5°C. It drops 8 degrees. What is the new temperature?", answer: -3 },
  { text: "Start at −4. Add 6. Where do you end up?", answer: 2 },
  { text: "The temperature is −7°C. It rises 10 degrees. What is the new temperature?", answer: 3 },
  { text: "What is −3 + (−5)?", answer: -8 },
  { text: "Start at 8. Subtract 12. What do you get?", answer: -4 },
  { text: "What is the difference between −2 and 6?", answer: 8 },
  { text: "What number is 5 less than −1?", answer: -6 },
  { text: "−10 + 15 = ?", answer: 5 },
  { text: "Temperature: −12°C rises by 7 degrees. What is the new temperature?", answer: -5 },
  { text: "What is halfway between −6 and 4?", answer: -1 },
];

let currentRound = 0;
let score = 0;
let answered = false;

// Build number line
function buildNumberLine() {
  const wrap = document.getElementById('nlWrap');
  wrap.innerHTML = '';

  // Negative half
  const negTrack = document.createElement('div');
  negTrack.className = 'nl-track nl-negative';
  negTrack.style.cssText = 'position:absolute; top:20px; left:0; right:50%; height:6px; border-radius:3px 0 0 3px;';
  wrap.appendChild(negTrack);

  // Positive half
  const posTrack = document.createElement('div');
  posTrack.className = 'nl-track nl-positive';
  posTrack.style.cssText = 'position:absolute; top:20px; left:50%; right:0; height:6px; border-radius:0 3px 3px 0;';
  wrap.appendChild(posTrack);

  // Zero marker
  const zero = document.createElement('div');
  zero.style.cssText = 'position:absolute; top:13px; left:50%; width:4px; height:20px; background:#3B82F6; border-radius:2px; transform:translateX(-50%); z-index:2;';
  wrap.appendChild(zero);

  // Ticks at -20,-15,-10,-5,0,5,10,15,20
  const ticks = [-20,-15,-10,-5,0,5,10,15,20];
  ticks.forEach(val => {
    const pct = ((val + 20) / 40) * 100;
    const tick = document.createElement('div');
    tick.style.cssText = `position:absolute; top:15px; left:${pct}%; width:2px; height:16px; background:rgba(59,130,246,0.4); border-radius:1px; transform:translateX(-50%); z-index:2;`;
    wrap.appendChild(tick);

    const label = document.createElement('div');
    label.style.cssText = `position:absolute; top:36px; left:${pct}%; font-size:10px; color:var(--text-mid); font-weight:700; transform:translateX(-50%); white-space:nowrap;`;
    label.textContent = val;
    wrap.appendChild(label);
  });

  // Marker
  const marker = document.createElement('div');
  marker.className = 'nl-marker';
  marker.id = 'nlMarker';
  wrap.appendChild(marker);
}

function setThermometer(val) {
  const fill = document.getElementById('thermoFill');
  const bulb = document.getElementById('thermoBulb');
  if (!fill || !bulb) return;

  if (val >= 0) {
    const h = val * 3.75;
    fill.setAttribute('y', 85 - h);
    fill.setAttribute('height', 85 - (85 - h) + 75);
    fill.setAttribute('fill', '#FF8E53');
    bulb.setAttribute('fill', '#FF8E53');
  } else {
    const h = Math.abs(val) * 3.75;
    fill.setAttribute('y', 85);
    fill.setAttribute('height', h + 75);
    fill.setAttribute('fill', '#4FC3F7');
    bulb.setAttribute('fill', '#4FC3F7');
  }
}

function animateMarker(val) {
  const marker = document.getElementById('nlMarker');
  if (!marker) return;
  marker.style.display = 'block';
  const pct = ((val + 20) / 40) * 100;
  marker.style.left = pct + '%';
  if (val < 0) {
    marker.style.background = '#4FC3F7';
    marker.style.boxShadow = '0 2px 8px rgba(79,195,247,0.6)';
  } else {
    marker.style.background = '#FF8E53';
    marker.style.boxShadow = '0 2px 8px rgba(255,142,83,0.6)';
  }
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function generateOptions(correct) {
  const set = new Set([correct]);
  const opts = [correct];
  const deltas = shuffle([-4,-3,-2,-1,1,2,3,4,5,-5,-6,6]);
  for (const d of deltas) {
    const v = correct + d;
    if (!set.has(v) && v >= -20 && v <= 20) {
      set.add(v); opts.push(v);
      if (opts.length === 4) break;
    }
  }
  let extra = -20;
  while (opts.length < 4) {
    if (!set.has(extra)) { set.add(extra); opts.push(extra); }
    extra++;
  }
  return shuffle(opts);
}

function loadRound() {
  answered = false;
  const q = QUESTIONS[currentRound];

  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('score').textContent = score;
  document.getElementById('questionText').textContent = q.text;

  buildNumberLine();
  setThermometer(0);

  const marker = document.getElementById('nlMarker');
  if (marker) marker.style.display = 'none';

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';

  const options = generateOptions(q.answer);
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';

  options.forEach(opt => {
    const btn = document.createElement('button');
    if (opt < 0) btn.className = 'ans-btn negative';
    else if (opt > 0) btn.className = 'ans-btn positive';
    else btn.className = 'ans-btn zero';
    btn.textContent = opt > 0 ? '+' + opt : opt;
    btn.onclick = () => checkAnswer(btn, opt, q);
    grid.appendChild(btn);
  });
}

function checkAnswer(btn, selected, q) {
  if (answered) return;
  answered = true;
  disableButtons();

  const fb = document.getElementById('feedback');
  const isCorrect = selected === q.answer;

  if (isCorrect) {
    btn.className = 'ans-btn correct';
    fb.className = 'feedback correct show';
    fb.textContent = `✓ Correct! The answer is ${q.answer > 0 ? '+' : ''}${q.answer}`;
    score++;
  } else {
    btn.className = 'ans-btn wrong';
    fb.className = 'feedback wrong show';
    fb.textContent = `✗ The answer is ${q.answer > 0 ? '+' : ''}${q.answer}`;
    highlightCorrect(q.answer);
  }

  document.getElementById('score').textContent = score;
  setThermometer(q.answer);
  setTimeout(() => animateMarker(q.answer), 200);
  setTimeout(nextRound, 1600);
}

function disableButtons() {
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
}

function highlightCorrect(correct) {
  document.querySelectorAll('.ans-btn').forEach(b => {
    const raw = b.textContent.replace('+', '');
    if (parseInt(raw) === correct && !b.classList.contains('wrong')) {
      b.className = 'ans-btn correct';
    }
  });
}

function nextRound() {
  currentRound++;
  if (currentRound >= 10) showEnd();
  else loadRound();
}

function showEnd() {
  document.getElementById('progressBar').style.width = '100%';

  let emoji, title, stars;
  if (score >= 9) { emoji='🥷'; title='Brilliant!'; stars='★★★'; }
  else if (score >= 7) { emoji='⭐'; title='Well Done!'; stars='★★☆'; }
  else { emoji='🌙'; title='Keep Trying!'; stars='★☆☆'; }

  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `${score}/10 correct`;
  document.getElementById('endStars').textContent = stars;
  document.getElementById('endOverlay').classList.add('show');
}

function restartGame() {
  currentRound = 0; score = 0;
  document.getElementById('endOverlay').classList.remove('show');
  loadRound();
}

loadRound();
</script>
<script src="../../js/mathmunch.js"></script>
</body>
</html>
