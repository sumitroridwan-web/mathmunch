<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplication Mountains – MathMunch</title>
<style>
  :root {
    --primary: #6C5CE7;
    --primary-light: #E8E4FF;
    --accent: #FDCB6E;
    --n1: #FF6B6B;
    --n2: #FF8E53;
    --bg: #F0F4FF;
    --white: #FFFFFF;
    --text: #1E1E2E;
    --text2: #525270;
    --green: #00B894;
    --red: #FF4757;
    --radius: 16px;
    --shadow: 0 4px 20px rgba(108,92,231,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg, #E3F2FD 0%, #BBDEFB 100%);
    min-height: 100vh;
    color: var(--text);
  }

  /* TOP BAR */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--white);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px; height: 56px;
  }
  .topbar a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 4px; }
  .topbar .brand { font-weight: 700; font-size: 18px; color: var(--primary); }
  .topbar .title { font-weight: 600; font-size: 16px; color: var(--text); }
  .topbar .badge { background: #E0F7FF; color: #0090C0; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .topbar .score { margin-left: auto; font-weight: 700; font-size: 16px; color: var(--text); display: flex; align-items: center; gap: 4px; }

  /* GAME AREA */
  .game-area {
    max-width: 800px;
    margin: 30px auto 100px;
    padding: 0 16px;
  }

  .question-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
    margin-bottom: 20px;
    text-align: center;
  }
  .question-text {
    font-size: 22px; font-weight: 700; color: var(--text);
    margin-bottom: 20px;
  }

  /* DOT ARRAY */
  .array-container {
    display: inline-block;
    background: var(--white);
    border-radius: 12px;
    padding: 16px;
    border: 2px solid #E0E0F0;
    margin: 0 auto;
  }
  .array-labels-top {
    display: flex; gap: 6px; margin-bottom: 8px;
    padding-left: 32px;
  }
  .col-label {
    width: 22px; text-align: center;
    font-size: 12px; color: var(--text2); font-weight: 600;
  }
  .array-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  }
  .row-label {
    width: 26px; text-align: right; padding-right: 6px;
    font-size: 12px; color: var(--text2); font-weight: 600;
  }
  .dot {
    width: 22px; height: 22px; border-radius: 50%;
    display: inline-block;
    transition: transform 0.3s ease;
  }
  .dot.pop { animation: dotPop 0.4s ease; }
  @keyframes dotPop {
    0% { transform: scale(0); }
    70% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ANSWER BUTTONS */
  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
  }
  .ans-btn {
    padding: 18px 10px;
    border-radius: var(--radius);
    border: 3px solid #E0E0F0;
    background: var(--white);
    font-size: 20px; font-weight: 700; color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .ans-btn:hover { border-color: var(--primary); background: var(--primary-light); transform: translateY(-2px); }
  .ans-btn.correct { border-color: var(--green); background: #E8FFF5; color: var(--green); }
  .ans-btn.wrong { border-color: var(--red); background: #FFF0F0; color: var(--red); }
  .ans-btn:disabled { cursor: default; transform: none; }

  /* FEEDBACK */
  .feedback {
    min-height: 40px;
    font-size: 18px; font-weight: 700;
    text-align: center; margin-top: 12px;
    padding: 8px;
    border-radius: 10px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .feedback.show { opacity: 1; }
  .feedback.correct { color: var(--green); background: #E8FFF5; }
  .feedback.wrong { color: var(--red); background: #FFF0F0; }

  /* FLAG ANIMATION */
  .flag-anim {
    position: fixed; top: 80px; right: 30px;
    font-size: 40px;
    animation: flagPlant 1s ease forwards;
    pointer-events: none;
    opacity: 0;
  }
  @keyframes flagPlant {
    0% { opacity: 0; transform: translateY(-30px) rotate(-20deg); }
    40% { opacity: 1; transform: translateY(0) rotate(5deg); }
    70% { transform: rotate(-3deg); }
    100% { opacity: 1; transform: rotate(0deg); }
  }

  /* MOUNTAIN SVG */
  .mountain-bg {
    position: fixed; bottom: 60px; left: 0; right: 0;
    z-index: 0; pointer-events: none;
    overflow: hidden; height: 120px;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white);
    padding: 10px 20px;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    display: flex; align-items: center; gap: 16px; z-index: 100;
  }
  .progress-label { font-size: 14px; color: var(--text2); font-weight: 600; white-space: nowrap; }
  .progress-track {
    flex: 1; height: 12px; background: #E0E0F0;
    border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--n1), var(--n2));
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .progress-pct { font-size: 14px; font-weight: 700; color: var(--n2); white-space: nowrap; }

  /* END SCREEN */
  .end-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    display: none;
  }
  .end-card {
    background: var(--white);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .end-emoji { font-size: 64px; margin-bottom: 10px; }
  .end-title { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .end-score { font-size: 20px; color: var(--text2); margin-bottom: 16px; }
  .end-stars { font-size: 36px; margin-bottom: 24px; }
  .end-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    padding: 14px 28px; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: white; font-size: 16px; font-weight: 700;
    border: none; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,92,231,0.4); }
  .btn-secondary {
    padding: 14px 28px; border-radius: var(--radius);
    background: var(--white); color: var(--primary);
    font-size: 16px; font-weight: 700;
    border: 2px solid var(--primary); cursor: pointer;
    text-decoration: none; display: inline-block;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: var(--primary-light); }

  .mode-indicator {
    font-size: 13px; font-weight: 600;
    color: var(--text2); background: var(--primary-light);
    padding: 4px 12px; border-radius: 20px;
    display: inline-block; margin-bottom: 12px;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="../../index.html">← Games</a>
  <span class="brand">🧮 MathMunch</span>
  <span class="title">Multiplication Mountains</span>
  <span class="badge">P3</span>
  <div class="score">⭐ <span id="scoreDisplay">0</span></div>
</div>

<!-- MOUNTAIN BACKGROUND -->
<div class="mountain-bg">
  <svg viewBox="0 0 800 120" preserveAspectRatio="none" width="100%" height="120">
    <polygon points="0,120 100,40 200,80 320,10 440,70 560,20 680,60 800,30 800,120" fill="#90CAF9" opacity="0.5"/>
    <polygon points="0,120 80,60 180,100 280,30 400,90 520,25 640,75 800,40 800,120" fill="#64B5F6" opacity="0.6"/>
  </svg>
</div>

<!-- GAME AREA -->
<div class="game-area">
  <div class="question-card">
    <div class="mode-indicator" id="modeIndicator">Mode: Identify</div>
    <div class="question-text" id="questionText">Loading...</div>
    <div id="arrayDisplay" style="text-align:center; margin: 10px 0;"></div>
    <div class="answers-grid" id="answersGrid"></div>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<!-- PROGRESS BAR -->
<div class="progress-bar-wrap">
  <div class="progress-label" id="progressLabel">Question 1 of 10</div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-pct" id="progressPct">0%</div>
</div>

<!-- END SCREEN -->
<div class="end-overlay" id="endOverlay">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-score" id="endScore"></div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-btns">
      <button class="btn-primary" onclick="restartGame()">Play Again</button>
      <a class="btn-secondary" href="../../index.html">← Back</a>
    </div>
  </div>
</div>

<script>
const DOT_COLORS = ['#FF6B6B','#6C5CE7','#00B894','#FDCB6E','#FF8E53','#0984E3','#E84393','#00CEC9'];

const ROUNDS = [
  {r:2, c:3}, {r:3, c:4}, {r:2, c:5},
  {r:4, c:3}, {r:5, c:4}, {r:4, c:6},
  {r:6, c:4}, {r:7, c:5}, {r:6, c:6},
  {r:8, c:8}
];

let currentRound = 0;
let score = 0;
let answered = false;
let flagEl = null;

function buildArray(rows, cols) {
  const color = DOT_COLORS[(rows + cols) % DOT_COLORS.length];
  let html = '<div class="array-container">';
  // Top labels
  html += '<div class="array-labels-top">';
  for (let c = 1; c <= cols; c++) html += `<div class="col-label">${c}</div>`;
  html += '</div>';
  // Rows
  for (let r = 1; r <= rows; r++) {
    html += '<div class="array-row">';
    html += `<div class="row-label">${r}</div>`;
    for (let c = 0; c < cols; c++) {
      html += `<span class="dot pop" style="background:${color}; animation-delay:${(r*cols+c)*0.03}s"></span>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateWrongOptions(correctVal, isProduct) {
  const set = new Set([correctVal]);
  const opts = [correctVal];
  if (isProduct) {
    const deltas = [-4,-3,-2,-1,1,2,3,4,5,-5];
    shuffle(deltas);
    for (const d of deltas) {
      const v = correctVal + d;
      if (v > 0 && !set.has(v)) { set.add(v); opts.push(v); if (opts.length === 4) break; }
    }
  } else {
    // For mode A, options are like "AxB" strings
    // opts already has correct string; generate wrong ones
    // handled separately
  }
  return opts;
}

function generateModeAOptions(r, c) {
  const correct = `${r}×${c}`;
  const options = [correct];
  const used = new Set([correct, `${c}×${r}`]);
  const candidates = [];
  for (let a = 2; a <= 9; a++) for (let b = 2; b <= 9; b++) {
    const s = `${a}×${b}`;
    if (!used.has(s) && (a*b !== r*c)) { candidates.push(s); used.add(s); }
  }
  shuffle(candidates);
  for (let i = 0; i < 3 && i < candidates.length; i++) options.push(candidates[i]);
  return shuffle(options);
}

function loadRound() {
  answered = false;
  const {r, c} = ROUNDS[currentRound];
  const product = r * c;
  const isEven = currentRound % 2 === 0; // Mode A on 0-indexed even rounds

  document.getElementById('progressLabel').textContent = `Question ${currentRound+1} of 10`;
  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('scoreDisplay').textContent = score;

  const arrayHTML = buildArray(r, c);
  document.getElementById('arrayDisplay').innerHTML = arrayHTML;

  const grid = document.getElementById('answersGrid');
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  if (isEven) {
    // Mode A: identify multiplication
    document.getElementById('modeIndicator').textContent = 'Mode: Identify the Multiplication';
    document.getElementById('questionText').textContent = 'What multiplication does this array show?';
    const options = generateModeAOptions(r, c);
    grid.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = opt;
      btn.onclick = () => checkAnswerA(btn, opt, `${r}×${c}`, r, c, product, options);
      grid.appendChild(btn);
    });
  } else {
    // Mode B: find product
    document.getElementById('modeIndicator').textContent = 'Mode: Find the Product';
    document.getElementById('questionText').textContent = `${r} × ${c} = ?`;
    const wrongs = [];
    const used = new Set([product]);
    const deltas = shuffle([-4,-3,-2,-1,1,2,3,4,5,6,-5,-6]);
    for (const d of deltas) {
      const v = product + d;
      if (v > 0 && !used.has(v)) { used.add(v); wrongs.push(v); if (wrongs.length === 3) break; }
    }
    const options = shuffle([product, ...wrongs]);
    grid.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = opt;
      btn.onclick = () => checkAnswerB(btn, opt, product);
      grid.appendChild(btn);
    });
  }
}

function checkAnswerA(btn, selected, correct, r, c, product, options) {
  if (answered) return;
  answered = true;
  disableButtons();
  const fb = document.getElementById('feedback');
  // Accept both r×c and c×r as correct
  const isCorrect = (selected === correct || selected === `${c}×${r}` ||
    (selected.split('×').map(Number).reduce((a,b)=>a*b,1) === product));
  if (isCorrect) {
    btn.className = 'ans-btn correct';
    fb.className = 'feedback correct show';
    fb.textContent = `✓ Correct! ${r} rows × ${c} columns = ${r}×${c}`;
    score++;
    showFlag();
  } else {
    btn.className = 'ans-btn wrong';
    fb.className = 'feedback wrong show';
    fb.textContent = `✗ Not quite. This array shows ${r}×${c}`;
    highlightCorrect(correct);
  }
  document.getElementById('scoreDisplay').textContent = score;
  setTimeout(nextRound, 1400);
}

function checkAnswerB(btn, selected, correct) {
  if (answered) return;
  answered = true;
  disableButtons();
  const fb = document.getElementById('feedback');
  if (selected === correct) {
    btn.className = 'ans-btn correct';
    fb.className = 'feedback correct show';
    fb.textContent = `✓ Correct! The answer is ${correct}`;
    score++;
    showFlag();
  } else {
    btn.className = 'ans-btn wrong';
    fb.className = 'feedback wrong show';
    fb.textContent = `✗ The answer is ${correct}`;
    highlightCorrectNumber(correct);
  }
  document.getElementById('scoreDisplay').textContent = score;
  setTimeout(nextRound, 1400);
}

function disableButtons() {
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
}

function highlightCorrect(correctStr) {
  document.querySelectorAll('.ans-btn').forEach(b => {
    const txt = b.textContent;
    const parts = txt.split('×').map(Number);
    if (txt === correctStr || (parts.length===2 && parts[0]*parts[1] === correctStr.split('×').map(Number).reduce((a,b)=>a*b,1) && b.className !== 'ans-btn wrong')) {
      if (!b.classList.contains('wrong')) b.className = 'ans-btn correct';
    }
  });
}

function highlightCorrectNumber(correct) {
  document.querySelectorAll('.ans-btn').forEach(b => {
    if (parseInt(b.textContent) === correct && !b.classList.contains('wrong')) {
      b.className = 'ans-btn correct';
    }
  });
}

function showFlag() {
  if (flagEl) flagEl.remove();
  flagEl = document.createElement('div');
  flagEl.className = 'flag-anim';
  flagEl.textContent = '🚩';
  document.body.appendChild(flagEl);
  setTimeout(() => { if (flagEl) flagEl.remove(); }, 1200);
}

function nextRound() {
  currentRound++;
  if (currentRound >= 10) {
    showEnd();
  } else {
    loadRound();
  }
}

function showEnd() {
  document.getElementById('progressLabel').textContent = 'Question 10 of 10';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressPct').textContent = '100%';
  document.getElementById('scoreDisplay').textContent = score;

  let emoji, title, stars;
  if (score >= 9) { emoji='🏔️'; title='Brilliant!'; stars='★★★'; }
  else if (score >= 7) { emoji='⛰️'; title='Well Done!'; stars='★★☆'; }
  else { emoji='🌄'; title='Keep Trying!'; stars='★☆☆'; }

  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `${score}/10 correct`;
  document.getElementById('endStars').textContent = stars;
  document.getElementById('endOverlay').style.display = 'flex';
}

function restartGame() {
  currentRound = 0;
  score = 0;
  document.getElementById('endOverlay').style.display = 'none';
  loadRound();
}

loadRound();
</script>
</body>
</html>
