<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Multiplication Mountains – MathMunch</title>
<style>
:root {
  --blue:#3B82F6;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
  --green:#10B981;--orange:#F97316;
  --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
  --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
  --canvas:#DBEAFE;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.site-header{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:1px solid var(--outline);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:64px;}
.header-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:20px;color:var(--blue);text-decoration:none;}
.header-nav{display:flex;gap:24px;}
.header-nav a{text-decoration:none;font-size:14px;font-weight:600;color:var(--text-mid);}
.header-nav a:hover{color:var(--blue);}
.header-cta{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;}
.header-cta:hover{background:var(--blue-dark);}

/* LAYOUT */
.game-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;max-width:1200px;margin:0 auto;padding:24px 20px;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:14px;}
.exit-btn{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--outline);border-radius:12px;padding:12px 16px;font-size:14px;font-weight:600;color:var(--text-mid);cursor:pointer;font-family:'Lexend',sans-serif;transition:background .2s;}
.exit-btn:hover{background:#F1F5F9;}
.stat-card{background:var(--white);border:1px solid var(--outline);border-radius:16px;padding:16px 18px;}
.stat-label{font-size:11px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.stat-value{font-family:'Quicksand',sans-serif;font-size:32px;font-weight:700;color:var(--text);}
.stat-level-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.level-icon{font-size:20px;}
.stat-value-sm{font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;color:var(--text);}
.level-progress{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;}
.level-progress-fill{height:100%;background:var(--blue);border-radius:99px;width:0%;transition:width .4s ease;}
.hearts{font-size:22px;letter-spacing:4px;margin-top:4px;}
.game-info-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;}
.level-pill{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;}

/* GAME CANVAS */
.game-canvas{background:var(--canvas);border-radius:24px;padding:28px;position:relative;overflow:hidden;min-height:560px;}
.game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
.game-canvas > *{position:relative;z-index:1;}

/* GAME AREA */
.game-area{width:100%;}

/* QUESTION CARD */
.question-card{background:var(--white);border-radius:16px;box-shadow:0 4px 20px rgba(59,130,246,0.12);padding:28px;margin-bottom:20px;text-align:center;}
.question-text{font-size:22px;font-weight:700;color:var(--text);margin-bottom:20px;}

/* DOT ARRAY */
.array-container{display:inline-block;background:var(--white);border-radius:12px;padding:16px;border:2px solid var(--outline);margin:0 auto;}
.array-labels-top{display:flex;gap:6px;margin-bottom:8px;padding-left:32px;}
.col-label{width:22px;text-align:center;font-size:12px;color:var(--text-soft);font-weight:600;}
.array-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.row-label{width:26px;text-align:right;padding-right:6px;font-size:12px;color:var(--text-soft);font-weight:600;}
.dot{width:22px;height:22px;border-radius:50%;display:inline-block;transition:transform .3s ease;}
.dot.pop{animation:dotPop .4s ease;}
@keyframes dotPop{0%{transform:scale(0);}70%{transform:scale(1.3);}100%{transform:scale(1);}}

/* ANSWER BUTTONS */
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.ans-btn{padding:18px 10px;border-radius:16px;border:3px solid var(--outline);background:var(--white);font-size:20px;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s;font-family:'Lexend',sans-serif;}
.ans-btn:hover{border-color:var(--blue);background:var(--blue-light);transform:translateY(-2px);}
.ans-btn.correct{border-color:var(--green);background:#E8FFF5;color:var(--green);}
.ans-btn.wrong{border-color:#FF4757;background:#FFF0F0;color:#FF4757;}
.ans-btn:disabled{cursor:default;transform:none;}

/* FEEDBACK */
.feedback{min-height:40px;font-size:18px;font-weight:700;text-align:center;margin-top:12px;padding:8px;border-radius:10px;opacity:0;transition:opacity .3s;}
.feedback.show{opacity:1;}
.feedback.correct{color:var(--green);background:#E8FFF5;}
.feedback.wrong{color:#FF4757;background:#FFF0F0;}

/* FLAG ANIMATION */
.flag-anim{position:fixed;top:80px;right:30px;font-size:40px;animation:flagPlant 1s ease forwards;pointer-events:none;opacity:0;}
@keyframes flagPlant{0%{opacity:0;transform:translateY(-30px) rotate(-20deg);}40%{opacity:1;transform:translateY(0) rotate(5deg);}70%{transform:rotate(-3deg);}100%{opacity:1;transform:rotate(0deg);}}

/* MODE INDICATOR */
.mode-indicator{font-size:13px;font-weight:600;color:var(--text-soft);background:var(--blue-light);padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:12px;}

/* END SCREEN */
.end-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200;}
.end-overlay.show{display:flex;}
.end-card{background:var(--white);border-radius:24px;padding:40px;text-align:center;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.end-emoji{font-size:64px;margin-bottom:10px;}
.end-title{font-size:28px;font-weight:800;color:var(--text);margin-bottom:6px;}
.end-score{font-size:20px;color:var(--text-soft);margin-bottom:16px;}
.end-stars{font-size:36px;margin-bottom:24px;}
.end-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-primary{padding:14px 28px;border-radius:16px;background:linear-gradient(135deg,var(--blue),#a855f7);color:white;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;font-family:'Lexend',sans-serif;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,0.4);}
.btn-secondary{padding:14px 28px;border-radius:16px;background:var(--white);color:var(--blue);font-size:16px;font-weight:700;border:2px solid var(--blue);cursor:pointer;text-decoration:none;display:inline-block;transition:background .2s;font-family:'Lexend',sans-serif;}
.btn-secondary:hover{background:var(--blue-light);}

@media(max-width:768px){.game-layout{grid-template-columns:1fr;}.site-header .header-nav{display:none;}}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<!-- HEADER -->
<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav">
    <a href="../../index.html">Games</a>
    <a href="#">Leaderboard</a>
    <a href="#">Progress</a>
  </nav>
  <button class="header-cta" onclick="window.location.href='../../index.html'">Play Now</button>
</header>

<!-- LAYOUT -->
<div class="game-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Primary 3</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Multiplication Mountains</div>
      <span class="level-pill">P3</span>
    </div>
  </aside>

  <!-- GAME CANVAS -->
  <div class="game-canvas">
    <div class="game-area">
      <div class="question-card">
        <div class="mode-indicator" id="modeIndicator">Mode: Identify</div>
        <div class="question-text" id="questionText">Loading...</div>
        <div id="arrayDisplay" style="text-align:center;margin:10px 0;"></div>
        <div class="answers-grid" id="answersGrid"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>
  </div>
</div>

<!-- END SCREEN -->
<div class="end-overlay" id="endOverlay">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-score" id="endScore"></div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-btns">
      <button class="btn-primary" onclick="restartGame()">Play Again</button>
      <a class="btn-secondary" href="../../index.html">← Back</a>
    </div>
  </div>
</div>

<script>
const DOT_COLORS=['#FF6B6B','#3B82F6','#00B894','#FDCB6E','#FF8E53','#0984E3','#E84393','#00CEC9'];

const ROUNDS=[
  {r:2,c:3},{r:3,c:4},{r:2,c:5},{r:4,c:3},{r:5,c:4},
  {r:4,c:6},{r:6,c:4},{r:7,c:5},{r:6,c:6},{r:8,c:8}
];

let currentRound=0, score=0, answered=false, flagEl=null;

function buildArray(rows,cols){
  const color=DOT_COLORS[(rows+cols)%DOT_COLORS.length];
  let html='<div class="array-container">';
  html+='<div class="array-labels-top">';
  for(let c=1;c<=cols;c++) html+=`<div class="col-label">${c}</div>`;
  html+='</div>';
  for(let r=1;r<=rows;r++){
    html+='<div class="array-row">';
    html+=`<div class="row-label">${r}</div>`;
    for(let c=0;c<cols;c++) html+=`<span class="dot pop" style="background:${color};animation-delay:${(r*cols+c)*0.03}s"></span>`;
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

function generateModeAOptions(r,c){
  const correct=`${r}×${c}`;
  const options=[correct];
  const used=new Set([correct,`${c}×${r}`]);
  const candidates=[];
  for(let a=2;a<=9;a++) for(let b=2;b<=9;b++){
    const s=`${a}×${b}`;
    if(!used.has(s)&&(a*b!==r*c)){candidates.push(s);used.add(s);}
  }
  shuffle(candidates);
  for(let i=0;i<3&&i<candidates.length;i++) options.push(candidates[i]);
  return shuffle(options);
}

function loadRound(){
  answered=false;
  const {r,c}=ROUNDS[currentRound], product=r*c;
  const isEven=currentRound%2===0;

  const pct=Math.round((currentRound/10)*100);
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('score').textContent=score;
  document.getElementById('arrayDisplay').innerHTML=buildArray(r,c);

  const grid=document.getElementById('answersGrid'), fb=document.getElementById('feedback');
  fb.className='feedback'; fb.textContent='';

  if(isEven){
    document.getElementById('modeIndicator').textContent='Mode: Identify the Multiplication';
    document.getElementById('questionText').textContent='What multiplication does this array show?';
    const options=generateModeAOptions(r,c);
    grid.innerHTML='';
    options.forEach(opt=>{
      const btn=document.createElement('button'); btn.className='ans-btn'; btn.textContent=opt;
      btn.onclick=()=>checkAnswerA(btn,opt,`${r}×${c}`,r,c,product,options);
      grid.appendChild(btn);
    });
  } else {
    document.getElementById('modeIndicator').textContent='Mode: Find the Product';
    document.getElementById('questionText').textContent=`${r} × ${c} = ?`;
    const wrongs=[], used=new Set([product]);
    const deltas=shuffle([-4,-3,-2,-1,1,2,3,4,5,6,-5,-6]);
    for(const d of deltas){ const v=product+d; if(v>0&&!used.has(v)){used.add(v);wrongs.push(v);if(wrongs.length===3)break;} }
    const options=shuffle([product,...wrongs]);
    grid.innerHTML='';
    options.forEach(opt=>{
      const btn=document.createElement('button'); btn.className='ans-btn'; btn.textContent=opt;
      btn.onclick=()=>checkAnswerB(btn,opt,product);
      grid.appendChild(btn);
    });
  }
}

function checkAnswerA(btn,selected,correct,r,c,product,options){
  if(answered) return; answered=true; disableButtons();
  const fb=document.getElementById('feedback');
  const isCorrect=(selected===correct||selected===`${c}×${r}`||(selected.split('×').map(Number).reduce((a,b)=>a*b,1)===product));
  if(isCorrect){
    btn.className='ans-btn correct'; fb.className='feedback correct show';
    fb.textContent=`✓ Correct! ${r} rows × ${c} columns = ${r}×${c}`;
    score++; showFlag();
  } else {
    btn.className='ans-btn wrong'; fb.className='feedback wrong show';
    fb.textContent=`✗ Not quite. This array shows ${r}×${c}`;
    highlightCorrect(correct);
  }
  document.getElementById('score').textContent=score;
  setTimeout(nextRound,1400);
}

function checkAnswerB(btn,selected,correct){
  if(answered) return; answered=true; disableButtons();
  const fb=document.getElementById('feedback');
  if(selected===correct){
    btn.className='ans-btn correct'; fb.className='feedback correct show';
    fb.textContent=`✓ Correct! The answer is ${correct}`;
    score++; showFlag();
  } else {
    btn.className='ans-btn wrong'; fb.className='feedback wrong show';
    fb.textContent=`✗ The answer is ${correct}`;
    highlightCorrectNumber(correct);
  }
  document.getElementById('score').textContent=score;
  setTimeout(nextRound,1400);
}

function disableButtons(){ document.querySelectorAll('.ans-btn').forEach(b=>b.disabled=true); }

function highlightCorrect(correctStr){
  document.querySelectorAll('.ans-btn').forEach(b=>{
    const txt=b.textContent, parts=txt.split('×').map(Number);
    if(txt===correctStr||(parts.length===2&&parts[0]*parts[1]===correctStr.split('×').map(Number).reduce((a,b)=>a*b,1)&&!b.classList.contains('wrong'))){
      if(!b.classList.contains('wrong')) b.className='ans-btn correct';
    }
  });
}

function highlightCorrectNumber(correct){
  document.querySelectorAll('.ans-btn').forEach(b=>{
    if(parseInt(b.textContent)===correct&&!b.classList.contains('wrong')) b.className='ans-btn correct';
  });
}

function showFlag(){
  if(flagEl) flagEl.remove();
  flagEl=document.createElement('div'); flagEl.className='flag-anim'; flagEl.textContent='🚩';
  document.body.appendChild(flagEl); setTimeout(()=>{ if(flagEl) flagEl.remove(); },1200);
}

function nextRound(){ currentRound++; if(currentRound>=10) showEnd(); else loadRound(); }

function showEnd(){
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('score').textContent=score;
  let emoji,title,stars;
  if(score>=9){emoji='🏔️';title='Brilliant!';stars='★★★';}
  else if(score>=7){emoji='⛰️';title='Well Done!';stars='★★☆';}
  else{emoji='🌄';title='Keep Trying!';stars='★☆☆';}
  document.getElementById('endEmoji').textContent=emoji;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endScore').textContent=`${score}/10 correct`;
  document.getElementById('endStars').textContent=stars;
  document.getElementById('endOverlay').classList.add('show');
}

function restartGame(){
  currentRound=0; score=0;
  document.getElementById('endOverlay').classList.remove('show');
  loadRound();
}

loadRound();
</script>
</body>
</html>
