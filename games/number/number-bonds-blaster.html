<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Number Bonds Blaster – MathMunch</title>
<style>
  :root {
    --blue:#3B82F6;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
    --green:#10B981;--orange:#F97316;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#DBEAFE;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3,.logo-text,.stat-value{font-family:'Quicksand',system-ui,sans-serif;}
  .site-header{background:var(--white);border-bottom:1px solid var(--outline);position:sticky;top:0;z-index:100;}
  .site-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:38px;height:38px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 2px 0 var(--blue-dark);}
  .logo-text{font-size:1.25rem;font-weight:700;color:var(--blue);}
  .site-nav{display:flex;gap:4px;}
  .site-nav a{text-decoration:none;color:var(--text-mid);font-weight:600;font-size:.9rem;padding:8px 16px;border-radius:9999px;transition:.15s;}
  .site-nav a:hover,.site-nav a.active{background:var(--blue-light);color:var(--blue);}
  .btn-play-now{background:var(--blue);color:white;padding:10px 22px;border-radius:9999px;font-weight:700;font-size:.9rem;text-decoration:none;box-shadow:0 3px 0 var(--blue-dark);transition:.1s;}
  .btn-play-now:hover{transform:translateY(-1px);}
  .game-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;padding:20px 24px 24px;max-width:1200px;margin:0 auto;flex:1;align-items:start;}
  .sidebar{display:flex;flex-direction:column;gap:12px;}
  .exit-btn{background:var(--white);border:2px solid var(--outline);border-radius:9999px;padding:12px 20px;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:600;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 0 var(--outline);transition:.1s;}
  .exit-btn:hover{border-color:var(--blue);color:var(--blue);}
  .stat-card{background:var(--white);border:1px solid var(--outline);border-radius:24px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .stat-label{font-family:'Lexend',sans-serif;font-size:.7rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .stat-value{font-size:2.2rem;font-weight:700;color:var(--blue);line-height:1;}
  .stat-level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .level-icon{font-size:1.4rem;}
  .stat-value-sm{font-size:1.8rem;font-weight:700;color:var(--blue);}
  .level-progress{height:10px;background:var(--outline);border-radius:9999px;overflow:hidden;}
  .level-progress-fill{height:100%;background:var(--green);border-radius:9999px;width:0%;transition:width .4s ease;}
  .hearts{display:flex;gap:6px;font-size:1.5rem;}
  .game-info-title{font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
  .level-pill{display:inline-block;background:var(--blue);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:9999px;}
  .game-canvas{background:var(--canvas);border-radius:24px;padding:32px;position:relative;overflow:hidden;min-height:520px;border:1px solid rgba(59,130,246,.15);}
  .game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
  .game-canvas > *{position:relative;z-index:1;}

  /* GAME-SPECIFIC */
  .make-banner{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:20px;padding:20px 24px;text-align:center;margin-bottom:16px;}
  .make-label{font-size:0.85rem;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
  .make-target{font-size:3rem;font-weight:900;color:#D97706;line-height:1;}
  .make-sub{font-size:0.9rem;color:var(--text-soft);margin-top:4px;}
  .equation-display{background:rgba(255,255,255,0.7);border:1px solid var(--outline);border-radius:16px;padding:16px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:16px;font-size:2rem;font-weight:900;}
  .eq-num{background:linear-gradient(135deg,#3B82F6,#93C5FD);border-radius:12px;padding:8px 20px;box-shadow:0 4px 16px rgba(59,130,246,0.4);color:white;}
  .eq-plus{color:var(--text-mid);}
  .eq-blank{background:rgba(255,255,255,0.5);border:2px dashed rgba(59,130,246,0.4);border-radius:12px;padding:8px 28px;min-width:80px;text-align:center;color:var(--text-soft);font-size:1.5rem;}
  .eq-equals{color:var(--text-mid);}
  .eq-result{color:#D97706;}
  .question-text{text-align:center;font-size:1rem;color:var(--text-mid);margin-bottom:20px;font-weight:600;}
  .bubble-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:380px;margin:0 auto 20px;}
  .bubble{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:900;color:white;cursor:pointer;border:none;font-family:inherit;transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden;margin:0 auto;box-shadow:0 6px 24px rgba(0,0,0,0.3);}
  .bubble::before{content:'';position:absolute;top:12%;left:20%;width:30%;height:20%;border-radius:50%;background:rgba(255,255,255,0.35);transform:rotate(-30deg);}
  .bubble:hover:not(:disabled){transform:scale(1.1) translateY(-4px);}
  .bubble:disabled{cursor:default;}
  .bubble.explode{animation:bubbleExplode 0.5s ease-out forwards;}
  .bubble.shake{animation:bubbleShake 0.4s ease;}
  .bubble.wrong-bubble{opacity:0.35;transform:scale(0.9);}
  @keyframes bubbleExplode{0%{transform:scale(1);opacity:1;}40%{transform:scale(1.4);opacity:1;}100%{transform:scale(0);opacity:0;}}
  @keyframes bubbleShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
  .bc0{background:linear-gradient(135deg,#FF6B6B,#FF8E53);}
  .bc1{background:linear-gradient(135deg,#3B82F6,#93C5FD);}
  .bc2{background:linear-gradient(135deg,#00B894,#55EFC4);}
  .bc3{background:linear-gradient(135deg,#FDCB6E,#E17055);}
  .bc4{background:linear-gradient(135deg,#FD79A8,#E84393);}
  .bc5{background:linear-gradient(135deg,#0984E3,#74B9FF);}
  .bc6{background:linear-gradient(135deg,#6AB04C,#BADC58);}
  .bc7{background:linear-gradient(135deg,#EB4D4B,#C0392B);}
  .round-badge{display:block;text-align:center;margin:0 auto 12px;background:rgba(255,255,255,0.6);border:1px solid var(--outline);border-radius:20px;padding:4px 14px;font-size:0.8rem;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:1px;}
  .feedback-box{border-radius:12px;padding:12px 20px;text-align:center;font-weight:700;font-size:1rem;margin-top:4px;display:none;max-width:440px;margin-left:auto;margin-right:auto;}
  .feedback-box.correct{background:#D1FAE5;color:#065F46;display:block;}
  .feedback-box.wrong{background:#FEE2E2;color:#991B1B;display:block;}
  .confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:200;overflow:hidden;}
  .confetti-piece{position:absolute;font-size:1.5rem;animation:confettiFly 1.2s ease-out forwards;top:50%;opacity:1;}
  @keyframes confettiFly{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(-240px) rotate(720deg);opacity:0;}}
  .end-screen{display:none;position:fixed;inset:0;background:rgba(25,28,30,.8);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;}
  .end-screen.show{display:flex;}
  .end-card{background:white;border-radius:28px;padding:44px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:9999px;border:none;cursor:pointer;font-family:'Lexend',sans-serif;font-size:1rem;font-weight:700;transition:.1s;text-decoration:none;}
  .btn-play{background:var(--blue);color:white;box-shadow:0 3px 0 var(--blue-dark);margin:0 6px;}
  .btn-home{background:var(--bg);color:var(--text-mid);border:2px solid var(--outline);margin:0 6px;}
  @media(max-width:768px){.game-layout{grid-template-columns:1fr;padding:16px;}.sidebar{flex-direction:row;flex-wrap:wrap;}.stat-card{flex:1;min-width:140px;}.site-nav{display:none;}}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <div class="site-header-inner">
    <a href="../../index.html" class="logo">
      <div class="logo-icon">🧮</div>
      <span class="logo-text">MathMunch</span>
    </a>
    <nav class="site-nav">
      <a href="../../index.html#games" class="active">Games</a>
      <a href="#">Badges</a>
      <a href="#">Progress</a>
    </nav>
    <a href="../../index.html" class="btn-play-now">Play Now</a>
  </div>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Primary 1</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Number Bonds Blaster</div>
      <span class="level-pill">P1</span>
    </div>
  </div>

  <div class="game-canvas">
    <div class="make-banner">
      <div class="make-label">🚀 Mission Target</div>
      <div class="make-target" id="makeTarget">Make 10</div>
      <div class="make-sub" id="makeSub">Rounds 1–3</div>
    </div>

    <span class="round-badge" id="roundBadge">Round 1</span>

    <div class="equation-display">
      <div class="eq-num" id="eqNum">?</div>
      <div class="eq-plus">+</div>
      <div class="eq-blank" id="eqBlank">?</div>
      <div class="eq-equals">=</div>
      <div class="eq-result" id="eqResult">?</div>
    </div>

    <div class="question-text">Blast the correct number bubble! 💥</div>

    <div class="bubble-grid" id="bubbleGrid"></div>

    <div class="feedback-box" id="feedbackBox"></div>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="end-screen" id="endOverlay">
  <div class="end-card">
    <div style="font-size:3rem;margin-bottom:12px;" id="endEmoji">🚀</div>
    <div style="font-family:'Quicksand',sans-serif;font-size:1.9rem;font-weight:700;color:var(--text);margin-bottom:8px;">Blast Complete!</div>
    <div style="font-size:1rem;color:var(--text-mid);margin-bottom:8px;" id="endScore">0 / 10</div>
    <div style="font-size:2rem;margin-bottom:8px;" id="endStars">★★★</div>
    <div style="font-size:1rem;color:var(--text-mid);margin-bottom:20px;" id="endLabel">Brilliant!</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">← All Games</a>
  </div>
</div>

<script>
const CONFETTI = ['🚀','⭐','💥','✨','🌟','🎆'];
const BC = ['bc0','bc1','bc2','bc3','bc4','bc5','bc6','bc7'];

let rounds = [];
let currentRound = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateRounds() {
  rounds = [];
  for (let i = 0; i < 10; i++) {
    let target, minFirst, maxFirst, label, sub;
    if (i < 3) {
      target = 10; minFirst = 1; maxFirst = 9;
      label = 'Make 10'; sub = 'Rounds 1–3';
    } else if (i < 6) {
      target = 20; minFirst = 1; maxFirst = 19;
      label = 'Make 20'; sub = 'Rounds 4–6';
    } else {
      target = 100; minFirst = 10; maxFirst = 90;
      label = 'Make 100'; sub = 'Rounds 7–10';
    }

    let first;
    if (i >= 6) {
      const opts = [];
      for (let v = minFirst; v <= maxFirst; v += 10) opts.push(v);
      first = opts[Math.floor(Math.random() * opts.length)];
    } else {
      first = minFirst + Math.floor(Math.random() * (maxFirst - minFirst + 1));
    }

    const correct = target - first;
    const wrongs = new Set();
    let attempts = 0;
    while (wrongs.size < 5 && attempts < 200) {
      attempts++;
      let w;
      if (i >= 6) {
        const delta = (Math.floor(Math.random() * 8) + 1) * 10 * (Math.random() < 0.5 ? 1 : -1);
        w = correct + delta;
        if (w % 10 !== 0) continue;
      } else {
        w = correct + (Math.floor(Math.random() * 6) + 1) * (Math.random() < 0.5 ? 1 : -1);
      }
      if (w !== correct && w >= 0 && w <= target + 10 && w !== first) wrongs.add(w);
    }
    let fb = correct + 1;
    while (wrongs.size < 5) { if (fb !== correct) wrongs.add(fb); fb++; }

    const allBubbles = shuffle([correct, ...wrongs]);
    rounds.push({ target, first, correct, allBubbles, label, sub });
  }
}

function renderRound() {
  answered = false;
  const r = rounds[currentRound];

  document.getElementById('makeTarget').textContent = r.label;
  document.getElementById('makeSub').textContent = r.sub;
  document.getElementById('roundBadge').textContent = `Round ${currentRound + 1}`;
  document.getElementById('eqNum').textContent = r.first;
  document.getElementById('eqBlank').textContent = '?';
  document.getElementById('eqResult').textContent = r.target;

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  fb.textContent = '';

  const colors = shuffle([...BC]);
  const grid = document.getElementById('bubbleGrid');
  grid.innerHTML = '';

  r.allBubbles.forEach((val, idx) => {
    const bubble = document.createElement('button');
    bubble.className = 'bubble ' + colors[idx % colors.length];
    bubble.textContent = val;
    bubble.dataset.value = val;
    bubble.onclick = () => handleBubble(bubble, val, r.correct, r.first + ' + ? = ' + r.target);
    grid.appendChild(bubble);
  });

  updateProgress();
}

function handleBubble(bubble, chosen, correct, equationStr) {
  if (answered) return;
  answered = true;

  const allBubbles = document.querySelectorAll('.bubble');
  allBubbles.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedbackBox');

  if (chosen === correct) {
    bubble.classList.add('explode');
    document.getElementById('eqBlank').textContent = correct;
    document.getElementById('eqBlank').style.background = 'linear-gradient(135deg,#00B894,#55EFC4)';
    document.getElementById('eqBlank').style.border = 'none';
    document.getElementById('eqBlank').style.color = 'white';
    fb.className = 'feedback-box correct';
    fb.textContent = '✓ Correct! Great job!';
    score++;
    document.getElementById('score').textContent = score;
    launchConfetti();
  } else {
    bubble.classList.add('shake');
    setTimeout(() => bubble.classList.add('wrong-bubble'), 400);
    allBubbles.forEach(b => {
      if (parseInt(b.dataset.value) === correct) {
        b.style.boxShadow = '0 0 0 3px #00B894,0 6px 24px rgba(0,184,148,0.5)';
      }
    });
    document.getElementById('eqBlank').textContent = correct;
    document.getElementById('eqBlank').style.background = 'rgba(0,184,148,0.3)';
    document.getElementById('eqBlank').style.border = '2px solid #00B894';
    document.getElementById('eqBlank').style.color = '#059669';
    fb.className = 'feedback-box wrong';
    fb.textContent = `✗ Not quite! The answer was ${correct}.`;
  }

  setTimeout(advance, 1200);
}

function advance() {
  currentRound++;
  const blank = document.getElementById('eqBlank');
  blank.style.background = '';
  blank.style.border = '';
  blank.style.color = '';
  if (currentRound < 10) renderRound();
  else showEndScreen();
}

function updateProgress() {
  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressBar').style.width = `${pct}%`;
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  for (let i = 0; i < 10; i++) {
    const piece = document.createElement('span');
    piece.className = 'confetti-piece';
    piece.textContent = CONFETTI[Math.floor(Math.random() * CONFETTI.length)];
    piece.style.left = (10 + Math.random() * 80) + '%';
    piece.style.animationDelay = (Math.random() * 0.4) + 's';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 1600);
  }
}

function showEndScreen() {
  document.getElementById('endScore').textContent = `${score} / 10`;
  let stars, label, emoji;
  if (score >= 9) { stars = '★★★'; label = 'Brilliant!'; emoji = '🏆'; }
  else if (score >= 7) { stars = '★★☆'; label = 'Well Done!'; emoji = '🚀'; }
  else { stars = '★☆☆'; label = 'Keep Trying!'; emoji = '💫'; }
  document.getElementById('endStars').textContent = stars;
  document.getElementById('endLabel').textContent = label;
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endOverlay').classList.add('show');
}

function restartGame() {
  currentRound = 0; score = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('endOverlay').classList.remove('show');
  generateRounds(); renderRound();
}

generateRounds();
renderRound();
</script>
<script src="../../js/mathmunch.js"></script>
</body>
</html>
