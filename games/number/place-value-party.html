<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Place Value Party – MathMunch</title>
<style>
:root {
  --blue:#3B82F6;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
  --green:#10B981;--orange:#F97316;
  --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
  --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
  --canvas:#DBEAFE;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.site-header{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:1px solid var(--outline);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:64px;}
.header-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:20px;color:var(--blue);text-decoration:none;}
.header-nav{display:flex;gap:24px;}
.header-nav a{text-decoration:none;font-size:14px;font-weight:600;color:var(--text-mid);}
.header-nav a:hover{color:var(--blue);}
.header-cta{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;}
.header-cta:hover{background:var(--blue-dark);}

/* LAYOUT */
.game-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;max-width:1200px;margin:0 auto;padding:24px 20px;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:14px;}
.exit-btn{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--outline);border-radius:12px;padding:12px 16px;font-size:14px;font-weight:600;color:var(--text-mid);cursor:pointer;font-family:'Lexend',sans-serif;transition:background .2s;}
.exit-btn:hover{background:#F1F5F9;}
.stat-card{background:var(--white);border:1px solid var(--outline);border-radius:16px;padding:16px 18px;}
.stat-label{font-size:11px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.stat-value{font-family:'Quicksand',sans-serif;font-size:32px;font-weight:700;color:var(--text);}
.stat-level-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.level-icon{font-size:20px;}
.stat-value-sm{font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;color:var(--text);}
.level-progress{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;}
.level-progress-fill{height:100%;background:var(--blue);border-radius:99px;width:0%;transition:width .4s ease;}
.hearts{font-size:22px;letter-spacing:4px;margin-top:4px;}
.game-info-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;}
.level-pill{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;}

/* GAME CANVAS */
.game-canvas{background:var(--canvas);border-radius:24px;padding:28px;position:relative;overflow:hidden;min-height:560px;}
.game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
.game-canvas > *{position:relative;z-index:1;}

/* GAME AREA */
.game-area{width:100%;}

/* QUESTION CARD */
.question-card{background:var(--white);border-radius:16px;box-shadow:0 4px 20px rgba(59,130,246,0.12);padding:28px 24px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden;}
.question-card::before{content:'🎈';position:absolute;top:10px;left:16px;font-size:1.6rem;opacity:0.5;}
.question-card::after{content:'🎈';position:absolute;top:10px;right:16px;font-size:1.6rem;opacity:0.5;}
.question-label{font-size:0.95rem;color:var(--text-soft);margin-bottom:10px;font-weight:600;}
.question-number{font-size:3rem;font-weight:900;color:var(--blue);letter-spacing:4px;margin:8px 0;}
.question-ask{font-size:1.1rem;font-weight:700;color:var(--text);margin-top:8px;}

/* BLOCKS DISPLAY */
.blocks-area{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:flex-end;min-height:80px;padding:16px;background:#FFF9E3;border-radius:12px;margin:12px 0;border:2px dashed #FDCB6E;}
.block-group{display:flex;flex-direction:column;align-items:center;gap:4px;}
.block-group-label{font-size:0.7rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;}
.blocks-row{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-width:200px;}
.block-thousand{width:52px;height:52px;background:linear-gradient(135deg,#2C3E7A,#4A5FAD);border-radius:6px;border:2px solid #1A2860;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.block-hundred{width:36px;height:36px;background:linear-gradient(135deg,#3D8EF0,#5B9CF6);border-radius:5px;border:2px solid #1A6FD4;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.block-ten{width:24px;height:24px;background:linear-gradient(135deg,#FF8E53,#FDCB6E);border-radius:4px;border:2px solid #E07020;display:flex;align-items:center;justify-content:center;font-size:0.65rem;}
.block-one{width:18px;height:18px;background:linear-gradient(135deg,#FFE066,#FDCB6E);border-radius:3px;border:2px solid #C8A000;}

/* ANSWERS */
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
.ans-btn{background:var(--white);border:3px solid var(--blue-light);border-radius:16px;padding:16px 12px;font-size:1.3rem;font-weight:800;color:var(--text);cursor:pointer;transition:all .18s ease;box-shadow:0 2px 8px rgba(59,130,246,0.08);font-family:'Lexend',sans-serif;}
.ans-btn:hover:not(:disabled){background:var(--blue-light);border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 18px rgba(59,130,246,0.18);}
.ans-btn:disabled{cursor:default;}
.ans-btn.correct{background:#D4F5E9;border-color:var(--green);color:#007A5A;animation:popIn .3s ease;}
.ans-btn.wrong{background:#FFE5E8;border-color:#FF4757;color:#FF4757;}
.ans-btn.reveal{background:#D4F5E9;border-color:var(--green);color:#007A5A;}
@keyframes popIn{0%{transform:scale(0.9);}60%{transform:scale(1.08);}100%{transform:scale(1);}}

/* FEEDBACK BANNER */
.feedback{border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:700;text-align:center;margin-top:12px;display:none;}
.feedback.show{display:block;}
.feedback.correct-fb{background:#D4F5E9;color:#007A5A;}
.feedback.wrong-fb{background:#FFE5E8;color:#FF4757;}

/* FLOATING BALLOONS */
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-160px) scale(1.3);opacity:0;}}
.float-balloon{position:fixed;font-size:2rem;pointer-events:none;z-index:200;animation:floatUp 1.2s ease-out forwards;}

/* END SCREEN */
.end-overlay{position:fixed;inset:0;background:rgba(30,30,46,0.80);z-index:300;display:none;align-items:center;justify-content:center;}
.end-overlay.show{display:flex;}
.end-card{background:var(--white);border-radius:24px;padding:40px 32px;text-align:center;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.3);}
.end-emoji{font-size:3.5rem;margin-bottom:8px;}
.end-title{font-size:1.6rem;font-weight:900;color:var(--blue);margin-bottom:4px;}
.end-score{font-size:2.2rem;font-weight:900;color:var(--text);margin:12px 0;}
.end-stars{font-size:2rem;margin:8px 0 20px;}
.end-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-primary{background:var(--blue);color:var(--white);border:none;border-radius:12px;padding:12px 24px;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .15s;font-family:'Lexend',sans-serif;}
.btn-primary:hover{transform:scale(1.05);}
.btn-secondary{background:var(--blue-light);color:var(--blue);border:none;border-radius:12px;padding:12px 24px;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .15s;font-family:'Lexend',sans-serif;}
.btn-secondary:hover{transform:scale(1.05);}

@media(max-width:768px){.game-layout{grid-template-columns:1fr;}.site-header .header-nav{display:none;}}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<!-- HEADER -->
<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav">
    <a href="../../index.html">Games</a>
    <a href="#">Leaderboard</a>
    <a href="#">Progress</a>
  </nav>
  <button class="header-cta" onclick="window.location.href='../../index.html'">Play Now</button>
</header>

<!-- LAYOUT -->
<div class="game-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Primary 3</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Place Value Party</div>
      <span class="level-pill">P3</span>
    </div>
  </aside>

  <!-- GAME CANVAS -->
  <div class="game-canvas">
    <div class="game-area" id="gameArea">
      <div class="question-card" id="questionCard">
        <div class="question-label" id="qLabel">What number is shown by the blocks?</div>
        <div class="blocks-area" id="blocksArea" style="display:none"></div>
        <div class="question-number" id="qNumber" style="display:none"></div>
        <div class="question-ask" id="qAsk"></div>
      </div>
      <div class="answers-grid" id="answersGrid"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>
</div>

<!-- END SCREEN -->
<div class="end-overlay" id="endOverlay">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji">🎉</div>
    <div class="end-title" id="endTitle">Brilliant!</div>
    <div class="end-score" id="endScore">10 / 10</div>
    <div class="end-stars" id="endStars">★★★</div>
    <div class="end-btns">
      <button class="btn-primary" onclick="restartGame()">Play Again</button>
      <a href="../../index.html" class="btn-secondary">← Back</a>
    </div>
  </div>
</div>

<script>
let currentQuestion = 0;
let score = 0;
let answered = false;
const TOTAL = 10;

const ROUND_DEFS = [
  {mode:'A', range:[10,99]},{mode:'A', range:[10,99]},{mode:'A', range:[10,99]},
  {mode:'B', range:[10,99]},{mode:'B', range:[10,99]},
  {mode:'A', range:[100,999]},{mode:'A', range:[100,999]},
  {mode:'B', range:[100,999]},{mode:'B', range:[100,999]},
  {mode:'A', range:[1000,3999]},
];

let questions = [];

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=rand(0,i);[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

function decompose(n){
  const thousands=Math.floor(n/1000), hundreds=Math.floor((n%1000)/100), tens=Math.floor((n%100)/10), ones=n%10;
  return {thousands,hundreds,tens,ones};
}

function generateQuestions(){
  questions=[];
  for(let i=0;i<TOTAL;i++){
    const def=ROUND_DEFS[i], num=rand(def.range[0],def.range[1]), d=decompose(num);
    let q={mode:def.mode,num,d};
    if(def.mode==='B'){
      const places=[];
      if(num>=1000) places.push('thousands');
      if(num>=100) places.push('hundreds');
      places.push('tens','ones');
      q.place=places[rand(0,places.length-1)];
      q.answer=d[q.place];
      const opts=new Set([q.answer]);
      while(opts.size<4){ opts.add(rand(0,9)); }
      q.options=shuffle([...opts]);
    } else {
      const opts=new Set([num]);
      while(opts.size<4){ let v=num+rand(-30,30); if(v>=def.range[0]&&v<=def.range[1]&&v!==num) opts.add(v); }
      while(opts.size<4) opts.add(num+opts.size*10);
      q.answer=num; q.options=shuffle([...opts]);
    }
    questions.push(q);
  }
}

function renderBlocks(d){
  const area=document.getElementById('blocksArea');
  area.innerHTML='';
  const groups=[
    {key:'thousands',label:'Thousands',cls:'block-thousand',emoji:'🟦'},
    {key:'hundreds',label:'Hundreds',cls:'block-hundred',emoji:'🟦'},
    {key:'tens',label:'Tens',cls:'block-ten',emoji:'🟧'},
    {key:'ones',label:'Ones',cls:'block-one',emoji:''},
  ];
  let hasAny=false;
  groups.forEach(g=>{
    const count=d[g.key];
    if(count===0) return;
    hasAny=true;
    const grp=document.createElement('div'); grp.className='block-group';
    const row=document.createElement('div'); row.className='blocks-row';
    for(let i=0;i<count;i++){ const b=document.createElement('div'); b.className=g.cls; row.appendChild(b); }
    const lbl=document.createElement('div'); lbl.className='block-group-label'; lbl.textContent=g.label;
    grp.appendChild(row); grp.appendChild(lbl); area.appendChild(grp);
  });
  if(!hasAny) area.textContent='0';
}

function showQuestion(){
  answered=false;
  const q=questions[currentQuestion];
  const label=document.getElementById('qLabel'), blocksArea=document.getElementById('blocksArea');
  const qNumber=document.getElementById('qNumber'), qAsk=document.getElementById('qAsk');
  const grid=document.getElementById('answersGrid'), fb=document.getElementById('feedback');
  fb.className='feedback'; fb.textContent='';

  if(q.mode==='A'){
    label.textContent='What number is shown by the blocks?';
    blocksArea.style.display='flex'; qNumber.style.display='none';
    renderBlocks(q.d); qAsk.textContent='Choose the correct number:';
  } else {
    const placeNames={thousands:'thousands',hundreds:'hundreds',tens:'tens',ones:'ones'};
    label.textContent='Look at this number:';
    blocksArea.style.display='none'; qNumber.style.display='block';
    qNumber.textContent=q.num;
    qAsk.textContent=`How many ${placeNames[q.place]} are there?`;
  }

  grid.innerHTML='';
  q.options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='ans-btn'; btn.textContent=opt;
    btn.onclick=()=>handleAnswer(opt,btn,q);
    grid.appendChild(btn);
  });
  updateProgress();
}

function handleAnswer(chosen,btn,q){
  if(answered) return;
  answered=true;
  const btns=document.querySelectorAll('.ans-btn');
  btns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(chosen===q.answer){
    score++;
    document.getElementById('score').textContent=score;
    btn.classList.add('correct');
    fb.textContent='🎉 Correct! Well done!';
    fb.className='feedback show correct-fb';
    launchBalloons();
  } else {
    btn.classList.add('wrong');
    btns.forEach(b=>{ if(+b.textContent===q.answer||b.textContent==q.answer) b.classList.add('reveal'); });
    fb.textContent=`❌ Not quite! The answer is ${q.answer}.`;
    fb.className='feedback show wrong-fb';
  }
  setTimeout(nextQuestion,1300);
}

function nextQuestion(){ currentQuestion++; if(currentQuestion>=TOTAL){ showEnd(); return; } showQuestion(); }

function updateProgress(){
  const done=currentQuestion, pct=Math.round((done/TOTAL)*100);
  document.getElementById('progressBar').style.width=pct+'%';
}

function launchBalloons(){
  const emojis=['🎈','🎈','🎉','🎈','✨'];
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      const b=document.createElement('div'); b.className='float-balloon';
      b.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      b.style.left=rand(10,90)+'vw'; b.style.bottom='80px';
      document.body.appendChild(b); setTimeout(()=>b.remove(),1300);
    },i*120);
  }
}

function showEnd(){
  document.getElementById('progressBar').style.width='100%';
  let emoji='🎉',title='Brilliant!',stars='★★★';
  if(score<7){ emoji='💪'; title='Keep Trying!'; stars='★☆☆'; }
  else if(score<9){ emoji='👍'; title='Well Done!'; stars='★★☆'; }
  document.getElementById('endEmoji').textContent=emoji;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endScore').textContent=score+' / '+TOTAL;
  document.getElementById('endStars').textContent=stars;
  document.getElementById('endOverlay').classList.add('show');
}

function restartGame(){
  currentQuestion=0; score=0;
  document.getElementById('score').textContent=0;
  document.getElementById('endOverlay').classList.remove('show');
  generateQuestions(); showQuestion();
}

generateQuestions();
showQuestion();
</script>
</body>
</html>
