<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Factor Finder – MathMunch</title>
<style>
  :root {
    --blue:#3B82F6;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
    --green:#10B981;--orange:#F97316;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#DBEAFE;
    --accent:#FDCB6E;
    --red:#EF4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lexend', system-ui, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

  /* HEADER */
  .site-header { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 1px solid var(--outline); box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; align-items: center; padding: 0 24px; height: 60px; gap: 16px; }
  .header-logo { font-family: 'Quicksand', sans-serif; font-size: 20px; font-weight: 700; color: var(--blue); text-decoration: none; }
  .header-nav { flex: 1; display: flex; justify-content: center; }
  .header-nav span { font-size: 15px; font-weight: 600; color: var(--text-mid); }
  .header-play { background: var(--blue); color: white; border: none; border-radius: 10px; padding: 8px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* LAYOUT */
  .game-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 12px; }
  .exit-btn { display: block; width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--outline); background: var(--white); color: var(--text-mid); font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; font-family: inherit; text-decoration: none; transition: background 0.15s; }
  .exit-btn:hover { background: #F1F5F9; }
  .stat-card { background: var(--white); border: 1px solid var(--outline); border-radius: 16px; padding: 16px; }
  .stat-label { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .stat-value { font-family: 'Quicksand', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-level-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .level-icon { font-size: 20px; }
  .stat-value-sm { font-family: 'Quicksand', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .level-progress { height: 8px; background: var(--outline); border-radius: 8px; overflow: hidden; }
  .level-progress-fill { height: 100%; background: var(--blue); border-radius: 8px; transition: width .4s ease; width: 0%; }
  .hearts { font-size: 20px; letter-spacing: 2px; }
  .game-info-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .level-pill { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

  /* GAME CANVAS */
  .game-canvas { background: var(--canvas); border-radius: 24px; padding: 28px; position: relative; overflow: hidden; min-height: 560px; }
  .game-canvas::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px); background-size: 28px 28px; pointer-events: none; z-index: 0; }
  .game-area { position: relative; z-index: 1; }

  /* DETECTIVE HEADER */
  .detective-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; font-size: 15px; color: var(--text-mid); font-style: italic; }

  /* TARGET NUMBER CARD */
  .target-card { background: var(--white); border-radius: 16px; border: 1px solid var(--outline); padding: 24px; text-align: center; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .target-label { font-size: 13px; font-weight: 700; color: var(--text-soft); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .target-number { font-size: 72px; font-weight: 900; color: var(--blue); line-height: 1; }
  .target-instruction { font-size: 14px; color: var(--text-mid); margin-top: 8px; }

  /* FACTOR GRID */
  .factor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .factor-btn { padding: 16px 8px; border-radius: 12px; border: 2px solid var(--outline); background: var(--white); font-size: 20px; font-weight: 800; color: var(--text); cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: relative; font-family: inherit; }
  .factor-btn:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-light); transform: translateY(-2px); }
  .factor-btn.selected { border-color: var(--green); background: #ECFDF5; color: #065F46; }
  .factor-btn.selected::after { content: '✓'; position: absolute; top: 4px; right: 8px; font-size: 12px; color: var(--green); }
  .factor-btn.wrong-flash { border-color: var(--red); background: #FEF2F2; color: var(--red); }
  .factor-btn.missed { border-color: var(--orange); background: #FFF7ED; color: var(--orange); }
  .factor-btn:disabled { cursor: default; }

  /* STATUS ROW */
  .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .selection-info { font-size: 14px; color: var(--text-mid); font-weight: 600; }
  .check-btn { padding: 12px 28px; border-radius: 16px; background: var(--blue); color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .check-btn:hover:not(:disabled) { transform: translateY(-2px); background: var(--blue-dark); }
  .check-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  /* FEEDBACK */
  .feedback { font-size: 16px; font-weight: 700; text-align: center; padding: 12px; border-radius: 10px; opacity: 0; transition: opacity 0.3s; min-height: 42px; }
  .feedback.show { opacity: 1; }
  .feedback.correct { color: var(--green); background: #ECFDF5; }
  .feedback.partial { color: var(--orange); background: #FFF7ED; }
  .feedback.wrong { color: var(--red); background: #FEF2F2; }
  .hint-text { font-size: 13px; color: var(--text-mid); text-align: center; margin-top: 6px; font-style: italic; }

  .next-btn { display: none; width: 100%; padding: 14px; border-radius: 16px; background: var(--green); color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer; margin-top: 12px; transition: all 0.2s; font-family: inherit; }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-2px); }

  /* END SCREEN */
  .end-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 200; }
  .end-overlay.show { display: flex; }
  .end-card { background: var(--white); border-radius: 24px; padding: 40px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .end-emoji { font-size: 64px; margin-bottom: 10px; }
  .end-title { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .end-score { font-size: 20px; color: var(--text-mid); margin-bottom: 16px; }
  .end-stars { font-size: 36px; margin-bottom: 24px; }
  .end-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary { padding: 14px 28px; border-radius: 16px; background: var(--blue); color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; transition: transform 0.2s; }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary { padding: 14px 28px; border-radius: 16px; background: var(--white); color: var(--blue); font-size: 16px; font-weight: 700; border: 2px solid var(--blue); cursor: pointer; text-decoration: none; display: inline-block; font-family: inherit; }
  .btn-secondary:hover { background: var(--blue-light); }

  @media(max-width:768px){.game-layout{grid-template-columns:1fr}.sidebar{flex-direction:row;flex-wrap:wrap}.stat-card{flex:1;min-width:120px}}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<!-- END SCREEN -->
<div class="end-overlay" id="endOverlay">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-score" id="endScore"></div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-btns">
      <button class="btn-primary" onclick="restartGame()">Play Again</button>
      <a class="btn-secondary" href="../../index.html">← Back</a>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav"><span>Factor Finder</span></nav>
  <button class="header-play" onclick="restartGame()">Play Now</button>
</header>

<!-- LAYOUT -->
<div class="game-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Primary 4</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Factor Finder</div>
      <span class="level-pill">P4</span>
    </div>
  </aside>

  <!-- GAME CANVAS -->
  <div class="game-canvas">
    <div class="game-area">
      <div class="detective-header">
        <span>🔍</span>
        <span>Find ALL the factors of the mystery number!</span>
        <span>🔍</span>
      </div>

      <div class="target-card">
        <div class="target-label">Mystery Number</div>
        <div class="target-number" id="targetNumber">–</div>
        <div class="target-instruction">Click all numbers that divide evenly into this number</div>
      </div>

      <div class="status-row">
        <div class="selection-info" id="selectionInfo">0 factors selected</div>
        <button class="check-btn" id="checkBtn" onclick="checkAnswer()">🔍 Check Answer</button>
      </div>

      <div class="factor-grid" id="factorGrid"></div>

      <div class="feedback" id="feedback"></div>
      <div class="hint-text" id="hintText"></div>
      <button class="next-btn" id="nextBtn" onclick="nextRound()">Next Question →</button>
    </div>
  </div>
</div>

<script>
const ROUNDS = [
  { target: 10,  factors: [1,2,5,10] },
  { target: 12,  factors: [1,2,3,4,6,12] },
  { target: 15,  factors: [1,3,5,15] },
  { target: 18,  factors: [1,2,3,6,9,18] },
  { target: 20,  factors: [1,2,4,5,10,20] },
  { target: 24,  factors: [1,2,3,4,6,8,12,24] },
  { target: 36,  factors: [1,2,3,4,6,9,12,18,36] },
  { target: 28,  factors: [1,2,4,7,14,28] },
  { target: 30,  factors: [1,2,3,5,6,10,15,30] },
  { target: 48,  factors: [1,2,3,4,6,8,12,16,24,48] },
];

let currentRound = 0;
let score = 0;
let selectedFactors = new Set();
let wrongClicks = 0;
let roundDone = false;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function generateGridNumbers(factors, target) {
  const factorSet = new Set(factors);
  const nonFactors = [];
  const used = new Set(factors);
  for (let n = 1; n <= target+10; n++) {
    if (!factorSet.has(n) && !used.has(n)) {
      nonFactors.push(n); used.add(n);
    }
    if (nonFactors.length >= 20) break;
  }
  shuffle(nonFactors);
  const fillCount = Math.min(12 - factors.length, nonFactors.length);
  const grid = [...factors, ...nonFactors.slice(0, fillCount)];
  return shuffle(grid);
}

function loadRound() {
  selectedFactors = new Set();
  wrongClicks = 0;
  roundDone = false;

  const q = ROUNDS[currentRound];
  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('score').textContent = score;
  document.getElementById('targetNumber').textContent = q.target;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
  document.getElementById('hintText').textContent = '';
  document.getElementById('checkBtn').disabled = false;
  const nb = document.getElementById('nextBtn');
  nb.classList.remove('show');

  const gridNums = generateGridNumbers(q.factors, q.target);
  const grid = document.getElementById('factorGrid');
  grid.innerHTML = '';

  gridNums.forEach(num => {
    const btn = document.createElement('button');
    btn.className = 'factor-btn';
    btn.textContent = num;
    btn.dataset.num = num;
    btn.onclick = () => toggleFactor(btn, num, q);
    grid.appendChild(btn);
  });

  updateSelectionInfo();
}

function toggleFactor(btn, num, q) {
  if (roundDone) return;
  const factorSet = new Set(q.factors);

  if (!factorSet.has(num)) {
    btn.classList.add('wrong-flash');
    wrongClicks++;
    setTimeout(() => btn.classList.remove('wrong-flash'), 600);
    return;
  }

  if (selectedFactors.has(num)) {
    selectedFactors.delete(num);
    btn.classList.remove('selected');
  } else {
    selectedFactors.add(num);
    btn.classList.add('selected');
  }
  updateSelectionInfo();
}

function updateSelectionInfo() {
  const n = selectedFactors.size;
  document.getElementById('selectionInfo').textContent = `${n} factor${n!==1?'s':''} selected`;
}

function checkAnswer() {
  if (roundDone) return;
  roundDone = true;
  document.getElementById('checkBtn').disabled = true;

  const q = ROUNDS[currentRound];
  const missing = q.factors.filter(f => !selectedFactors.has(f));
  const fb = document.getElementById('feedback');

  document.querySelectorAll('.factor-btn').forEach(b => b.disabled = true);

  if (missing.length === 0 && wrongClicks === 0) {
    score++;
    document.getElementById('score').textContent = score;
    fb.className = 'feedback correct show';
    fb.textContent = `✓ Brilliant! You found all ${q.factors.length} factors of ${q.target}!`;
    document.getElementById('hintText').textContent = `All factors: ${q.factors.join(', ')}`;
  } else if (missing.length === 0) {
    score++;
    document.getElementById('score').textContent = score;
    fb.className = 'feedback correct show';
    fb.textContent = `✓ All factors found! (${wrongClicks} wrong click${wrongClicks!==1?'s':''})`;
    document.getElementById('hintText').textContent = `Factors of ${q.target}: ${q.factors.join(', ')}`;
  } else {
    fb.className = 'feedback partial show';
    fb.textContent = `You missed ${missing.length} factor${missing.length!==1?'s':''}. Highlighted in orange.`;
    document.getElementById('hintText').textContent = `All factors of ${q.target}: ${q.factors.join(', ')}`;
    document.querySelectorAll('.factor-btn').forEach(b => {
      const num = parseInt(b.dataset.num);
      if (missing.includes(num)) b.classList.add('missed');
    });
  }

  const nb = document.getElementById('nextBtn');
  nb.classList.add('show');
}

function nextRound() {
  currentRound++;
  if (currentRound >= 10) showEnd();
  else loadRound();
}

function showEnd() {
  document.getElementById('progressBar').style.width = '100%';

  let emoji, title, stars;
  if (score >= 9) { emoji='🔍'; title='Brilliant!'; stars='★★★'; }
  else if (score >= 7) { emoji='🕵️'; title='Well Done!'; stars='★★☆'; }
  else { emoji='📋'; title='Keep Trying!'; stars='★☆☆'; }

  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `${score}/10 correct`;
  document.getElementById('endStars').textContent = stars;
  document.getElementById('endOverlay').classList.add('show');
}

function restartGame() {
  currentRound = 0; score = 0;
  document.getElementById('endOverlay').classList.remove('show');
  loadRound();
}

loadRound();
</script>
<script src="../../js/mathmunch.js"></script>
</body>
</html>
