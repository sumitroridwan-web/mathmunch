<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Symmetry Lab – MathMunch</title>
<style>
  :root {
    --green:#10B981;--green-dark:#059669;--green-light:#ECFDF5;
    --blue:#3B82F6;--orange:#F97316;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#D1FAE5;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3,.logo-text,.stat-value,.game-title-text{font-family:'Quicksand',system-ui,sans-serif;}

  .site-header{background:var(--white);border-bottom:1px solid var(--outline);position:sticky;top:0;z-index:100;}
  .site-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:38px;height:38px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 2px 0 var(--green-dark);}
  .logo-text{font-size:1.25rem;font-weight:700;color:var(--green);}
  .site-nav{display:flex;gap:4px;}
  .site-nav a{text-decoration:none;color:var(--text-mid);font-weight:600;font-size:.9rem;padding:8px 16px;border-radius:9999px;transition:.15s;}
  .site-nav a:hover,.site-nav a.active{background:var(--green-light);color:var(--green);}
  .btn-play-now{background:var(--green);color:white;padding:10px 22px;border-radius:9999px;font-weight:700;font-size:.9rem;text-decoration:none;box-shadow:0 3px 0 var(--green-dark);transition:.1s;}
  .btn-play-now:hover{transform:translateY(-1px);}
  .btn-play-now:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dark);}

  .game-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;padding:20px 24px 24px;max-width:1200px;margin:0 auto;flex:1;align-items:start;}

  .sidebar{display:flex;flex-direction:column;gap:12px;}
  .exit-btn{background:var(--white);border:2px solid var(--outline);border-radius:9999px;padding:12px 20px;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:600;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 0 var(--outline);transition:.1s;}
  .exit-btn:hover{border-color:var(--green);color:var(--green);}
  .exit-btn:active{transform:translateY(1px);box-shadow:none;}
  .stat-card{background:var(--white);border:1px solid var(--outline);border-radius:24px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .stat-label{font-family:'Lexend',sans-serif;font-size:.7rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .stat-value{font-size:2.2rem;font-weight:700;color:var(--green);line-height:1;}
  .stat-level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .level-icon{font-size:1.4rem;}
  .stat-value-sm{font-size:1.4rem;font-weight:700;color:var(--green);}
  .level-progress{height:10px;background:var(--outline);border-radius:9999px;overflow:hidden;}
  .level-progress-fill{height:100%;background:var(--green);border-radius:9999px;width:0%;transition:width .4s ease;}
  .hearts{display:flex;gap:6px;font-size:1.5rem;}
  .game-info-title{font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
  .level-pill{display:inline-block;background:var(--green);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:9999px;}

  .game-canvas{background:var(--canvas);border-radius:24px;padding:32px;position:relative;overflow:hidden;min-height:520px;border:1px solid rgba(16,185,129,.15);}
  .game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
  .game-canvas > *{position:relative;z-index:1;}

  .end-screen{display:none;position:fixed;inset:0;background:rgba(25,28,30,.8);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;}
  .end-screen.show{display:flex;}
  .end-card{background:white;border-radius:28px;padding:44px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:9999px;border:none;cursor:pointer;font-family:'Lexend',sans-serif;font-size:1rem;font-weight:700;transition:.1s;text-decoration:none;margin:0 6px;}
  .btn-play{background:var(--green);color:white;box-shadow:0 3px 0 var(--green-dark);}
  .btn-play:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dark);}
  .btn-home{background:var(--bg);color:var(--text-mid);border:2px solid var(--outline);}

  @media(max-width:768px){
    .game-layout{grid-template-columns:1fr;padding:16px;}
    .sidebar{flex-direction:row;flex-wrap:wrap;}
    .stat-card{flex:1;min-width:140px;}
    .site-nav{display:none;}
  }

  /* Game-specific CSS */
  .question-card{background:rgba(255,255,255,0.85);border-radius:16px;padding:24px;margin-bottom:20px;text-align:center;border:1px solid rgba(16,185,129,0.2);}
  .question-label{font-size:13px;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .question-text{font-size:18px;font-weight:700;color:var(--text);margin-bottom:20px;}
  .shape-display{display:flex;justify-content:center;align-items:center;padding:20px;min-height:160px;position:relative;}
  .answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:420px;margin:0 auto;}
  .btn-answer{padding:14px 20px;border-radius:12px;font-weight:700;font-size:17px;cursor:pointer;border:2px solid rgba(16,185,129,0.3);background:white;color:var(--text);transition:all 0.2s;font-family:'Lexend',sans-serif;}
  .btn-answer:hover:not(:disabled){background:var(--green-light);border-color:var(--green);transform:translateY(-2px);}
  .btn-answer.correct{background:#E8FFF3;border-color:#00B894;color:#00B894;}
  .btn-answer.wrong{background:#FFE8EC;border-color:#FF4757;color:#FF4757;}
  .btn-answer:disabled{cursor:not-allowed;opacity:0.7;}
  .grid-container{display:flex;justify-content:center;align-items:flex-start;gap:0;position:relative;margin:0 auto 20px;overflow-x:auto;}
  .grid-half{display:grid;grid-template-columns:repeat(4,34px);grid-template-rows:repeat(8,34px);gap:2px;}
  .grid-cell{width:34px;height:34px;background:rgba(255,255,255,0.6);border:1px solid rgba(16,185,129,0.2);border-radius:4px;cursor:default;transition:all 0.15s;}
  .grid-cell.filled-left{background:var(--green);border-color:#059669;}
  .grid-cell.right-clickable{cursor:pointer;}
  .grid-cell.right-clickable:hover{background:rgba(16,185,129,0.2);border-color:var(--green);}
  .grid-cell.player-filled{background:#9B8FF5;border-color:#7C3AED;}
  .grid-cell.check-correct{background:#00B894!important;border-color:#00956C!important;}
  .grid-cell.check-wrong{background:#FF4757!important;border-color:#CC2233!important;}
  .grid-cell.check-missed{background:#FFD700!important;border-color:#B8A000!important;}
  .mirror-line{width:6px;background:linear-gradient(180deg,var(--green),#9B8FF5);border-radius:3px;margin:0 4px;align-self:stretch;box-shadow:0 0 8px rgba(16,185,129,0.4);}
  .check-btn{margin-top:16px;}
  .feedback-bar{padding:12px 20px;border-radius:12px;font-weight:700;font-size:15px;text-align:center;margin-top:12px;display:none;}
  .feedback-bar.show{display:block;}
  .feedback-bar.correct-fb{background:#E8FFF3;color:#00B894;border:2px solid #00B894;}
  .feedback-bar.wrong-fb{background:#FFE8EC;color:#FF4757;border:2px solid #FF4757;}
  .mode-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:800;margin-bottom:12px;letter-spacing:0.5px;}
  .mode-a-tag{background:#D1FAE5;color:#059669;}
  .mode-b-tag{background:#EDE9FE;color:#7C3AED;}
  .shape-svg-wrap{display:flex;justify-content:center;align-items:center;}
  .btn-geo{padding:10px 24px;border-radius:12px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#34D399,#10B981);color:white;font-size:14px;transition:all 0.2s;font-family:'Lexend',sans-serif;}
  .btn-geo:hover{transform:translateY(-2px);}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <div class="site-header-inner">
    <a href="../../index.html" class="logo">
      <div class="logo-icon">🔷</div>
      <span class="logo-text">MathMunch</span>
    </a>
    <nav class="site-nav">
      <a href="../../index.html#games" class="active">Games</a>
      <a href="#">Badges</a>
      <a href="#">Progress</a>
    </nav>
    <a href="../../index.html" class="btn-play-now">Play Now</a>
  </div>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>

    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Scientist</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Symmetry Lab</div>
      <span class="level-pill">P3</span>
    </div>
  </div>

  <div class="game-canvas">
    <div class="question-card" id="questionCard">
      <div class="question-label" id="roundLabel">Round 1 of 10</div>
      <div id="modeTag"></div>
      <div class="question-text" id="questionText"></div>
      <div id="gameContent"></div>
      <div class="feedback-bar" id="feedbackBar"></div>
    </div>
  </div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div style="font-size:3rem;margin-bottom:12px;" id="endEmoji">🎉</div>
    <div style="font-family:'Quicksand',sans-serif;font-size:1.9rem;font-weight:700;color:var(--text);margin-bottom:8px;" id="endTitle">Game Over!</div>
    <div style="font-size:1rem;color:var(--text-mid);margin-bottom:28px;" id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">← All Games</a>
  </div>
</div>

<script>
const modeARounds = [
  { shape:'square', label:'Square', answer:4, options:[1,2,4,6], svgFn:drawSquare, symmetryLines:['h','v','d1','d2'] },
  { shape:'rectangle', label:'Rectangle', answer:2, options:[1,2,3,4], svgFn:drawRectangle, symmetryLines:['h','v'] },
  { shape:'eq-triangle', label:'Equilateral Triangle', answer:3, options:[1,2,3,4], svgFn:drawEqTriangle, symmetryLines:['m1','m2','m3'] },
  { shape:'iso-triangle', label:'Isosceles Triangle', answer:1, options:[0,1,2,3], svgFn:drawIsoTriangle, symmetryLines:['v'] },
  { shape:'letterH', label:'Letter H Shape', answer:2, options:[0,1,2,4], svgFn:drawLetterH, symmetryLines:['h','v'] }
];

const modeBRounds = [
  { label:'Simple L-shape', leftCells:[[0,0],[1,0],[2,0],[3,0],[3,1],[3,2],[3,3]], correctRight:[[0,3],[1,3],[2,3],[3,3],[3,2],[3,1],[3,0]] },
  { label:'T-shape', leftCells:[[0,0],[0,1],[0,2],[0,3],[2,2],[3,2],[4,2]], correctRight:[[0,3],[0,2],[0,1],[0,0],[2,1],[3,1],[4,1]] },
  { label:'Corner shape', leftCells:[[1,0],[1,1],[2,0],[3,0],[4,0],[4,1],[4,2],[4,3]], correctRight:[[1,3],[1,2],[2,3],[3,3],[4,3],[4,2],[4,1],[4,0]] },
  { label:'Cross half', leftCells:[[0,2],[1,2],[2,0],[2,1],[2,2],[3,2],[4,2]], correctRight:[[0,1],[1,1],[2,3],[2,2],[2,1],[3,1],[4,1]] },
  { label:'Arrow shape', leftCells:[[2,0],[1,1],[2,1],[3,1],[0,2],[2,2],[4,2]], correctRight:[[2,3],[1,2],[2,2],[3,2],[0,1],[2,1],[4,1]] }
];

const rounds = [];
for(let i=0;i<5;i++){
  rounds.push({mode:'A', data:modeARounds[i]});
  rounds.push({mode:'B', data:modeBRounds[i]});
}

let currentRound = 0;
let score = 0;
let answered = false;
let playerCells = new Set();

function svgWrap(content, w=200, h=200){
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${content}</svg>`;
}

function drawSquare(showLines){
  const x=40, y=40, s=120;
  let lines = '';
  if(showLines){
    lines = `
      <line x1="${x+s/2}" y1="${y-15}" x2="${x+s/2}" y2="${y+s+15}" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
      <line x1="${x-15}" y1="${y+s/2}" x2="${x+s+15}" y2="${y+s/2}" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
      <line x1="${x-10}" y1="${y-10}" x2="${x+s+10}" y2="${y+s+10}" stroke="#FDCB6E" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
      <line x1="${x+s+10}" y1="${y-10}" x2="${x-10}" y2="${y+s+10}" stroke="#FDCB6E" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>`;
  }
  return svgWrap(`<rect x="${x}" y="${y}" width="${s}" height="${s}" fill="#D1FAE5" stroke="#34D399" stroke-width="3" rx="4"/>${lines}`);
}

function drawRectangle(showLines){
  const x=25, y=60, w=150, h=80;
  let lines = '';
  if(showLines){
    lines = `
      <line x1="${x+w/2}" y1="${y-15}" x2="${x+w/2}" y2="${y+h+15}" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
      <line x1="${x-15}" y1="${y+h/2}" x2="${x+w+15}" y2="${y+h/2}" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>`;
  }
  return svgWrap(`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#D1FAE5" stroke="#34D399" stroke-width="3" rx="4"/>${lines}`);
}

function drawEqTriangle(showLines){
  const ax=100,ay=20, bx=20,by=170, cx2=180,cy2=170;
  let lines = '';
  if(showLines){
    lines = `
      <line x1="${ax}" y1="${ay-10}" x2="${(bx+cx2)/2}" y2="${(by+cy2)/2+5}" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
      <line x1="${bx-10}" y1="${by+5}" x2="${(ax+cx2)/2}" y2="${(ay+cy2)/2-5}" stroke="#FDCB6E" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
      <line x1="${cx2+10}" y1="${cy2+5}" x2="${(ax+bx)/2}" y2="${(ay+by)/2-5}" stroke="#00B894" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>`;
  }
  return svgWrap(`<polygon points="${ax},${ay} ${bx},${by} ${cx2},${cy2}" fill="#D1FAE5" stroke="#34D399" stroke-width="3"/>${lines}`);
}

function drawIsoTriangle(showLines){
  const ax=100,ay=20, bx=30,by=175, cx=170,cy=175;
  let lines = '';
  if(showLines){
    lines = `<line x1="100" y1="${ay-12}" x2="100" y2="${by+8}" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>`;
  }
  return svgWrap(`<polygon points="${ax},${ay} ${bx},${by} ${cx},${cy}" fill="#D1FAE5" stroke="#34D399" stroke-width="3"/>${lines}`);
}

function drawLetterH(showLines){
  let lines = '';
  if(showLines){
    lines = `
      <line x1="100" y1="15" x2="100" y2="185" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
      <line x1="15" y1="100" x2="185" y2="100" stroke="#FDCB6E" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>`;
  }
  const h = `
    <rect x="35" y="25" width="30" height="150" fill="#D1FAE5" stroke="#34D399" stroke-width="2"/>
    <rect x="135" y="25" width="30" height="150" fill="#D1FAE5" stroke="#34D399" stroke-width="2"/>
    <rect x="65" y="82" width="70" height="36" fill="#D1FAE5" stroke="#34D399" stroke-width="2"/>
    ${lines}`;
  return svgWrap(h);
}

function renderRound(){
  const r = rounds[currentRound];
  answered = false;
  playerCells = new Set();

  document.getElementById('roundLabel').textContent = `Round ${currentRound+1} of 10`;
  const pct = Math.round(currentRound/10*100);
  document.getElementById('progressBar').style.width = pct+'%';

  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';
  fb.textContent = '';

  if(r.mode === 'A'){
    renderModeA(r.data);
  } else {
    renderModeB(r.data);
  }
}

function renderModeA(data){
  document.getElementById('modeTag').innerHTML = '<span class="mode-tag mode-a-tag">🔍 Count Lines of Symmetry</span>';
  document.getElementById('questionText').textContent = `How many lines of symmetry does this ${data.label} have?`;

  const content = document.getElementById('gameContent');
  content.innerHTML = `
    <div class="shape-display shape-svg-wrap" id="shapeDisplay">
      ${data.svgFn(false)}
    </div>
    <div class="answers-grid">
      ${data.options.map(o=>`<button class="btn-answer" onclick="answerModeA(${o},${data.answer},${JSON.stringify(data)})">${o}</button>`).join('')}
    </div>`;
}

function answerModeA(chosen, correct, data){
  if(answered) return;
  answered = true;

  const btns = document.querySelectorAll('.btn-answer');
  btns.forEach(b=>{
    const val = parseInt(b.textContent);
    b.disabled = true;
    if(val === correct) b.classList.add('correct');
    else if(val === chosen) b.classList.add('wrong');
  });

  document.getElementById('shapeDisplay').innerHTML = data.svgFn(true);

  const fb = document.getElementById('feedbackBar');
  if(chosen === correct){
    score++;
    document.getElementById('score').textContent = score;
    fb.textContent = `✓ Correct! ${data.label} has ${correct} line${correct!==1?'s':''} of symmetry.`;
    fb.className = 'feedback-bar show correct-fb';
  } else {
    fb.textContent = `✗ Not quite! The correct answer is ${correct}. See the dashed lines above.`;
    fb.className = 'feedback-bar show wrong-fb';
  }

  setTimeout(nextRound, 1800);
}

function renderModeB(data){
  document.getElementById('modeTag').innerHTML = '<span class="mode-tag mode-b-tag">🪞 Complete the Reflection</span>';
  document.getElementById('questionText').textContent = 'Click the cells on the RIGHT side to complete the mirror reflection!';

  const leftSet = new Set(data.leftCells.map(([r,c])=>`${r},${c}`));
  const correctSet = new Set(data.correctRight.map(([r,c])=>`${r},${c}`));

  let leftHTML = '', rightHTML = '';
  for(let r=0;r<8;r++){
    for(let c=0;c<4;c++){
      const filled = leftSet.has(`${r},${c}`) ? ' filled-left' : '';
      leftHTML += `<div class="grid-cell${filled}" id="L${r}_${c}"></div>`;
    }
  }
  for(let r=0;r<8;r++){
    for(let c=0;c<4;c++){
      rightHTML += `<div class="grid-cell right-clickable" id="R${r}_${c}" onclick="toggleCell(${r},${c})"></div>`;
    }
  }

  const content = document.getElementById('gameContent');
  content.innerHTML = `
    <div style="overflow-x:auto">
    <div class="grid-container">
      <div class="grid-half" id="gridLeft">${leftHTML}</div>
      <div class="mirror-line" id="mirrorLine"></div>
      <div class="grid-half" id="gridRight">${rightHTML}</div>
    </div>
    </div>
    <div style="text-align:center">
      <button class="btn-geo check-btn" onclick="checkReflection(${JSON.stringify(data).replace(/"/g,'&quot;')})">Check My Answer ✓</button>
    </div>`;

  window._correctRight = correctSet;
}

function toggleCell(r,c){
  if(answered) return;
  const key = `${r},${c}`;
  const cell = document.getElementById(`R${r}_${c}`);
  if(playerCells.has(key)){
    playerCells.delete(key);
    cell.classList.remove('player-filled');
  } else {
    playerCells.add(key);
    cell.classList.add('player-filled');
  }
}

function checkReflection(data){
  if(answered) return;
  answered = true;

  const correctSet = window._correctRight;
  let allCorrect = true;

  for(let r=0;r<8;r++){
    for(let c=0;c<4;c++){
      const key = `${r},${c}`;
      const cell = document.getElementById(`R${r}_${c}`);
      const shouldBeFilled = correctSet.has(key);
      const isFilled = playerCells.has(key);

      cell.classList.remove('right-clickable','player-filled');
      if(shouldBeFilled && isFilled){
        cell.classList.add('check-correct');
      } else if(!shouldBeFilled && isFilled){
        cell.classList.add('check-wrong');
        allCorrect = false;
      } else if(shouldBeFilled && !isFilled){
        cell.classList.add('check-missed');
        allCorrect = false;
      }
    }
  }

  const fb = document.getElementById('feedbackBar');
  if(allCorrect){
    score++;
    document.getElementById('score').textContent = score;
    fb.textContent = '✓ Perfect reflection! All cells match!';
    fb.className = 'feedback-bar show correct-fb';
  } else {
    fb.textContent = '✗ Not quite! Green = correct, Yellow = missed, Red = wrong.';
    fb.className = 'feedback-bar show wrong-fb';
  }

  document.querySelector('.check-btn').disabled = true;
  setTimeout(nextRound, 2200);
}

function nextRound(){
  currentRound++;
  if(currentRound >= 10){
    showEndScreen();
  } else {
    renderRound();
  }
}

function showEndScreen(){
  document.getElementById('progressBar').style.width = '100%';
  let emoji, title;
  if(score >= 9){ emoji='🌟'; title='Brilliant!'; }
  else if(score >= 7){ emoji='😊'; title='Well Done!'; }
  else { emoji='💪'; title='Keep Trying!'; }
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `You scored ${score} out of 10`;
  document.getElementById('endScreen').classList.add('show');
}

function restartGame(){
  currentRound = 0;
  score = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('endScreen').classList.remove('show');
  renderRound();
}

renderRound();
</script>
</body>
</html>
