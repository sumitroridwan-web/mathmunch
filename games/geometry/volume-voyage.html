<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Volume Voyage – MathMunch</title>
<style>
:root {
  --green:#10B981; --green-dark:#059669; --green-light:#ECFDF5;
  --canvas:#D1FAE5; --bg:#F8FAFC; --white:#FFFFFF;
  --text:#1E293B; --text2:#64748B; --shadow:0 4px 20px rgba(16,185,129,0.12);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

.site-header{background:var(--white);box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:20px;color:var(--green);text-decoration:none;display:flex;align-items:center;gap:8px;}
.header-nav{display:flex;align-items:center;gap:16px;}
.header-nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;}
.header-nav a:hover{color:var(--green);}
.header-cta{background:var(--green);color:white;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;text-decoration:none;}

.game-layout{display:grid;grid-template-columns:280px 1fr;flex:1;min-height:0;}

.sidebar{background:var(--white);border-right:1px solid #E2E8F0;padding:24px 20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.exit-btn{display:flex;align-items:center;gap:8px;background:var(--green-light);color:var(--green-dark);border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%;}
.exit-btn:hover{background:#D1FAE5;}
.stat-card{background:var(--bg);border-radius:12px;padding:16px;border:1px solid #E2E8F0;}
.stat-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.stat-value{font-family:'Quicksand',sans-serif;font-size:28px;font-weight:700;color:var(--green);}
.level-progress-track{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;margin-top:8px;}
.level-progress-fill{height:100%;background:linear-gradient(90deg,#34D399,var(--green));border-radius:99px;transition:width 0.4s ease;width:0%;}

.game-canvas{background:var(--canvas);position:relative;overflow-y:auto;padding:32px 28px;}
.game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#6EE7B7 1px,transparent 1px);background-size:24px 24px;opacity:0.4;pointer-events:none;}
.canvas-inner{position:relative;z-index:1;}

/* Game-specific CSS */
.game-card{background:var(--white);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow);}
.round-label{font-size:12px;color:var(--text2);text-align:center;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.question-text{font-size:17px;font-weight:600;color:var(--text);text-align:center;margin-bottom:20px;line-height:1.5;}
.iso-container{display:flex;justify-content:center;align-items:center;margin:16px 0;min-height:200px;}
svg.iso-svg{overflow:visible;}
.formula-box{background:var(--green-light);border:1px solid #A7F3D0;border-radius:12px;padding:16px 24px;text-align:center;margin:16px 0;}
.formula-title{font-size:14px;color:var(--green-dark);margin-bottom:8px;letter-spacing:1px;font-weight:700;}
.formula-eq{font-size:20px;font-weight:700;color:var(--green-dark);}
.options-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px;}
.option-btn{background:var(--green-light);border:2px solid #A7F3D0;border-radius:12px;padding:14px 8px;color:var(--text);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;}
.option-btn:hover{background:#D1FAE5;border-color:var(--green);transform:translateY(-2px);}
.option-btn.correct{background:#D1FAE5;border-color:var(--green-dark);color:var(--green-dark);}
.option-btn.wrong{background:#FEE2E2;border-color:#DC2626;color:#DC2626;}
.option-btn:disabled{cursor:not-allowed;}
.feedback{text-align:center;font-size:15px;font-weight:700;padding:10px;border-radius:10px;margin-top:12px;min-height:36px;}
.feedback.correct{background:#D1FAE5;color:var(--green-dark);}
.feedback.wrong{background:#FEE2E2;color:#DC2626;}

.end-screen{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200;}
.end-screen.show{display:flex;}
.end-card{background:var(--white);border-radius:24px;padding:40px 36px;max-width:420px;width:90%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
#endEmoji{font-size:48px;margin-bottom:12px;}
#endTitle{font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px;font-family:'Quicksand',sans-serif;}
#endScore{font-size:18px;font-weight:700;color:var(--green);margin-bottom:24px;}
.btn{display:inline-block;padding:12px 28px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:none;margin:4px;text-decoration:none;}
.btn-play{background:linear-gradient(135deg,#34D399,var(--green));color:white;}
.btn-home{background:var(--green-light);color:var(--green-dark);}

@media(max-width:768px){
  .game-layout{grid-template-columns:1fr;}
  .sidebar{flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid #E2E8F0;padding:12px;}
  .header-nav{display:none;}
}
</style>
</head>
<body>
<script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav">
    <a href="../../index.html">All Games</a>
    <a href="#">Leaderboard</a>
    <a href="../../index.html" class="header-cta">Play Now</a>
  </nav>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">&#8617; Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-value" style="font-size:18px;">Captain</div>
      <div class="level-progress-track"><div class="level-progress-fill" id="progressBar"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Grade</div>
      <div class="stat-value" style="font-size:18px;color:var(--text);">P5</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Topic</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;line-height:1.5;">Volume of 3D Shapes</div>
    </div>
  </div>

  <div class="game-canvas">
    <div class="canvas-inner">
      <div class="game-card" id="gameCard">
        <div class="round-label">DIVE <span id="roundLabel">1</span> OF 10</div>
        <div class="question-text" id="questionText"></div>
        <div class="iso-container" id="isoContainer">
          <svg class="iso-svg" id="isoSvg" width="280" height="200"></svg>
        </div>
        <div class="formula-box" id="formulaBox" style="display:none;">
          <div class="formula-title">VOLUME FORMULA</div>
          <div class="formula-eq" id="formulaEq"></div>
        </div>
        <div class="options-row" id="optionsRow"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>
  </div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div id="endEmoji">🎉</div>
    <div id="endTitle">Game Over!</div>
    <div id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">&#8592; All Games</a>
  </div>
</div>

<script>
const CELL_W = 40, CELL_H = 40;
const ns = 'http://www.w3.org/2000/svg';

function isoPoint(col, row, layer, cX, cY) {
  const x = (col - row) * CELL_W / 2 + cX;
  const y = (col + row) * CELL_H / 4 - layer * CELL_H / 2 + cY;
  return [x, y];
}

function drawCube(svg, col, row, layer, cX, cY) {
  const [x0,y0] = isoPoint(col,   row,   layer,   cX, cY);
  const [x1,y1] = isoPoint(col+1, row,   layer,   cX, cY);
  const [x2,y2] = isoPoint(col+1, row+1, layer,   cX, cY);
  const [x3,y3] = isoPoint(col,   row+1, layer,   cX, cY);
  const [x4,y4] = isoPoint(col,   row,   layer+1, cX, cY);
  const [x5,y5] = isoPoint(col+1, row,   layer+1, cX, cY);
  const [x6,y6] = isoPoint(col+1, row+1, layer+1, cX, cY);
  const [x7,y7] = isoPoint(col,   row+1, layer+1, cX, cY);

  function poly(pts, fill) {
    const p = document.createElementNS(ns,'polygon');
    p.setAttribute('points', pts.map(([px,py])=>`${px},${py}`).join(' '));
    p.setAttribute('fill', fill);
    p.setAttribute('stroke', '#D1FAE5');
    p.setAttribute('stroke-width','1.5');
    return p;
  }

  svg.appendChild(poly([[x1,y1],[x2,y2],[x6,y6],[x5,y5]], '#059669'));
  svg.appendChild(poly([[x2,y2],[x3,y3],[x7,y7],[x6,y6]], '#10B981'));
  svg.appendChild(poly([[x4,y4],[x5,y5],[x6,y6],[x7,y7]], '#34D399'));
}

function drawArrangement(svg, arrangement, cX, cY) {
  const sorted = [...arrangement].sort((a,b) => {
    if (b[1] !== a[1]) return b[1] - a[1];
    return a[0] - b[0];
  });
  sorted.forEach(([c,r,l]) => drawCube(svg, c, r, l, cX, cY));
}

function drawCuboidDiagram(svg, L, W, H) {
  svg.innerHTML = '';
  svg.setAttribute('width','280');
  svg.setAttribute('height','180');
  const cX = 120, cY = 130;
  const sx = 8, sy = 4, sz = 22;
  const w = L * sx, d = W * sz, h = H * 14;

  function pt(x,y) { return `${x},${y}`; }

  const pts = {
    A:[cX, cY], B:[cX+w, cY], C:[cX+w+d, cY-d/2], D:[cX+d, cY-d/2],
    E:[cX, cY-h], F:[cX+w, cY-h], G:[cX+w+d, cY-h-d/2], H2:[cX+d, cY-h-d/2]
  };

  function face(corners, fill) {
    const p = document.createElementNS(ns,'polygon');
    p.setAttribute('points', corners.map(k=>pt(pts[k][0],pts[k][1])).join(' '));
    p.setAttribute('fill', fill);
    p.setAttribute('stroke','#34D399');
    p.setAttribute('stroke-width','1.5');
    return p;
  }

  svg.appendChild(face(['A','B','F','E'], '#A7F3D0'));
  svg.appendChild(face(['B','C','G','F'], '#6EE7B7'));
  svg.appendChild(face(['E','F','G','H2'], '#34D39988'));

  function label(text, x, y) {
    const t = document.createElementNS(ns,'text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    t.setAttribute('font-size','13'); t.setAttribute('fill','#FDCB6E');
    t.setAttribute('font-weight','700'); t.setAttribute('text-anchor','middle');
    t.textContent = text;
    svg.appendChild(t);
  }

  label(`L=${L}`, cX+w/2, cY+16);
  label(`W=${W}`, cX+w+d/2+6, cY-d/4+4);
  label(`H=${H}`, cX-12, cY-h/2);
}

const ROUNDS = [
  { q:'How many unit cubes are there in total?', visual:'cubes',
    arrangement: (()=>{ const a=[]; for(let c=0;c<2;c++) for(let r=0;r<2;r++) for(let l=0;l<2;l++) a.push([c,r,l]); return a; })(),
    answer:8, options:[6,7,8,9], cX:140, cY:140 },
  { q:'How many unit cubes are in this flat layer?', visual:'cubes',
    arrangement: (()=>{ const a=[]; for(let c=0;c<3;c++) for(let r=0;r<2;r++) a.push([c,r,0]); return a; })(),
    answer:6, options:[5,6,7,8], cX:130, cY:130 },
  { q:'Count the cubes in this staircase arrangement.', visual:'cubes',
    arrangement: [[0,0,0],[1,0,0],[1,0,1],[2,0,0],[2,0,1],[2,0,2]],
    answer:6, options:[5,6,7,8], cX:130, cY:150 },
  { q:'How many unit cubes make up this tower?', visual:'cubes',
    arrangement: (()=>{ const a=[]; for(let c=0;c<2;c++) for(let r=0;r<2;r++) for(let l=0;l<3;l++) a.push([c,r,l]); return a; })(),
    answer:12, options:[10,11,12,14], cX:140, cY:150 },
  { q:'What is the volume of this cuboid?', visual:'formula', L:4, W:3, H:2, answer:24, options:[18,20,24,26], formulaHint:'V = L × W × H = 4 × 3 × 2 = ?' },
  { q:'How many unit cubes form this L-shaped structure?', visual:'cubes',
    arrangement: [[0,0,0],[1,0,0],[2,0,0],[0,1,0],[1,1,0],[2,1,0],[0,2,0],[0,3,0]],
    answer:8, options:[7,8,9,10], cX:130, cY:130 },
  { q:'What is the volume of a cube with side length 3 cm?', visual:'formula', L:3, W:3, H:3, answer:27, options:[18,24,27,30], formulaHint:'V = side³ = 3 × 3 × 3 = ?' },
  { q:'One cube is missing! How many cubes remain?', visual:'cubes',
    arrangement: (()=>{ const a=[]; for(let c=0;c<3;c++) for(let r=0;r<3;r++) { if(!(c===2&&r===2)) a.push([c,r,0]); } return a; })(),
    answer:8, options:[7,8,9,10], cX:130, cY:130 },
  { q:'Count all the cubes in this 3D arrangement.', visual:'cubes',
    arrangement: (()=>{ const a=[]; for(let c=0;c<3;c++) for(let r=0;r<2;r++) for(let l=0;l<2;l++) a.push([c,r,l]); return a; })(),
    answer:12, options:[10,12,14,16], cX:130, cY:150 },
  { q:'Find the volume of this cuboid.', visual:'formula', L:5, W:4, H:3, answer:60, options:[48,55,60,66], formulaHint:'V = L × W × H = 5 × 4 × 3 = ?' }
];

let currentRound = 0;
let score = 0;
let answeredThisRound = false;

function renderRound() {
  answeredThisRound = false;
  const rd = ROUNDS[currentRound];

  document.getElementById('roundLabel').textContent = currentRound + 1;
  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('questionText').textContent = rd.q;

  const svg = document.getElementById('isoSvg');
  const formulaBox = document.getElementById('formulaBox');
  const isoContainer = document.getElementById('isoContainer');

  svg.innerHTML = '';

  if (rd.visual === 'formula') {
    isoContainer.style.display = 'flex';
    formulaBox.style.display = 'block';
    svg.setAttribute('width','280');
    svg.setAttribute('height','180');
    drawCuboidDiagram(svg, rd.L, rd.W, rd.H);
    document.getElementById('formulaEq').textContent = rd.formulaHint;
  } else {
    isoContainer.style.display = 'flex';
    formulaBox.style.display = 'none';
    svg.setAttribute('width','280');
    svg.setAttribute('height','200');
    drawArrangement(svg, rd.arrangement, rd.cX, rd.cY);
  }

  const optRow = document.getElementById('optionsRow');
  optRow.innerHTML = '';
  const opts = [...rd.options].sort((a,b) => a-b);
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt + (rd.visual==='formula' ? ' cm³' : '');
    btn.onclick = () => handleAnswer(btn, opt === rd.answer, rd.answer, rd.visual==='formula');
    optRow.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, correctAns, isFormula) {
  if (answeredThisRound) return;
  answeredThisRound = true;
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  const suffix = isFormula ? ' cm³' : '';
  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    fb.textContent = `✅ Correct! The answer is ${correctAns}${suffix}.`;
    fb.className = 'feedback correct';
    document.getElementById('score').textContent = score;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (b.textContent === correctAns + suffix) b.classList.add('correct');
    });
    fb.textContent = `❌ Not quite! The answer is ${correctAns}${suffix}.`;
    fb.className = 'feedback wrong';
  }
  setTimeout(advanceRound, 1300);
}

function advanceRound() {
  currentRound++;
  if (currentRound >= 10) showEndScreen();
  else renderRound();
}

function showEndScreen() {
  document.getElementById('progressBar').style.width = '100%';
  const emoji = score >= 9 ? '🌟' : score >= 7 ? '😊' : '💪';
  const title = score >= 9 ? 'Brilliant!' : score >= 7 ? 'Well Done!' : 'Keep Trying!';
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = score + ' / 10 correct';
  document.getElementById('endScreen').classList.add('show');
}

function restartGame() {
  currentRound = 0; score = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('endScreen').classList.remove('show');
  renderRound();
}

renderRound();
</script>
</body>
</html>
