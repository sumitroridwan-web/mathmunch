<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Coordinate Commander – MathMunch</title>
<style>
:root {
  --green:#10B981; --green-dark:#059669; --green-light:#ECFDF5;
  --canvas:#D1FAE5; --bg:#F8FAFC; --white:#FFFFFF;
  --text:#1E293B; --text2:#64748B; --shadow:0 4px 20px rgba(16,185,129,0.12);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

.site-header{background:var(--white);box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:20px;color:var(--green);text-decoration:none;display:flex;align-items:center;gap:8px;}
.header-nav{display:flex;align-items:center;gap:16px;}
.header-nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;}
.header-nav a:hover{color:var(--green);}
.header-cta{background:var(--green);color:white;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;text-decoration:none;}

.game-layout{display:grid;grid-template-columns:280px 1fr;flex:1;min-height:0;}

.sidebar{background:var(--white);border-right:1px solid #E2E8F0;padding:24px 20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.exit-btn{display:flex;align-items:center;gap:8px;background:var(--green-light);color:var(--green-dark);border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%;}
.exit-btn:hover{background:#D1FAE5;}
.stat-card{background:var(--bg);border-radius:12px;padding:16px;border:1px solid #E2E8F0;}
.stat-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.stat-value{font-family:'Quicksand',sans-serif;font-size:28px;font-weight:700;color:var(--green);}
.level-progress-track{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;margin-top:8px;}
.level-progress-fill{height:100%;background:linear-gradient(90deg,#34D399,var(--green));border-radius:99px;transition:width 0.4s ease;width:0%;}

.game-canvas{background:var(--canvas);position:relative;overflow-y:auto;padding:32px 28px;}
.game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#6EE7B7 1px,transparent 1px);background-size:24px 24px;opacity:0.4;pointer-events:none;}
.canvas-inner{position:relative;z-index:1;}

/* Game-specific CSS */
.game-card{background:var(--white);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow);}
.round-label{font-size:12px;color:var(--text2);text-align:center;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.question-text{font-size:17px;font-weight:600;color:var(--text);text-align:center;margin-bottom:16px;line-height:1.4;}
.mode-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:14px;}
.mode-a{background:#FEF9C3;color:#A16207;}
.mode-b{background:var(--green-light);color:var(--green-dark);}
.click-instruction{text-align:center;color:var(--text2);font-size:14px;font-style:italic;margin-bottom:8px;}
.grid-wrapper{display:flex;justify-content:center;margin:16px 0;}
svg.coord-grid{border:2px solid #A7F3D0;border-radius:8px;background:#F0FDF4;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
.option-btn{background:var(--green-light);border:2px solid #A7F3D0;border-radius:12px;padding:14px 20px;color:var(--text);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;}
.option-btn:hover{background:#D1FAE5;border-color:var(--green);transform:translateY(-1px);}
.option-btn.correct{background:#D1FAE5;border-color:var(--green-dark);color:var(--green-dark);}
.option-btn.wrong{background:#FEE2E2;border-color:#DC2626;color:#DC2626;}
.option-btn:disabled{cursor:not-allowed;}
.feedback{text-align:center;font-size:15px;font-weight:700;padding:10px;border-radius:10px;margin-top:12px;min-height:36px;}
.feedback.correct{background:#D1FAE5;color:var(--green-dark);}
.feedback.wrong{background:#FEE2E2;color:#DC2626;}
@keyframes crosshairPop{0%{r:0;opacity:1;}100%{r:20;opacity:0;}}
.crosshair-ring{animation:crosshairPop 0.6s ease-out forwards;}

.end-screen{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200;}
.end-screen.show{display:flex;}
.end-card{background:var(--white);border-radius:24px;padding:40px 36px;max-width:420px;width:90%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
#endEmoji{font-size:48px;margin-bottom:12px;}
#endTitle{font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px;font-family:'Quicksand',sans-serif;}
#endScore{font-size:18px;font-weight:700;color:var(--green);margin-bottom:24px;}
.btn{display:inline-block;padding:12px 28px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:none;margin:4px;text-decoration:none;}
.btn-play{background:linear-gradient(135deg,#34D399,var(--green));color:white;}
.btn-home{background:var(--green-light);color:var(--green-dark);}

@media(max-width:768px){
  .game-layout{grid-template-columns:1fr;}
  .sidebar{flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid #E2E8F0;padding:12px;}
  .header-nav{display:none;}
}
</style>
</head>
<body>
<script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav">
    <a href="../../index.html">All Games</a>
    <a href="#">Leaderboard</a>
    <a href="../../index.html" class="header-cta">Play Now</a>
  </nav>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">&#8617; Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-value" style="font-size:18px;">Commander</div>
      <div class="level-progress-track"><div class="level-progress-fill" id="progressBar"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Grade</div>
      <div class="stat-value" style="font-size:18px;color:var(--text);">P4</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Topic</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;line-height:1.5;">Reading &amp; Plotting Coordinates</div>
    </div>
  </div>

  <div class="game-canvas">
    <div class="canvas-inner">
      <div class="game-card" id="gameCard">
        <div class="round-label">MISSION <span id="roundLabel">1</span> OF 10</div>
        <div style="text-align:center;margin-bottom:10px;">
          <span class="mode-badge mode-a" id="modeBadge">READ COORDINATES</span>
        </div>
        <div class="question-text" id="questionText">Loading mission...</div>
        <div class="click-instruction" id="clickInstruction" style="display:none;">Click the correct point on the grid</div>
        <div class="grid-wrapper">
          <svg id="coordGrid" class="coord-grid" width="360" height="360" viewBox="-30 -10 360 360"></svg>
        </div>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>
  </div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div id="endEmoji">🎉</div>
    <div id="endTitle">Game Over!</div>
    <div id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">&#8592; All Games</a>
  </div>
</div>

<script>
const COORDS = [
  {x:2,y:3},{x:5,y:7},{x:8,y:2},{x:4,y:6},{x:1,y:9},
  {x:7,y:4},{x:3,y:8},{x:6,y:1},{x:9,y:5},{x:2,y:7}
];

const CELL = 30;
const GRID_ORIGIN_X = 20;
const GRID_ORIGIN_Y = 310;

let currentRound = 0;
let score = 0;
let answeredThisRound = false;

function drawGrid(svg, pointX = null, pointY = null, showClick = false) {
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';

  const bg = document.createElementNS(ns,'rect');
  bg.setAttribute('x', GRID_ORIGIN_X - 5);
  bg.setAttribute('y', GRID_ORIGIN_Y - 10 * CELL - 5);
  bg.setAttribute('width', 10 * CELL + 10);
  bg.setAttribute('height', 10 * CELL + 10);
  bg.setAttribute('fill','#F0FDF4');
  bg.setAttribute('rx','4');
  svg.appendChild(bg);

  for (let i = 0; i <= 10; i++) {
    const vl = document.createElementNS(ns,'line');
    vl.setAttribute('x1', GRID_ORIGIN_X + i*CELL);
    vl.setAttribute('y1', GRID_ORIGIN_Y - 0);
    vl.setAttribute('x2', GRID_ORIGIN_X + i*CELL);
    vl.setAttribute('y2', GRID_ORIGIN_Y - 10*CELL);
    vl.setAttribute('stroke', i===0?'#059669':'rgba(0,0,0,0.10)');
    vl.setAttribute('stroke-width', i===0?'2':'1');
    svg.appendChild(vl);

    const hl = document.createElementNS(ns,'line');
    hl.setAttribute('x1', GRID_ORIGIN_X);
    hl.setAttribute('y1', GRID_ORIGIN_Y - i*CELL);
    hl.setAttribute('x2', GRID_ORIGIN_X + 10*CELL);
    hl.setAttribute('y2', GRID_ORIGIN_Y - i*CELL);
    hl.setAttribute('stroke', i===0?'#059669':'rgba(0,0,0,0.10)');
    hl.setAttribute('stroke-width', i===0?'2':'1');
    svg.appendChild(hl);

    if (i > 0) {
      const tx = document.createElementNS(ns,'text');
      tx.setAttribute('x', GRID_ORIGIN_X + i*CELL);
      tx.setAttribute('y', GRID_ORIGIN_Y + 14);
      tx.setAttribute('text-anchor','middle');
      tx.setAttribute('font-size','10');
      tx.setAttribute('fill','#64748B');
      tx.textContent = i;
      svg.appendChild(tx);

      const ty = document.createElementNS(ns,'text');
      ty.setAttribute('x', GRID_ORIGIN_X - 12);
      ty.setAttribute('y', GRID_ORIGIN_Y - i*CELL + 4);
      ty.setAttribute('text-anchor','middle');
      ty.setAttribute('font-size','10');
      ty.setAttribute('fill','#64748B');
      ty.textContent = i;
      svg.appendChild(ty);
    }

    if (i===0) {
      const tz = document.createElementNS(ns,'text');
      tz.setAttribute('x', GRID_ORIGIN_X - 10);
      tz.setAttribute('y', GRID_ORIGIN_Y + 12);
      tz.setAttribute('font-size','10');
      tz.setAttribute('fill','#64748B');
      tz.textContent = '0';
      svg.appendChild(tz);
    }
  }

  const lx = document.createElementNS(ns,'text');
  lx.setAttribute('x', GRID_ORIGIN_X + 10*CELL + 10);
  lx.setAttribute('y', GRID_ORIGIN_Y + 4);
  lx.setAttribute('font-size','11');
  lx.setAttribute('fill','#059669');
  lx.setAttribute('font-weight','700');
  lx.textContent = 'x →';
  svg.appendChild(lx);

  const ly = document.createElementNS(ns,'text');
  ly.setAttribute('x', GRID_ORIGIN_X - 10);
  ly.setAttribute('y', GRID_ORIGIN_Y - 10*CELL - 8);
  ly.setAttribute('font-size','11');
  ly.setAttribute('fill','#059669');
  ly.setAttribute('font-weight','700');
  ly.textContent = '↑ y';
  svg.appendChild(ly);

  if (showClick) {
    for (let cx = 1; cx <= 10; cx++) {
      for (let cy = 1; cy <= 10; cy++) {
        const svgX = GRID_ORIGIN_X + cx * CELL;
        const svgY = GRID_ORIGIN_Y - cy * CELL;
        const hitArea = document.createElementNS(ns,'circle');
        hitArea.setAttribute('cx', svgX);
        hitArea.setAttribute('cy', svgY);
        hitArea.setAttribute('r', '14');
        hitArea.setAttribute('fill','transparent');
        hitArea.setAttribute('data-cx', cx);
        hitArea.setAttribute('data-cy', cy);
        hitArea.setAttribute('class','grid-hit');
        hitArea.style.cursor = 'crosshair';
        svg.appendChild(hitArea);
      }
    }
  }

  if (pointX !== null && pointY !== null) {
    const px = GRID_ORIGIN_X + pointX * CELL;
    const py = GRID_ORIGIN_Y - pointY * CELL;

    const glow = document.createElementNS(ns,'circle');
    glow.setAttribute('cx', px);
    glow.setAttribute('cy', py);
    glow.setAttribute('r','10');
    glow.setAttribute('fill','rgba(253,203,110,0.35)');
    svg.appendChild(glow);

    const pt = document.createElementNS(ns,'circle');
    pt.setAttribute('cx', px);
    pt.setAttribute('cy', py);
    pt.setAttribute('r','7');
    pt.setAttribute('fill','#FDCB6E');
    pt.setAttribute('stroke','white');
    pt.setAttribute('stroke-width','2');
    svg.appendChild(pt);

    for (const [dx,dy] of [[-18,0],[18,0],[0,-18],[0,18]]) {
      const ln = document.createElementNS(ns,'line');
      ln.setAttribute('x1', px + dx * 0.3);
      ln.setAttribute('y1', py + dy * 0.3);
      ln.setAttribute('x2', px + dx);
      ln.setAttribute('y2', py + dy);
      ln.setAttribute('stroke','#FDCB6E');
      ln.setAttribute('stroke-width','1.5');
      svg.appendChild(ln);
    }
  }
}

function generateWrongOptions(x, y) {
  const wrongs = new Set();
  wrongs.add(`(${y},${x})`);
  wrongs.add(`(${x+1},${y})`);
  wrongs.add(`(${x},${y+1})`);
  wrongs.add(`(${x-1},${y})`);
  wrongs.add(`(${x},${y-1})`);
  wrongs.add(`(${x+1},${y+1})`);
  wrongs.add(`(${x-1},${y-1})`);
  const correct = `(${x},${y})`;
  const filtered = [...wrongs].filter(w => {
    if (w === correct) return false;
    const m = w.match(/\((\d+),(\d+)\)/);
    if (!m) return false;
    const wx = parseInt(m[1]), wy = parseInt(m[2]);
    return wx >= 0 && wx <= 10 && wy >= 0 && wy <= 10;
  });
  return filtered.slice(0, 3);
}

function renderRound() {
  answeredThisRound = false;
  const roundIdx = currentRound;
  const coord = COORDS[roundIdx];
  const modeA = (roundIdx % 2 === 0);

  document.getElementById('roundLabel').textContent = roundIdx + 1;
  const pct = Math.round((roundIdx / 10) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const modeBadge = document.getElementById('modeBadge');
  const svg = document.getElementById('coordGrid');
  const optionsGrid = document.getElementById('optionsGrid');
  const clickInstruction = document.getElementById('clickInstruction');

  const newSvg = svg.cloneNode(false);
  svg.parentNode.replaceChild(newSvg, svg);
  const activeSvg = document.getElementById('coordGrid');

  if (modeA) {
    modeBadge.textContent = 'READ COORDINATES';
    modeBadge.className = 'mode-badge mode-a';
    document.getElementById('questionText').textContent = `What are the coordinates of the point shown on the grid?`;
    clickInstruction.style.display = 'none';

    drawGrid(activeSvg, coord.x, coord.y, false);
    optionsGrid.style.display = 'grid';

    const correct = `(${coord.x},${coord.y})`;
    const wrongs = generateWrongOptions(coord.x, coord.y);
    const options = [correct, ...wrongs].sort(() => Math.random() - 0.5);

    optionsGrid.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => handleAnswer(btn, opt === correct, correct);
      optionsGrid.appendChild(btn);
    });

  } else {
    modeBadge.textContent = 'PLOT THE POINT';
    modeBadge.className = 'mode-badge mode-b';
    document.getElementById('questionText').textContent = `Click the point at coordinates (${coord.x}, ${coord.y}) on the grid.`;
    clickInstruction.style.display = 'block';
    optionsGrid.style.display = 'none';
    optionsGrid.innerHTML = '';

    drawGrid(activeSvg, null, null, true);

    activeSvg.addEventListener('mousemove', function(e) {
      if (answeredThisRound) return;
      const rect = activeSvg.getBoundingClientRect();
      const scaleX = 330 / rect.width;
      const scaleY = 330 / rect.height;
      const svgX = (e.clientX - rect.left) * scaleX;
      const svgY = (e.clientY - rect.top) * scaleY;
      const nx = Math.round((svgX - GRID_ORIGIN_X) / CELL);
      const ny = Math.round((GRID_ORIGIN_Y - svgY) / CELL);
      if (nx >= 1 && nx <= 10 && ny >= 1 && ny <= 10) {
        activeSvg.style.cursor = 'crosshair';
        const old = activeSvg.querySelector('.hover-dot');
        if (old) old.remove();
        const ns2 = 'http://www.w3.org/2000/svg';
        const hd = document.createElementNS(ns2,'circle');
        hd.setAttribute('cx', GRID_ORIGIN_X + nx*CELL);
        hd.setAttribute('cy', GRID_ORIGIN_Y - ny*CELL);
        hd.setAttribute('r','8');
        hd.setAttribute('fill','rgba(253,203,110,0.4)');
        hd.setAttribute('stroke','#FDCB6E');
        hd.setAttribute('stroke-width','1');
        hd.setAttribute('class','hover-dot');
        hd.style.pointerEvents = 'none';
        activeSvg.appendChild(hd);
      }
    });

    activeSvg.addEventListener('mouseleave', function() {
      const old = activeSvg.querySelector('.hover-dot');
      if (old) old.remove();
    });

    activeSvg.addEventListener('click', function(e) {
      if (answeredThisRound) return;
      const rect = activeSvg.getBoundingClientRect();
      const scaleX = 330 / rect.width;
      const scaleY = 330 / rect.height;
      const svgX = (e.clientX - rect.left) * scaleX;
      const svgY = (e.clientY - rect.top) * scaleY;
      const nx = Math.round((svgX - GRID_ORIGIN_X) / CELL);
      const ny = Math.round((GRID_ORIGIN_Y - svgY) / CELL);

      if (nx < 0 || nx > 10 || ny < 0 || ny > 10) return;

      const isCorrect = (nx === coord.x && ny === coord.y);

      const ns2 = 'http://www.w3.org/2000/svg';
      const old = activeSvg.querySelector('.hover-dot');
      if (old) old.remove();

      const px = GRID_ORIGIN_X + nx*CELL;
      const py = GRID_ORIGIN_Y - ny*CELL;

      const ring = document.createElementNS(ns2,'circle');
      ring.setAttribute('cx', px);
      ring.setAttribute('cy', py);
      ring.setAttribute('r','0');
      ring.setAttribute('fill','none');
      ring.setAttribute('stroke', isCorrect ? '#059669' : '#DC2626');
      ring.setAttribute('stroke-width','2');
      ring.setAttribute('class','crosshair-ring');
      activeSvg.appendChild(ring);

      const dot = document.createElementNS(ns2,'circle');
      dot.setAttribute('cx', px);
      dot.setAttribute('cy', py);
      dot.setAttribute('r','7');
      dot.setAttribute('fill', isCorrect ? '#059669' : '#DC2626');
      dot.setAttribute('stroke','white');
      dot.setAttribute('stroke-width','2');
      activeSvg.appendChild(dot);

      if (!isCorrect) {
        const cpx = GRID_ORIGIN_X + coord.x*CELL;
        const cpy = GRID_ORIGIN_Y - coord.y*CELL;
        const cdot = document.createElementNS(ns2,'circle');
        cdot.setAttribute('cx', cpx);
        cdot.setAttribute('cy', cpy);
        cdot.setAttribute('r','7');
        cdot.setAttribute('fill','#FDCB6E');
        cdot.setAttribute('stroke','white');
        cdot.setAttribute('stroke-width','2');
        activeSvg.appendChild(cdot);
        const cLabel = document.createElementNS(ns2,'text');
        cLabel.setAttribute('x', cpx + 10);
        cLabel.setAttribute('y', cpy - 8);
        cLabel.setAttribute('font-size','10');
        cLabel.setAttribute('fill','#FDCB6E');
        cLabel.textContent = `(${coord.x},${coord.y})`;
        activeSvg.appendChild(cLabel);
      }

      handleGridClick(isCorrect, `(${coord.x},${coord.y})`);
    });
  }
}

function handleAnswer(btn, isCorrect, correctAnswer) {
  if (answeredThisRound) return;
  answeredThisRound = true;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => { b.disabled = true; });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    fb.textContent = '✅ Correct! Well done, Commander!';
    fb.className = 'feedback correct';
    document.getElementById('score').textContent = score;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => { if (b.textContent === correctAnswer) b.classList.add('correct'); });
    fb.textContent = `❌ The correct coordinates are ${correctAnswer}.`;
    fb.className = 'feedback wrong';
  }

  setTimeout(advanceRound, 1300);
}

function handleGridClick(isCorrect, correctAnswer) {
  if (answeredThisRound) return;
  answeredThisRound = true;

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    score++;
    fb.textContent = '✅ Direct hit! Perfect aim!';
    fb.className = 'feedback correct';
    document.getElementById('score').textContent = score;
  } else {
    fb.textContent = `❌ Missed! The correct point was ${correctAnswer}.`;
    fb.className = 'feedback wrong';
  }

  setTimeout(advanceRound, 1300);
}

function advanceRound() {
  currentRound++;
  if (currentRound >= 10) {
    showEndScreen();
  } else {
    renderRound();
  }
}

function showEndScreen() {
  document.getElementById('progressBar').style.width = '100%';
  const emoji = score >= 9 ? '🌟' : score >= 7 ? '😊' : '💪';
  const title = score >= 9 ? 'Brilliant!' : score >= 7 ? 'Well Done!' : 'Keep Trying!';
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = score + ' / 10 correct';
  document.getElementById('endScreen').classList.add('show');
}

function restartGame() {
  currentRound = 0;
  score = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('endScreen').classList.remove('show');
  renderRound();
}

renderRound();
</script>
</body>
</html>
