<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Angle Adventurer – MathMunch</title>
<style>
  :root {
    --green:#10B981;--green-dark:#059669;--green-light:#ECFDF5;
    --blue:#3B82F6;--orange:#F97316;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#D1FAE5;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3,.logo-text,.stat-value,.game-title-text{font-family:'Quicksand',system-ui,sans-serif;}

  .site-header{background:var(--white);border-bottom:1px solid var(--outline);position:sticky;top:0;z-index:100;}
  .site-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:38px;height:38px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 2px 0 var(--green-dark);}
  .logo-text{font-size:1.25rem;font-weight:700;color:var(--green);}
  .site-nav{display:flex;gap:4px;}
  .site-nav a{text-decoration:none;color:var(--text-mid);font-weight:600;font-size:.9rem;padding:8px 16px;border-radius:9999px;transition:.15s;}
  .site-nav a:hover,.site-nav a.active{background:var(--green-light);color:var(--green);}
  .btn-play-now{background:var(--green);color:white;padding:10px 22px;border-radius:9999px;font-weight:700;font-size:.9rem;text-decoration:none;box-shadow:0 3px 0 var(--green-dark);transition:.1s;}
  .btn-play-now:hover{transform:translateY(-1px);}
  .btn-play-now:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dark);}

  .game-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;padding:20px 24px 24px;max-width:1200px;margin:0 auto;flex:1;align-items:start;}

  .sidebar{display:flex;flex-direction:column;gap:12px;}
  .exit-btn{background:var(--white);border:2px solid var(--outline);border-radius:9999px;padding:12px 20px;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:600;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 0 var(--outline);transition:.1s;}
  .exit-btn:hover{border-color:var(--green);color:var(--green);}
  .exit-btn:active{transform:translateY(1px);box-shadow:none;}
  .stat-card{background:var(--white);border:1px solid var(--outline);border-radius:24px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .stat-label{font-family:'Lexend',sans-serif;font-size:.7rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .stat-value{font-size:2.2rem;font-weight:700;color:var(--green);line-height:1;}
  .stat-level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .level-icon{font-size:1.4rem;}
  .stat-value-sm{font-size:1.4rem;font-weight:700;color:var(--green);}
  .level-progress{height:10px;background:var(--outline);border-radius:9999px;overflow:hidden;}
  .level-progress-fill{height:100%;background:var(--green);border-radius:9999px;width:0%;transition:width .4s ease;}
  .hearts{display:flex;gap:6px;font-size:1.5rem;}
  .game-info-title{font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
  .level-pill{display:inline-block;background:var(--green);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:9999px;}

  .game-canvas{background:var(--canvas);border-radius:24px;padding:32px;position:relative;overflow:hidden;min-height:520px;border:1px solid rgba(16,185,129,.15);}
  .game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
  .game-canvas > *{position:relative;z-index:1;}

  .end-screen{display:none;position:fixed;inset:0;background:rgba(25,28,30,.8);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;}
  .end-screen.show{display:flex;}
  .end-card{background:white;border-radius:28px;padding:44px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:9999px;border:none;cursor:pointer;font-family:'Lexend',sans-serif;font-size:1rem;font-weight:700;transition:.1s;text-decoration:none;margin:0 6px;}
  .btn-play{background:var(--green);color:white;box-shadow:0 3px 0 var(--green-dark);}
  .btn-play:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dark);}
  .btn-home{background:var(--bg);color:var(--text-mid);border:2px solid var(--outline);}

  @media(max-width:768px){
    .game-layout{grid-template-columns:1fr;padding:16px;}
    .sidebar{flex-direction:row;flex-wrap:wrap;}
    .stat-card{flex:1;min-width:140px;}
    .site-nav{display:none;}
  }

  /* Game-specific CSS */
  .question-card{background:rgba(255,255,255,0.85);border-radius:16px;padding:24px;margin-bottom:20px;text-align:center;border:1px solid rgba(16,185,129,0.2);}
  .question-label{font-size:13px;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .question-text{font-size:18px;font-weight:700;color:var(--text);margin-bottom:20px;}
  .type-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:800;margin-bottom:12px;letter-spacing:0.5px;}
  .tag-acute{background:#D1FAE5;color:#10B981;border:1px solid #10B981;}
  .tag-right{background:#DBEAFE;color:#3B82F6;border:1px solid #3B82F6;}
  .tag-obtuse{background:#FEF3C7;color:#D97706;border:1px solid #D97706;}
  .tag-reflex{background:#EDE9FE;color:#7C3AED;border:1px solid #7C3AED;}
  .tag-name{background:var(--green-light);color:#059669;border:1px solid #059669;}
  .tag-estimate{background:#D1FAE5;color:#10B981;border:1px solid #10B981;}
  .tag-compare{background:#FEF3C7;color:#D97706;border:1px solid #D97706;}
  .answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:460px;margin:0 auto;}
  .btn-answer{padding:14px 20px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:2px solid rgba(16,185,129,0.3);background:white;color:var(--text);transition:all 0.2s;font-family:'Lexend',sans-serif;}
  .btn-answer:hover:not(:disabled){background:var(--green-light);border-color:var(--green);transform:translateY(-2px);}
  .btn-answer.correct{background:#E8FFF3;border-color:#00B894;color:#00B894;}
  .btn-answer.wrong{background:#FFE8EC;border-color:#FF4757;color:#FF4757;}
  .btn-answer:disabled{cursor:not-allowed;opacity:0.7;}
  .compare-wrap{display:flex;justify-content:center;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:20px;}
  .angle-choice{background:rgba(255,255,255,0.8);border:2px solid rgba(16,185,129,0.3);border-radius:16px;padding:16px;cursor:pointer;transition:all 0.2s;text-align:center;}
  .angle-choice:hover:not(.disabled){border-color:var(--green);background:white;transform:translateY(-2px);}
  .angle-choice.correct{border-color:#00B894;background:#E8FFF3;}
  .angle-choice.wrong{border-color:#FF4757;background:#FFE8EC;}
  .angle-choice.disabled{cursor:not-allowed;}
  .angle-choice-label{font-size:14px;font-weight:700;color:var(--text-mid);margin-top:8px;}
  .feedback-bar{padding:12px 20px;border-radius:12px;font-weight:700;font-size:15px;text-align:center;margin-top:12px;display:none;}
  .feedback-bar.show{display:block;}
  .feedback-bar.correct-fb{background:#E8FFF3;color:#00B894;border:2px solid #00B894;}
  .feedback-bar.wrong-fb{background:#FFE8EC;color:#FF4757;border:2px solid #FF4757;}
  .type-legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <div class="site-header-inner">
    <a href="../../index.html" class="logo">
      <div class="logo-icon">🔷</div>
      <span class="logo-text">MathMunch</span>
    </a>
    <nav class="site-nav">
      <a href="../../index.html#games" class="active">Games</a>
      <a href="#">Badges</a>
      <a href="#">Progress</a>
    </nav>
    <a href="../../index.html" class="btn-play-now">Play Now</a>
  </div>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>

    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Adventurer</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Angle Adventurer</div>
      <span class="level-pill">P4</span>
    </div>
  </div>

  <div class="game-canvas">
    <div class="question-card" id="questionCard">
      <div class="question-label" id="roundLabel">Round 1 of 10</div>
      <div id="typeTag"></div>
      <div class="question-text" id="questionText"></div>
      <div id="gameContent"></div>
      <div class="feedback-bar" id="feedbackBar"></div>
    </div>
  </div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div style="font-size:3rem;margin-bottom:12px;" id="endEmoji">🎉</div>
    <div style="font-family:'Quicksand',sans-serif;font-size:1.9rem;font-weight:700;color:var(--text);margin-bottom:8px;" id="endTitle">Game Over!</div>
    <div style="font-size:1rem;color:var(--text-mid);margin-bottom:28px;" id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">← All Games</a>
  </div>
</div>

<script>
function drawAngleSVG(deg, showArc=true, size=200){
  const cx=100, cy=110, len=110;
  const rad = deg * Math.PI / 180;
  const x1 = cx + len;
  const y1 = cy;
  const x2 = cx + len * Math.cos(-rad);
  const y2 = cy + len * Math.sin(-rad);

  let arcPath = '';
  let rightAngleBox = '';

  if(deg === 90){
    const bSize = 18;
    rightAngleBox = `<rect x="${cx}" y="${cy-bSize}" width="${bSize}" height="${bSize}" fill="none" stroke="#FDCB6E" stroke-width="2.5"/>`;
  } else if(showArc){
    const r = 38;
    const arcX = cx + r * Math.cos(-rad);
    const arcY = cy + r * Math.sin(-rad);
    const largeArc = deg > 180 ? 1 : 0;
    const sweep = 0;
    arcPath = `<path d="M ${cx+r},${cy} A ${r},${r} 0 ${largeArc},${sweep} ${arcX},${arcY}" fill="none" stroke="#FDCB6E" stroke-width="2.5" stroke-linecap="round"/>`;
    const midDeg = deg/2;
    const labelR = r + 16;
    const lx = cx + labelR * Math.cos(-midDeg*Math.PI/180);
    const ly = cy + labelR * Math.sin(-midDeg*Math.PI/180);
    arcPath += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="800" fill="#FDCB6E">?°</text>`;
  }

  return `<svg width="${size}" height="${size}" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <line x1="${cx}" y1="${cy}" x2="${x1}" y2="${y1}" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
    <line x1="${cx}" y1="${cy}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#34D399"/>
    ${rightAngleBox}
    ${arcPath}
  </svg>`;
}

function getAngleType(deg){
  if(deg > 0 && deg < 90) return 'Acute';
  if(deg === 90) return 'Right';
  if(deg > 90 && deg < 180) return 'Obtuse';
  return 'Reflex';
}

function angleTypeTag(type){
  const map = {Acute:'tag-acute',Right:'tag-right',Obtuse:'tag-obtuse',Reflex:'tag-reflex'};
  const icons = {Acute:'↗',Right:'⊾',Obtuse:'↖',Reflex:'↩'};
  return `<span class="type-tag ${map[type]}">${icons[type]} ${type}</span>`;
}

const rounds = [
  { type:'A', deg:45, question:'What type of angle is this?', answer:'Acute', options:['Acute','Right','Obtuse','Reflex'], tagHtml:'<span class="type-tag tag-name">🔍 Name the Angle</span>' },
  { type:'A', deg:90, question:'What type of angle is this?', answer:'Right', options:['Acute','Right','Obtuse','Reflex'], tagHtml:'<span class="type-tag tag-name">🔍 Name the Angle</span>' },
  { type:'A', deg:120, question:'What type of angle is this?', answer:'Obtuse', options:['Acute','Right','Obtuse','Reflex'], tagHtml:'<span class="type-tag tag-name">🔍 Name the Angle</span>' },
  { type:'B', deg:65, question:'Which of these is closest to the angle shown?', answer:'65°', options:['30°','45°','65°','80°'], tagHtml:'<span class="type-tag tag-estimate">📐 Estimate the Angle</span>' },
  { type:'A', deg:270, question:'What type of angle is this?', answer:'Reflex', options:['Acute','Right','Obtuse','Reflex'], tagHtml:'<span class="type-tag tag-name">🔍 Name the Angle</span>' },
  { type:'C', question:'Which angle is LARGER?', angleA:{deg:40, label:'Angle A'}, angleB:{deg:130, label:'Angle B'}, answer:'B', tagHtml:'<span class="type-tag tag-compare">⚖️ Compare Angles</span>' },
  { type:'B', deg:150, question:'Which of these is closest to the angle shown?', answer:'150°', options:['90°','120°','150°','180°'], tagHtml:'<span class="type-tag tag-estimate">📐 Estimate the Angle</span>' },
  { type:'A', deg:30, question:'What type of angle is this?', answer:'Acute', options:['Acute','Right','Obtuse','Reflex'], tagHtml:'<span class="type-tag tag-name">🔍 Name the Angle</span>' },
  { type:'C', question:'Which angle is LARGER?', angleA:{deg:90, label:'Angle A (90°)'}, angleB:{deg:89, label:'Angle B (89°)'}, answer:'A', tagHtml:'<span class="type-tag tag-compare">⚖️ Compare Angles</span>' },
  { type:'B', deg:210, question:'Which of these is closest to the angle shown?', answer:'210°', options:['90°','180°','210°','360°'], tagHtml:'<span class="type-tag tag-estimate">📐 Estimate the Angle</span>' }
];

let currentRound = 0;
let score = 0;
let answered = false;

function renderRound(){
  const r = rounds[currentRound];
  answered = false;

  document.getElementById('roundLabel').textContent = `Round ${currentRound+1} of 10`;
  const pct = Math.round(currentRound/10*100);
  document.getElementById('progressBar').style.width = pct+'%';

  document.getElementById('typeTag').innerHTML = r.tagHtml;
  document.getElementById('questionText').textContent = r.question;

  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';

  if(r.type === 'A' || r.type === 'B'){
    renderTypeAB(r);
  } else {
    renderTypeC(r);
  }
}

function renderTypeAB(r){
  const content = document.getElementById('gameContent');

  let legend = '';
  if(r.type === 'A'){
    legend = `<div class="type-legend">
      <span class="type-tag tag-acute">↗ Acute (0–90°)</span>
      <span class="type-tag tag-right">⊾ Right (90°)</span>
      <span class="type-tag tag-obtuse">↖ Obtuse (90–180°)</span>
      <span class="type-tag tag-reflex">↩ Reflex (180–360°)</span>
    </div>`;
  }

  content.innerHTML = `
    ${legend}
    <div style="display:flex;justify-content:center;margin-bottom:16px">
      ${drawAngleSVG(r.deg)}
    </div>
    <div class="answers-grid">
      ${r.options.map(o=>`<button class="btn-answer" onclick="answerAB('${o}')">${o}</button>`).join('')}
    </div>`;
}

function answerAB(chosen){
  if(answered) return;
  answered = true;
  const r = rounds[currentRound];

  const btns = document.querySelectorAll('.btn-answer');
  btns.forEach(b=>{
    b.disabled = true;
    const val = b.textContent.trim();
    if(val === r.answer) b.classList.add('correct');
    else if(val === chosen) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedbackBar');
  if(chosen === r.answer){
    score++;
    document.getElementById('score').textContent = score;
    const typeLabel = r.type === 'A' ? angleTypeTag(r.answer) : '';
    fb.innerHTML = `✓ Correct! ${r.type==='A'?'It is a '+r.answer+' angle. '+typeLabel:r.deg+'° is closest to '+r.answer}`;
    fb.className = 'feedback-bar show correct-fb';
  } else {
    fb.innerHTML = `✗ Not quite! The answer is <strong>${r.answer}</strong>.${r.type==='A'?' '+r.deg+'° is '+r.answer.toLowerCase()+'.' : ''}`;
    fb.className = 'feedback-bar show wrong-fb';
  }

  setTimeout(nextRound, 1800);
}

function renderTypeC(r){
  const content = document.getElementById('gameContent');
  content.innerHTML = `
    <div class="compare-wrap">
      <div class="angle-choice" id="choiceA" onclick="answerC('A')">
        ${drawAngleSVG(r.angleA.deg, true, 170)}
        <div class="angle-choice-label">${r.angleA.label}</div>
      </div>
      <div style="font-size:24px;font-weight:900;color:var(--text-mid)">vs</div>
      <div class="angle-choice" id="choiceB" onclick="answerC('B')">
        ${drawAngleSVG(r.angleB.deg, true, 170)}
        <div class="angle-choice-label">${r.angleB.label}</div>
      </div>
    </div>`;
}

function answerC(chosen){
  if(answered) return;
  answered = true;
  const r = rounds[currentRound];

  const a = document.getElementById('choiceA');
  const b = document.getElementById('choiceB');
  a.classList.add('disabled');
  b.classList.add('disabled');
  a.onclick = null; b.onclick = null;

  if(r.answer === 'A') a.classList.add('correct');
  else a.classList.add('wrong');
  if(r.answer === 'B') b.classList.add('correct');
  else if(chosen === 'B') b.classList.add('wrong');

  const fb = document.getElementById('feedbackBar');
  const winner = r.answer === 'A' ? r.angleA : r.angleB;
  if(chosen === r.answer){
    score++;
    document.getElementById('score').textContent = score;
    fb.textContent = `✓ Correct! ${winner.label} is the larger angle.`;
    fb.className = 'feedback-bar show correct-fb';
  } else {
    fb.textContent = `✗ Not quite! ${winner.label} (${r.answer==='A'?r.angleA.deg:r.angleB.deg}°) is larger.`;
    fb.className = 'feedback-bar show wrong-fb';
  }

  setTimeout(nextRound, 1800);
}

function nextRound(){
  currentRound++;
  if(currentRound >= 10) showEndScreen();
  else renderRound();
}

function showEndScreen(){
  document.getElementById('progressBar').style.width = '100%';
  let emoji, title;
  if(score >= 9){ emoji='🌟'; title='Brilliant!'; }
  else if(score >= 7){ emoji='😊'; title='Well Done!'; }
  else { emoji='💪'; title='Keep Trying!'; }
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `You scored ${score} out of 10`;
  document.getElementById('endScreen').classList.add('show');
}

function restartGame(){
  currentRound = 0; score = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('endScreen').classList.remove('show');
  renderRound();
}

renderRound();
</script>
</body>
</html>
