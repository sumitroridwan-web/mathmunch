<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Perimeter Patrol – MathMunch</title>
<style>
:root {
  --green:#10B981; --green-dark:#059669; --green-light:#ECFDF5;
  --canvas:#D1FAE5; --bg:#F8FAFC; --white:#FFFFFF;
  --text:#1E293B; --text2:#64748B; --shadow:0 4px 20px rgba(16,185,129,0.12);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

.site-header{background:var(--white);box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:20px;color:var(--green);text-decoration:none;display:flex;align-items:center;gap:8px;}
.header-nav{display:flex;align-items:center;gap:16px;}
.header-nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;}
.header-nav a:hover{color:var(--green);}
.header-cta{background:var(--green);color:white;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;text-decoration:none;}

.game-layout{display:grid;grid-template-columns:280px 1fr;flex:1;min-height:0;}

.sidebar{background:var(--white);border-right:1px solid #E2E8F0;padding:24px 20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.exit-btn{display:flex;align-items:center;gap:8px;background:var(--green-light);color:var(--green-dark);border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%;}
.exit-btn:hover{background:#D1FAE5;}
.stat-card{background:var(--bg);border-radius:12px;padding:16px;border:1px solid #E2E8F0;}
.stat-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.stat-value{font-family:'Quicksand',sans-serif;font-size:28px;font-weight:700;color:var(--green);}
.level-progress-track{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;margin-top:8px;}
.level-progress-fill{height:100%;background:linear-gradient(90deg,#34D399,var(--green));border-radius:99px;transition:width 0.4s ease;width:0%;}

.game-canvas{background:var(--canvas);position:relative;overflow-y:auto;padding:32px 28px;}
.game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#6EE7B7 1px,transparent 1px);background-size:24px 24px;opacity:0.4;pointer-events:none;}
.canvas-inner{position:relative;z-index:1;}

/* Game-specific CSS */
.question-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow);padding:28px 24px;margin-bottom:20px;text-align:center;}
.question-label{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.question-text{font-size:18px;font-weight:700;color:var(--text);margin-bottom:20px;}
.patrol-badge{font-size:28px;margin-bottom:6px;}
.grid-wrap{display:flex;justify-content:center;margin:0 auto 20px;overflow-x:auto;}
.shape-grid{display:inline-grid;background:#F0FDF4;border:2px solid #A7F3D0;border-radius:8px;position:relative;}
.gcell{width:30px;height:30px;border:1px solid #D1FAE5;position:relative;}
.gcell.shape-fill{background:rgba(16,185,129,0.15);border-color:#6EE7B7;}
.gcell.shape-border-top{border-top:3px solid var(--green);}
.gcell.shape-border-bottom{border-bottom:3px solid var(--green);}
.gcell.shape-border-left{border-left:3px solid var(--green);}
.gcell.shape-border-right{border-right:3px solid var(--green);}
.shape-label-display{position:relative;display:inline-block;margin:0 auto 20px;}
.rect-visual{background:#D1FAE5;border:3px solid #34D399;border-radius:6px;position:relative;display:inline-flex;align-items:center;justify-content:center;}
.side-label{position:absolute;font-size:13px;font-weight:700;color:var(--text2);}
.side-top{top:-22px;left:50%;transform:translateX(-50%);}
.side-bottom{bottom:-22px;left:50%;transform:translateX(-50%);}
.side-left{left:-28px;top:50%;transform:translateY(-50%);}
.side-right{right:-28px;top:50%;transform:translateY(-50%);}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:420px;margin:0 auto;}
.btn-answer{padding:14px 20px;border-radius:12px;font-weight:700;font-size:18px;cursor:pointer;border:2px solid #A7F3D0;background:var(--white);color:var(--text);transition:all 0.2s;}
.btn-answer:hover:not(:disabled){background:var(--green-light);border-color:var(--green);transform:translateY(-2px);}
.btn-answer.correct{background:#D1FAE5;border-color:var(--green-dark);color:var(--green-dark);}
.btn-answer.wrong{background:#FEE2E2;border-color:#DC2626;color:#DC2626;}
.btn-answer:disabled{cursor:not-allowed;opacity:0.7;}
.feedback-bar{padding:12px 20px;border-radius:12px;font-weight:700;font-size:15px;text-align:center;margin-top:12px;display:none;}
.feedback-bar.show{display:block;}
.feedback-bar.correct-fb{background:#D1FAE5;color:var(--green-dark);border:2px solid var(--green);}
.feedback-bar.wrong-fb{background:#FEE2E2;color:#DC2626;border:2px solid #DC2626;}
.tape-wrap{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;}
.tape{background:linear-gradient(90deg,#FDCB6E,#F0A500);border-radius:6px;padding:6px 16px;font-weight:900;font-size:15px;color:#1E1E2E;display:flex;align-items:center;gap:6px;}
.hex-display{display:flex;justify-content:center;margin-bottom:16px;}

.end-screen{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200;}
.end-screen.show{display:flex;}
.end-card{background:var(--white);border-radius:24px;padding:40px 36px;max-width:420px;width:90%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
#endEmoji{font-size:48px;margin-bottom:12px;}
#endTitle{font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px;font-family:'Quicksand',sans-serif;}
#endScore{font-size:18px;font-weight:700;color:var(--green);margin-bottom:24px;}
.btn{display:inline-block;padding:12px 28px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:none;margin:4px;text-decoration:none;}
.btn-play{background:linear-gradient(135deg,#34D399,var(--green));color:white;}
.btn-home{background:var(--green-light);color:var(--green-dark);}

@media(max-width:768px){
  .game-layout{grid-template-columns:1fr;}
  .sidebar{flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid #E2E8F0;padding:12px;}
  .header-nav{display:none;}
}
</style>
</head>
<body>
<script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav">
    <a href="../../index.html">All Games</a>
    <a href="#">Leaderboard</a>
    <a href="../../index.html" class="header-cta">Play Now</a>
  </nav>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">&#8617; Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-value" style="font-size:18px;">Officer</div>
      <div class="level-progress-track"><div class="level-progress-fill" id="progressBar"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Grade</div>
      <div class="stat-value" style="font-size:18px;color:var(--text);">P3</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Topic</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;line-height:1.5;">Perimeter of 2D Shapes</div>
    </div>
  </div>

  <div class="game-canvas">
    <div class="canvas-inner">
      <div class="question-card" id="questionCard">
        <div class="question-label" id="roundLabel">Round 1 of 10</div>
        <div class="patrol-badge">🏅</div>
        <div class="question-text" id="questionText"></div>
        <div id="gameContent"></div>
        <div class="feedback-bar" id="feedbackBar"></div>
      </div>
    </div>
  </div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div id="endEmoji">🎉</div>
    <div id="endTitle">Game Over!</div>
    <div id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">&#8592; All Games</a>
  </div>
</div>

<script>
function buildGridShape(cells, labels, cols=10, rows=6){
  const filled = new Set(cells.map(([r,c])=>`${r},${c}`));
  let html = `<div class="shape-grid" style="grid-template-columns:repeat(${cols},30px);grid-template-rows:repeat(${rows},30px)">`;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const k = `${r},${c}`;
      if(filled.has(k)){
        let cls = 'gcell shape-fill';
        if(!filled.has(`${r-1},${c}`)) cls += ' shape-border-top';
        if(!filled.has(`${r+1},${c}`)) cls += ' shape-border-bottom';
        if(!filled.has(`${r},${c-1}`)) cls += ' shape-border-left';
        if(!filled.has(`${r},${c+1}`)) cls += ' shape-border-right';
        html += `<div class="${cls}"></div>`;
      } else {
        html += `<div class="gcell"></div>`;
      }
    }
  }
  html += '</div>';
  if(labels){
    html = `<div style="position:relative;display:inline-block;padding:30px">${html}${labels}</div>`;
  }
  return html;
}

function rectLabel(cells, cols, rows, wLabel, hLabel){
  const gridW = cols*30, gridH = rows*30;
  return `<div style="position:relative;display:inline-block;padding:30px">
    <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);font-weight:800;font-size:13px;color:var(--text2)">${wLabel}</div>
    <div style="position:absolute;left:4px;top:50%;transform:translateY(-50%) rotate(-90deg);font-weight:800;font-size:13px;color:var(--text2)">${hLabel}</div>
    ${buildGridShape(cells,'',cols,rows)}
  </div>`;
}

function rect(startR, startC, w, h){
  const cells=[];
  for(let r=startR;r<startR+h;r++) for(let c=startC;c<startC+w;c++) cells.push([r,c]);
  return cells;
}

const rounds = [
  { question:'What is the perimeter of this rectangle? (Each square = 1 cm)', hint:'Count all 4 sides!', answer:10, options:[8,10,12,14],
    render(){ const cells = rect(1,1,3,2); return `<div class="tape-wrap"><div class="tape">📏 Each square = 1 cm</div></div><div class="grid-wrap">${rectLabel(cells,7,5,'3 cm','2 cm')}</div>`; } },
  { question:'What is the perimeter of this square? (Each square = 1 cm)', hint:'All sides are equal!', answer:16, options:[12,14,16,20],
    render(){ const cells = rect(0,1,4,4); return `<div class="tape-wrap"><div class="tape">📏 Each square = 1 cm</div></div><div class="grid-wrap">${rectLabel(cells,7,5,'4 cm','4 cm')}</div>`; } },
  { question:'What is the perimeter of this L-shape? (Each square = 1 cm)', hint:'Walk all the way around!', answer:14, options:[12,14,16,18],
    render(){ const cells = [[0,0],[0,1],[0,2],[0,3],[1,0],[2,0],[3,0],[3,1],[3,2]]; return `<div class="tape-wrap"><div class="tape">📏 Each square = 1 cm</div></div><div class="grid-wrap">${buildGridShape(cells,'',6,5)}</div>`; } },
  { question:'What is the perimeter of this rectangle? (Each square = 1 cm)', hint:'Add up all 4 sides!', answer:16, options:[14,15,16,18],
    render(){ const cells = rect(1,0,5,3); return `<div class="tape-wrap"><div class="tape">📏 Each square = 1 cm</div></div><div class="grid-wrap">${rectLabel(cells,7,6,'5 cm','3 cm')}</div>`; } },
  { question:'What is the perimeter of this square? (Each square = 1 cm)', hint:'Perimeter = 4 × side!', answer:12, options:[9,10,12,15],
    render(){ const cells = rect(1,1,3,3); return `<div class="tape-wrap"><div class="tape">📏 Each square = 1 cm</div></div><div class="grid-wrap">${rectLabel(cells,6,6,'3 cm','3 cm')}</div>`; } },
  { question:'What is the perimeter of this T-shape? (Each square = 1 cm)', hint:'Count every outside edge!', answer:16, options:[14,16,18,20],
    render(){ const cells = [[0,0],[0,1],[0,2],[0,3],[0,4],[1,2],[2,2],[3,2]]; return `<div class="tape-wrap"><div class="tape">📏 Each square = 1 cm</div></div><div class="grid-wrap">${buildGridShape(cells,'',7,5)}</div>`; } },
  { question:'A rectangle has a length of 7 cm and width of 4 cm. What is its perimeter?', hint:'Perimeter = 2 × (length + width)', answer:22, options:[20,21,22,24],
    render(){ return `<div style="display:flex;justify-content:center;margin-bottom:20px"><div style="position:relative;padding:36px 50px"><div class="rect-visual" style="width:175px;height:100px;font-size:13px;color:var(--text2);font-weight:700">Rectangle</div><span class="side-label side-top">7 cm</span><span class="side-label side-bottom">7 cm</span><span class="side-label side-left">4 cm</span><span class="side-label side-right">4 cm</span></div></div><div style="background:#FEF9C3;border:2px solid #FDCB6E;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;color:#92400E;margin-bottom:16px">📐 Formula: P = 2 × (l + w)</div>`; } },
  { question:'A regular hexagon has all sides equal to 3 cm. What is its perimeter?', hint:'A hexagon has 6 equal sides!', answer:18, options:[15,16,18,21],
    render(){
      const pts = [];
      for(let i=0;i<6;i++){ const a = Math.PI/2 + i*Math.PI/3; pts.push([100+70*Math.cos(a), 105+70*Math.sin(a)]); }
      const ptStr = pts.map(p=>p.join(',')).join(' ');
      return `<div class="hex-display"><svg width="200" height="210" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg"><polygon points="${ptStr}" fill="#D1FAE5" stroke="#34D399" stroke-width="3"/><text x="138" y="68" font-size="12" font-weight="800" fill="#525270" text-anchor="middle">3 cm</text><text x="163" y="105" font-size="12" font-weight="800" fill="#525270" text-anchor="start">3 cm</text></svg></div><div style="background:#FEF9C3;border:2px solid #FDCB6E;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;color:#92400E;margin-bottom:16px">💡 All 6 sides = 3 cm each</div>`; } },
  { question:'What is the perimeter of this shape? (Each square = 1 cm)', hint:'Follow every edge on the outside!', answer:18, options:[14,16,18,20],
    render(){ const cells = [[0,0],[0,1],[0,2],[0,3],[0,4],[1,0],[1,1],[2,0],[2,1],[3,0],[3,1],[4,0],[4,1],[4,2],[4,3],[4,4]]; return `<div class="tape-wrap"><div class="tape">📏 Each square = 1 cm</div></div><div class="grid-wrap">${buildGridShape(cells,'',8,6)}</div>`; } },
  { question:'A rectangle has one side = 2 cm and area = 12 cm². What is its perimeter?', hint:'First find the missing side: Area = length × width', answer:16, options:[12,14,16,20],
    render(){ return `<div style="display:flex;justify-content:center;margin-bottom:20px"><div style="position:relative;padding:36px 50px"><div class="rect-visual" style="width:180px;height:60px;font-size:13px;color:var(--text2);font-weight:700">Area = 12 cm²</div><span class="side-label side-top">? cm</span><span class="side-label side-bottom">? cm</span><span class="side-label side-left">2 cm</span><span class="side-label side-right">2 cm</span></div></div><div style="background:#FEF9C3;border:2px solid #FDCB6E;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;color:#92400E;margin-bottom:16px">💡 Hint: Area = l × w, then P = 2 × (l + w)</div>`; } }
];

let currentRound = 0;
let score = 0;
let answered = false;

function renderRound(){
  const r = rounds[currentRound];
  answered = false;

  document.getElementById('roundLabel').textContent = `Round ${currentRound+1} of 10`;
  const pct = Math.round(currentRound/10*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('questionText').textContent = r.question;

  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';

  const content = document.getElementById('gameContent');
  content.innerHTML = `
    ${r.render()}
    <div class="answers-grid">
      ${r.options.map(o=>`<button class="btn-answer" onclick="answer(${o})">${o} cm</button>`).join('')}
    </div>`;
}

function answer(chosen){
  if(answered) return;
  answered = true;
  const r = rounds[currentRound];

  const btns = document.querySelectorAll('.btn-answer');
  btns.forEach(b=>{
    const val = parseInt(b.textContent);
    b.disabled = true;
    if(val === r.answer) b.classList.add('correct');
    else if(val === chosen) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedbackBar');
  if(chosen === r.answer){
    score++;
    document.getElementById('score').textContent = score;
    fb.textContent = `✓ Correct! The perimeter is ${r.answer} cm. ${r.hint}`;
    fb.className = 'feedback-bar show correct-fb';
  } else {
    fb.textContent = `✗ Not quite! The answer is ${r.answer} cm. ${r.hint}`;
    fb.className = 'feedback-bar show wrong-fb';
  }

  setTimeout(nextRound, 1800);
}

function nextRound(){
  currentRound++;
  if(currentRound >= 10) showEndScreen();
  else renderRound();
}

function showEndScreen(){
  document.getElementById('progressBar').style.width = '100%';
  const emoji = score >= 9 ? '🌟' : score >= 7 ? '😊' : '💪';
  const title = score >= 9 ? 'Brilliant!' : score >= 7 ? 'Well Done!' : 'Keep Trying!';
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `${score} / 10 correct`;
  document.getElementById('endScreen').classList.add('show');
}

function restartGame(){
  currentRound = 0; score = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('endScreen').classList.remove('show');
  renderRound();
}

renderRound();
</script>
</body>
</html>
