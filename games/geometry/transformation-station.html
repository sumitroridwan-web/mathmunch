<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Transformation Station – MathMunch</title>
<style>
:root {
  --green:#10B981; --green-dark:#059669; --green-light:#ECFDF5;
  --canvas:#D1FAE5; --bg:#F8FAFC; --white:#FFFFFF;
  --text:#1E293B; --text2:#64748B; --shadow:0 4px 20px rgba(16,185,129,0.12);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* SITE HEADER */
.site-header{background:var(--white);box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:20px;color:var(--green);text-decoration:none;display:flex;align-items:center;gap:8px;}
.header-nav{display:flex;align-items:center;gap:16px;}
.header-nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;}
.header-nav a:hover{color:var(--green);}
.header-cta{background:var(--green);color:white;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;text-decoration:none;}

/* TWO-COLUMN LAYOUT */
.game-layout{display:grid;grid-template-columns:280px 1fr;flex:1;min-height:0;}

/* SIDEBAR */
.sidebar{background:var(--white);border-right:1px solid #E2E8F0;padding:24px 20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.exit-btn{display:flex;align-items:center;gap:8px;background:var(--green-light);color:var(--green-dark);border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%;}
.exit-btn:hover{background:#D1FAE5;}
.stat-card{background:var(--bg);border-radius:12px;padding:16px;border:1px solid #E2E8F0;}
.stat-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.stat-value{font-family:'Quicksand',sans-serif;font-size:28px;font-weight:700;color:var(--green);}
.level-progress-track{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;margin-top:8px;}
.level-progress-fill{height:100%;background:linear-gradient(90deg,#34D399,var(--green));border-radius:99px;transition:width 0.4s ease;width:0%;}

/* GAME CANVAS */
.game-canvas{background:var(--canvas);position:relative;overflow-y:auto;padding:32px 28px;}
.game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#6EE7B7 1px,transparent 1px);background-size:24px 24px;opacity:0.4;pointer-events:none;}
.canvas-inner{position:relative;z-index:1;}

/* Game-specific CSS */
.game-card{background:var(--white);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow);}
.type-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:12px;}
.type-reflect{background:#34D39933;color:#059669;}
.type-translate{background:#FDCB6E33;color:#B45309;}
.type-rotate{background:#FF475733;color:#DC2626;}
.question-text{font-size:16px;font-weight:600;color:var(--text);text-align:center;margin-bottom:16px;line-height:1.5;}
.main-grid-wrap{display:flex;justify-content:center;margin-bottom:16px;}
.thumb-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:480px;margin:0 auto;}
.thumb-option{background:#F0FDF4;border:3px solid #A7F3D0;border-radius:12px;padding:8px;cursor:pointer;transition:all 0.2s;text-align:center;}
.thumb-option:hover{border-color:var(--green);background:#D1FAE5;transform:translateY(-2px);}
.platform-label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;}
.thumb-option.correct{border-color:#059669;background:#D1FAE5;}
.thumb-option.wrong{border-color:#DC2626;background:#FEE2E2;}
.thumb-option.disabled{cursor:not-allowed;pointer-events:none;}
.feedback{text-align:center;font-size:15px;font-weight:700;padding:10px;border-radius:10px;margin-top:12px;min-height:36px;}
.feedback.correct{background:#D1FAE5;color:#059669;}
.feedback.wrong{background:#FEE2E2;color:#DC2626;}
.round-label{font-size:12px;color:var(--text2);text-align:center;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}

/* END SCREEN */
.end-screen{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200;}
.end-screen.show{display:flex;}
.end-card{background:var(--white);border-radius:24px;padding:40px 36px;max-width:420px;width:90%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
#endEmoji{font-size:48px;margin-bottom:12px;}
#endTitle{font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px;font-family:'Quicksand',sans-serif;}
#endScore{font-size:18px;font-weight:700;color:var(--green);margin-bottom:24px;}
.btn{display:inline-block;padding:12px 28px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:none;margin:4px;text-decoration:none;}
.btn-play{background:linear-gradient(135deg,#34D399,var(--green));color:white;}
.btn-home{background:var(--green-light);color:var(--green-dark);}

@media(max-width:768px){
  .game-layout{grid-template-columns:1fr;}
  .sidebar{flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid #E2E8F0;padding:12px;}
  .header-nav{display:none;}
}
</style>
</head>
<body>
<script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav">
    <a href="../../index.html">All Games</a>
    <a href="#">Leaderboard</a>
    <a href="../../index.html" class="header-cta">Play Now</a>
  </nav>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">&#8617; Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-value" style="font-size:18px;">Engineer</div>
      <div class="level-progress-track"><div class="level-progress-fill" id="progressBar"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Grade</div>
      <div class="stat-value" style="font-size:18px;color:var(--text);">P5</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Topic</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;line-height:1.5;">Reflections, Translations &amp; Rotations</div>
    </div>
  </div>

  <div class="game-canvas">
    <div class="canvas-inner">
      <div class="game-card">
        <div class="round-label">PLATFORM <span id="roundLabel">1</span> OF 10</div>
        <div style="text-align:center;margin-bottom:8px;">
          <span class="type-badge type-reflect" id="typeBadge">REFLECTION</span>
        </div>
        <div class="question-text" id="questionText"></div>
        <div class="main-grid-wrap" id="mainGridWrap">
          <svg id="mainGrid" width="320" height="320"></svg>
        </div>
        <div style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:10px;">Which image shows the result?</div>
        <div class="thumb-grid" id="thumbGrid"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>
  </div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div id="endEmoji">🎉</div>
    <div id="endTitle">Game Over!</div>
    <div id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">&#8592; All Games</a>
  </div>
</div>

<script>
const ns = 'http://www.w3.org/2000/svg';

const SHAPES = {
  L: [[1,1],[2,1],[3,1],[3,2]],
  T: [[1,1],[1,2],[1,3],[2,2]],
  Z: [[1,1],[1,2],[2,2],[2,3]],
  F: [[1,1],[1,2],[2,1],[3,1],[3,2]]
};

function reflectV(cells) { return cells.map(([r,c]) => [r, 7-c]); }
function reflectH(cells) { return cells.map(([r,c]) => [7-r, c]); }
function translate(cells, dc, dr) { return cells.map(([r,c]) => [r+dr, c+dc]); }
function rotate90CW(cells) { return cells.map(([r,c]) => [c, 7-r]); }
function rotate180(cells) { return cells.map(([r,c]) => [7-r, 7-c]); }

const CELL_SIZE = 40;
const THUMB_CELL = 10;

function drawGridSVG(svg, cells, mirrorLine, cellSize, fillColor, bgColor, gridColor, showGrid) {
  svg.innerHTML = '';
  const COLS = 8, ROWS = 8;
  const W = COLS * cellSize, H = ROWS * cellSize;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  const bg = document.createElementNS(ns,'rect');
  bg.setAttribute('width', W); bg.setAttribute('height', H);
  bg.setAttribute('fill', bgColor || '#A7F3D0');
  svg.appendChild(bg);

  if (showGrid) {
    for (let r = 0; r <= ROWS; r++) {
      const l = document.createElementNS(ns,'line');
      l.setAttribute('x1',0); l.setAttribute('y1',r*cellSize);
      l.setAttribute('x2',W); l.setAttribute('y2',r*cellSize);
      l.setAttribute('stroke', gridColor||'rgba(0,0,0,0.08)');
      l.setAttribute('stroke-width','0.5');
      svg.appendChild(l);
    }
    for (let c = 0; c <= COLS; c++) {
      const l = document.createElementNS(ns,'line');
      l.setAttribute('x1',c*cellSize); l.setAttribute('y1',0);
      l.setAttribute('x2',c*cellSize); l.setAttribute('y2',H);
      l.setAttribute('stroke', gridColor||'rgba(0,0,0,0.08)');
      l.setAttribute('stroke-width','0.5');
      svg.appendChild(l);
    }
  }

  cells.forEach(([r,c]) => {
    const rect = document.createElementNS(ns,'rect');
    rect.setAttribute('x', c*cellSize + 1);
    rect.setAttribute('y', r*cellSize + 1);
    rect.setAttribute('width', cellSize - 2);
    rect.setAttribute('height', cellSize - 2);
    rect.setAttribute('fill', fillColor || '#10B981');
    rect.setAttribute('rx','2');
    svg.appendChild(rect);
  });

  if (mirrorLine) {
    const ml = document.createElementNS(ns,'line');
    if (mirrorLine.type === 'vertical') {
      const x = mirrorLine.pos * cellSize;
      ml.setAttribute('x1',x); ml.setAttribute('y1',0);
      ml.setAttribute('x2',x); ml.setAttribute('y2',H);
    } else {
      const y = mirrorLine.pos * cellSize;
      ml.setAttribute('x1',0); ml.setAttribute('y1',y);
      ml.setAttribute('x2',W); ml.setAttribute('y2',y);
    }
    ml.setAttribute('stroke','#DC2626');
    ml.setAttribute('stroke-width', mirrorLine.width || '2');
    ml.setAttribute('stroke-dasharray', mirrorLine.dash || '6,4');
    svg.appendChild(ml);
  }
}

function generateWrongVariants(correctCells, type) {
  const wrongs = [];
  if (type === 'reflect_v') {
    wrongs.push(reflectH(SHAPES.L));
    wrongs.push(translate(correctCells, 1, 0));
    wrongs.push(translate(correctCells, 0, 1));
  } else if (type === 'reflect_h') {
    wrongs.push(reflectV(SHAPES.T));
    wrongs.push(translate(correctCells, 0, 1));
    wrongs.push(rotate90CW(SHAPES.T));
  } else if (type === 'reflect_v2') {
    wrongs.push(reflectH(SHAPES.Z));
    wrongs.push(translate(correctCells, 1, 0));
    wrongs.push(rotate90CW(SHAPES.Z));
  } else if (type === 'reflect_h2') {
    wrongs.push(reflectV(SHAPES.F));
    wrongs.push(translate(correctCells, 0, 1));
    wrongs.push(rotate90CW(SHAPES.F));
  } else if (type === 'translate1') {
    wrongs.push(translate(SHAPES.L, 3, 2));
    wrongs.push(translate(SHAPES.L, 4, 2));
    wrongs.push(translate(SHAPES.L, 3, 3));
  } else if (type === 'translate2') {
    wrongs.push(translate(SHAPES.T, 4, 1));
    wrongs.push(translate(SHAPES.T, 4, 2));
    wrongs.push(translate(SHAPES.T, 5, 1));
  } else if (type === 'translate3') {
    wrongs.push(translate(SHAPES.Z, 2, 3));
    wrongs.push(translate(SHAPES.Z, 3, 3));
    wrongs.push(translate(SHAPES.Z, 2, 4));
  } else if (type === 'rotate_L_90') {
    wrongs.push(reflectV(SHAPES.L));
    wrongs.push(rotate180(SHAPES.L));
    wrongs.push(rotate90CW(rotate90CW(rotate90CW(SHAPES.L))));
  } else if (type === 'rotate_T_90') {
    wrongs.push(reflectH(SHAPES.T));
    wrongs.push(rotate180(SHAPES.T));
    wrongs.push(rotate90CW(rotate90CW(rotate90CW(SHAPES.T))));
  } else if (type === 'rotate_Z_180') {
    wrongs.push(reflectV(SHAPES.Z));
    wrongs.push(rotate90CW(SHAPES.Z));
    wrongs.push(reflectH(SHAPES.Z));
  }
  return wrongs.map(cells => cells.filter(([r,c])=>r>=0&&r<8&&c>=0&&c<8));
}

const ROUNDS = [
  { type:'reflect', subtype:'reflect_v', typeName:'REFLECTION', badgeClass:'type-reflect',
    q:'Reflect the shape over the vertical mirror line.',
    mainShape: SHAPES.L, mirrorLine:{type:'vertical',pos:4,width:2},
    correctCells: reflectV(SHAPES.L), mainFill:'#10B981' },
  { type:'translate', subtype:'translate1', typeName:'TRANSLATION', badgeClass:'type-translate',
    q:'The shape moves 3 right and 2 down. Which image shows the result?',
    mainShape: SHAPES.L, mirrorLine: null,
    correctCells: translate(SHAPES.L, 3, 2), mainFill:'#FDCB6E' },
  { type:'reflect', subtype:'reflect_h', typeName:'REFLECTION', badgeClass:'type-reflect',
    q:'Reflect the shape over the horizontal mirror line.',
    mainShape: SHAPES.T, mirrorLine:{type:'horizontal',pos:4,width:2},
    correctCells: reflectH(SHAPES.T), mainFill:'#10B981' },
  { type:'rotate', subtype:'rotate_L_90', typeName:'ROTATION', badgeClass:'type-rotate',
    q:'Which image shows the shape rotated 90° clockwise?',
    mainShape: SHAPES.L, mirrorLine: null,
    correctCells: rotate90CW(SHAPES.L), mainFill:'#F87171' },
  { type:'reflect', subtype:'reflect_v2', typeName:'REFLECTION', badgeClass:'type-reflect',
    q:'Reflect the shape over the vertical mirror line.',
    mainShape: SHAPES.Z, mirrorLine:{type:'vertical',pos:4,width:2},
    correctCells: reflectV(SHAPES.Z), mainFill:'#10B981' },
  { type:'translate', subtype:'translate2', typeName:'TRANSLATION', badgeClass:'type-translate',
    q:'The shape moves 4 right and 1 down. Which image shows the result?',
    mainShape: SHAPES.T, mirrorLine: null,
    correctCells: translate(SHAPES.T, 4, 1), mainFill:'#FDCB6E' },
  { type:'rotate', subtype:'rotate_T_90', typeName:'ROTATION', badgeClass:'type-rotate',
    q:'Which image shows the T-shape rotated 90° clockwise?',
    mainShape: SHAPES.T, mirrorLine: null,
    correctCells: rotate90CW(SHAPES.T), mainFill:'#F87171' },
  { type:'reflect', subtype:'reflect_h2', typeName:'REFLECTION', badgeClass:'type-reflect',
    q:'Reflect the shape over the horizontal mirror line.',
    mainShape: SHAPES.F, mirrorLine:{type:'horizontal',pos:4,width:2},
    correctCells: reflectH(SHAPES.F), mainFill:'#10B981' },
  { type:'translate', subtype:'translate3', typeName:'TRANSLATION', badgeClass:'type-translate',
    q:'The shape moves 2 right and 3 down. Which image shows the result?',
    mainShape: SHAPES.Z, mirrorLine: null,
    correctCells: translate(SHAPES.Z, 2, 3), mainFill:'#FDCB6E' },
  { type:'rotate', subtype:'rotate_Z_180', typeName:'ROTATION', badgeClass:'type-rotate',
    q:'Which image shows the Z-shape rotated 180°?',
    mainShape: SHAPES.Z, mirrorLine: null,
    correctCells: rotate180(SHAPES.Z), mainFill:'#F87171' }
];

let currentRound = 0;
let score = 0;
let answeredThisRound = false;

function renderRoundFixed() {
  answeredThisRound = false;
  const rd = ROUNDS[currentRound];

  document.getElementById('roundLabel').textContent = currentRound + 1;
  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('questionText').textContent = rd.q;

  const typeBadge = document.getElementById('typeBadge');
  typeBadge.textContent = rd.typeName;
  typeBadge.className = 'type-badge ' + rd.badgeClass;

  const mainSvg = document.getElementById('mainGrid');
  drawGridSVG(mainSvg, rd.mainShape, rd.mirrorLine, CELL_SIZE, rd.mainFill, '#A7F3D0', 'rgba(0,0,0,0.06)', true);

  const wrongs = generateWrongVariants(rd.correctCells, rd.subtype);
  const options = [
    { cells: rd.correctCells, isCorrect: true },
    ...wrongs.slice(0,3).map(c => ({ cells: c, isCorrect: false }))
  ].sort(() => Math.random() - 0.5);

  const thumbGrid = document.getElementById('thumbGrid');
  thumbGrid.innerHTML = '';
  const platformLetters = ['A','B','C','D'];
  const thumbFill = rd.type === 'reflect' ? '#10B981' : rd.type === 'translate' ? '#FDCB6E' : '#F87171';

  options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'thumb-option';
    if (opt.isCorrect) div.dataset.correct = '1';

    const lbl = document.createElement('div');
    lbl.className = 'platform-label';
    lbl.textContent = 'Platform ' + platformLetters[idx];
    div.appendChild(lbl);

    const thumbSvg = document.createElementNS(ns,'svg');
    thumbSvg.setAttribute('width','80');
    thumbSvg.setAttribute('height','80');
    const mirrorLnThumb = rd.mirrorLine ? {...rd.mirrorLine, width:1, dash:'4,3'} : null;
    drawGridSVG(thumbSvg, opt.cells, mirrorLnThumb, THUMB_CELL, thumbFill, '#D1FAE5', 'rgba(0,0,0,0.06)', true);
    div.appendChild(thumbSvg);

    div.onclick = () => {
      if (answeredThisRound) return;
      answeredThisRound = true;

      const allDivs = thumbGrid.querySelectorAll('.thumb-option');
      allDivs.forEach(d => d.classList.add('disabled'));

      const fb = document.getElementById('feedback');
      if (opt.isCorrect) {
        score++;
        div.classList.add('correct');
        fb.textContent = '✅ Correct! Great transformation!';
        fb.className = 'feedback correct';
        document.getElementById('score').textContent = score;
      } else {
        div.classList.add('wrong');
        allDivs.forEach(d => { if (d.dataset.correct === '1') d.classList.add('correct'); });
        fb.textContent = '❌ Not quite! The green option was correct.';
        fb.className = 'feedback wrong';
      }
      setTimeout(advanceRound, 1300);
    };

    thumbGrid.appendChild(div);
  });
}

function advanceRound() {
  currentRound++;
  if (currentRound >= 10) showEndScreen();
  else renderRoundFixed();
}

function showEndScreen() {
  document.getElementById('progressBar').style.width = '100%';
  const emoji = score >= 9 ? '🌟' : score >= 7 ? '😊' : '💪';
  const title = score >= 9 ? 'Brilliant!' : score >= 7 ? 'Well Done!' : 'Keep Trying!';
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = score + ' / 10 correct';
  document.getElementById('endScreen').classList.add('show');
}

function restartGame() {
  currentRound = 0; score = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('endScreen').classList.remove('show');
  renderRoundFixed();
}

renderRoundFixed();
</script>
</body>
</html>
