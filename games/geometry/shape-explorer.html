<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Shape Explorer – MathMunch</title>
<style>
  :root {
    --green:#10B981;--green-dark:#059669;--green-light:#ECFDF5;
    --blue:#3B82F6;--orange:#F97316;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#D1FAE5;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3,.logo-text,.stat-value,.game-title-text{font-family:'Quicksand',system-ui,sans-serif;}

  .site-header{background:var(--white);border-bottom:1px solid var(--outline);position:sticky;top:0;z-index:100;}
  .site-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:38px;height:38px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 2px 0 var(--green-dark);}
  .logo-text{font-size:1.25rem;font-weight:700;color:var(--green);}
  .site-nav{display:flex;gap:4px;}
  .site-nav a{text-decoration:none;color:var(--text-mid);font-weight:600;font-size:.9rem;padding:8px 16px;border-radius:9999px;transition:.15s;}
  .site-nav a:hover,.site-nav a.active{background:var(--green-light);color:var(--green);}
  .btn-play-now{background:var(--green);color:white;padding:10px 22px;border-radius:9999px;font-weight:700;font-size:.9rem;text-decoration:none;box-shadow:0 3px 0 var(--green-dark);transition:.1s;}
  .btn-play-now:hover{transform:translateY(-1px);}
  .btn-play-now:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dark);}

  .game-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;padding:20px 24px 24px;max-width:1200px;margin:0 auto;flex:1;align-items:start;}

  .sidebar{display:flex;flex-direction:column;gap:12px;}
  .exit-btn{background:var(--white);border:2px solid var(--outline);border-radius:9999px;padding:12px 20px;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:600;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 0 var(--outline);transition:.1s;}
  .exit-btn:hover{border-color:var(--green);color:var(--green);}
  .exit-btn:active{transform:translateY(1px);box-shadow:none;}
  .stat-card{background:var(--white);border:1px solid var(--outline);border-radius:24px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .stat-label{font-family:'Lexend',sans-serif;font-size:.7rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .stat-value{font-size:2.2rem;font-weight:700;color:var(--green);line-height:1;}
  .stat-level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .level-icon{font-size:1.4rem;}
  .stat-value-sm{font-size:1.4rem;font-weight:700;color:var(--green);}
  .level-progress{height:10px;background:var(--outline);border-radius:9999px;overflow:hidden;}
  .level-progress-fill{height:100%;background:var(--green);border-radius:9999px;width:0%;transition:width .4s ease;}
  .hearts{display:flex;gap:6px;font-size:1.5rem;}
  .game-info-title{font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
  .level-pill{display:inline-block;background:var(--green);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:9999px;}

  .game-canvas{background:var(--canvas);border-radius:24px;padding:32px;position:relative;overflow:hidden;min-height:520px;border:1px solid rgba(16,185,129,.15);}
  .game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
  .game-canvas > *{position:relative;z-index:1;}

  .end-screen{display:none;position:fixed;inset:0;background:rgba(25,28,30,.8);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;}
  .end-screen.show{display:flex;}
  .end-card{background:white;border-radius:28px;padding:44px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:9999px;border:none;cursor:pointer;font-family:'Lexend',sans-serif;font-size:1rem;font-weight:700;transition:.1s;text-decoration:none;margin:0 6px;}
  .btn-play{background:var(--green);color:white;box-shadow:0 3px 0 var(--green-dark);}
  .btn-play:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dark);}
  .btn-home{background:var(--bg);color:var(--text-mid);border:2px solid var(--outline);}

  @media(max-width:768px){
    .game-layout{grid-template-columns:1fr;padding:16px;}
    .sidebar{flex-direction:row;flex-wrap:wrap;}
    .stat-card{flex:1;min-width:140px;}
    .site-nav{display:none;}
  }

  /* Game-specific CSS */
  .question-card{background:rgba(255,255,255,0.85);border-radius:16px;padding:24px;margin-bottom:20px;text-align:center;border:1px solid rgba(16,185,129,0.2);}
  .question-label{font-size:13px;font-weight:700;color:#424754;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  .shape-display{display:flex;justify-content:center;align-items:center;padding:30px;min-height:160px;}
  .shape-wrapper{display:flex;justify-content:center;align-items:center;transition:transform 0.3s;}
  .shape-wrapper.pulse{animation:pulse 0.4s ease;}
  @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
  .css-circle{border-radius:50%;width:120px;height:120px;}
  .css-square{border-radius:8px;width:110px;height:110px;}
  .css-triangle{width:0;height:0;}
  .css-rectangle{border-radius:8px;width:160px;height:90px;}
  .css-pentagon{clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);width:110px;height:110px;}
  .css-hexagon{clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);width:110px;height:110px;}
  .css-oval{border-radius:50%;width:150px;height:90px;}
  .css-star{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);width:110px;height:110px;}
  .answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:480px;margin:0 auto;}
  .btn-answer{padding:14px 20px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:2px solid rgba(16,185,129,0.3);background:white;color:var(--text);transition:all 0.2s;font-family:'Lexend',sans-serif;}
  .btn-answer:hover:not(:disabled){background:var(--green-light);border-color:var(--green);transform:translateY(-2px);}
  .btn-answer.correct{background:#E8FFF3;border-color:#00B894;color:#00B894;}
  .btn-answer.wrong{background:#FFE8EC;border-color:#FF4757;color:#FF4757;}
  .btn-answer:disabled{cursor:not-allowed;}
  .shape-cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:460px;margin:0 auto;}
  .shape-card{background:white;border:2px solid rgba(16,185,129,0.2);border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:110px;cursor:pointer;transition:all 0.2s;}
  .shape-card:hover:not(.disabled){border-color:var(--green);transform:translateY(-3px);box-shadow:0 6px 20px rgba(16,185,129,0.18);}
  .shape-card.correct{border-color:#00B894;background:#E8FFF3;}
  .shape-card.wrong{border-color:#FF4757;background:#FFE8EC;}
  .find-shape-name{font-size:36px;font-weight:900;color:var(--green);margin-bottom:8px;font-family:'Quicksand',sans-serif;}
  .find-instruction{font-size:15px;color:var(--text-mid);font-weight:600;}
  .feedback{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;padding:18px 36px;border-radius:20px;font-size:22px;font-weight:800;color:white;pointer-events:none;}
  .feedback.show-correct{display:block;background:#00B894;}
  .feedback.show-wrong{display:block;background:#FF4757;}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <div class="site-header-inner">
    <a href="../../index.html" class="logo">
      <div class="logo-icon">🔷</div>
      <span class="logo-text">MathMunch</span>
    </a>
    <nav class="site-nav">
      <a href="../../index.html#games" class="active">Games</a>
      <a href="#">Badges</a>
      <a href="#">Progress</a>
    </nav>
    <a href="../../index.html" class="btn-play-now">Play Now</a>
  </div>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">↩ Exit Game</button>

    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Explorer</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Lives</div>
      <div class="hearts">❤️❤️❤️</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Game</div>
      <div class="game-info-title">Shape Explorer</div>
      <span class="level-pill">EY</span>
    </div>
  </div>

  <div class="game-canvas">
    <div class="question-card" id="questionCard">
      <div class="question-label" id="questionLabel">Question 1 of 10</div>
      <div id="questionContent"></div>
    </div>
    <div id="answersArea"></div>
  </div>
</div>

<div class="feedback" id="feedback"></div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div style="font-size:3rem;margin-bottom:12px;" id="endEmoji">🎉</div>
    <div style="font-family:'Quicksand',sans-serif;font-size:1.9rem;font-weight:700;color:var(--text);margin-bottom:8px;" id="endTitle">Game Over!</div>
    <div style="font-size:1rem;color:var(--text-mid);margin-bottom:28px;" id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">← All Games</a>
  </div>
</div>

<script>
const SHAPES = [
  { id:'circle',    name:'Circle',    cls:'css-circle' },
  { id:'square',    name:'Square',    cls:'css-square' },
  { id:'triangle',  name:'Triangle',  cls:'css-triangle' },
  { id:'rectangle', name:'Rectangle', cls:'css-rectangle' },
  { id:'pentagon',  name:'Pentagon',  cls:'css-pentagon' },
  { id:'hexagon',   name:'Hexagon',   cls:'css-hexagon' },
  { id:'oval',      name:'Oval',      cls:'css-oval' },
  { id:'star',      name:'Star',      cls:'css-star' },
];
const COLORS = ['#FF6B6B','#34D399','#FFD93D','#6EE7B7','#FF8E53','#10B981','#74B9FF','#FF6B9D'];

let currentRound = 0;
let score = 0;
let rounds = [];

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function buildRounds(){
  rounds = [];
  const shapePool = shuffle(SHAPES);
  for(let i=0;i<10;i++){
    const shape = shapePool[i % shapePool.length];
    const mode = (i % 2 === 0) ? 'A' : 'B';
    const color = COLORS[i % COLORS.length];
    rounds.push({ shape, mode, color });
  }
}

function buildShapeEl(shape, color, small=false){
  const wrapper = document.createElement('div');
  wrapper.className = 'shape-wrapper';
  if(shape.id === 'triangle'){
    const el = document.createElement('div');
    el.className = 'css-triangle';
    const size = small ? 40 : 55;
    el.style.cssText = `border-left:${size}px solid transparent;border-right:${size}px solid transparent;border-bottom:${size*2}px solid ${color};`;
    wrapper.appendChild(el);
  } else {
    const el = document.createElement('div');
    el.className = shape.cls;
    el.style.background = color;
    if(small){
      el.style.transform = 'scale(0.55)';
      el.style.transformOrigin = 'center';
    }
    wrapper.appendChild(el);
  }
  return wrapper;
}

function renderRound(){
  const r = rounds[currentRound];
  document.getElementById('questionLabel').textContent = `Question ${currentRound+1} of 10`;
  const pct = Math.round((currentRound/10)*100);
  document.getElementById('progressBar').style.width = pct+'%';

  const content = document.getElementById('questionContent');
  const answersArea = document.getElementById('answersArea');
  content.innerHTML = '';
  answersArea.innerHTML = '';

  if(r.mode === 'A'){
    const q = document.createElement('div');
    q.style.cssText = 'font-size:18px;font-weight:700;color:var(--text);margin-bottom:20px;font-family:Lexend,sans-serif;';
    q.textContent = 'What shape is this?';
    content.appendChild(q);

    const display = document.createElement('div');
    display.className = 'shape-display';
    const shapeEl = buildShapeEl(r.shape, r.color);
    shapeEl.id = 'mainShape';
    display.appendChild(shapeEl);
    content.appendChild(display);

    const wrongShapes = shuffle(SHAPES.filter(s=>s.id!==r.shape.id)).slice(0,3);
    const options = shuffle([r.shape, ...wrongShapes]);
    const grid = document.createElement('div');
    grid.className = 'answers-grid';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-answer';
      btn.textContent = opt.name;
      btn.onclick = () => handleAnswer(opt.id === r.shape.id, btn, grid);
      grid.appendChild(btn);
    });
    answersArea.appendChild(grid);

  } else {
    const nameDiv = document.createElement('div');
    nameDiv.style.cssText = 'margin-bottom:8px;';
    const bigName = document.createElement('div');
    bigName.className = 'find-shape-name';
    bigName.textContent = r.shape.name;
    const instr = document.createElement('div');
    instr.className = 'find-instruction';
    instr.textContent = 'Tap the matching shape!';
    nameDiv.appendChild(bigName);
    nameDiv.appendChild(instr);
    content.appendChild(nameDiv);

    const wrongShapes = shuffle(SHAPES.filter(s=>s.id!==r.shape.id)).slice(0,3);
    const options = shuffle([r.shape, ...wrongShapes]);
    const grid = document.createElement('div');
    grid.className = 'shape-cards-grid';
    options.forEach((opt,idx) => {
      const card = document.createElement('div');
      card.className = 'shape-card';
      const cardColor = COLORS[idx % COLORS.length];
      const shapeEl = buildShapeEl(opt, cardColor, true);
      card.appendChild(shapeEl);
      card.onclick = () => handleCardAnswer(opt.id === r.shape.id, card, grid, r.shape, options, cardColor);
      grid.appendChild(card);
    });
    answersArea.appendChild(grid);
  }
}

function handleAnswer(isCorrect, clickedBtn, grid){
  if(isCorrect) score++;
  document.getElementById('score').textContent = score;
  Array.from(grid.children).forEach(b => b.disabled = true);

  if(isCorrect){
    clickedBtn.classList.add('correct');
    const shapeEl = document.getElementById('mainShape');
    if(shapeEl) shapeEl.classList.add('pulse');
    showFeedback(true);
  } else {
    clickedBtn.classList.add('wrong');
    const r = rounds[currentRound];
    Array.from(grid.children).forEach(b => {
      if(b.textContent === r.shape.name) b.classList.add('correct');
    });
    showFeedback(false);
  }
  setTimeout(nextRound, 1200);
}

function handleCardAnswer(isCorrect, clickedCard, grid, correctShape, options, cardColor){
  if(isCorrect) score++;
  document.getElementById('score').textContent = score;
  Array.from(grid.children).forEach(c => {
    c.onclick = null;
    c.style.cursor = 'default';
  });

  if(isCorrect){
    clickedCard.classList.add('correct');
    clickedCard.querySelector('.shape-wrapper').classList.add('pulse');
    showFeedback(true);
  } else {
    clickedCard.classList.add('wrong');
    Array.from(grid.children).forEach(c => {
      const wrapper = c.querySelector('.shape-wrapper');
      const el = wrapper ? wrapper.firstChild : null;
      if(el){
        const hasCorrectCls = el.className && (el.className.includes(correctShape.cls) || el.className.includes('css-triangle'));
        if(hasCorrectCls) c.classList.add('correct');
      }
    });
    showFeedback(false);
  }
  setTimeout(nextRound, 1200);
}

function showFeedback(correct){
  const fb = document.getElementById('feedback');
  fb.textContent = correct ? '✓ Correct!' : '✗ Try again!';
  fb.className = 'feedback ' + (correct ? 'show-correct' : 'show-wrong');
  setTimeout(()=>{ fb.className='feedback'; }, 1100);
}

function nextRound(){
  currentRound++;
  if(currentRound >= 10){
    showEndScreen();
  } else {
    renderRound();
  }
}

function showEndScreen(){
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('endScreen').classList.add('show');
  let emoji, title;
  if(score >= 9){ emoji='🌟'; title='Brilliant!'; }
  else if(score >= 7){ emoji='😊'; title='Well Done!'; }
  else { emoji='💪'; title='Keep Trying!'; }
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `You scored ${score} out of 10`;
}

function restartGame(){
  score = 0;
  currentRound = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('endScreen').classList.remove('show');
  buildRounds();
  renderRound();
}

buildRounds();
renderRound();
</script>
</body>
</html>
