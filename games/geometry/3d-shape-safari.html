<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>3D Shape Safari – MathMunch</title>
<style>
:root {
  --green:#10B981; --green-dark:#059669; --green-light:#ECFDF5;
  --canvas:#D1FAE5; --bg:#F8FAFC; --white:#FFFFFF;
  --text:#1E293B; --text2:#64748B; --shadow:0 4px 20px rgba(16,185,129,0.12);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

.site-header{background:var(--white);box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:20px;color:var(--green);text-decoration:none;display:flex;align-items:center;gap:8px;}
.header-nav{display:flex;align-items:center;gap:16px;}
.header-nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;}
.header-nav a:hover{color:var(--green);}
.header-cta{background:var(--green);color:white;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;text-decoration:none;}

.game-layout{display:grid;grid-template-columns:280px 1fr;flex:1;min-height:0;}

.sidebar{background:var(--white);border-right:1px solid #E2E8F0;padding:24px 20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.exit-btn{display:flex;align-items:center;gap:8px;background:var(--green-light);color:var(--green-dark);border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%;}
.exit-btn:hover{background:#D1FAE5;}
.stat-card{background:var(--bg);border-radius:12px;padding:16px;border:1px solid #E2E8F0;}
.stat-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.stat-value{font-family:'Quicksand',sans-serif;font-size:28px;font-weight:700;color:var(--green);}
.level-progress-track{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;margin-top:8px;}
.level-progress-fill{height:100%;background:linear-gradient(90deg,#34D399,var(--green));border-radius:99px;transition:width 0.4s ease;width:0%;}

.game-canvas{background:var(--canvas);position:relative;overflow-y:auto;padding:32px 28px;}
.game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#6EE7B7 1px,transparent 1px);background-size:24px 24px;opacity:0.4;pointer-events:none;}
.canvas-inner{position:relative;z-index:1;}

/* Game-specific CSS */
.question-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow);padding:28px 24px;margin-bottom:20px;text-align:center;}
.q-label{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.q-text{font-size:18px;font-weight:700;color:var(--text);margin-bottom:20px;line-height:1.4;}
.shape-display{display:flex;justify-content:center;align-items:center;margin:10px 0 20px;min-height:160px;}
.shape-3d-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.css-cube{width:90px;height:90px;background:#34D399;border-radius:6px;position:relative;box-shadow:8px -8px 0 #059669, 8px -8px 0 1px #047857;transform:perspective(200px) rotateY(-10deg) rotateX(5deg);}
.css-cuboid{width:130px;height:80px;background:#6EE7B7;border-radius:6px;position:relative;box-shadow:10px -10px 0 #10B981, 10px -10px 0 1px #059669;transform:perspective(250px) rotateY(-10deg) rotateX(5deg);}
.css-cylinder-wrap{display:flex;flex-direction:column;align-items:center;}
.css-cylinder-top{width:80px;height:22px;background:#FDCB6E;border-radius:50%;border:3px solid #F59E0B;z-index:2;position:relative;}
.css-cylinder-body{width:80px;height:90px;background:linear-gradient(135deg,#FDCB6E 60%,#F59E0B);border-radius:0 0 8px 8px;margin-top:-2px;border:3px solid #F59E0B;border-top:none;}
.css-cylinder-bottom{width:80px;height:22px;background:#F59E0B;border-radius:50%;margin-top:-4px;}
.css-cone-wrap{display:flex;flex-direction:column;align-items:center;}
.css-cone-tri{width:0;height:0;border-left:55px solid transparent;border-right:55px solid transparent;border-bottom:110px solid #F87171;filter:drop-shadow(2px 2px 3px rgba(0,0,0,0.15));}
.css-cone-bottom{width:90px;height:24px;background:#EF4444;border-radius:50%;margin-top:-6px;}
.css-sphere{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%, #A78BFA 0%, #7C3AED 60%, #5B21B6 100%);box-shadow:4px 8px 20px rgba(91,33,182,0.25);}
.css-prism-wrap{display:inline-block;position:relative;width:120px;height:100px;}
.css-prism-face{position:absolute;width:0;height:0;border-left:55px solid transparent;border-right:55px solid transparent;border-bottom:95px solid #10B981;top:0;left:5px;filter:drop-shadow(4px 4px 0 #059669);}
.css-prism-base{position:absolute;bottom:0;left:0;width:120px;height:18px;background:#059669;border-radius:3px;}
.props-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0 8px;}
.prop-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;background:var(--green-light);color:var(--green-dark);border:2px solid #A7F3D0;}
.real-object{font-size:80px;display:block;margin:8px auto;line-height:1;}
.props-display{background:#F0FDF4;border-radius:14px;padding:16px 20px;margin-bottom:8px;text-align:center;}
.props-display .prop-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:480px;margin:0 auto;}
.btn-answer{padding:14px 20px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:2px solid #A7F3D0;background:var(--white);color:var(--text);transition:all 0.2s;min-height:54px;}
.btn-answer:hover:not(:disabled){background:var(--green-light);border-color:var(--green);transform:translateY(-2px);}
.btn-answer.correct{background:#D1FAE5;border-color:var(--green-dark);color:var(--green-dark);}
.btn-answer.wrong{background:#FEE2E2;border-color:#DC2626;color:#DC2626;}
.btn-answer:disabled{cursor:not-allowed;}
.btn-number{font-size:24px;padding:16px;font-weight:900;}
.flash-feedback{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;padding:18px 36px;border-radius:20px;font-size:22px;font-weight:700;color:white;pointer-events:none;}
.flash-feedback.show-correct{display:block;background:var(--green-dark);}
.flash-feedback.show-wrong{display:block;background:#DC2626;}

.end-screen{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:300;}
.end-screen.show{display:flex;}
.end-card{background:var(--white);border-radius:24px;padding:40px 36px;max-width:420px;width:90%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
#endEmoji{font-size:48px;margin-bottom:12px;}
#endTitle{font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px;font-family:'Quicksand',sans-serif;}
#endScore{font-size:18px;font-weight:700;color:var(--green);margin-bottom:24px;}
.btn{display:inline-block;padding:12px 28px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:none;margin:4px;text-decoration:none;}
.btn-play{background:linear-gradient(135deg,#34D399,var(--green));color:white;}
.btn-home{background:var(--green-light);color:var(--green-dark);}

@media(max-width:768px){
  .game-layout{grid-template-columns:1fr;}
  .sidebar{flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid #E2E8F0;padding:12px;}
  .header-nav{display:none;}
}
</style>
</head>
<body>
<script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav">
    <a href="../../index.html">All Games</a>
    <a href="#">Leaderboard</a>
    <a href="../../index.html" class="header-cta">Play Now</a>
  </nav>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">&#8617; Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-value" style="font-size:18px;">Explorer</div>
      <div class="level-progress-track"><div class="level-progress-fill" id="progressBar"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Grade</div>
      <div class="stat-value" style="font-size:18px;color:var(--text);">P2</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Topic</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;line-height:1.5;">3D Shapes &amp; Properties</div>
    </div>
  </div>

  <div class="game-canvas">
    <div class="canvas-inner">
      <div class="question-card">
        <div class="q-label" id="qLabel">Question 1 of 10</div>
        <div class="q-text" id="qText"></div>
        <div class="shape-display" id="shapeDisplay"></div>
        <div id="propsArea"></div>
      </div>
      <div id="answersArea"></div>
    </div>
  </div>
</div>

<div class="flash-feedback" id="flashFeedback"></div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div id="endEmoji">🎉</div>
    <div id="endTitle">Game Over!</div>
    <div id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">&#8592; All Games</a>
  </div>
</div>

<script>
const SHAPES_3D = [
  { id:'cube',     name:'Cube',              faces:6, edges:12, vertices:8, obj:'🎲', objLabel:'dice' },
  { id:'cuboid',   name:'Cuboid',            faces:6, edges:12, vertices:8, obj:'📦', objLabel:'box' },
  { id:'cylinder', name:'Cylinder',          faces:3, edges:2,  vertices:0, obj:'🥫', objLabel:'can' },
  { id:'cone',     name:'Cone',              faces:2, edges:1,  vertices:1, obj:'🍦', objLabel:'ice cream' },
  { id:'sphere',   name:'Sphere',            faces:1, edges:0,  vertices:0, obj:'⚽', objLabel:'football' },
  { id:'prism',    name:'Triangular Prism',  faces:5, edges:9,  vertices:6, obj:'🔺', objLabel:'Toblerone' },
];

function buildShapeIllustration(shapeId){
  const d = document.createElement('div');
  d.className = 'shape-3d-wrap';
  let inner = '';
  if(shapeId === 'cube') inner = '<div class="css-cube"></div>';
  else if(shapeId === 'cuboid') inner = '<div class="css-cuboid"></div>';
  else if(shapeId === 'cylinder') inner = '<div class="css-cylinder-wrap"><div class="css-cylinder-top"></div><div class="css-cylinder-body"></div><div class="css-cylinder-bottom"></div></div>';
  else if(shapeId === 'cone') inner = '<div class="css-cone-wrap"><div class="css-cone-tri"></div><div class="css-cone-bottom"></div></div>';
  else if(shapeId === 'sphere') inner = '<div class="css-sphere"></div>';
  else if(shapeId === 'prism') inner = '<div class="css-prism-wrap"><div class="css-prism-face"></div><div class="css-prism-base"></div></div>';
  d.innerHTML = inner;
  return d;
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

const ROUND_TYPES = ['A','C','B','A','C','B','A','C','B','B'];

let currentRound = 0;
let score = 0;
let rounds = [];

function buildRounds(){
  rounds = [];
  let lastShape = null;
  for(let i=0;i<10;i++){
    const type = ROUND_TYPES[i];
    let available = SHAPES_3D.filter(s => s !== lastShape);
    const shape = available[Math.floor(Math.random()*available.length)];
    lastShape = shape;
    rounds.push({ type, shape });
  }
}

function renderRound(){
  const r = rounds[currentRound];
  document.getElementById('qLabel').textContent = `Question ${currentRound+1} of 10`;
  const pct = Math.round((currentRound/10)*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('propsArea').innerHTML = '';
  document.getElementById('answersArea').innerHTML = '';

  const shapeDisplay = document.getElementById('shapeDisplay');
  shapeDisplay.innerHTML = '';

  if(r.type === 'A'){
    const qParts = ['faces','edges','vertices'];
    const which = qParts[currentRound % 3];
    const correctNum = r.shape[which];
    document.getElementById('qText').textContent = `How many ${which.toUpperCase()} does a ${r.shape.name} have?`;
    shapeDisplay.appendChild(buildShapeIllustration(r.shape.id));

    const propsArea = document.getElementById('propsArea');
    const row = document.createElement('div');
    row.className = 'props-row';
    if(which !== 'faces'){ const c = document.createElement('div'); c.className='prop-chip'; c.textContent=`Faces: ${r.shape.faces}`; row.appendChild(c); }
    if(which !== 'edges'){ const c = document.createElement('div'); c.className='prop-chip'; c.textContent=`Edges: ${r.shape.edges}`; row.appendChild(c); }
    if(which !== 'vertices'){ const c = document.createElement('div'); c.className='prop-chip'; c.textContent=`Vertices: ${r.shape.vertices}`; row.appendChild(c); }
    propsArea.appendChild(row);

    const wrongNums = new Set();
    while(wrongNums.size < 3){ const n = Math.floor(Math.random()*13)+1; if(n !== correctNum) wrongNums.add(n); }
    const options = shuffle([correctNum, ...wrongNums]);
    const grid = document.createElement('div');
    grid.className = 'answers-grid';
    options.forEach(num => {
      const btn = document.createElement('button');
      btn.className = 'btn-answer btn-number';
      btn.textContent = num;
      btn.onclick = () => handleAnswer(num === correctNum, btn, grid, correctNum.toString());
      grid.appendChild(btn);
    });
    document.getElementById('answersArea').appendChild(grid);

  } else if(r.type === 'C'){
    document.getElementById('qText').textContent = `What 3D shape is this?`;
    const objEl = document.createElement('span');
    objEl.className = 'real-object';
    objEl.textContent = r.shape.obj;
    shapeDisplay.appendChild(objEl);

    const propsArea = document.getElementById('propsArea');
    const hint = document.createElement('div');
    hint.style.cssText = 'font-size:14px;color:var(--text2);margin-bottom:8px;';
    hint.textContent = `(${r.shape.objLabel})`;
    propsArea.appendChild(hint);

    const wrongShapes = shuffle(SHAPES_3D.filter(s=>s.id!==r.shape.id)).slice(0,3);
    const options = shuffle([r.shape,...wrongShapes]);
    const grid = document.createElement('div');
    grid.className = 'answers-grid';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-answer';
      btn.textContent = opt.name;
      btn.onclick = () => handleAnswer(opt.id === r.shape.id, btn, grid, r.shape.name);
      grid.appendChild(btn);
    });
    document.getElementById('answersArea').appendChild(grid);

  } else {
    document.getElementById('qText').textContent = `Which 3D shape has these properties?`;
    shapeDisplay.style.minHeight = '20px';

    const propsArea = document.getElementById('propsArea');
    const propsBox = document.createElement('div');
    propsBox.className = 'props-display';
    propsBox.innerHTML = `<div class="prop-title">Properties</div>`;
    const row = document.createElement('div');
    row.className = 'props-row';
    row.style.marginTop = '0';
    [{label:'Faces',val:r.shape.faces},{label:'Edges',val:r.shape.edges},{label:'Vertices',val:r.shape.vertices}].forEach(p=>{
      const chip = document.createElement('div');
      chip.className = 'prop-chip';
      chip.textContent = `${p.label}: ${p.val}`;
      row.appendChild(chip);
    });
    propsBox.appendChild(row);
    propsArea.appendChild(propsBox);

    shapeDisplay.appendChild(buildShapeIllustration(r.shape.id));

    const wrongShapes = shuffle(SHAPES_3D.filter(s=>s.id!==r.shape.id)).slice(0,3);
    const options = shuffle([r.shape,...wrongShapes]);
    const grid = document.createElement('div');
    grid.className = 'answers-grid';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-answer';
      btn.textContent = opt.name;
      btn.onclick = () => handleAnswer(opt.id === r.shape.id, btn, grid, r.shape.name);
      grid.appendChild(btn);
    });
    document.getElementById('answersArea').appendChild(grid);
  }
}

function handleAnswer(isCorrect, btn, grid, correctLabel){
  if(isCorrect) score++;
  document.getElementById('score').textContent = score;
  Array.from(grid.children).forEach(b => b.disabled = true);
  if(isCorrect){
    btn.classList.add('correct');
    showFlash(true);
  } else {
    btn.classList.add('wrong');
    Array.from(grid.children).forEach(b => {
      if(b.textContent.trim() === correctLabel.trim()) b.classList.add('correct');
    });
    showFlash(false);
  }
  setTimeout(nextRound, 1200);
}

function showFlash(correct){
  const fb = document.getElementById('flashFeedback');
  fb.textContent = correct ? '✓ Correct!' : '✗ Not quite!';
  fb.className = 'flash-feedback '+(correct?'show-correct':'show-wrong');
  setTimeout(()=>fb.className='flash-feedback', 1100);
}

function nextRound(){
  currentRound++;
  if(currentRound >= 10) showEndScreen();
  else renderRound();
}

function showEndScreen(){
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('endScreen').classList.add('show');
  const emoji = score>=9?'🌟':score>=7?'😊':'💪';
  const title = score>=9?'Brilliant!':score>=7?'Well Done!':'Keep Trying!';
  document.getElementById('endEmoji').textContent=emoji;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endScore').textContent=`${score} / 10 correct`;
}

function restartGame(){
  score=0; currentRound=0;
  document.getElementById('score').textContent='0';
  document.getElementById('endScreen').classList.remove('show');
  buildRounds();
  renderRound();
}

buildRounds();
renderRound();
</script>
</body>
</html>
