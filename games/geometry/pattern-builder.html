<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Builder – MathMunch</title>
<style>
  :root {
    --primary:#6C5CE7; --primary-light:#E8E4FF;
    --g1:#4ECDC4; --g2:#2ECC71;
    --accent:#FDCB6E; --accent-dark:#E17055;
    --bg:#F0F4FF; --white:#FFFFFF;
    --text:#1E1E2E; --text2:#525270;
    --green:#00B894; --red:#FF4757;
    --radius:16px; --shadow:0 4px 20px rgba(78,205,196,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#FFF9F0;color:var(--text);min-height:100vh}

  .topbar{position:sticky;top:0;z-index:100;background:var(--white);box-shadow:0 2px 15px rgba(0,0,0,0.08);display:flex;align-items:center;gap:12px;padding:10px 20px;flex-wrap:wrap}
  .topbar a.back{text-decoration:none;color:var(--primary);font-weight:700;font-size:14px;display:flex;align-items:center;gap:4px;white-space:nowrap}
  .topbar .brand{font-weight:900;font-size:18px;color:var(--primary)}
  .topbar .game-title{font-weight:700;font-size:16px;color:var(--text);flex:1}
  .badge{padding:4px 12px;border-radius:20px;font-weight:800;font-size:12px;background:#FFF0E0;color:#FF7043}
  .score-box{display:flex;align-items:center;gap:5px;font-weight:800;font-size:16px;color:var(--text)}

  .game-area{max-width:800px;margin:24px auto 90px;padding:0 16px}

  .question-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow);padding:28px 24px;margin-bottom:20px;text-align:center}
  .q-label{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
  .q-text{font-size:20px;font-weight:800;color:var(--text);margin-bottom:24px}

  /* PATTERN ROW */
  .pattern-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .tile{width:62px;height:62px;display:flex;align-items:center;justify-content:center;border-radius:12px;position:relative;flex-shrink:0}
  .tile-blank{width:62px;height:62px;border:3px dashed #B0B0C0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#B0B0C0;background:#F8F8FF;flex-shrink:0}

  /* CSS Shapes inside tiles */
  .sh-circle{border-radius:50%}
  .sh-square{border-radius:4px}
  .sh-triangle{width:0!important;height:0!important;border-left:20px solid transparent;border-right:20px solid transparent}
  .sh-diamond{transform:rotate(45deg);border-radius:3px}

  /* Answer tiles */
  .answers-row{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:10px}
  .answer-tile{width:72px;height:72px;display:flex;align-items:center;justify-content:center;border-radius:14px;border:3px solid #E8E4FF;cursor:pointer;transition:all 0.2s;background:var(--white);position:relative;overflow:visible}
  .answer-tile:hover:not(.disabled){transform:scale(1.1);border-color:var(--primary);box-shadow:0 4px 16px rgba(108,92,231,0.2)}
  .answer-tile.correct-ans{border-color:var(--green);background:#E8FFF3;animation:flyIn 0.4s ease}
  .answer-tile.wrong-ans{border-color:var(--red);background:#FFE8EC}
  .answer-tile.disabled{cursor:not-allowed;opacity:0.7}
  @keyframes flyIn{0%{transform:scale(1.3)}50%{transform:scale(0.9)}100%{transform:scale(1)}}

  .label-below{font-size:11px;font-weight:700;color:var(--text2);margin-top:4px;text-align:center}
  .answer-wrap{display:flex;flex-direction:column;align-items:center}

  /* Feedback */
  .feedback{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;padding:18px 36px;border-radius:20px;font-size:22px;font-weight:800;color:white;pointer-events:none}
  .feedback.show-correct{display:block;background:var(--green)}
  .feedback.show-wrong{display:block;background:var(--red)}

  /* Progress */
  .progress-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);box-shadow:0 -2px 15px rgba(0,0,0,0.08);padding:12px 20px;z-index:100}
  .progress-info{display:flex;justify-content:space-between;font-weight:700;font-size:13px;color:var(--text2);margin-bottom:6px}
  .progress-track{height:8px;background:#E8E4FF;border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#4ECDC4,#2ECC71);border-radius:4px;transition:width 0.4s ease}

  /* End screen */
  .end-screen{display:none;position:fixed;inset:0;z-index:300;background:rgba(30,30,46,0.85);backdrop-filter:blur(6px);align-items:center;justify-content:center}
  .end-screen.show{display:flex}
  .end-card{background:var(--white);border-radius:24px;padding:40px 36px;text-align:center;max-width:420px;width:90%;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1)}
  @keyframes popIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
  .end-emoji{font-size:56px;margin-bottom:10px}
  .end-title{font-size:28px;font-weight:900;color:var(--text);margin-bottom:6px}
  .end-score-text{font-size:18px;color:var(--text2);margin-bottom:14px}
  .end-stars{font-size:32px;margin-bottom:6px}
  .end-verdict{font-size:20px;font-weight:800;color:var(--primary);margin-bottom:24px}
  .btn-geo{padding:12px 28px;border-radius:12px;font-weight:800;cursor:pointer;border:none;background:linear-gradient(135deg,#4ECDC4,#2ECC71);color:white;box-shadow:0 4px 15px rgba(78,205,196,0.35);font-size:16px;transition:all 0.2s;text-decoration:none;display:inline-block;margin:6px}
  .btn-geo:hover{transform:translateY(-2px)}
  .btn-secondary{padding:12px 28px;border-radius:12px;font-weight:800;cursor:pointer;border:2px solid var(--primary);background:transparent;color:var(--primary);font-size:16px;transition:all 0.2s;text-decoration:none;display:inline-block;margin:6px}
  .btn-secondary:hover{background:var(--primary-light)}

  .pattern-hint{font-size:13px;color:var(--text2);margin-top:6px;font-style:italic}
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="../../index.html">← All Games</a>
  <div class="brand">🧮 MathMunch</div>
  <div class="game-title">Pattern Builder</div>
  <div class="badge">P1</div>
  <div class="score-box">⭐ <span id="scoreDisplay">0</span></div>
</div>

<div class="game-area">
  <div class="question-card" id="questionCard">
    <div class="q-label" id="qLabel">Question 1 of 10</div>
    <div class="q-text">What comes next in the pattern?</div>
    <div class="pattern-row" id="patternRow"></div>
    <div class="pattern-hint" id="patternHint"></div>
  </div>
  <div class="answers-row" id="answersRow"></div>
</div>

<div class="feedback" id="feedback"></div>

<div class="progress-bar">
  <div class="progress-info">
    <span id="progressText">Question 1 of 10</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-score-text" id="endScoreText"></div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-verdict" id="endVerdict"></div>
    <button class="btn-geo" onclick="restartGame()">Play Again</button>
    <a class="btn-secondary" href="../../index.html">← Back to All Games</a>
  </div>
</div>

<script>
// Shape + colour tile descriptor
// shape: 'circle','square','triangle','diamond'
// color: hex string

const PATTERNS = [
  // Round 1: Red circle, Blue circle alternating
  { sequence:[{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#74B9FF'},{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#74B9FF'},{s:'circle',c:'#FF6B6B'}], answer:{s:'circle',c:'#74B9FF'}, hint:'AB AB AB...', distractors:[{s:'circle',c:'#FF6B6B'},{s:'square',c:'#74B9FF'},{s:'circle',c:'#FFD93D'}] },
  // Round 2: Yellow square, Green square alternating
  { sequence:[{s:'square',c:'#FFD93D'},{s:'square',c:'#2ECC71'},{s:'square',c:'#FFD93D'},{s:'square',c:'#2ECC71'},{s:'square',c:'#FFD93D'}], answer:{s:'square',c:'#2ECC71'}, hint:'AB AB AB...', distractors:[{s:'square',c:'#FFD93D'},{s:'circle',c:'#2ECC71'},{s:'square',c:'#FF6B6B'}] },
  // Round 3: Triangle, Diamond alternating
  { sequence:[{s:'triangle',c:'#FF6B6B'},{s:'diamond',c:'#4ECDC4'},{s:'triangle',c:'#FF6B6B'},{s:'diamond',c:'#4ECDC4'}], answer:{s:'triangle',c:'#FF6B6B'}, hint:'AB AB AB...', distractors:[{s:'diamond',c:'#4ECDC4'},{s:'triangle',c:'#4ECDC4'},{s:'circle',c:'#FF6B6B'}] },
  // Round 4: Red circle, Red circle, Blue circle
  { sequence:[{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#74B9FF'},{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#FF6B6B'}], answer:{s:'circle',c:'#74B9FF'}, hint:'AAB AAB...', distractors:[{s:'circle',c:'#FF6B6B'},{s:'square',c:'#74B9FF'},{s:'circle',c:'#2ECC71'}] },
  // Round 5: Orange, Green, Purple cycling
  { sequence:[{s:'circle',c:'#FF8E53'},{s:'circle',c:'#2ECC71'},{s:'circle',c:'#A29BFE'},{s:'circle',c:'#FF8E53'},{s:'circle',c:'#2ECC71'}], answer:{s:'circle',c:'#A29BFE'}, hint:'ABC ABC...', distractors:[{s:'circle',c:'#FF8E53'},{s:'circle',c:'#2ECC71'},{s:'square',c:'#A29BFE'}] },
  // Round 6: Black square, White square alternating
  { sequence:[{s:'square',c:'#1A1A2E'},{s:'square',c:'#E0E0E0'},{s:'square',c:'#1A1A2E'},{s:'square',c:'#E0E0E0'},{s:'square',c:'#1A1A2E'}], answer:{s:'square',c:'#E0E0E0'}, hint:'AB AB AB...', distractors:[{s:'square',c:'#1A1A2E'},{s:'circle',c:'#E0E0E0'},{s:'square',c:'#FF6B6B'}] },
  // Round 7: Red, Blue, Yellow cycling
  { sequence:[{s:'square',c:'#FF6B6B'},{s:'square',c:'#74B9FF'},{s:'square',c:'#FFD93D'},{s:'square',c:'#FF6B6B'},{s:'square',c:'#74B9FF'}], answer:{s:'square',c:'#FFD93D'}, hint:'ABC ABC...', distractors:[{s:'square',c:'#FF6B6B'},{s:'square',c:'#74B9FF'},{s:'circle',c:'#FFD93D'}] },
  // Round 8: Teal diamond, Teal diamond, Red circle
  { sequence:[{s:'diamond',c:'#4ECDC4'},{s:'diamond',c:'#4ECDC4'},{s:'circle',c:'#FF6B6B'},{s:'diamond',c:'#4ECDC4'},{s:'diamond',c:'#4ECDC4'}], answer:{s:'circle',c:'#FF6B6B'}, hint:'AAB AAB...', distractors:[{s:'diamond',c:'#4ECDC4'},{s:'circle',c:'#4ECDC4'},{s:'square',c:'#FF6B6B'}] },
  // Round 9: Green circle, Yellow circle alternating
  { sequence:[{s:'circle',c:'#2ECC71'},{s:'circle',c:'#FFD93D'},{s:'circle',c:'#2ECC71'},{s:'circle',c:'#FFD93D'},{s:'circle',c:'#2ECC71'}], answer:{s:'circle',c:'#FFD93D'}, hint:'AB AB AB...', distractors:[{s:'circle',c:'#2ECC71'},{s:'square',c:'#FFD93D'},{s:'circle',c:'#FF6B6B'}] },
  // Round 10: Purple triangle x2, Blue circle
  { sequence:[{s:'triangle',c:'#A29BFE'},{s:'triangle',c:'#A29BFE'},{s:'circle',c:'#74B9FF'},{s:'triangle',c:'#A29BFE'},{s:'triangle',c:'#A29BFE'}], answer:{s:'circle',c:'#74B9FF'}, hint:'AAB AAB...', distractors:[{s:'triangle',c:'#A29BFE'},{s:'circle',c:'#A29BFE'},{s:'diamond',c:'#74B9FF'}] },
];

let currentRound = 0;
let score = 0;

function makeTileEl(desc, size=60, border=false){
  const tile = document.createElement('div');
  tile.style.width = size+'px';
  tile.style.height = size+'px';
  tile.style.display = 'flex';
  tile.style.alignItems = 'center';
  tile.style.justifyContent = 'center';
  tile.style.borderRadius = '12px';
  if(border) tile.style.border = '2px solid rgba(0,0,0,0.08)';
  tile.style.background = 'transparent';

  if(desc.s === 'triangle'){
    const tri = document.createElement('div');
    const half = Math.round(size*0.35);
    const h = Math.round(size*0.6);
    tri.style.cssText = `width:0;height:0;border-left:${half}px solid transparent;border-right:${half}px solid transparent;border-bottom:${h}px solid ${desc.c};`;
    tile.appendChild(tri);
  } else if(desc.s === 'diamond'){
    const sq = document.createElement('div');
    const s2 = Math.round(size*0.5);
    sq.style.cssText = `width:${s2}px;height:${s2}px;background:${desc.c};transform:rotate(45deg);border-radius:3px;`;
    tile.appendChild(sq);
  } else if(desc.s === 'circle'){
    const ci = document.createElement('div');
    const s2 = Math.round(size*0.72);
    ci.style.cssText = `width:${s2}px;height:${s2}px;background:${desc.c};border-radius:50%;`;
    tile.appendChild(ci);
  } else {
    const sq = document.createElement('div');
    const s2 = Math.round(size*0.72);
    sq.style.cssText = `width:${s2}px;height:${s2}px;background:${desc.c};border-radius:4px;`;
    tile.appendChild(sq);
  }
  return tile;
}

function tilesEqual(a, b){
  return a.s === b.s && a.c === b.c;
}

function renderRound(){
  const r = PATTERNS[currentRound];
  document.getElementById('qLabel').textContent = `Question ${currentRound+1} of 10`;
  document.getElementById('progressText').textContent = `Question ${currentRound+1} of 10`;
  const pct = Math.round((currentRound/10)*100);
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('patternHint').textContent = 'What comes next?';

  // Pattern row
  const patternRow = document.getElementById('patternRow');
  patternRow.innerHTML = '';
  r.sequence.forEach(tile => {
    const el = makeTileEl(tile, 62, true);
    patternRow.appendChild(el);
  });
  // Separator arrow
  const arrow = document.createElement('div');
  arrow.style.cssText = 'font-size:22px;color:#B0B0C0;flex-shrink:0;';
  arrow.textContent = '→';
  patternRow.appendChild(arrow);
  // Blank tile
  const blank = document.createElement('div');
  blank.className = 'tile-blank';
  blank.textContent = '?';
  patternRow.appendChild(blank);

  // Answer tiles
  const answersRow = document.getElementById('answersRow');
  answersRow.innerHTML = '';
  const allOptions = [r.answer, ...r.distractors];
  // shuffle
  const shuffled = allOptions.sort(()=>Math.random()-0.5);
  shuffled.forEach(opt => {
    const wrap = document.createElement('div');
    wrap.className = 'answer-wrap';
    const atile = document.createElement('div');
    atile.className = 'answer-tile';
    const inner = makeTileEl(opt, 60);
    atile.appendChild(inner);
    atile.onclick = () => handleAnswer(tilesEqual(opt, r.answer), atile, answersRow, r.answer);
    wrap.appendChild(atile);
    answersRow.appendChild(wrap);
  });
}

function handleAnswer(isCorrect, clickedTile, answersRow, correctAnswer){
  if(isCorrect) score++;
  document.getElementById('scoreDisplay').textContent = score;

  Array.from(answersRow.children).forEach(w => {
    const tile = w.querySelector('.answer-tile');
    tile.classList.add('disabled');
    tile.onclick = null;
  });

  if(isCorrect){
    clickedTile.classList.add('correct-ans');
    showFeedback(true);
  } else {
    clickedTile.classList.add('wrong-ans');
    // highlight correct
    Array.from(answersRow.children).forEach(w => {
      const tile = w.querySelector('.answer-tile');
      const inner = tile.querySelector('div');
      // re-check by rebuilding - just visually mark
    });
    showFeedback(false);
  }
  setTimeout(nextRound, 1200);
}

function showFeedback(correct){
  const fb = document.getElementById('feedback');
  fb.textContent = correct ? '✓ Correct!' : '✗ Not quite!';
  fb.className = 'feedback '+(correct?'show-correct':'show-wrong');
  setTimeout(()=>fb.className='feedback', 1100);
}

function nextRound(){
  currentRound++;
  if(currentRound >= 10) showEndScreen();
  else renderRound();
}

function showEndScreen(){
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressPct').textContent='100%';
  document.getElementById('endScreen').classList.add('show');
  let emoji,title,stars,verdict;
  if(score>=9){emoji='🌟';title='Brilliant!';stars='★★★';verdict='Amazing work!';}
  else if(score>=7){emoji='😊';title='Well Done!';stars='★★☆';verdict='Great job!';}
  else{emoji='💪';title='Keep Trying!';stars='★☆☆';verdict='You can do it!';}
  document.getElementById('endEmoji').textContent=emoji;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endScoreText').textContent=`You scored ${score} out of 10`;
  document.getElementById('endStars').textContent=stars;
  document.getElementById('endVerdict').textContent=verdict;
}

function restartGame(){
  score=0; currentRound=0;
  document.getElementById('scoreDisplay').textContent='0';
  document.getElementById('endScreen').classList.remove('show');
  renderRound();
}

renderRound();
</script>
</body>
</html>
