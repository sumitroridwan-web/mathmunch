<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Pattern Builder – MathMunch</title>
<style>
:root {
  --green:#10B981; --green-dark:#059669; --green-light:#ECFDF5;
  --canvas:#D1FAE5; --bg:#F8FAFC; --white:#FFFFFF;
  --text:#1E293B; --text2:#64748B; --shadow:0 4px 20px rgba(16,185,129,0.12);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

.site-header{background:var(--white);box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:20px;color:var(--green);text-decoration:none;display:flex;align-items:center;gap:8px;}
.header-nav{display:flex;align-items:center;gap:16px;}
.header-nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;}
.header-nav a:hover{color:var(--green);}
.header-cta{background:var(--green);color:white;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;text-decoration:none;}

.game-layout{display:grid;grid-template-columns:280px 1fr;flex:1;min-height:0;}

.sidebar{background:var(--white);border-right:1px solid #E2E8F0;padding:24px 20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.exit-btn{display:flex;align-items:center;gap:8px;background:var(--green-light);color:var(--green-dark);border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%;}
.exit-btn:hover{background:#D1FAE5;}
.stat-card{background:var(--bg);border-radius:12px;padding:16px;border:1px solid #E2E8F0;}
.stat-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.stat-value{font-family:'Quicksand',sans-serif;font-size:28px;font-weight:700;color:var(--green);}
.level-progress-track{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;margin-top:8px;}
.level-progress-fill{height:100%;background:linear-gradient(90deg,#34D399,var(--green));border-radius:99px;transition:width 0.4s ease;width:0%;}

.game-canvas{background:var(--canvas);position:relative;overflow-y:auto;padding:32px 28px;}
.game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#6EE7B7 1px,transparent 1px);background-size:24px 24px;opacity:0.4;pointer-events:none;}
.canvas-inner{position:relative;z-index:1;}

/* Game-specific CSS */
.question-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow);padding:28px 24px;margin-bottom:20px;text-align:center;}
.q-label{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.q-text{font-size:18px;font-weight:700;color:var(--text);margin-bottom:24px;}
.pattern-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.tile-blank{width:62px;height:62px;border:3px dashed #6EE7B7;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#6EE7B7;background:#F0FDF4;flex-shrink:0;}
.answers-row{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:10px;}
.answer-tile{width:72px;height:72px;display:flex;align-items:center;justify-content:center;border-radius:14px;border:3px solid #A7F3D0;cursor:pointer;transition:all 0.2s;background:var(--white);position:relative;overflow:visible;}
.answer-tile:hover:not(.disabled){transform:scale(1.1);border-color:var(--green);box-shadow:0 4px 16px rgba(16,185,129,0.2);}
.answer-tile.correct-ans{border-color:var(--green-dark);background:#D1FAE5;animation:flyIn 0.4s ease;}
.answer-tile.wrong-ans{border-color:#DC2626;background:#FEE2E2;}
.answer-tile.disabled{cursor:not-allowed;opacity:0.7;}
@keyframes flyIn{0%{transform:scale(1.3)}50%{transform:scale(0.9)}100%{transform:scale(1)}}
.answer-wrap{display:flex;flex-direction:column;align-items:center;}
.pattern-hint{font-size:13px;color:var(--text2);margin-top:6px;font-style:italic;}
.flash-feedback{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;padding:18px 36px;border-radius:20px;font-size:22px;font-weight:700;color:white;pointer-events:none;}
.flash-feedback.show-correct{display:block;background:var(--green-dark);}
.flash-feedback.show-wrong{display:block;background:#DC2626;}

.end-screen{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:300;}
.end-screen.show{display:flex;}
.end-card{background:var(--white);border-radius:24px;padding:40px 36px;max-width:420px;width:90%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
#endEmoji{font-size:48px;margin-bottom:12px;}
#endTitle{font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px;font-family:'Quicksand',sans-serif;}
#endScore{font-size:18px;font-weight:700;color:var(--green);margin-bottom:24px;}
.btn{display:inline-block;padding:12px 28px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:none;margin:4px;text-decoration:none;}
.btn-play{background:linear-gradient(135deg,#34D399,var(--green));color:white;}
.btn-home{background:var(--green-light);color:var(--green-dark);}

@media(max-width:768px){
  .game-layout{grid-template-columns:1fr;}
  .sidebar{flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid #E2E8F0;padding:12px;}
  .header-nav{display:none;}
}
</style>
</head>
<body>
<script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <a href="../../index.html" class="header-logo">🧮 MathMunch</a>
  <nav class="header-nav">
    <a href="../../index.html">All Games</a>
    <a href="#">Leaderboard</a>
    <a href="../../index.html" class="header-cta">Play Now</a>
  </nav>
</header>

<div class="game-layout">
  <div class="sidebar">
    <button class="exit-btn" onclick="window.location.href='../../index.html'">&#8617; Exit Game</button>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-value" style="font-size:18px;">Builder</div>
      <div class="level-progress-track"><div class="level-progress-fill" id="progressBar"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Grade</div>
      <div class="stat-value" style="font-size:18px;color:var(--text);">P1</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Topic</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;line-height:1.5;">Shape &amp; Colour Patterns</div>
    </div>
  </div>

  <div class="game-canvas">
    <div class="canvas-inner">
      <div class="question-card" id="questionCard">
        <div class="q-label" id="qLabel">Question 1 of 10</div>
        <div class="q-text">What comes next in the pattern?</div>
        <div class="pattern-row" id="patternRow"></div>
        <div class="pattern-hint" id="patternHint"></div>
      </div>
      <div class="answers-row" id="answersRow"></div>
    </div>
  </div>
</div>

<div class="flash-feedback" id="flashFeedback"></div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div id="endEmoji">🎉</div>
    <div id="endTitle">Game Over!</div>
    <div id="endScore">0 / 10</div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">&#8592; All Games</a>
  </div>
</div>

<script>
const PATTERNS = [
  { sequence:[{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#74B9FF'},{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#74B9FF'},{s:'circle',c:'#FF6B6B'}], answer:{s:'circle',c:'#74B9FF'}, hint:'AB AB AB...', distractors:[{s:'circle',c:'#FF6B6B'},{s:'square',c:'#74B9FF'},{s:'circle',c:'#FFD93D'}] },
  { sequence:[{s:'square',c:'#FFD93D'},{s:'square',c:'#10B981'},{s:'square',c:'#FFD93D'},{s:'square',c:'#10B981'},{s:'square',c:'#FFD93D'}], answer:{s:'square',c:'#10B981'}, hint:'AB AB AB...', distractors:[{s:'square',c:'#FFD93D'},{s:'circle',c:'#10B981'},{s:'square',c:'#FF6B6B'}] },
  { sequence:[{s:'triangle',c:'#FF6B6B'},{s:'diamond',c:'#34D399'},{s:'triangle',c:'#FF6B6B'},{s:'diamond',c:'#34D399'}], answer:{s:'triangle',c:'#FF6B6B'}, hint:'AB AB AB...', distractors:[{s:'diamond',c:'#34D399'},{s:'triangle',c:'#34D399'},{s:'circle',c:'#FF6B6B'}] },
  { sequence:[{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#74B9FF'},{s:'circle',c:'#FF6B6B'},{s:'circle',c:'#FF6B6B'}], answer:{s:'circle',c:'#74B9FF'}, hint:'AAB AAB...', distractors:[{s:'circle',c:'#FF6B6B'},{s:'square',c:'#74B9FF'},{s:'circle',c:'#10B981'}] },
  { sequence:[{s:'circle',c:'#FF8E53'},{s:'circle',c:'#10B981'},{s:'circle',c:'#6EE7B7'},{s:'circle',c:'#FF8E53'},{s:'circle',c:'#10B981'}], answer:{s:'circle',c:'#6EE7B7'}, hint:'ABC ABC...', distractors:[{s:'circle',c:'#FF8E53'},{s:'circle',c:'#10B981'},{s:'square',c:'#6EE7B7'}] },
  { sequence:[{s:'square',c:'#1A1A2E'},{s:'square',c:'#E0E0E0'},{s:'square',c:'#1A1A2E'},{s:'square',c:'#E0E0E0'},{s:'square',c:'#1A1A2E'}], answer:{s:'square',c:'#E0E0E0'}, hint:'AB AB AB...', distractors:[{s:'square',c:'#1A1A2E'},{s:'circle',c:'#E0E0E0'},{s:'square',c:'#FF6B6B'}] },
  { sequence:[{s:'square',c:'#FF6B6B'},{s:'square',c:'#74B9FF'},{s:'square',c:'#FFD93D'},{s:'square',c:'#FF6B6B'},{s:'square',c:'#74B9FF'}], answer:{s:'square',c:'#FFD93D'}, hint:'ABC ABC...', distractors:[{s:'square',c:'#FF6B6B'},{s:'square',c:'#74B9FF'},{s:'circle',c:'#FFD93D'}] },
  { sequence:[{s:'diamond',c:'#34D399'},{s:'diamond',c:'#34D399'},{s:'circle',c:'#FF6B6B'},{s:'diamond',c:'#34D399'},{s:'diamond',c:'#34D399'}], answer:{s:'circle',c:'#FF6B6B'}, hint:'AAB AAB...', distractors:[{s:'diamond',c:'#34D399'},{s:'circle',c:'#34D399'},{s:'square',c:'#FF6B6B'}] },
  { sequence:[{s:'circle',c:'#10B981'},{s:'circle',c:'#FFD93D'},{s:'circle',c:'#10B981'},{s:'circle',c:'#FFD93D'},{s:'circle',c:'#10B981'}], answer:{s:'circle',c:'#FFD93D'}, hint:'AB AB AB...', distractors:[{s:'circle',c:'#10B981'},{s:'square',c:'#FFD93D'},{s:'circle',c:'#FF6B6B'}] },
  { sequence:[{s:'triangle',c:'#6EE7B7'},{s:'triangle',c:'#6EE7B7'},{s:'circle',c:'#74B9FF'},{s:'triangle',c:'#6EE7B7'},{s:'triangle',c:'#6EE7B7'}], answer:{s:'circle',c:'#74B9FF'}, hint:'AAB AAB...', distractors:[{s:'triangle',c:'#6EE7B7'},{s:'circle',c:'#6EE7B7'},{s:'diamond',c:'#74B9FF'}] },
];

let currentRound = 0;
let score = 0;

function makeTileEl(desc, size=60, border=false){
  const tile = document.createElement('div');
  tile.style.width = size+'px';
  tile.style.height = size+'px';
  tile.style.display = 'flex';
  tile.style.alignItems = 'center';
  tile.style.justifyContent = 'center';
  tile.style.borderRadius = '12px';
  if(border) tile.style.border = '2px solid rgba(0,0,0,0.06)';
  tile.style.background = 'transparent';

  if(desc.s === 'triangle'){
    const tri = document.createElement('div');
    const half = Math.round(size*0.35);
    const h = Math.round(size*0.6);
    tri.style.cssText = `width:0;height:0;border-left:${half}px solid transparent;border-right:${half}px solid transparent;border-bottom:${h}px solid ${desc.c};`;
    tile.appendChild(tri);
  } else if(desc.s === 'diamond'){
    const sq = document.createElement('div');
    const s2 = Math.round(size*0.5);
    sq.style.cssText = `width:${s2}px;height:${s2}px;background:${desc.c};transform:rotate(45deg);border-radius:3px;`;
    tile.appendChild(sq);
  } else if(desc.s === 'circle'){
    const ci = document.createElement('div');
    const s2 = Math.round(size*0.72);
    ci.style.cssText = `width:${s2}px;height:${s2}px;background:${desc.c};border-radius:50%;`;
    tile.appendChild(ci);
  } else {
    const sq = document.createElement('div');
    const s2 = Math.round(size*0.72);
    sq.style.cssText = `width:${s2}px;height:${s2}px;background:${desc.c};border-radius:4px;`;
    tile.appendChild(sq);
  }
  return tile;
}

function tilesEqual(a, b){ return a.s === b.s && a.c === b.c; }

function renderRound(){
  const r = PATTERNS[currentRound];
  document.getElementById('qLabel').textContent = `Question ${currentRound+1} of 10`;
  const pct = Math.round((currentRound/10)*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('patternHint').textContent = 'What comes next?';

  const patternRow = document.getElementById('patternRow');
  patternRow.innerHTML = '';
  r.sequence.forEach(tile => {
    const el = makeTileEl(tile, 62, true);
    patternRow.appendChild(el);
  });
  const arrow = document.createElement('div');
  arrow.style.cssText = 'font-size:22px;color:#6EE7B7;flex-shrink:0;';
  arrow.textContent = '→';
  patternRow.appendChild(arrow);
  const blank = document.createElement('div');
  blank.className = 'tile-blank';
  blank.textContent = '?';
  patternRow.appendChild(blank);

  const answersRow = document.getElementById('answersRow');
  answersRow.innerHTML = '';
  const allOptions = [r.answer, ...r.distractors];
  const shuffled = allOptions.sort(()=>Math.random()-0.5);
  shuffled.forEach(opt => {
    const wrap = document.createElement('div');
    wrap.className = 'answer-wrap';
    const atile = document.createElement('div');
    atile.className = 'answer-tile';
    const inner = makeTileEl(opt, 60);
    atile.appendChild(inner);
    atile.onclick = () => handleAnswer(tilesEqual(opt, r.answer), atile, answersRow, r.answer);
    wrap.appendChild(atile);
    answersRow.appendChild(wrap);
  });
}

function handleAnswer(isCorrect, clickedTile, answersRow, correctAnswer){
  if(isCorrect) score++;
  document.getElementById('score').textContent = score;

  Array.from(answersRow.children).forEach(w => {
    const tile = w.querySelector('.answer-tile');
    tile.classList.add('disabled');
    tile.onclick = null;
  });

  if(isCorrect){
    clickedTile.classList.add('correct-ans');
    showFlash(true);
  } else {
    clickedTile.classList.add('wrong-ans');
    showFlash(false);
  }
  setTimeout(nextRound, 1200);
}

function showFlash(correct){
  const fb = document.getElementById('flashFeedback');
  fb.textContent = correct ? '✓ Correct!' : '✗ Not quite!';
  fb.className = 'flash-feedback '+(correct?'show-correct':'show-wrong');
  setTimeout(()=>fb.className='flash-feedback', 1100);
}

function nextRound(){
  currentRound++;
  if(currentRound >= 10) showEndScreen();
  else renderRound();
}

function showEndScreen(){
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('endScreen').classList.add('show');
  const emoji = score>=9?'🌟':score>=7?'😊':'💪';
  const title = score>=9?'Brilliant!':score>=7?'Well Done!':'Keep Trying!';
  document.getElementById('endEmoji').textContent=emoji;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endScore').textContent=`${score} / 10 correct`;
}

function restartGame(){
  score=0; currentRound=0;
  document.getElementById('score').textContent='0';
  document.getElementById('endScreen').classList.remove('show');
  renderRound();
}

renderRound();
</script>
</body>
</html>
