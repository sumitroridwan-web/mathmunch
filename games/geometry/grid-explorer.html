<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<title>Grid Explorer – MathMunch</title>
<style>
  :root {
    --blue:#3B82F6;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
    --green:#10B981;--orange:#F97316;
    --bg:#F8FAFC;--white:#FFFFFF;--outline:#E2E8F0;
    --text:#191C1E;--text-mid:#424754;--text-soft:#727785;
    --canvas:#FFF7ED;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3,.logo-text,.stat-value,.game-title-text{font-family:'Quicksand',system-ui,sans-serif;}
  .site-header{background:var(--white);border-bottom:1px solid var(--outline);position:sticky;top:0;z-index:100;}
  .site-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:38px;height:38px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 2px 0 var(--blue-dark);}
  .logo-text{font-size:1.25rem;font-weight:700;color:var(--blue);}
  .site-nav{display:flex;gap:4px;}
  .site-nav a{text-decoration:none;color:var(--text-mid);font-weight:600;font-size:.9rem;padding:8px 16px;border-radius:9999px;transition:.15s;}
  .site-nav a:hover,.site-nav a.active{background:var(--blue-light);color:var(--blue);}
  .btn-play-now{background:var(--blue);color:white;padding:10px 22px;border-radius:9999px;font-weight:700;font-size:.9rem;text-decoration:none;box-shadow:0 3px 0 var(--blue-dark);transition:.1s;}
  .btn-play-now:hover{transform:translateY(-1px);}
  .game-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;padding:20px 24px 24px;max-width:1200px;margin:0 auto;flex:1;align-items:start;}
  .sidebar{display:flex;flex-direction:column;gap:12px;}
  .exit-btn{background:var(--white);border:2px solid var(--outline);border-radius:9999px;padding:12px 20px;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:600;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 0 var(--outline);transition:.1s;}
  .exit-btn:hover{border-color:var(--blue);color:var(--blue);}
  .stat-card{background:var(--white);border:1px solid var(--outline);border-radius:24px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .stat-label{font-family:'Lexend',sans-serif;font-size:.7rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .stat-value{font-size:2.2rem;font-weight:700;color:var(--blue);line-height:1;}
  .stat-level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .level-icon{font-size:1.4rem;}
  .stat-value-sm{font-size:1.8rem;font-weight:700;color:var(--blue);}
  .level-progress{height:10px;background:var(--outline);border-radius:9999px;overflow:hidden;}
  .level-progress-fill{height:100%;background:var(--green);border-radius:9999px;width:0%;transition:width .4s ease;}
  .hearts{display:flex;gap:6px;font-size:1.5rem;}
  .game-info-title{font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
  .level-pill{display:inline-block;background:var(--orange);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:9999px;}
  .game-canvas{background:var(--canvas);border-radius:24px;padding:32px;position:relative;overflow:hidden;min-height:520px;border:1px solid rgba(249,115,22,.15);}
  .game-canvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
  .game-canvas > *{position:relative;z-index:1;}

  .game-card{background:rgba(255,255,255,0.85);border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:20px;position:relative;}
  .question-label{font-size:1rem;font-weight:600;color:var(--text-mid);margin-bottom:10px;text-transform:uppercase;letter-spacing:2px;}
  .question-text{font-family:'Quicksand',sans-serif;font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.4;}
  .grid-wrap{display:flex;justify-content:center;margin-bottom:16px;overflow-x:auto;}
  /* Coordinate grid via SVG */
  .timer-wrap{margin:8px auto 16px;max-width:300px;}
  .timer-bar-track{background:rgba(249,115,22,0.15);border-radius:99px;height:12px;overflow:hidden;}
  .timer-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#FED7AA,#F97316);transition:width 0.1s linear;}
  .timer-label{font-size:0.75rem;color:var(--text-soft);margin-top:4px;font-weight:600;}
  .answer-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .answer-card{flex:1;min-width:100px;max-width:160px;border-radius:20px;padding:18px 10px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;border:none;font-family:inherit;color:white;font-size:1rem;font-weight:900;display:flex;flex-direction:column;align-items:center;gap:6px;background:linear-gradient(135deg,#F97316,#FDBA74);box-shadow:0 6px 20px rgba(249,115,22,0.4);}
  .answer-card:hover:not(:disabled){transform:translateY(-4px) scale(1.03);}
  .answer-card:disabled{cursor:default;opacity:0.7;}
  .answer-card.correct{box-shadow:0 0 0 4px #10B981,0 8px 24px rgba(16,185,129,0.4)!important;transform:scale(1.05);}
  .answer-card.wrong{opacity:0.5;transform:scale(0.95);}
  .card-label{font-size:1.2rem;font-weight:900;}
  .speed-bonus{position:absolute;top:20px;right:20px;background:#FDCB6E;color:var(--text);font-weight:800;font-size:0.85rem;padding:4px 10px;border-radius:20px;animation:popIn 0.3s ease;display:none;}
  .speed-bonus.show{display:block;}
  @keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
  .feedback-box{border-radius:12px;padding:12px 20px;text-align:center;font-weight:700;font-size:.95rem;margin-top:12px;display:none;}
  .feedback-box.correct{background:#D1FAE5;color:#065F46;display:block;}
  .feedback-box.wrong{background:#FEE2E2;color:#991B1B;display:block;}
  .round-counter{text-align:center;font-size:.85rem;font-weight:700;color:var(--text-soft);margin-bottom:10px;}
  .confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:200;overflow:hidden;}
  .confetti-piece{position:absolute;font-size:1.5rem;animation:confettiFly 1.2s ease-out forwards;top:50%;opacity:1;}
  @keyframes confettiFly{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(-220px) rotate(720deg);opacity:0;}}
  .end-screen{display:none;position:fixed;inset:0;background:rgba(25,28,30,.8);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;}
  .end-screen.show{display:flex;}
  .end-card{background:white;border-radius:28px;padding:44px;text-align:center;max-width:420px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:9999px;border:none;cursor:pointer;font-family:'Lexend',sans-serif;font-size:1rem;font-weight:700;transition:.1s;text-decoration:none;}
  .btn-play{background:var(--blue);color:white;box-shadow:0 3px 0 var(--blue-dark);margin:0 6px;}
  .btn-home{background:var(--bg);color:var(--text-mid);border:2px solid var(--outline);margin:0 6px;}
  @media(max-width:768px){.game-layout{grid-template-columns:1fr;padding:16px;}.sidebar{flex-direction:row;flex-wrap:wrap;}.stat-card{flex:1;min-width:140px;}.site-nav{display:none;}}
</style>
</head>
<body><script>if(!localStorage.getItem("mm_user")){sessionStorage.setItem("mm_redir",location.href);location.replace("../../login.html");}</script>

<header class="site-header">
  <div class="site-header-inner">
    <a href="../../index.html" class="logo">
      <div class="logo-icon">🧮</div>
      <span class="logo-text">MathMunch</span>
    </a>
    <nav class="site-nav">
      <a href="../../index.html#games" class="active">Games</a>
      <a href="#">Badges</a>
      <a href="#">Progress</a>
    </nav>

<div class="game-layout">

    <div class="stat-card">

      <div class="stat-value" id="score">0</div>

    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-level-row">
        <span class="level-icon">🏅</span>
        <span class="stat-value-sm">Primary 4</span>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="progressBar"></div>
      </div>
    </div>

      <div class="stat-label">Lives</div>

    <div style="font-family:'Quicksand',sans-serif;font-size:1.9rem;font-weight:700;color:var(--text);margin-bottom:8px;">Map Complete!</div>
    <div style="font-size:1rem;color:var(--text-mid);margin-bottom:8px;" id="endScore">0 / 10</div>
    <div style="font-size:2rem;margin-bottom:8px;" id="endStars">★★★</div>
    <div style="font-size:1rem;color:var(--text-mid);margin-bottom:4px;" id="endLabel">Brilliant!</div>
    <div style="font-size:0.9rem;color:#F59E0B;font-weight:700;margin-bottom:20px;" id="endBonus"></div>
    <button class="btn btn-play" onclick="restartGame()">Play Again</button>
    <a class="btn btn-home" href="../../index.html">← All Games</a>
  </div>
</div>

<script>
const CONFETTI = ['🗺️','🤖','⭐','✨','🌟','🎯','🏆','🎉'];

// Grid: 5×5, coordinates (0,0) bottom-left to (4,4) top-right
// SVG: 280×280 usable area; each cell = 48px; axes offset = 28px from edge
// Cell (x,y): SVG col = x, SVG row = 4-y (y=0 is bottom)

const CELL = 48;      // cell size in px
const PAD = 30;       // left/bottom padding for axis labels
const GRID_N = 5;     // 5×5 grid (points 0–4)
const SVG_W = PAD + CELL * GRID_N + 10;   // ~280
const SVG_H = PAD + CELL * GRID_N + 10;

// Convert grid coord to SVG pixel (top-left of cell)
function gx(x) { return PAD + x * CELL; }
function gy(y) { return SVG_H - PAD - (y + 1) * CELL; } // y=0 at bottom

// Center of cell in SVG pixels
function cx(x) { return gx(x) + CELL / 2; }
function cy(y) { return gy(y) + CELL / 2; }

function buildGridSVG(robotX, robotY, highlightCells, targetCell) {
  // highlightCells: array of {x,y,color} for "plot the point" distractors
  // targetCell: {x,y} the correct answer cell (only used for plot type during reveal)

  let cells = '';
  for (let row = 0; row < GRID_N; row++) {
    for (let col = 0; col < GRID_N; col++) {
      const sx = gx(col);
      const sy = gy(row);
      let fill = 'white';
      let stroke = '#CBD5E1';
      if (highlightCells) {
        const h = highlightCells.find(c => c.x === col && c.y === row);
        if (h) { fill = h.color; stroke = h.borderColor || '#CBD5E1'; }
      }
      cells += `<rect x="${sx}" y="${sy}" width="${CELL}" height="${CELL}"
                      fill="${fill}" stroke="${stroke}" stroke-width="1.5" rx="2"/>`;
    }
  }

  // Axis labels
  let xlabels = '', ylabels = '';
  for (let i = 0; i < GRID_N; i++) {
    xlabels += `<text x="${cx(i)}" y="${SVG_H - 6}" text-anchor="middle"
                      font-family="Lexend,sans-serif" font-size="13" font-weight="700"
                      fill="#64748B">${i}</text>`;
    ylabels += `<text x="${PAD - 8}" y="${cy(i) + 5}" text-anchor="middle"
                      font-family="Lexend,sans-serif" font-size="13" font-weight="700"
                      fill="#64748B">${i}</text>`;
  }

  // Axis lines
  const axisX = `<line x1="${gx(0)}" y1="${SVG_H - PAD}" x2="${gx(GRID_N)}" y2="${SVG_H - PAD}"
                        stroke="#94A3B8" stroke-width="2"/>`;
  const axisY = `<line x1="${PAD}" y1="${gy(-1) + CELL}" x2="${PAD}" y2="${gy(GRID_N - 1)}"
                        stroke="#94A3B8" stroke-width="2"/>`;

  // Axis label text
  const xAxisLabel = `<text x="${gx(GRID_N) - 4}" y="${SVG_H - 6}" font-family="Lexend,sans-serif"
                             font-size="11" fill="#94A3B8" font-weight="700">x</text>`;
  const yAxisLabel = `<text x="${PAD - 8}" y="${gy(GRID_N - 1) - 4}" font-family="Lexend,sans-serif"
                             font-size="11" fill="#94A3B8" font-weight="700">y</text>`;

  // Robot
  let robot = '';
  if (robotX !== null && robotY !== null) {
    robot = `<text x="${cx(robotX)}" y="${cy(robotY) + 10}"
                   font-size="26" text-anchor="middle"
                   style="user-select:none">🤖</text>`;
  }

  return `<svg viewBox="0 0 ${SVG_W} ${SVG_H}" width="${SVG_W}" height="${SVG_H}" xmlns="http://www.w3.org/2000/svg">
    ${cells}
    ${axisX}${axisY}
    ${xlabels}${ylabels}
    ${xAxisLabel}${yAxisLabel}
    ${robot}
  </svg>`;
}

// Pre-set 10 questions — mix of 3 types
const ALL_QUESTIONS = [
  // TYPE A: robot moves, find new coords
  {
    type: 'move',
    robotX: 1, robotY: 1,
    moveRight: 2, moveUp: 2,
    question: 'The 🤖 is at (1,1). It moves 2 right and 2 up. Where is it now?',
    options: ['(2,2)', '(3,3)', '(4,4)', '(2,3)'],
    correctIndex: 1,
    explanation: '1+2=3, 1+2=3 → (3,3).'
  },
  {
    type: 'move',
    robotX: 2, robotY: 3,
    moveRight: 2, moveUp: -1,
    question: 'The 🤖 is at (2,3). It moves 2 right and 1 down. Where is it now?',
    options: ['(3,2)', '(4,2)', '(4,3)', '(3,3)'],
    correctIndex: 1,
    explanation: '2+2=4, 3-1=2 → (4,2).'
  },
  {
    type: 'move',
    robotX: 0, robotY: 0,
    moveRight: 3, moveUp: 4,
    question: 'The 🤖 is at (0,0). It moves 3 right and 4 up. Where is it now?',
    options: ['(3,4)', '(4,3)', '(2,4)', '(3,3)'],
    correctIndex: 0,
    explanation: '0+3=3, 0+4=4 → (3,4).'
  },
  {
    type: 'move',
    robotX: 4, robotY: 4,
    moveRight: -2, moveUp: -3,
    question: 'The 🤖 is at (4,4). It moves 2 left and 3 down. Where is it now?',
    options: ['(2,1)', '(1,2)', '(3,1)', '(2,2)'],
    correctIndex: 0,
    explanation: '4-2=2, 4-3=1 → (2,1).'
  },
  // TYPE B: read coordinates of robot
  {
    type: 'read',
    robotX: 3, robotY: 2,
    question: 'What are the coordinates of the 🤖?',
    options: ['(2,3)', '(3,2)', '(2,2)', '(3,3)'],
    correctIndex: 1,
    explanation: 'The robot is in column 3, row 2 → (3,2).'
  },
  {
    type: 'read',
    robotX: 1, robotY: 4,
    question: 'What are the coordinates of the 🤖?',
    options: ['(4,1)', '(1,4)', '(0,4)', '(1,3)'],
    correctIndex: 1,
    explanation: 'The robot is in column 1, row 4 → (1,4).'
  },
  {
    type: 'read',
    robotX: 0, robotY: 2,
    question: 'What are the coordinates of the 🤖?',
    options: ['(2,0)', '(0,3)', '(0,2)', '(1,2)'],
    correctIndex: 2,
    explanation: 'The robot is in column 0, row 2 → (0,2).'
  },
  // TYPE C: plot the point — highlight 4 cells, pick the correct one
  {
    type: 'plot',
    targetX: 2, targetY: 3,
    question: 'Which highlighted cell is at position (2,3)?',
    // distractors: 3 wrong cells (shown in grey), correct in orange
    distractors: [{x:1,y:3},{x:2,y:2},{x:3,y:3}],
    options: ['(1,3)', '(2,2)', '(2,3)', '(3,3)'],
    correctIndex: 2,
    explanation: 'x=2 means column 2; y=3 means row 3 → (2,3).'
  },
  {
    type: 'plot',
    targetX: 4, targetY: 1,
    question: 'Which highlighted cell is at position (4,1)?',
    distractors: [{x:1,y:4},{x:4,y:2},{x:3,y:1}],
    options: ['(1,4)', '(4,2)', '(4,1)', '(3,1)'],
    correctIndex: 2,
    explanation: 'x=4 means column 4; y=1 means row 1 → (4,1).'
  },
  {
    type: 'plot',
    targetX: 0, targetY: 4,
    question: 'Which highlighted cell is at position (0,4)?',
    distractors: [{x:4,y:0},{x:0,y:3},{x:1,y:4}],
    options: ['(4,0)', '(0,3)', '(0,4)', '(1,4)'],
    correctIndex: 2,
    explanation: 'x=0 means column 0; y=4 means row 4 → (0,4).'
  }
];

let rounds = [];
let currentRound = 0;
let score = 0;
let lives = 3;
let bonusStarCount = 0;
let answered = false;
let timerInterval = null;
let timerStart = 0;
const TIMER_DURATION = 10000;

const HIGHLIGHT_COLORS = ['#FED7AA','#BFDBFE','#D1FAE5','#E9D5FF'];
const HIGHLIGHT_BORDERS = ['#F97316','#3B82F6','#10B981','#7C3AED'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateRounds() {
  rounds = shuffle([...ALL_QUESTIONS]).slice(0, 10);
}

function buildHighlightCells(r) {
  if (r.type !== 'plot') return null;
  // Assign colors to all 4 cells (correct + 3 distractors), shuffled
  const allCells = [
    { x: r.targetX, y: r.targetY, isCorrect: true },
    ...r.distractors.map(d => ({ ...d, isCorrect: false }))
  ];
  return allCells.map((c, i) => ({
    x: c.x, y: c.y, isCorrect: c.isCorrect,
    color: HIGHLIGHT_COLORS[i],
    borderColor: HIGHLIGHT_BORDERS[i]
  }));
}

function renderRound() {
  answered = false;
  const r = rounds[currentRound];
  document.getElementById('roundCounter').textContent = `Round ${currentRound + 1} of 10`;
  document.getElementById('questionText').textContent = r.question;

  const gridWrap = document.getElementById('gridWrap');

  let robotX = null, robotY = null, highlights = null;

  if (r.type === 'move') {
    robotX = r.robotX;
    robotY = r.robotY;
  } else if (r.type === 'read') {
    robotX = r.robotX;
    robotY = r.robotY;
  } else if (r.type === 'plot') {
    highlights = buildHighlightCells(r);
  }

  gridWrap.innerHTML = buildGridSVG(robotX, robotY, highlights, null);

  // Answer buttons
  const cardsEl = document.getElementById('answerCards');
  cardsEl.innerHTML = '';
  r.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'answer-card';
    btn.innerHTML = `<span class="card-label">${opt}</span>`;
    btn.onclick = () => handleAnswer(idx);
    cardsEl.appendChild(btn);
  });

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  fb.textContent = '';
  document.getElementById('speedBonus').classList.remove('show');
  updateProgress();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timerStart = Date.now();
  const bar = document.getElementById('timerBar');
  const label = document.getElementById('timerLabel');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.offsetWidth;
  bar.style.transition = 'width 0.1s linear';

  timerInterval = setInterval(() => {
    const elapsed = Date.now() - timerStart;
    const remaining = Math.max(0, TIMER_DURATION - elapsed);
    const pct = (remaining / TIMER_DURATION) * 100;
    bar.style.width = pct + '%';
    const secs = Math.ceil(remaining / 1000);
    label.textContent = secs + (secs === 1 ? ' second' : ' seconds');
    if (remaining <= 0) {
      clearInterval(timerInterval);
      if (!answered) timeUp();
    }
  }, 100);
}

function timeUp() {
  answered = true;
  const r = rounds[currentRound];
  disableButtons();
  highlightCorrect(r.correctIndex);
  revealAnswer(r);
  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box wrong';
  fb.textContent = `⏰ Time's up! ${r.explanation}`;
  loseLife();
  setTimeout(advance, 1800);
}

function handleAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  const elapsed = Date.now() - timerStart;
  const fast = elapsed < 5000;
  const r = rounds[currentRound];
  const correct = idx === r.correctIndex;
  const fb = document.getElementById('feedbackBox');
  const buttons = document.getElementById('answerCards').querySelectorAll('button');
  disableButtons();

  if (r.type === 'move') revealMovedRobot(r);
  if (r.type === 'plot') revealAnswer(r);

  if (correct) {
    score++;
    document.getElementById('score').textContent = score;
    buttons[idx].classList.add('correct');
    fb.className = 'feedback-box correct';
    fb.textContent = fast ? `✓ Correct! ⚡ Speed bonus! ${r.explanation}` : `✓ Correct! ${r.explanation}`;
    if (fast) {
      bonusStarCount++;
      document.getElementById('speedBonus').classList.add('show');
    }
    launchConfetti();
  } else {
    buttons[idx].classList.add('wrong');
    highlightCorrect(r.correctIndex);
    fb.className = 'feedback-box wrong';
    fb.textContent = `✗ Not quite! ${r.explanation}`;
    loseLife();
  }
  setTimeout(advance, 1800);
}

function revealMovedRobot(r) {
  // Show robot at new position
  const newX = r.robotX + r.moveRight;
  const newY = r.robotY + r.moveUp;
  if (newX >= 0 && newX < 5 && newY >= 0 && newY < 5) {
    document.getElementById('gridWrap').innerHTML = buildGridSVG(newX, newY, null, null);
  }
}

function revealAnswer(r) {
  if (r.type === 'plot') {
    const highlights = buildHighlightCells(r);
    document.getElementById('gridWrap').innerHTML = buildGridSVG(null, null, highlights, null);
  }
}

function disableButtons() {
  document.getElementById('answerCards').querySelectorAll('button').forEach(b => b.disabled = true);
}

function highlightCorrect(idx) {
  const buttons = document.getElementById('answerCards').querySelectorAll('button');
  if (buttons[idx]) buttons[idx].classList.add('correct');
}

function loseLife() {
  if (lives > 0) lives--;
  const heartsEl = document.getElementById('hearts');
  heartsEl.textContent = '❤️'.repeat(lives) + (lives < 3 ? '🖤'.repeat(3 - lives) : '');
}

function advance() {
  currentRound++;
  if (currentRound < 10) renderRound();
  else showEndScreen();
}

function updateProgress() {
  const pct = Math.round((currentRound / 10) * 100);
  document.getElementById('progressBar').style.width = `${pct}%`;
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  for (let i = 0; i < 10; i++) {
    const piece = document.createElement('span');
    piece.className = 'confetti-piece';
    piece.textContent = CONFETTI[Math.floor(Math.random() * CONFETTI.length)];
    piece.style.left = (10 + Math.random() * 80) + '%';
    piece.style.animationDelay = (Math.random() * 0.4) + 's';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 1600);
  }
}

function showEndScreen() {
  clearInterval(timerInterval);
  document.getElementById('endScore').textContent = `${score} / 10`;
  let stars, label, emoji;
  if (score >= 9) { stars = '★★★'; label = 'Brilliant!'; emoji = '🏆'; }
  else if (score >= 7) { stars = '★★☆'; label = 'Well Done!'; emoji = '🌟'; }
  else { stars = '★☆☆'; label = 'Keep Trying!'; emoji = '🗺️'; }
  document.getElementById('endStars').textContent = stars;
  document.getElementById('endLabel').textContent = label;
  document.getElementById('endEmoji').textContent = emoji;
  if (bonusStarCount > 0) {
    document.getElementById('endBonus').textContent = `⚡ ${bonusStarCount} speed bonus${bonusStarCount > 1 ? 'es' : ''} earned!`;
  }
  for (let b = 0; b < 3; b++) setTimeout(launchConfetti, b * 300);
  document.getElementById('endOverlay').classList.add('show');
}

function restartGame() {
  currentRound = 0; score = 0; lives = 3; bonusStarCount = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('hearts').textContent = '❤️❤️❤️';
  document.getElementById('endBonus').textContent = '';
  document.getElementById('endOverlay').classList.remove('show');
  generateRounds();
  renderRound();
}

generateRounds();
renderRound();
</script>
<script src="../../js/mathmunch.js"></script>
</body>
</html>
